<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movimentações</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
body{
  font-family:'Inter',sans-serif;
  background:#F5F5F7;
  margin:0;
  color:#111;
}
.top{
  padding:20px 16px 10px;
}
.title{
  font-size:20px;
  font-weight:800;
}
.sub{
  font-size:14px;
  color:#666;
  margin-top:4px;
}
.total{
  margin:20px 16px;
  font-size:28px;
  font-weight:800;
}
.list{
  padding:0 16px 100px;
}
.item{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}
.date{
  font-size:13px;
  color:#777;
  margin-bottom:12px;
}
.value{
  font-size:24px;
  font-weight:800;
  margin-bottom:14px;
}
.meta{
  font-size:15px;
  margin-bottom:8px;
}
.cons{
  font-size:14px;
  color:#555;
  margin-bottom:16px;
}
.actions{
  display:flex;
  gap:10px;
}
.btn{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  font-weight:600;
}
.edit{
  background:#E8F0FF;
  color:#2563EB;
}
.del{
  background:#FEE2E2;
  color:#EF4444;
}
.fab{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#2563EB;
  color:#fff;
  font-size:28px;
  border:none;
}
</style>
</head>
<body>

<div class="top">
  <div class="title">Movimentações</div>
  <div class="sub">João da Feira</div>
</div>

<div class="total">R$ 1.580,00</div>

<div class="list">

  <div class="item">
    <div class="date">05/04/2026</div>
    <div class="value">R$ 120,00</div>
    <div class="meta">Conta Externa</div>
    <div class="cons">Consumo: Sim</div>
    <div class="actions">
      <button class="btn edit">Editar</button>
      <button class="btn del">Excluir</button>
    </div>
  </div>

  <div class="item">
    <div class="date">03/04/2026</div>
    <div class="value">R$ 80,00</div>
    <div class="meta">O Próprio</div>
    <div class="cons">Consumo: Não</div>
    <div class="actions">
      <button class="btn edit">Editar</button>
      <button class="btn del">Excluir</button>
    </div>
  </div>

  <div class="item">
    <div class="date">01/04/2026</div>
    <div class="value">R$ 200,00</div>
    <div class="meta">Nenhum</div>
    <div class="cons">Consumo: Sim</div>
    <div class="actions">
      <button class="btn edit">Editar</button>
      <button class="btn del">Excluir</button>
    </div>
  </div>

</div>

<button class="fab">+</button>

</body>
</html>
