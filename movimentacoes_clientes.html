<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movimentações</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
body{
  font-family:'Inter',sans-serif;
  background:#F5F5F7;
  margin:0;
  color:#111;
}
.top{
  padding:20px 16px 10px;
}
.title{
  font-size:20px;
  font-weight:800;
}
.sub{
  font-size:14px;
  color:#666;
  margin-top:4px;
}
.cliente-box{
  margin-top:10px;
  position:relative;
}
.cliente-input{
  width:100%;
  padding:12px 14px;
  border:none;
  border-radius:12px;
  background:#F2F2F7;
  font-size:14px;
  outline:none;
}
.cliente-lista{
  margin-top:8px;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
  display:none;
  position:absolute;
  left:0;
  right:0;
  z-index:30;
}
.cliente-item{
  padding:12px 14px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.cliente-item:last-child{
  border-bottom:none;
}
.total{
  margin:20px 16px;
  font-size:28px;
  font-weight:800;
}
.list{
  padding:0 16px 100px;
}
.item{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}
.date{
  font-size:13px;
  color:#777;
  margin-bottom:12px;
}
.value{
  font-size:24px;
  font-weight:800;
  margin-bottom:14px;
}
.meta{
  font-size:15px;
  margin-bottom:8px;
}
.cons{
  font-size:14px;
  color:#555;
  margin-bottom:16px;
}
.item{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}
.item-row{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
}
.item-main{
  flex:1;
  min-width:0;
}
.actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.btn{
  padding:9px 12px;
  border-radius:999px;
  border:none;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  background:#F2F2F7;
}
.edit{
  color:#2563EB;
}
.del{
  color:#8E8E93;
}
@media (max-width:520px){
  .item-row{
    gap:10px;
  }
  .btn{
    padding:8px 10px;
    font-size:12px;
  }
}
.fab{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#2563EB;
  color:#fff;
  font-size:28px;
  border:none;
  box-shadow:0 18px 36px rgba(37,99,235,.30);
  cursor:pointer;
}
.fab:active{
  transform:scale(.96);
}
.back-row{
  display:flex;
  align-items:center;
  gap:14px;
}
.back-btn{
  width:44px;
  height:44px;
  border:none;
  border-radius:999px;
  background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:
    0 14px 30px rgba(15,23,42,.14),
    0 4px 10px rgba(15,23,42,.08),
    inset 0 1px 0 rgba(255,255,255,.95);
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  flex-shrink:0;
}
.back-btn:active{
  transform:scale(.96);
  background:linear-gradient(180deg,#F8F8FA 0%,#EAEAEE 100%);
  box-shadow:
    0 8px 18px rgba(15,23,42,.12),
    0 2px 6px rgba(15,23,42,.08),
    inset 0 1px 0 rgba(255,255,255,.9);
}
.back-btn svg{
  width:22px;
  height:22px;
  stroke:#111827;
  fill:none;
  stroke-width:2.75;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.head-copy{min-width:0}
.toast{
  position:fixed;
  left:50%;
  bottom:94px;
  transform:translateX(-50%);
  background:#111827;
  color:#fff;
  padding:10px 14px;
  border-radius:12px;
  font-size:13px;
  display:none;
  z-index:100;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
}
.sheet-overlay{
  position:fixed;
  inset:0;
  background:rgba(17,17,17,.22);
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:14px;
  z-index:90;
}
.sheet-overlay.open{display:flex}
.sheet{
  width:100%;
  max-width:520px;
  background:#fff;
  border-radius:24px 24px 18px 18px;
  padding:14px;
  box-shadow:0 18px 40px rgba(0,0,0,.18);
}
.sheet-handle{
  width:44px;
  height:5px;
  border-radius:999px;
  background:#D1D5DB;
  margin:2px auto 14px;
}
.sheet-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.sheet-title{
  font-size:24px;
  font-weight:800;
}
.sheet-sub{
  font-size:14px;
  color:#666;
  margin-top:4px;
}
.sheet-close{
  width:40px;
  height:40px;
  border:none;
  border-radius:999px;
  background:#F2F2F7;
  color:#6B7280;
  font-size:24px;
  cursor:pointer;
}
.sheet-form{
  display:grid;
  gap:12px;
}
.sheet-field{
  background:#F7F7F9;
  border-radius:16px;
  padding:14px;
}
.sheet-label{
  font-size:12px;
  font-weight:700;
  color:#666;
  margin-bottom:8px;
}
.sheet-input{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  font-size:16px;
  font-weight:600;
  color:#111;
  font-family:'Inter',sans-serif;
}
.sheet-actions{
  display:flex;
  gap:10px;
  margin-top:14px;
}
.sheet-btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}
.sheet-btn.secondary{
  background:#F2F2F7;
  color:#374151;
}
.sheet-btn.primary{
  background:#2563EB;
  color:#fff;
}
</style>
</head>
<body>

<div class="top">
  <div class="back-row">
    <button class="back-btn" id="btn-voltar" type="button" aria-label="Voltar" title="Voltar">
      <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
    </button>
    <div class="head-copy">
      <div class="title">Movimentações</div>
      <div class="sub" id="cliente-nome">Selecione um cliente</div>
    </div>
  </div>
  <div class="cliente-box">
    <input class="cliente-input" id="cliente-input" type="text" placeholder="Buscar cliente..." style="display:none;" autocomplete="off"/>
    <div class="cliente-lista" id="cliente-lista"></div>
  </div>
</div>

<div class="total" id="total-geral">R$ 1.580,00</div>

<div class="list" id="lista-movimentacoes">

  <div class="item">
    <div class="item-row">
      <div class="item-main">
        <div class="date">05/04/2026</div>
        <div class="value">R$ 120,00</div>
        <div class="meta">Conta Externa</div>
        <div class="cons">Consumo: Sim</div>
      </div>
      <div class="actions">
        <button class="btn edit" type="button">Editar</button>
        <button class="btn del" type="button">Excluir</button>
      </div>
    </div>
  </div>

  <div class="item">
    <div class="item-row">
      <div class="item-main">
        <div class="date">03/04/2026</div>
        <div class="value">R$ 80,00</div>
        <div class="meta">O Próprio</div>
        <div class="cons">Consumo: Não</div>
      </div>
      <div class="actions">
        <button class="btn edit" type="button">Editar</button>
        <button class="btn del" type="button">Excluir</button>
      </div>
    </div>
  </div>

  <div class="item">
    <div class="item-row">
      <div class="item-main">
        <div class="date">01/04/2026</div>
        <div class="value">R$ 200,00</div>
        <div class="meta">Nenhum</div>
        <div class="cons">Consumo: Sim</div>
      </div>
      <div class="actions">
        <button class="btn edit" type="button">Editar</button>
        <button class="btn del" type="button">Excluir</button>
      </div>
    </div>
  </div>

</div>

<button class="fab" id="btn-nova" type="button" aria-label="Nova movimentação" title="Nova movimentação">+</button>

<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div>
        <div class="sheet-title">Nova movimentação</div>
        <div class="sheet-sub" id="sheet-cliente">Selecione um cliente</div>
      </div>
      <button class="sheet-close" id="sheet-close" type="button">×</button>
    </div>

    <div class="sheet-form">
      <div class="sheet-field">
        <div class="sheet-label">Data</div>
        <input class="sheet-input" id="mov-data" type="date"/>
      </div>

      <div class="sheet-field">
        <div class="sheet-label">Valor</div>
        <input class="sheet-input" id="mov-valor" type="text" inputmode="decimal" placeholder="R$ 0,00"/>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="sheet-btn secondary" id="btn-cancelar-sheet" type="button">Cancelar</button>
      <button class="sheet-btn primary" id="btn-gravar-sheet" type="button">Gravar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', async function(){
  const clienteNome = new URLSearchParams(window.location.search).get('cliente_nome');
  const clienteId = new URLSearchParams(window.location.search).get('cliente_id');

  const label = document.getElementById('cliente-nome');
  const input = document.getElementById('cliente-input');
  const lista = document.getElementById('cliente-lista');
  const btnVoltar = document.getElementById('btn-voltar');
  const btnNova = document.getElementById('btn-nova');
  const toast = document.getElementById('toast');
  const sheet = document.getElementById('sheet-overlay');
  const sheetClose = document.getElementById('sheet-close');
  const btnCancelarSheet = document.getElementById('btn-cancelar-sheet');
  const btnGravarSheet = document.getElementById('btn-gravar-sheet');
  const sheetCliente = document.getElementById('sheet-cliente');
  const movData = document.getElementById('mov-data');
  const movValor = document.getElementById('mov-valor');

  let clientes = [];
  let clienteSelecionado = clienteId || null;
  let clienteSelecionadoNome = clienteNome ? decodeURIComponent(clienteNome) : '';

  function mostrarToast(msg){
    toast.textContent = msg;
    toast.style.display = 'block';
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(function(){
      toast.style.display = 'none';
    }, 2200);
  }

  function atualizarTotal(){
    const totalEl = document.getElementById('total-geral');
    const valores = Array.from(document.querySelectorAll('.item .value')).map(function(el){
      return Number(String(el.textContent).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.')) || 0;
    });
    const soma = valores.reduce((a,b) => a + b, 0);
    totalEl.textContent = soma.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
  }

  function renderLista(items){
    if (!items.length) {
      lista.innerHTML = '<div class="cliente-item">Nenhum cliente encontrado</div>';
      lista.style.display = 'block';
      return;
    }
    lista.innerHTML = items.map(function(c){
      const nome = String(c.nome || '');
      const safeNome = nome.replace(/"/g, '&quot;');
      return '<div class="cliente-item" data-id="' + c.id + '" data-nome="' + safeNome + '">' + nome + '</div>';
    }).join('');
    lista.style.display = 'block';

    lista.querySelectorAll('.cliente-item[data-id]').forEach(function(el){
      el.addEventListener('click', function(){
        clienteSelecionado = this.dataset.id;
        clienteSelecionadoNome = this.dataset.nome;
        window.clienteSelecionado = clienteSelecionado;
        label.style.display = 'block';
        label.textContent = clienteSelecionadoNome;
        input.style.display = 'none';
        input.value = '';
        lista.style.display = 'none';
        lista.innerHTML = '';
        mostrarToast('Cliente selecionado');
      });
    });
  }

  function abrirFormulario(){
    if (!clienteSelecionado && !clienteSelecionadoNome) {
      mostrarToast('Selecione um cliente primeiro');
      input.focus();
      if (clientes.length) renderLista(clientes.slice(0, 8));
      return;
    }
    sheetCliente.textContent = clienteSelecionadoNome || label.textContent || 'Cliente';
    if (!movData.value) movData.value = new Date().toISOString().slice(0,10);
    sheet.classList.add('open');
  }

  function fecharFormulario(){
    sheet.classList.remove('open');
  }

  if (btnVoltar) {
    btnVoltar.addEventListener('click', function(){
      if (window.history.length > 1) window.history.back();
      else window.location.href = 'dashboard.html';
    });
  }

  document.querySelectorAll('.btn.edit').forEach(function(btn){
    btn.addEventListener('click', abrirFormulario);
  });

  document.querySelectorAll('.btn.del').forEach(function(btn){
    btn.addEventListener('click', function(){
      const item = this.closest('.item');
      if (!item) return;
      item.remove();
      atualizarTotal();
      mostrarToast('Movimentação excluída');
    });
  });

  btnNova.addEventListener('click', abrirFormulario);
  sheetClose.addEventListener('click', fecharFormulario);
  btnCancelarSheet.addEventListener('click', fecharFormulario);
  btnGravarSheet.addEventListener('click', function(){
    mostrarToast('Formulário carregado');
    fecharFormulario();
  });
  sheet.addEventListener('click', function(e){
    if (e.target === sheet) fecharFormulario();
  });

  document.addEventListener('click', function(e){
    if (!input.contains(e.target) && !lista.contains(e.target) && e.target !== input) {
      lista.style.display = 'none';
    }
  });

  movValor.addEventListener('input', function(){
    const raw = this.value.replace(/\D/g, '');
    if (!raw) {
      this.value = '';
      return;
    }
    let n = (parseInt(raw,10) / 100).toFixed(2).replace('.', ',');
    n = n.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    this.value = 'R$ ' + n;
  });

  if (clienteSelecionadoNome) {
    label.textContent = clienteSelecionadoNome;
    input.style.display = 'none';
  } else {
    label.style.display = 'none';
    input.style.display = 'block';
  }

  if (!(window.db && typeof window.db.from === 'function')) {
    lista.innerHTML = '<div class="cliente-item">Supabase não inicializado</div>';
    lista.style.display = 'block';
    mostrarToast('Supabase não inicializado');
    atualizarTotal();
    return;
  }

  try {
    const result = await window.db.from('clientes').select('id, nome').order('nome');
    if (result.error) throw result.error;
    clientes = result.data || [];

    input.addEventListener('focus', function(){
      renderLista(clientes.slice(0, 8));
    });

    input.addEventListener('input', function(){
      const termo = this.value.trim().toLowerCase();
      const filtrados = termo
        ? clientes.filter(function(c){
            return String(c.nome || '').toLowerCase().includes(termo);
          }).slice(0, 8)
        : clientes.slice(0, 8);
      renderLista(filtrados);
    });

    if (!clientes.length) {
      lista.innerHTML = '<div class="cliente-item">Nenhum cliente cadastrado</div>';
      lista.style.display = 'block';
    }
  } catch (err) {
    console.error('Erro ao carregar clientes:', err);
    lista.innerHTML = '<div class="cliente-item">Erro ao carregar clientes</div>';
    lista.style.display = 'block';
    mostrarToast('Erro ao carregar clientes');
  }

  atualizarTotal();
});
</script>
</body>
</html>
