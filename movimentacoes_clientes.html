<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movimentações</title>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
body{
  font-family:'Inter',sans-serif;
  background:#F5F5F7;
  margin:0;
  color:#111;
}
.top{
  padding:20px 16px 10px;
}
.title{
  font-size:20px;
  font-weight:800;
}
.sub{
  font-size:14px;
  color:#666;
  margin-top:4px;
}
.cliente-box{
  margin-top:10px;
}
.cliente-input{
  width:100%;
  padding:12px 14px;
  border:none;
  border-radius:12px;
  background:#F2F2F7;
  font-size:14px;
  outline:none;
}
.cliente-lista{
  margin-top:8px;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
  display:none;
}
.cliente-item{
  padding:12px 14px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.cliente-item:last-child{
  border-bottom:none;
}
.total{
  margin:20px 16px;
  font-size:28px;
  font-weight:800;
}
.list{
  padding:0 16px 100px;
}
.item{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}
.date{
  font-size:13px;
  color:#777;
  margin-bottom:12px;
}
.value{
  font-size:24px;
  font-weight:800;
  margin-bottom:14px;
}
.meta{
  font-size:15px;
  margin-bottom:8px;
}
.cons{
  font-size:14px;
  color:#555;
  margin-bottom:16px;
}
.actions{
  display:flex;
  gap:10px;
}
.btn{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  font-weight:600;
}
.edit{
  background:#E8F0FF;
  color:#2563EB;
}
.del{
  background:#FEE2E2;
  color:#EF4444;
}
.fab{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#2563EB;
  color:#fff;
  font-size:28px;
  border:none;
}
</style>
</head>
<body>

<div class="top">
  <div class="title">Movimentações</div>
  <div class="sub" id="cliente-nome">Selecione um cliente</div>
  <div class="cliente-box">
    <input class="cliente-input" id="cliente-input" type="text" placeholder="Buscar cliente..." style="display:none;" autocomplete="off"/>
    <div class="cliente-lista" id="cliente-lista"></div>
  </div>
</div>

<div class="total">R$ 1.580,00</div>

<div class="list">

  <div class="item">
    <div class="date">05/04/2026</div>
    <div class="value">R$ 120,00</div>
    <div class="meta">Conta Externa</div>
    <div class="cons">Consumo: Sim</div>
    <div class="actions">
      <button class="btn edit">Editar</button>
      <button class="btn del">Excluir</button>
    </div>
  </div>

  <div class="item">
    <div class="date">03/04/2026</div>
    <div class="value">R$ 80,00</div>
    <div class="meta">O Próprio</div>
    <div class="cons">Consumo: Não</div>
    <div class="actions">
      <button class="btn edit">Editar</button>
      <button class="btn del">Excluir</button>
    </div>
  </div>

  <div class="item">
    <div class="date">01/04/2026</div>
    <div class="value">R$ 200,00</div>
    <div class="meta">Nenhum</div>
    <div class="cons">Consumo: Sim</div>
    <div class="actions">
      <button class="btn edit">Editar</button>
      <button class="btn del">Excluir</button>
    </div>
  </div>

</div>

<button class="fab">+</button>


<script>
(async function(){
  const db = window.db;
  const params = new URLSearchParams(window.location.search);
  const clienteNome = params.get('cliente_nome');
  const clienteId = params.get('cliente_id');

  const label = document.getElementById('cliente-nome');
  const input = document.getElementById('cliente-input');
  const lista = document.getElementById('cliente-lista');

  let clientes = [];
  let clienteSelecionado = clienteId || null;

  function selecionarCliente(id, nome){
    clienteSelecionado = id;
    label.style.display = 'block';
    label.textContent = nome;
    input.style.display = 'none';
    input.value = '';
    lista.style.display = 'none';
    lista.innerHTML = '';
    window.clienteSelecionado = clienteSelecionado;
  }

  function renderLista(items){
    if (!items.length) {
      lista.innerHTML = '<div class="cliente-item">Nenhum cliente encontrado</div>';
      lista.style.display = 'block';
      return;
    }

    lista.innerHTML = items.map(c =>
      `<div class="cliente-item" data-id="${c.id}" data-nome="${String(c.nome).replace(/"/g, '&quot;')}">${c.nome}</div>`
    ).join('');
    lista.style.display = 'block';

    lista.querySelectorAll('.cliente-item[data-id]').forEach(el => {
      el.addEventListener('click', function(){
        selecionarCliente(this.dataset.id, this.dataset.nome);
      });
    });
  }

  if (clienteNome) {
    label.textContent = decodeURIComponent(clienteNome);
    input.style.display = 'none';
    window.clienteSelecionado = clienteSelecionado;
    return;
  }

  label.style.display = 'none';
  input.style.display = 'block';

  if (!db) return;

  const { data, error } = await db
    .from('clientes')
    .select('id, nome')
    .order('nome');

  clientes = data || [];
  if (error) {
    lista.innerHTML = '<div class="cliente-item">Erro ao carregar clientes</div>';
    lista.style.display = 'block';
    return;
  }

  input.addEventListener('input', function(){
    const termo = this.value.trim().toLowerCase();

    if (!termo) {
      lista.innerHTML = '';
      lista.style.display = 'none';
      return;
    }

    const filtrados = clientes.filter(c =>
      String(c.nome || '').toLowerCase().includes(termo)
    ).slice(0, 8);

    renderLista(filtrados);
  });
})();
</script>

</body>
</html>
