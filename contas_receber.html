<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Contas a Receber</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-y:none;}
.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:#1C1C1E;}
.topbar-sub{font-size:10px;color:#10B981;font-weight:500;}
.ios-btn-float{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;}
.filtro-bar{padding:0 16px 10px;display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0;}


.cidade-select-btn{display:flex;align-items:center;gap:6px;background:#FFF;border:none;border-radius:20px;padding:8px 14px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:#1C1C1E;box-shadow:0 1px 4px rgba(0,0,0,0.06);cursor:pointer;}
.filtro-count{font-size:11px;color:#8E8E93;font-weight:500;}

.lista-card{flex:1;margin:0 16px 0;background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.lista-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px 4px;}

.cliente-row{padding:13px 16px;border-radius:14px;border:1px solid #E5E5EA;display:flex;flex-direction:column;gap:4px;position:relative;margin:0 0 8px 0;background:#FFF;}

.cliente-row:active{opacity:0.8;}
.cliente-row.sem-pagamento{background:#FFF5F5;border-color:#FCA5A5;}



.cliente-row-top{display:flex;align-items:center;justify-content:space-between;}
.cliente-nome{font-size:13px;font-weight:400;color:#1C1C1E;}
.cliente-notas-count{font-size:11px;color:#8E8E93;font-weight:400;}
.cliente-row-bottom{display:none;}
.val-num.saldo{font-size:12px;font-weight:500;color:#1C1C1E;}
.val-num.zerado{font-size:12px;font-weight:500;color:#10B981;}
.chevron-btn{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;}

.totais-bar{padding:10px 14px;border-top:1px solid #E5E5EA;display:flex;gap:0;flex-shrink:0;}
.total-item{flex:1;display:flex;flex-direction:column;gap:2px;}
.total-item:not(:last-child){border-right:0.5px solid #EFEFEF;margin-right:10px;padding-right:10px;}
.total-label{font-size:8px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.3px;}
.total-val{font-size:12px;font-weight:700;}
.paginacao{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px 16px;flex-shrink:0;}
.pag-btn{width:32px;height:32px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,0.08);cursor:pointer;}
.pag-btn:disabled{opacity:0.3;pointer-events:none;}
.pag-info{font-size:12px;font-weight:500;color:#8E8E93;}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:#C7C7CC;}

/* Select cidade dropdown */
.cidade-dropdown{position:fixed;z-index:9999;background:#FFF;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.14);overflow:hidden;display:none;min-width:180px;}
.cidade-dropdown-item{padding:13px 16px;font-size:14px;cursor:pointer;border-bottom:0.5px solid #F2F2F7;}
.cidade-dropdown-item:last-child{border-bottom:none;}
.cidade-dropdown-item:active{background:#F2F2F7;}
.cidade-dropdown-item.ativa{color:#007AFF;font-weight:600;}
.dropdown-overlay{position:fixed;inset:0;z-index:9998;display:none;}
.dropdown-overlay.active{display:block;}

/* Context menu */
.ctx-overlay{position:fixed;inset:0;z-index:9990;background:transparent;display:none;}
.ctx-overlay.active{display:block;}
.ctx-menu{position:fixed;z-index:9991;width:170px;background:#FFF;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.14);overflow:hidden;display:none;}
.ctx-title{padding:8px 14px;font-size:10px;color:#8E8E93;font-weight:500;border-bottom:0.5px solid #EBEBEB;}
.ctx-item{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.ctx-item:not(:last-child){border-bottom:0.5px solid #EBEBEB;}
.ctx-item:active{background:#F5F5F5;}
.ctx-item svg{width:18px;height:18px;fill:none;stroke:#444;stroke-width:1.5;flex-shrink:0;}
.ctx-item span{font-size:14px;color:#1C1C1E;}

/* Modal detalhar notas */
.modal-overlay{position:fixed;inset:0;background:transparent;z-index:9995;display:none;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}

.modal{background:#FFF;border-radius:20px;padding:20px 18px 28px;width:calc(100% - 48px);max-width:400px;box-shadow:0 16px 48px rgba(0,0,0,0.18);}

.modal-title{font-size:14px;font-weight:700;color:#1C1C1E;margin-bottom:14px;}
.notas-grid-header{display:grid;grid-template-columns:70px 1fr 1fr 1fr;padding:6px 0;border-bottom:0.5px solid #E0E0E0;margin-bottom:4px;}
.notas-grid-header span{font-size:9px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.3px;text-align:right;}
.notas-grid-header span:first-child{text-align:left;}
.nota-row{display:grid;grid-template-columns:70px 1fr 1fr 1fr;padding:8px 0;border-bottom:0.5px solid #F5F5F5;}
.nota-row span{font-size:12px;font-weight:500;color:#1C1C1E;text-align:right;}
.nota-row span:first-child{color:#8E8E93;text-align:left;}
.nota-row .r{color:#EF4444;}
.nota-row .g{color:#10B981;}
.modal-close{width:100%;margin-top:14px;padding:13px;background:#F2F2F7;border:none;border-radius:14px;color:#1C1C1E;font-size:15px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn-float" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Contas a Receber</div>
    <div class="topbar-sub" id="status-sinc">Carregando...</div>
  </div>
  <div style="width:38px;"></div>
</div>

<div class="filtro-bar">
  <button class="cidade-select-btn" id="btn-cidade" onclick="abrirDropdownCidade(event)">
    <span id="cidade-label">Todas as cidades</span>
    <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:#8E8E93;stroke-width:2.5;fill:none"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
  </button>

</div>

<div class="lista-card">
  <div class="lista-scroll" id="lista-scroll">
    <div class="empty-state">Carregando...</div>
  </div>
  <div class="totais-bar" id="totais-bar" style="display:none;">
    <div class="total-item">
      <span class="total-label">Em Aberto</span>
      <span class="total-val" id="total-aberto" style="color:#EF4444;">R$ 0,00</span>
    </div>
    <div class="total-item">
      <span class="total-label">Pagamentos</span>
      <span class="total-val" id="total-pago" style="color:#10B981;">R$ 0,00</span>
    </div>
    <div class="total-item">
      <span class="total-label">Saldo</span>
      <span class="total-val" id="total-saldo">R$ 0,00</span>
    </div>
  </div>
</div>

<div class="paginacao" id="paginacao" style="display:none;">
  <button class="pag-btn" id="btn-prev" onclick="mudarPagina(-1)">
    <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <span class="pag-info" id="pag-info">1 / 1</span>
  <button class="pag-btn" id="btn-next" onclick="mudarPagina(1)">
    <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
  </button>
</div>

<!-- Dropdown cidades -->
<div class="dropdown-overlay" id="dropdown-overlay" onclick="fecharDropdownCidade()"></div>
<div class="cidade-dropdown" id="cidade-dropdown"></div>

<!-- Context menu -->
<div class="ctx-overlay" id="ctx-overlay" onclick="fecharCtx()"></div>
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-title" id="ctx-title"></div>
  <div class="ctx-item" onclick="irMovimentos()">
    <svg viewBox="0 0 24 24"><path d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75"/></svg>
    <span>Movimentos</span>
  </div>
  <div class="ctx-item" onclick="abrirDetalharNotas()">
    <svg viewBox="0 0 24 24"><path d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/></svg>
    <span>Detalhar Notas</span>
  </div>
</div>

<!-- Modal detalhar notas -->
<div class="modal-overlay" id="modal-notas">
  <div class="modal">
    <div class="modal-title" id="modal-notas-title"></div>
    <div class="notas-grid-header">
      <span style="text-align:left;">Data</span>
      <span>Nominal</span>
      <span>Pago</span>
      <span>Saldo</span>
    </div>
    <div id="modal-notas-body"></div>
    <button class="modal-close" onclick="fecharModal()">Fechar</button>
  </div>
</div>

<script>
const POR_PAGINA = 15;
let _todosClientes = [];
let _dadosClientes = [];
let _cidadeSelecionada = 'todas';
let _cidades = [];
let _paginaAtual = 1;
let _ctxClienteId = null;
let _ctxClienteNome = null;
let _cicloAtual = null;

const fmt = v => Number(v).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

function setStatus(msg, cor = '#10B981') {
  const el = document.getElementById('status-sinc');
  el.textContent = msg;
  el.style.color = cor;
}

function setAtualizado() {
  const agora = new Date();
  const hh = String(agora.getHours()).padStart(2,'0');
  const mi = String(agora.getMinutes()).padStart(2,'0');
  setStatus(`Atualizado ${hh}:${mi}`);
}


async function init() {
  window.HHUtils.atualizarCicloAtualGlobal();
  _cicloAtual = window.cicloAtual;
  setStatus('Carregando...', '#3B82F6');

  const { data: clientes } = await window.db
    .from('clientes')
    .select('id, nome, cidade')
    .order('nome');

  if (!clientes || clientes.length === 0) {
    setStatus('Sincronizado');
    document.getElementById('lista-scroll').innerHTML = '<div class="empty-state">Nenhum cliente encontrado</div>';
    return;
  }

  _todosClientes = clientes;
    _cidades = ['todas', ...new Set(clientes.map(c => c.cidade).filter(Boolean).sort())];
  const paramCidade = new URLSearchParams(window.location.search).get('cidade');
  if(paramCidade) _cidadeSelecionada = paramCidade;
  document.getElementById('cidade-label').textContent = _cidadeSelecionada === 'todas' ? 'Todas as cidades' : _cidadeSelecionada;
  montarDropdownCidades();


  await carregarDados();
}

async function carregarDados() {
  setStatus('Carregando...', '#3B82F6');

  const clientesFiltrados = _cidadeSelecionada === 'todas'
    ? _todosClientes
    : _todosClientes.filter(c => c.cidade === _cidadeSelecionada);

  const ids = clientesFiltrados.map(c => c.id);
  if (ids.length === 0) {
    _dadosClientes = [];
    renderizarLista();
    setStatus('Sincronizado');
    return;
  }

  const d0Str = _cicloAtual.d0.toISOString().split('T')[0];
  const d7Str = _cicloAtual.d7.toISOString().split('T')[0];

  const [{ data: pedidos }, { data: movimentos }] = await Promise.all([
    window.db.from('pedidos_vendas').select('id, cliente_id, data, total_venda, em_aberto').in('cliente_id', ids),
    window.db.from('movimentos_clientes').select('cliente_id, valor').in('cliente_id', ids).eq('status', 0)
  ]);

  _dadosClientes = clientesFiltrados.map(cliente => {
    const pedidosCliente = (pedidos || []).filter(p => p.cliente_id === cliente.id);
    const movsCliente = (movimentos || []).filter(m => m.cliente_id === cliente.id);
    const totalAberto = pedidosCliente.reduce((a, p) => a + (parseFloat(p.em_aberto) || 0), 0);
    const totalPago = movsCliente.reduce((a, m) => a + (parseFloat(m.valor) || 0), 0);
    const saldo = totalAberto - totalPago;


    const temLancamentoCiclo = pedidosCliente.some(p => {
      const dataStr = p.data ? p.data.split('T')[0] : '';
      return dataStr >= d0Str && dataStr <= d7Str;
    });
    return {
      id: cliente.id,
      nome: cliente.nome,
      notas: pedidosCliente.filter(p => (parseFloat(p.em_aberto) || 0) > 0).length,

      totalAberto,
      totalPago,
      saldo,
      temLancamentoCiclo,
      pedidos: pedidosCliente
    };
  }).filter(c => c.notas > 0 || c.totalPago > 0);

  _dadosClientes = _dadosClientes.filter(c => c.saldo > 0);
_dadosClientes.sort((a, b) => b.saldo - a.saldo);

  _paginaAtual = 1;
  renderizarLista();
  setStatus('Sincronizado');
}

function renderizarLista() {
  const total = _dadosClientes.length;
  const totalPags = Math.max(1, Math.ceil(total / POR_PAGINA));
  if (_paginaAtual > totalPags) _paginaAtual = totalPags;

  const inicio = (_paginaAtual - 1) * POR_PAGINA;
  const pagina = _dadosClientes.slice(inicio, inicio + POR_PAGINA);



  const lista = document.getElementById('lista-scroll');
  if (pagina.length === 0) {
    lista.innerHTML = '<div class="empty-state">Nenhum cliente com movimentação</div>';
    document.getElementById('totais-bar').style.display = 'none';
    document.getElementById('paginacao').style.display = 'none';
    return;
  }

  lista.innerHTML = pagina.map(c => {
    const zerado = c.saldo <= 0;
    return `<div class="cliente-row${c.totalPago <= 0 ? ' sem-pagamento' : ''}">

            <div class="cliente-row-top">
        <div>
          <span class="cliente-nome">${c.nome} </span>
          <span class="cliente-notas-count">(${c.notas})</span>
        </div>
        <div class="chevron-btn" onclick="abrirCtx('${c.id}','${c.nome.replace(/'/g,"\\'")}',event)">
          <span class="val-num ${zerado ? 'zerado' : 'saldo'}">${fmt(c.saldo)}</span>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#C7C7CC" stroke-width="2.5" stroke-linecap="round"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
      </div>

    </div>`;
  }).join('');

  // Totais
  const somaAberto = _dadosClientes.reduce((a, c) => a + c.totalAberto, 0);
  const somaPago = _dadosClientes.reduce((a, c) => a + c.totalPago, 0);
  const somaSaldo = _dadosClientes.reduce((a, c) => a + c.saldo, 0);
  document.getElementById('total-aberto').textContent = fmt(somaAberto);
  document.getElementById('total-pago').textContent = fmt(somaPago);
  document.getElementById('total-saldo').textContent = fmt(somaSaldo);
  document.getElementById('totais-bar').style.display = 'flex';

  // Paginação
  const pag = document.getElementById('paginacao');
  if (totalPags > 1) {
    pag.style.display = 'flex';
    document.getElementById('pag-info').textContent = `${_paginaAtual} / ${totalPags}`;
    document.getElementById('btn-prev').disabled = _paginaAtual === 1;
    document.getElementById('btn-next').disabled = _paginaAtual === totalPags;
  } else {
    pag.style.display = 'none';
  }
}

function mudarPagina(delta) {
  _paginaAtual += delta;
  renderizarLista();
  document.getElementById('lista-scroll').scrollTop = 0;
}

function montarDropdownCidades() {
  const dropdown = document.getElementById('cidade-dropdown');
  dropdown.innerHTML = _cidades.map(c => `
    <div class="cidade-dropdown-item${c === _cidadeSelecionada ? ' ativa' : ''}" onclick="selecionarCidade('${c}')">
      ${c === 'todas' ? 'Todas as cidades' : c}
    </div>`).join('');
}

function abrirDropdownCidade(event) {
  const btn = document.getElementById('btn-cidade');
  const rect = btn.getBoundingClientRect();
  const dropdown = document.getElementById('cidade-dropdown');
  dropdown.style.top = (rect.bottom + 6) + 'px';
  dropdown.style.left = rect.left + 'px';
  dropdown.style.display = 'block';
  document.getElementById('dropdown-overlay').classList.add('active');
}

function fecharDropdownCidade() {
  document.getElementById('cidade-dropdown').style.display = 'none';
  document.getElementById('dropdown-overlay').classList.remove('active');
}

function selecionarCidade(cidade) {
  _cidadeSelecionada = cidade;
  document.getElementById('cidade-label').textContent = cidade === 'todas' ? 'Todas as cidades' : cidade;
  montarDropdownCidades();
  fecharDropdownCidade();
  carregarDados();
}

function abrirCtx(clienteId, clienteNome, event) {
  event.stopPropagation();
  _ctxClienteId = clienteId;
  _ctxClienteNome = clienteNome;
  document.getElementById('ctx-title').textContent = clienteNome;
  const menu = document.getElementById('ctx-menu');
  const y = event.clientY, x = event.clientX;
  const mW = 170, mH = 100;
  const vW = window.innerWidth, vH = window.innerHeight;
  let top = y + 8, left = x - mW / 2;
  if (top + mH > vH - 20) top = y - mH - 8;
  if (left < 10) left = 10;
  if (left + mW > vW - 10) left = vW - mW - 10;
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';
  menu.style.display = 'block';
  document.getElementById('ctx-overlay').classList.add('active');
}

function fecharCtx() {
  document.getElementById('ctx-menu').style.display = 'none';
  document.getElementById('ctx-overlay').classList.remove('active');
}

function irMovimentos() {
  fecharCtx();
  window.location.href = `movimentacoes_clientes.html?cliente_id=${_ctxClienteId}&cliente_nome=${encodeURIComponent(_ctxClienteNome)}&origem=contas_receber&cidade=${encodeURIComponent(_cidadeSelecionada)}`;
}


async function abrirDetalharNotas() {
  fecharCtx();
  const cliente = _dadosClientes.find(c => c.id === _ctxClienteId);
  if (!cliente) return;

  document.getElementById('modal-notas-title').textContent = 'Extrato Detalhado — ' + cliente.nome;



  // Distribuir pagamentos pelas notas (FIFO)
  const pedidosOrdenados = [...cliente.pedidos].filter(p => (parseFloat(p.em_aberto) || 0) > 0).sort((a, b) => new Date(a.data) - new Date(b.data));
  let pagoDisp = cliente.totalPago;

  let saldoAcum = 0;
  const rows = pedidosOrdenados.map(p => {
    const nominal = parseFloat(p.em_aberto) || 0;
    const pago = Math.min(pagoDisp, nominal);
    pagoDisp = Math.max(0, pagoDisp - nominal);
    const saldo = nominal - pago;
    saldoAcum += saldo;
    const dataStr = p.data ? p.data.split('T')[0] : '';
    const [aa, mm, dd] = dataStr.split('-');
    const dataFmt = `${dd}/${mm}/${aa ? aa.substring(2) : ''}`;
    return `<div class="nota-row">
      <span>${dataFmt}</span>
      <span>${fmt(nominal)}</span>
      <span class="g">${fmt(pago)}</span>
      <span class="${saldoAcum > 0 ? 'r' : 'g'}">${fmt(saldoAcum)}</span>
    </div>`;
  }).join('');






  document.getElementById('modal-notas-body').innerHTML = rows;
  document.getElementById('modal-notas').classList.add('active');
}

function fecharModal() {
  document.getElementById('modal-notas').classList.remove('active');
}

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight);
fixHeight();
init();
</script>
</body>
</html>
