<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>HuberHorti · Patrimônio</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0C10;
  --surface:#111318;
  --border:#1E2230;
  --accent:#3B9EFF;
  --text:#E8EDF5;
  --muted:#4A5568;
  --green:#34D399;
  --yellow:#FBBF24;
  --purple:#A78BFA;
  --red:#F87171;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;}
.page{max-width:960px;margin:0 auto;padding:24px 16px 48px;}

.topbar{display:flex;align-items:center;gap:14px;margin-bottom:32px;}
.btn-back{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.logo{font-size:16px;font-weight:800;letter-spacing:-0.5px;flex:1;}
.logo span{color:var(--accent);}
.topbar-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}

.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.kpi-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.kpi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--text);margin-top:6px;}

.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 20px 12px;}
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.chart-title{font-size:13px;font-weight:700;color:var(--text);}
.chart-subtitle{font-size:10px;color:var(--muted);margin-top:2px;}
.filters{display:flex;gap:6px;}
.filter-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.filter-btn.active,.filter-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

.legenda{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

.canvas-wrap{position:relative;width:100%;height:300px;}
canvas{width:100%!important;height:100%!important;}

.tooltip{position:absolute;pointer-events:none;background:#1A1F2E;border:1px solid var(--border);border-radius:10px;padding:10px 14px;opacity:0;transition:opacity .1s;z-index:20;white-space:nowrap;}
.tooltip-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:6px;}
.tooltip-row{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.tooltip-row:last-child{margin-bottom:0;}

.crosshair{position:absolute;top:0;bottom:0;width:1px;background:rgba(59,158,255,0.25);pointer-events:none;display:none;}

.loading{text-align:center;padding:60px;font-size:13px;color:var(--muted);}
.erro{text-align:center;padding:60px;font-size:13px;color:var(--red);}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <button class="btn-back" onclick="window.location.href='consolidado.html'">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#E8EDF5;stroke-width:2.5;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
    </button>
    <div class="logo">Huber<span>Horti</span></div>
    <div class="topbar-title">Patrimônio</div>
  </div>

  <div id="kpis" class="kpis" style="display:none;">
    <div class="kpi">
      <div class="kpi-label"><span class="kpi-dot" style="background:#3B9EFF"></span>Saldo Livre</div>
      <div class="kpi-val" id="kpi-saldo">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label"><span class="kpi-dot" style="background:#FBBF24"></span>Ativos · Custo</div>
      <div class="kpi-val" id="kpi-custo">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label"><span class="kpi-dot" style="background:#A78BFA"></span>Ativos · Mercado</div>
      <div class="kpi-val" id="kpi-mercado">—</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title">Evolução Patrimonial</div>
        <div class="chart-subtitle" id="chart-range">—</div>
      </div>
      <div class="filters">
        <button class="filter-btn" data-p="3">3M</button>
        <button class="filter-btn" data-p="6">6M</button>
        <button class="filter-btn" data-p="12">1A</button>
        <button class="filter-btn active" data-p="0">Tudo</button>
      </div>
    </div>
    <div class="legenda">
      <div class="leg-item"><span class="leg-dot" style="background:#3B9EFF"></span>Saldo Livre</div>
      <div class="leg-item"><span class="leg-dot" style="background:#FBBF24"></span>+ Custo Aberto</div>
      <div class="leg-item"><span class="leg-dot" style="background:#A78BFA"></span>+ Valor Mercado</div>
    </div>
    <div id="loading" class="loading">Carregando dados...</div>
    <div id="erro" class="erro" style="display:none;"></div>
    <div class="canvas-wrap" id="canvas-wrap" style="display:none;">
      <canvas id="grafico"></canvas>
      <div class="crosshair" id="crosshair"></div>
      <div class="tooltip" id="tooltip">
        <div class="tooltip-date" id="tt-date"></div>
        <div class="tooltip-row" id="tt-row-saldo"></div>
        <div class="tooltip-row" id="tt-row-custo" style="display:none"></div>
        <div class="tooltip-row" id="tt-row-mercado" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API_KEY = '3366384ac03a400c84f239e16cb5c4bd';
const fmtUSD = v => '$' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtShort = v => {
  const a = Math.abs(v);
  if(a >= 1000000) return '$'+(v/1000000).toFixed(1)+'M';
  if(a >= 1000) return '$'+(v/1000).toFixed(1)+'K';
  return '$'+v.toFixed(0);
};

let _pontosBase = [];
let _custoAberto = 0;
let _valorMercado = 0;
let _periodoMeses = 0;

async function carregarDados() {
  try {
    const [{ data: transacoes, error: e1 }, { data: transferencias, error: e2 }] = await Promise.all([
      window.db.from('transacoes').select('ativo_id,tipo_operacao,data,quantidade_ativo,valor_total_usd,ativos(id,ticker)').order('data'),
      window.db.from('transferencias').select('tipo,valor_origem,valor_destino,data').order('data')
    ]);

    if (e1 || e2) throw new Error(e1?.message || e2?.message);

    // ── Saldo livre histórico ────────────────────────────────────
    const eventos = [];
    (transferencias||[]).forEach(t => {
      const delta = t.tipo==='D' ? parseFloat(t.valor_destino) : -parseFloat(t.valor_origem);
      if (!isNaN(delta)) eventos.push({ data: new Date(t.data), delta });
    });
    (transacoes||[]).forEach(t => {
      const valor = parseFloat(t.valor_total_usd)||0;
      let delta = 0;
      if (t.tipo_operacao==='LA'||t.tipo_operacao==='SA') delta = -valor;
      else if (t.tipo_operacao==='LF'||t.tipo_operacao==='SF') delta = +valor;
      if (delta !== 0) eventos.push({ data: new Date(t.data), delta });
    });
    eventos.sort((a,b)=>a.data-b.data);
    let s = 0;
    _pontosBase = eventos.filter(e=>!isNaN(e.data)).map(e=>{ s+=e.delta; return {data:e.data,saldo:s,delta:e.delta}; });

    // ── Custo em aberto (FIFO por ativo) ─────────────────────────
    const porAtivo = {};
    (transacoes||[]).forEach(t => {
      const aid = t.ativo_id;
      if (!porAtivo[aid]) porAtivo[aid] = { ticker: t.ativos?.ticker||'?', txs:[] };
      porAtivo[aid].txs.push(t);
    });

    let custoAberto = 0;
    const qtdsAbertas = {}; // ticker -> qtd aberta

    Object.values(porAtivo).forEach(({ticker, txs}) => {
      txs.sort((a,b)=>new Date(a.data)-new Date(b.data));
      let qtdL=0, custoL=0, pmL=0, qtdS=0, custoS=0, pmS=0;
      txs.forEach(t => {
        const qtd = parseFloat(t.quantidade_ativo)||0;
        const val = parseFloat(t.valor_total_usd)||0;
        if (t.tipo_operacao==='LA') {
          const nq=qtdL+qtd; pmL=nq>0?(custoL+val)/nq:0; qtdL=nq; custoL+=val;
        } else if (t.tipo_operacao==='LF') {
          qtdL-=qtd; custoL=qtdL*pmL;
        } else if (t.tipo_operacao==='SA') {
          const nq=qtdS+qtd; pmS=nq>0?(custoS+val)/nq:0; qtdS=nq; custoS+=val;
        } else if (t.tipo_operacao==='SF') {
          qtdS-=qtd; custoS=qtdS*pmS;
        }
      });
      if (custoL>0.01) { custoAberto+=custoL; qtdsAbertas[ticker]=(qtdsAbertas[ticker]||0)+qtdL; }
      if (custoS>0.01) { custoAberto+=custoS; } // short: margem travada
    });
    _custoAberto = custoAberto;

    // ── Cotações para valor de mercado ───────────────────────────
    const tickers = Object.keys(qtdsAbertas);
    let valorMercado = 0;
    if (tickers.length > 0) {
      try {
        const r = await fetch(`https://api.twelvedata.com/price?symbol=${tickers.join(',')}&apikey=${API_KEY}`);
        const d = await r.json();
        tickers.forEach(tk => {
          const p = tickers.length===1 ? parseFloat(d.price)||0 : parseFloat(d[tk]?.price)||0;
          valorMercado += p * (qtdsAbertas[tk]||0);
        });
        // Adiciona custo dos shorts (margem não tem preço de mercado separado)
        Object.values(porAtivo).forEach(({txs}) => {
          let qtdS=0,custoS=0,pmS=0;
          txs.forEach(t=>{
            const qtd=parseFloat(t.quantidade_ativo)||0, val=parseFloat(t.valor_total_usd)||0;
            if(t.tipo_operacao==='SA'){const nq=qtdS+qtd;pmS=nq>0?(custoS+val)/nq:0;qtdS=nq;custoS+=val;}
            else if(t.tipo_operacao==='SF'){qtdS-=qtd;custoS=qtdS*pmS;}
          });
          if(custoS>0.01) valorMercado+=custoS;
        });
      } catch(e) { valorMercado = custoAberto; }
    } else {
      valorMercado = 0;
    }
    _valorMercado = valorMercado;

    // ── KPIs ─────────────────────────────────────────────────────
    const saldoAtual = _pontosBase.length>0 ? _pontosBase[_pontosBase.length-1].saldo : 0;
    document.getElementById('kpis').style.display = 'grid';
    document.getElementById('kpi-saldo').textContent = fmtUSD(saldoAtual);
    document.getElementById('kpi-custo').textContent = fmtUSD(_custoAberto);
    document.getElementById('kpi-mercado').textContent = fmtUSD(_valorMercado);
    document.getElementById('kpi-mercado').style.color = _valorMercado >= _custoAberto ? '#34D399' : '#F87171';

    renderizarGrafico();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('erro').style.display = 'block';
    document.getElementById('erro').textContent = 'Erro: ' + e.message;
  }
}

function renderizarGrafico() {
  if (!_pontosBase.length) { document.getElementById('loading').textContent='Sem dados.'; return; }

  let pontos = _pontosBase;
  if (_periodoMeses > 0) {
    const corte = new Date(); corte.setMonth(corte.getMonth()-_periodoMeses);
    const idx = _pontosBase.findIndex(p=>p.data>=corte);
    if (idx>0) pontos=[{..._pontosBase[idx-1],data:corte},..._pontosBase.slice(idx)];
    else if (idx<0) pontos=_pontosBase.slice(-1);
  }

  const porDia={}, deltaDia={};
  pontos.forEach(p=>{
    const k=p.data.toISOString().split('T')[0];
    porDia[k]=p.saldo; deltaDia[k]=(deltaDia[k]||0)+p.delta;
  });

  const dias=Object.keys(porDia).sort();
  const valores=dias.map(k=>porDia[k]);
  const deltas=dias.map(k=>deltaDia[k]);

  const d1=new Date(dias[0]), d2=new Date(dias[dias.length-1]);
  document.getElementById('chart-range').textContent =
    d1.toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'})+' – '+
    d2.toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'});

  document.getElementById('loading').style.display='none';
  const wrap=document.getElementById('canvas-wrap');
  wrap.style.display='block';
  desenharCanvas(dias, valores, deltas, wrap);
}

function desenharCanvas(labels, valores, deltas, wrap) {
  const canvas=document.getElementById('grafico');
  const dpr=window.devicePixelRatio||1;
  const W=wrap.clientWidth, H=wrap.clientHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const PL=64,PR=70,PT=16,PB=30;
  const gW=W-PL-PR, gH=H-PT-PB;

  const saldoFinal=valores[valores.length-1];
  const valCusto=saldoFinal+_custoAberto;
  const valMerc=saldoFinal+_valorMercado;

  const allVals=[...valores,valCusto,valMerc];
  const minV=Math.min(...allVals,0);
  const maxV=Math.max(...allVals);
  const range=maxV-minV||1;

  const xOf=i=>PL+(i/Math.max(labels.length-1,1))*gW;
  const yOf=v=>PT+gH-((v-minV)/range)*gH;
  const xFim=xOf(labels.length-1);

  // Grid
  for(let t=0;t<=5;t++){
    const y=PT+(t/5)*gH;
    ctx.strokeStyle='#1E2230'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(PL,y); ctx.lineTo(W-PR,y); ctx.stroke();
    ctx.fillStyle='#4A5568'; ctx.font='500 9px "JetBrains Mono"'; ctx.textAlign='right';
    ctx.fillText(fmtShort(maxV-(t/5)*range), PL-6, y+3);
  }

  // X labels
  ctx.fillStyle='#4A5568'; ctx.font='500 9px "JetBrains Mono"'; ctx.textAlign='center';
  const xStep=Math.ceil(labels.length/8);
  for(let i=0;i<labels.length;i+=xStep)
    ctx.fillText(new Date(labels[i]).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}), xOf(i), H-8);

  // Área azul
  const gradAzul=ctx.createLinearGradient(0,PT,0,PT+gH);
  gradAzul.addColorStop(0,'rgba(59,158,255,0.28)');
  gradAzul.addColorStop(1,'rgba(59,158,255,0.0)');
  ctx.beginPath();
  ctx.moveTo(xOf(0),yOf(valores[0]));
  for(let i=1;i<valores.length;i++) ctx.lineTo(xOf(i),yOf(valores[i]));
  ctx.lineTo(xFim,yOf(Math.max(minV,0)));
  ctx.lineTo(xOf(0),yOf(Math.max(minV,0)));
  ctx.closePath(); ctx.fillStyle=gradAzul; ctx.fill();

  // Linha azul
  ctx.beginPath(); ctx.moveTo(xOf(0),yOf(valores[0]));
  for(let i=1;i<valores.length;i++) ctx.lineTo(xOf(i),yOf(valores[i]));
  ctx.strokeStyle='#3B9EFF'; ctx.lineWidth=1.5; ctx.lineJoin='round';
  ctx.setLineDash([]); ctx.stroke();

  // Pontos de evento
  deltas.forEach((d,i)=>{
    if(Math.abs(d)<0.01) return;
    ctx.beginPath(); ctx.arc(xOf(i),yOf(valores[i]),3.5,0,Math.PI*2);
    ctx.fillStyle=d>=0?'#34D399':'#F87171'; ctx.fill();
  });

  // ── Projeções a partir do último ponto ───────────────────────
  const ySaldo=yOf(saldoFinal);
  const yCusto=yOf(valCusto);
  const yMerc=yOf(valMerc);
  const xProj=xFim+36;

  // Linha amarela (custo)
  ctx.setLineDash([5,4]); ctx.strokeStyle='#FBBF24'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(xFim,ySaldo); ctx.lineTo(xProj,yCusto); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(xProj,yCusto,5,0,Math.PI*2); ctx.fillStyle='#FBBF24'; ctx.fill();
  ctx.font='600 9px "JetBrains Mono"'; ctx.textAlign='left'; ctx.fillStyle='#FBBF24';
  ctx.fillText(fmtShort(valCusto), xProj+9, yCusto+3);

  // Linha roxa (mercado)
  ctx.setLineDash([5,4]); ctx.strokeStyle='#A78BFA'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(xFim,ySaldo); ctx.lineTo(xProj,yMerc); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(xProj,yMerc,5,0,Math.PI*2); ctx.fillStyle='#A78BFA'; ctx.fill();
  ctx.font='600 9px "JetBrains Mono"'; ctx.textAlign='left'; ctx.fillStyle='#A78BFA';
  ctx.fillText(fmtShort(valMerc), xProj+9, yMerc+3);

  // ── Tooltip ───────────────────────────────────────────────────
  const tooltip=document.getElementById('tooltip');
  const crosshair=document.getElementById('crosshair');

  const onMove=mx=>{
    if(mx<PL||mx>W-PR){crosshair.style.display='none';tooltip.style.opacity=0;return;}
    const idx=Math.round((mx-PL)/gW*(labels.length-1));
    const cl=Math.max(0,Math.min(labels.length-1,idx));
    const x=xOf(cl);
    crosshair.style.display='block'; crosshair.style.left=x+'px';

    document.getElementById('tt-date').textContent=
      new Date(labels[cl]).toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'});
    document.getElementById('tt-row-saldo').innerHTML=
      `<span style="color:#3B9EFF">●</span> ${fmtUSD(valores[cl])}`;

    const isLast = cl===labels.length-1;
    document.getElementById('tt-row-custo').style.display=isLast?'flex':'none';
    document.getElementById('tt-row-mercado').style.display=isLast?'flex':'none';
    if(isLast){
      document.getElementById('tt-row-custo').innerHTML=`<span style="color:#FBBF24">●</span> ${fmtUSD(valCusto)}`;
      document.getElementById('tt-row-mercado').innerHTML=`<span style="color:#A78BFA">●</span> ${fmtUSD(valMerc)}`;
    }

    let tx=x+16; if(tx+190>W) tx=x-195;
    tooltip.style.left=tx+'px';
    tooltip.style.top=Math.max(0,yOf(valores[cl])-50)+'px';
    tooltip.style.opacity=1;
  };

  wrap.onmousemove=e=>{const r=wrap.getBoundingClientRect();onMove(e.clientX-r.left);};
  wrap.ontouchmove=e=>{e.preventDefault();const r=wrap.getBoundingClientRect();onMove(e.touches[0].clientX-r.left);};
  wrap.onmouseleave=wrap.ontouchend=()=>{crosshair.style.display='none';tooltip.style.opacity=0;};
  wrap._labels=labels; wrap._valores=valores; wrap._deltas=deltas;
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    _periodoMeses=parseInt(this.dataset.p);
    document.getElementById('grafico').getContext('2d').clearRect(0,0,9999,9999);
    renderizarGrafico();
  });
});

window.addEventListener('resize',()=>{
  const wrap=document.getElementById('canvas-wrap');
  if(wrap._labels) desenharCanvas(wrap._labels,wrap._valores,wrap._deltas,wrap);
});

carregarDados();
</script>
</body>
</html>
