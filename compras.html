<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HuberHorti - Compras</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
function irDashboard(){
  window.location.href = 'dashboard.html';
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ... (Seu CSS original mantido integralmente) ... */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:'Inter',sans-serif;background:#F7F8FA;color:#1A1D23;min-height:100vh;background:linear-gradient(180deg,#F6F7FB 0%,#F2F4F8 100%)}
.topbar{position:fixed;top:0;left:0;right:0;height:78px;background:#F2F4F8;z-index:100;display:flex;align-items:flex-start;padding:14px 18px 6px;gap:14px}
.back-btn{width:44px;height:44px;border:none;border-radius:999px;background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;box-shadow:0 14px 30px rgba(15,23,42,.14), 0 4px 10px rgba(15,23,42,.08), inset 0 1px 0 rgba(255,255,255,.95)}
.back-btn svg{width:22px;height:22px;stroke:#1C1C1E;fill:none;stroke-width:2.75;stroke-linecap:round;stroke-linejoin:round}
.topbar-copy{display:flex;flex-direction:column;justify-content:flex-start;align-items:flex-start;min-width:0;flex:1;padding-top:6px;gap:4px}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:15px;letter-spacing:-.01em}
.autosave-status{font-size:12px;font-weight:500;color:#6B7280}
.autosave-status.ok{color:#16A34A}
.main{margin-top:78px;padding:4px 16px 104px}
.top-info-row{display:grid;grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr);gap:14px;margin-bottom:14px}
.top-date-card,.top-total-card{background:rgba(255,255,255,.96);border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:14px 16px}
.meta-label{font-size:12px;font-weight:600;color:#8E8E93;display:block;margin-bottom:4px}
#r-compra-btn{font-size:18px;font-weight:800;color:#2563EB}
.cli-wrap{position:relative}
.cli-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:#9CA3AF;fill:none;stroke-width:2}
.cli-input{width:100%;padding:14px 14px 14px 44px;background:rgba(255,255,255,.96);border:none;border-radius:999px;font-size:15px;outline:none;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.cli-lista{position:absolute;top:calc(100% + 8px);left:0;right:0;background:#fff;border-radius:18px;display:none;max-height:240px;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.15);z-index:380}
.cli-lista.open{display:block}
.ac-item{padding:14px;cursor:pointer;border-bottom:1px solid #F7F8FA}
.ac-item:active{background:#F7F8FA}
.ac-cod{font-size:11px;color:#9CA3AF;margin-top:2px}
.cli-selected{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,.96);border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.cli-info{flex:1}
.cli-nome-el{font-size:15px;font-weight:700;color:#1A1D23}
.cli-meta-el{font-size:12px;color:#9CA3AF}
.btn-cancelar-dots{padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid #ECEEF2;background:#F7F8FA;color:#6B7280;cursor:pointer}
.busca-wrap{position:relative;margin:14px 0}
.busca-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:#9CA3AF;fill:none;stroke-width:2}
.busca-input{width:100%;padding:14px 14px 14px 44px;background:rgba(255,255,255,.96);border:none;border-radius:999px;font-size:15px;outline:none;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.tabela-wrap{background:rgba(255,255,255,.96);border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:16px 0;overflow-x:auto}
.tabela{min-width:600px;width:100%}
.t-head{display:grid;grid-template-columns:30px 2fr 60px 70px 70px 70px 70px 50px;padding:0 16px 12px;border-bottom:1px solid #ECEEF2}
.t-th{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;text-align:center}
.t-th:nth-child(2){text-align:left}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="irDashboard()">
    <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="breadcrumb"><span class="active">Central de Compras</span></div>
    <div class="autosave-status" id="autosave-status">Status: pronto</div>
  </div>
</div>

<div class="main">
  <div class="top-info-row">
    <div class="top-date-card">
      <span class="meta-label">Data</span>
      <div id="nota-data-dia" style="font-weight:700; font-size:15px">07/04/2026</div>
      <div id="nota-data-hora" style="font-size:12px; color:#9CA3AF">08:20</div>
    </div>
    <div class="top-total-card">
      <span class="meta-label">Total da Compra</span>
      <div id="r-compra-btn">R$ 0,00</div>
    </div>
  </div>

  <div id="cli-busca">
    <div class="cli-wrap">
      <svg class="cli-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="cli-input" id="cli-input" type="text" placeholder="Buscar fornecedor..." oninput="buscarFornecedor()" autocomplete="off"/>
    </div>
    <div class="cli-lista" id="cli-lista"></div>
  </div>

  <div id="cli-sel" style="display:none">
    <div class="cli-selected">
      <div class="cli-info">
        <div class="cli-nome-el" id="cli-nome">--</div>
        <div class="cli-meta-el" id="cli-meta">--</div>
      </div>
      <button class="btn-cancelar-dots" onclick="limparFornecedor()">Trocar</button>
    </div>
  </div>

  <div class="busca-wrap">
    <svg class="busca-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="busca-input" id="prod-search" type="text" placeholder="Buscar produto..." autocomplete="off"/>
  </div>

  <div class="tabela-wrap">
    <div class="tabela">
      <div style="padding:0 16px 12px; font-weight:700; font-size:14px">Itens da Compra · <span id="grid-itens-count">0</span></div>
      <div class="t-head">
        <div class="t-th">CD</div>
        <div class="t-th">Produto</div>
        <div class="t-th">QTD</div>
        <div class="t-th">UNIT</div>
        <div class="t-th">TOTAL</div>
        <div class="t-th">BASE</div>
        <div class="t-th">DIF.</div>
        <div class="t-th">ESTQ</div>
      </div>
      <div id="itens-lista">
        <div style="text-align:center;padding:60px 0;color:#9CA3AF;font-size:13px">Selecione um fornecedor para iniciar</div>
      </div>
    </div>
  </div>
</div>

<script>
async function buscarFornecedor() {
  const input = document.getElementById('cli-input');
  const lista = document.getElementById('cli-lista');
  const query = input.value.trim();

  if (query.length < 2) {
    lista.classList.remove('open');
    return;
  }

  try {
    // Usamos 'supabase' pois agora ele é window.supabase
    const { data, error } = await supabase
      .from('fornecedores')
      .select('id, codigo, nome')
      .or(`nome.ilike.%${query}%,codigo.ilike.%${query}%`)
      .limit(10);

    if (error) throw error;
    renderizarSugestoes(data);
  } catch (err) {
    console.error('Erro na busca:', err.message);
  }
}

function renderizarSugestoes(fornecedores) {
  const lista = document.getElementById('cli-lista');
  lista.innerHTML = '';

  if (!fornecedores || fornecedores.length === 0) {
    lista.classList.remove('open');
    return;
  }

  fornecedores.forEach(f => {
    const item = document.createElement('div');
    item.className = 'ac-item';
    item.innerHTML = `
      <div style="font-weight:600; color:#1A1D23;">${f.nome}</div>
      <div class="ac-cod">Código: ${f.codigo || 'S/C'}</div>
    `;
    item.onclick = () => selecionarFornecedor(f);
    lista.appendChild(item);
  });
  lista.classList.add('open');
}

function selecionarFornecedor(f) {
  document.getElementById('cli-busca').style.display = 'none';
  document.getElementById('cli-sel').style.display = 'block';
  document.getElementById('cli-nome').textContent = f.nome;
  document.getElementById('cli-meta').textContent = `Código: ${f.codigo} | ID: ${f.id}`;
  document.getElementById('cli-lista').classList.remove('open');
  
  document.getElementById('itens-lista').innerHTML = `
    <div style="text-align:center;padding:40px 0;color:#9CA3AF;font-size:13px">
      <b>${f.nome}</b> selecionado. Busque produtos acima.
    </div>`;
    
  const status = document.getElementById('autosave-status');
  status.textContent = "Status: fornecedor ativo";
  status.className = "autosave-status ok";
}

function limparFornecedor() {
  document.getElementById('cli-busca').style.display = 'block';
  document.getElementById('cli-sel').style.display = 'none';
  document.getElementById('cli-input').value = '';
  document.getElementById('itens-lista').innerHTML = '<div style="text-align:center;padding:40px 0;color:#9CA3AF;font-size:13px">Selecione um fornecedor para iniciar</div>';
  document.getElementById('autosave-status').textContent = "Status: aguardando fornecedor";
  document.getElementById('autosave-status').className = "autosave-status";
}
</script>
</body>
</html>
