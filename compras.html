<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Compras v25.9</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
/* RESET & BASE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Inter',sans-serif;
    background:#F2F4F8;
    color:#1C1C1E;
    height: 100vh; 
    height: calc(var(--vh, 1vh) * 100);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* ESTADO BLOQUEADO */
.btn-disabled {
    opacity: 0.4 !important;
    pointer-events: none !important;
    filter: grayscale(1);
}

/* TOPBAR */
.topbar{
    height: 64px;
    padding: 0 18px;
    padding-top: env(safe-area-inset-top);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px}
.autosave-status{font-size:10px;color:#10B981;font-weight:500;transition: color 0.3s ease;}

/* ÁREA PRINCIPAL */
.main{
    flex-shrink: 0;
    padding: 0 16px; 
    display: flex;
    flex-direction: column;
}

.unified-card {
    background: #FFF;
    border-radius: 28px;
    box-shadow: 0 2px 10px rgba(0,0,0,.02);
    flex-shrink: 0;
    overflow: visible !important; 
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    z-index: 100;
}

/* AUTOCOMPLETE */
.autocomplete-wrapper { position: relative; width: 100%; }
.autocomplete-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #FFF;
    border-radius: 18px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    z-index: 9999;
    max-height: 220px;
    overflow-y: auto;
    display: none;
    margin-top: 8px;
    border: 1px solid #F2F2F7;
    -webkit-overflow-scrolling: touch;
}

.search-count {
    padding: 10px 18px;
    font-size: 10px;
    font-weight: 700;
    color: #8E8E93;
    text-transform: uppercase;
    background: #F9FAFB;
    border-bottom: 1px solid #F2F2F7;
    position: sticky;
    top: 0;
}

.autocomplete-item {
    padding: 14px 18px;
    font-size: 14px;
    border-bottom: 1px solid #F2F2F7;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:active { background: #F2F2F7; }
.autocomplete-item span { color: #8E8E93; font-size: 11px; font-weight: 500; }

.card-search-section { padding: 14px 14px 8px 14px; }
.busca-wrap-ios {
    position: relative;
    display: flex;
    align-items: center;
    background: #F8F8FA;
    border-radius: 16px;
    padding: 4px 10px;
}
.busca-input {
    flex-grow: 1;
    padding: 8px 8px 8px 32px;
    background: transparent;
    border: none;
    font-size: 15px;
    outline: none;
    color: #1C1C1E;
}
.busca-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    stroke: #8E8E93;
    stroke-width: 2.5;
    fill: none;
}

/* TOTAL E AÇÕES */
.total-info-section { 
    padding: 4px 18px 14px 18px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
}
.total-label { font-size: 9px; font-weight: 700; color: #8E8E93; text-transform: uppercase; margin-bottom: 2px; display: block; }
.price-tag { font-size: 18px; font-weight: 700; color: #1C1C1E; letter-spacing: -0.5px; }

.card-actions { display: flex; gap: 8px; align-items: center; }
.btn-card-action {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: #F2F2F7; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    cursor: pointer;
}
.btn-card-action svg { width: 14px; height: 14px; stroke: #1C1C1E; stroke-width: 2.5; fill: none; }
.btn-card-action.expand-btn { transition: transform 0.3s ease; }
.unified-card.expanded .expand-btn { transform: rotate(180deg); }

.details-content {
    max-height: 0;
    opacity: 0;
    padding: 0 18px;
    transition: all 0.4s ease;
    overflow: hidden;
}
.unified-card.expanded .details-content {
    max-height: 250px;
    opacity: 1;
    padding-bottom: 20px;
    border-top: 1px solid #F3F4F6;
    padding-top: 15px;
}

.details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr; 
    gap: 20px;
}

.sumario-titulo {
    font-size: 11px;
    font-weight: 600;
    color: #1C1C1E;
    margin-bottom: 12px;
    display: block;
}

.detail-item { 
    font-size: 11px; 
    color: #8E8E93; 
    margin-bottom: 8px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    min-height: 20px;
}
.detail-item b { color: #1C1C1E; }

/* SELETOR DE VISÃO DISCRETO */
.view-selector {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 700;
    color: #C7C7CC;
}
.view-opt { cursor: pointer; transition: color 0.2s; padding: 2px 4px; }
.view-opt.active { color: #007AFF; }
.col-hidden { display: none !important; }

.input-data-edit {
    border: none;
    background: transparent;
    color: #1C1C1E;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    outline: none;
    text-align: right;
    padding: 0;
    margin: 0;
    appearance: none;
    -webkit-appearance: none;
    min-width: 0;
    flex-shrink: 1;
}

/* TABELA / GRID */
.footer-grid-card {
    background: #FFF; 
    border-radius: 32px 32px 0 0;
    box-shadow: 0 -4px 15px rgba(0,0,0,.05);
    display: flex; 
    flex-direction: column;
    flex: 1; 
    min-height: 0; 
    margin-top: 12px;
    overflow: hidden;
}
.grid-scroll { flex: 1; overflow: auto; }

table { border-collapse: collapse; width: max-content; font-size: 10px; table-layout: fixed; }
th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #F9FAFB; color: #1C1C1E; width: 75px; }
th:first-child, td:first-child { 
    width: 150px; position: sticky; left: 0; background: #FFF; 
    text-align: left; font-weight: 700; z-index: 5; border-right: 1px solid #F3F4F6; padding-left: 20px;
    color: #1C1C1E;
}
thead th { position: sticky; top: 0; background: #F9FAFB; padding: 12px 8px; color: #8E8E93; z-index: 10; border-bottom: 1px solid #F3F4F6; }

.grid-input {
    width: 100%;
    border: 1px solid #E5E5EA;
    border-radius: 6px;
    padding: 5px;
    text-align: center;
    font-size: 10px;
    background: #F9FAFB;
    outline: none;
    color: #1C1C1E;
    font-weight: 600;
}
.grid-input:focus { border-color: #007AFF; background: #FFF; }
.grid-input[readonly] { background: transparent; border-color: transparent; font-weight: 600; color: #1C1C1E; }

.col-standard { color: #8E8E93 !important; font-weight: 500; }
.col-pm { color: #000 !important; font-weight: 800 !important; }

.pagination-footer {
  flex-shrink: 0; height: 65px; padding: 0 20px calc(8px + env(safe-area-inset-bottom));
  background: #FFF; border-top: 1px solid #F3F4F6; display: flex; justify-content: space-between; align-items: center;
}
.ios-btn-float { width: 38px; height: 38px; border-radius: 50%; border: none; background: #FFF; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
</style>
</head>

<div class="main">

    <div class="card-search-section">
      <div class="autocomplete-wrapper">

      <button class="ios-btn-float" style="width:34px; height:34px"><svg viewBox="0 0 24 24" style="width:16px; stroke:#1C1C1E; stroke-width:2.5; fill:none"><path d="M9 18l6-6-6-6" /></svg></button>

<script>
window.HHUtils.atualizarCicloAtualGlobal();
let currentView = 'QT1';
let timerAutoSave;
let statusAtual = 'sincronizado';

function setEstado(novoStatus) {
    const elStatus = document.getElementById('status-sinc');
    statusAtual = novoStatus;
    const ids = ['btn-voltar', 'btn-add-topbar', 'btn-nova-compra', 'btn-excluir-compra'];

    if (novoStatus === 'editando') {
        elStatus.textContent = 'Editando...';
        elStatus.style.color = '#F59E0B';
        ids.forEach(id => document.getElementById(id)?.classList.add('btn-disabled'));
    } else if (novoStatus === 'salvando') {
        elStatus.textContent = 'Salvando...';
        elStatus.style.color = '#3B82F6';
    } else {
        elStatus.textContent = 'Sincronizado';
        elStatus.style.color = '#10B981';
        ids.forEach(id => document.getElementById(id)?.classList.remove('btn-disabled'));
    }
}

async function salvarDadosSinc() {
    if (statusAtual !== 'editando') return;
    setEstado('salvando');

    const numCompraEl = document.getElementById('num-compra');
    const valorTotalStr = document.getElementById('total-geral').textContent.replace(/[^\d,.-]/g, '').replace(',', '.');
    const valorTotalNum = parseFloat(valorTotalStr) || 0;
    const fornecedorId = document.getElementById('busca-fornecedor').dataset.selectedId;
    const dataCompra = document.getElementById('data-ciclo').value;
    
    let pedidoId = numCompraEl.textContent.replace('#', '').trim();
    const isNovo = (pedidoId === '-----');

    try {
        // 1. SALVAR CABEÇALHO
        if (isNovo) {
            const { data: pData, error: pErr } = await window.db.from('pedidos_compras').insert({
                data: dataCompra,
                fornecedor_id: fornecedorId,
                valor_total: valorTotalNum,
                em_aberto: valorTotalNum
            }).select();
            if (pErr) throw pErr;
            pedidoId = pData[0].id;
            numCompraEl.textContent = `#${pedidoId}`;
        } else {
            const { error: pErr } = await window.db.from('pedidos_compras').update({
                data: dataCompra,
                valor_total: valorTotalNum,
                em_aberto: valorTotalNum
            }).eq('id', pedidoId);
            if (pErr) throw pErr;
        }

        // 2. SALVAR ITENS
        // Deleta todos e insere os da grade (estratégia de espelhamento)
        const { error: delErr } = await window.db.from('itens_pedidos_compras').delete().eq('pedido_compra_id', pedidoId);
        if (delErr) throw delErr;

        const linhas = document.querySelectorAll('#corpo-grid tr');
        const itensParaInserir = [];
        const promessasPM = [];

        linhas.forEach(tr => {
            const comp = parseFloat(tr.querySelector('.col-comp').value) || 0;
            const prodId = tr.dataset.id;
            const pmVal = parseFloat(tr.querySelector('.col-pm').textContent) || 0;

            if (comp > 0) {
                itensParaInserir.push({
                    pedido_compra_id: pedidoId,
                    produto_id: prodId,
                    quantidade: comp,
                    preco_unitario: parseFloat(tr.querySelector('.col-custo-input').value) || 0,
                    valor_total: parseFloat(tr.querySelector('.col-t1-input').value) || 0,
                    ganho: parseFloat(tr.querySelector('.col-ganho-input').value) || 0,
                    preco_compra_mkt: parseFloat(tr.querySelector('.col-mkt-input').value) || 0
                });

                // Prepara atualização do PM na tabela produtos
                promessasPM.push(window.db.from('produtos').update({ preco_medio_compra: pmVal }).eq('id', prodId));
            }
        });

        if (itensParaInserir.length > 0) {
            const { error: insErr } = await window.db.from('itens_pedidos_compras').insert(itensParaInserir);
            if (insErr) {
                console.warn("Erro ao inserir itens:", insErr);
                throw insErr;
            }
            
            // Tenta atualizar os PMs mas não trava o processo se um der erro
            try { await Promise.all(promessasPM); } catch(e) { console.warn("Erro ao atualizar PMs:", e); }
        }

        setEstado('sincronizado');
    } catch (err) {
        console.error("Erro geral no salvamento:", err);
        // Mesmo em erro, tentamos destravar a tela após 3 segundos para não congelar o usuário
        setTimeout(() => setEstado('sincronizado'), 3000);
    }
}

async function carregarProdutosEstoque(fornecedorUuid) {
    const dataCiclo = document.getElementById('data-ciclo').value;
    corpoGrid.innerHTML = '<tr><td colspan="12" style="text-align:center; padding:20px;">Sincronizando...</td></tr>';

    try {
        // TENTA RECUPERAR PEDIDO SALVO PARA ESTE FORNECEDOR/DATA
        const { data: pedidoDB } = await window.db
            .from('pedidos_compras')
            .select('id')
            .eq('fornecedor_id', fornecedorUuid)
            .eq('data', dataCiclo)
            .maybeSingle();

        let itensNoBanco = {};
        if (pedidoDB) {
            document.getElementById('num-compra').textContent = `#${pedidoDB.id}`;
            const { data: listaItens } = await window.db.from('itens_pedidos_compras').select('*').eq('pedido_compra_id', pedidoDB.id);
            if (listaItens) listaItens.forEach(it => itensNoBanco[it.produto_id] = it);
        } else {
            document.getElementById('num-compra').textContent = '#-----';
        }

        // LÓGICA DE CÁLCULO DE VENDAS (MANTIDA)
        const ciclo = window.cicloAtual;
        const d0_ant = new Date(ciclo.d0); d0_ant.setDate(d0_ant.getDate() - 7);
        const d7_ant = new Date(ciclo.d7); d7_ant.setDate(d7_ant.getDate() - 7);

        const { data: produtos } = await window.db.from('produtos').select(`id, nome, preco_medio_compra, estoque_inicial (quantidade_inicial, custo_unitario_inicial)`).eq('fornecedor_id', fornecedorUuid).order('nome', { ascending: true });
        const { data: vAnt } = await window.db.from('itens_pedidos_vendas').select('quantidade, produto_id, pedidos_vendas!inner(data)').gte('pedidos_vendas.data', d0_ant.toISOString()).lte('pedidos_vendas.data', d7_ant.toISOString());
        const { data: vFut } = await window.db.from('itens_pedidos_vendas').select('quantidade, produto_id, pedidos_vendas!pedido_venda_id!inner(data)').gte('pedidos_vendas.data', `${dataCiclo}T00:00:00+00:00`);

        const mapaVendas = {}; if(vAnt) vAnt.forEach(v => mapaVendas[v.produto_id] = (mapaVendas[v.produto_id] || 0) + parseFloat(v.quantidade));
        const mapaQT2 = {}; if(vFut) vFut.forEach(v => mapaQT2[v.produto_id] = (mapaQT2[v.produto_id] || 0) + parseFloat(v.quantidade));

        if (produtos) {
            corpoGrid.innerHTML = produtos.map(p => {
                const estIni = p.estoque_inicial?.[0]?.quantidade_inicial || 0;
                const custIni = p.estoque_inicial?.[0]?.custo_unitario_inicial || 0;
                const q1 = mapaVendas[p.id] || 0;
                const q2 = mapaQT2[p.id] || 0;
                
                // SE EXISTE NO BANCO, TRAZ O QUE ESTÁ SALVO
                const salvo = itensNoBanco[p.id];
                const comp = salvo ? salvo.quantidade : (q1 + q2) - estIni;
                const cust = salvo ? salvo.preco_unitario : 0;
                const mkt = salvo ? salvo.preco_compra_mkt : 0;
                const pm = p.preco_medio_compra || 0;

                const t1 = comp * cust;
                const t2 = comp * mkt;
                const gan = t2 - t1;

                return `
                    <tr data-id="${p.id}">
                        <td>${p.nome}</td>
                        <td class="col-est-ini col-standard">${estIni}</td>
                        <td class="col-ct-ini col-standard">${parseFloat(custIni).toFixed(2)}</td>
                        <td class="td-qt1 col-standard">${q1}</td>
                        <td class="td-qt2 col-hidden" style="font-weight:700">${q2}</td>
                        <td><input type="number" class="grid-input col-comp" value="${comp}"></td>
                        <td><input type="number" class="grid-input col-custo-input" value="${cust.toFixed(2)}"></td>
                        <td><input type="number" class="grid-input col-mkt-input" value="${mkt.toFixed(2)}"></td>
                        <td class="col-pm">${pm.toFixed(2)}</td>
                        <td><input type="number" class="grid-input col-t1-input" value="${t1.toFixed(2)}" readonly></td>
                        <td><input type="number" class="grid-input col-t2-input" value="${t2.toFixed(2)}" readonly></td>
                        <td><input type="number" class="grid-input col-ganho-input" value="${gan.toFixed(2)}" readonly style="color:#10B981; font-weight:700"></td>
                    </tr>
                `;
            }).join('');
            atualizarSumario();
        }
    } catch (err) { console.error(err); } 
    finally { setEstado('sincronizado'); }
}

// FUNÇÕES DE APOIO (MANTIDAS)
const setupDataDefault = () => {
    const c = document.getElementById('data-ciclo');
    if(c){ const h = new Date(); h.setDate(h.getDate()+1); c.value = h.toISOString().split('T')[0]; }
};
setupDataDefault();

function setViewMode(m) {
    currentView = m;
    document.getElementById('opt-qt1').classList.toggle('active', m === 'QT1');
    document.getElementById('opt-qt2').classList.toggle('active', m === 'QT2');
    atualizarSumario();
}

const inputBusca = document.getElementById('busca-fornecedor');
const listaRes = document.getElementById('resultados-fornecedor');
const corpoGrid = document.getElementById('corpo-grid');

inputBusca.addEventListener('input', async (e) => {
    const t = e.target.value; if(t.length < 1){ listaRes.style.display = 'none'; return; }
    const { data: f } = await window.db.from('fornecedores').select('id, codigo, nome').ilike('nome', `%${t}%`).limit(10);
    if(f){
        listaRes.innerHTML = f.map(x => `<div class="autocomplete-item" onclick="selecionarFornecedor('${x.nome}', '${x.id}')">${x.nome}</div>`).join('');
        listaRes.style.display = 'block';
    }
});

async function selecionarFornecedor(n, id) {
    inputBusca.value = n; listaRes.style.display = 'none';
    inputBusca.dataset.selectedId = id;
    await carregarProdutosEstoque(id);
}

function atualizarSumario() {
    const linhas = document.querySelectorAll('#corpo-grid tr');
    let sT1 = 0, sGan = 0, count = 0;
    linhas.forEach(tr => {
        const q1 = parseFloat(tr.querySelector('.td-qt1').textContent) || 0;
        const q2 = parseFloat(tr.querySelector('.td-qt2').textContent) || 0;
        const ativo = currentView === 'QT1' ? q1 : q2;
        tr.querySelector('.td-qt1').classList.toggle('col-hidden', currentView !== 'QT1');
        tr.querySelector('.td-qt2').classList.toggle('col-hidden', currentView !== 'QT2');
        if(ativo > 0) {
            tr.style.display = 'table-row';
            sT1 += parseFloat(tr.querySelector('.col-t1-input').value) || 0;
            sGan += parseFloat(tr.querySelector('.col-ganho-input').value) || 0;
            count++;
        } else { tr.style.display = 'none'; }
    });
    const fBRL = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    document.getElementById('total-geral').textContent = fBRL(sT1);
    document.getElementById('subtotal-card').textContent = fBRL(sT1);
    document.getElementById('ganho-card').textContent = fBRL(sGan);
    document.getElementById('qtd-itens').textContent = count;
}

corpoGrid.addEventListener('input', (e) => {
    if (e.target.classList.contains('grid-input')) {
        const tr = e.target.closest('tr');
        const comp = parseFloat(tr.querySelector('.col-comp').value) || 0;
        const cust = parseFloat(tr.querySelector('.col-custo-input').value) || 0;
        const est = parseFloat(tr.querySelector('.col-est-ini').textContent) || 0;
        const cIni = parseFloat(tr.querySelector('.col-ct-ini').textContent) || 0;
        if(e.target.classList.contains('col-custo-input')) tr.querySelector('.col-mkt-input').value = cust.toFixed(2);
        const mkt = parseFloat(tr.querySelector('.col-mkt-input').value) || 0;
        const div = comp + est;
        const pm = div !== 0 ? ((mkt * comp) + (est * cIni)) / div : 0;
        tr.querySelector('.col-pm').textContent = pm.toFixed(2);
        const t1 = comp * cust; tr.querySelector('.col-t1-input').value = t1.toFixed(2);
        const t2 = comp * mkt; tr.querySelector('.col-t2-input').value = t2.toFixed(2);
        tr.querySelector('.col-ganho-input').value = (t2 - t1).toFixed(2);
        atualizarSumario();
        setEstado('editando');
        clearTimeout(timerAutoSave);
        timerAutoSave = setTimeout(salvarDadosSinc, 8000);
    }
});

function toggleCard() { document.getElementById('mainCard').classList.toggle('expanded'); }
const fixH = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixH); fixH();
</script>
</body>
</html>
