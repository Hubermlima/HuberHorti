<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>HuberHorti - Compras v28 Polida</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html, body { height: 100%; overflow: hidden; background: #F2F4F8; color: #1C1C1E; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        /* TOPBAR - PADRONIZADA */
        .topbar { height: 80px; padding: 15px 18px; display: flex; align-items: center; flex-shrink: 0; }
        .round-btn { width: 44px; height: 44px; border: none; border-radius: 50%; background: #FFF; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(0,0,0,.05); cursor: pointer; }
        .round-btn svg { width: 20px; height: 20px; stroke: #1C1C1E; fill: none; stroke-width: 2.5; }
        .topbar-info { flex-grow: 1; padding-left: 14px; }
        .topbar-info h1 { font-size: 16px; font-weight: 700; color: #1C1C1E; }
        .status-tag { font-size: 11px; color: #10B981; font-weight: 600; }

        /* CONTENT */
        .content { flex-grow: 1; display: flex; flex-direction: column; padding: 0 16px 16px; overflow: hidden; gap: 10px; }

        /* CARD TOTAL - MENOS GRITANTE */
        .card-total { background: #FFF; border-radius: 20px; padding: 14px 18px; box-shadow: 0 2px 10px rgba(0,0,0,.03); display: flex; justify-content: space-between; align-items: center; cursor: pointer; z-index: 10; flex-shrink: 0; }
        .total-price { font-size: 19px; font-weight: 700; color: #2563EB; }
        .badge-margin { background: #E1F9F0; color: #10B981; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        
        /* SUMÁRIO - CORRIGIDO */
        .sumario-content { max-height: 0; overflow: hidden; transition: 0.3s ease-out; background: #FFF; border-radius: 0 0 20px 20px; margin-top: -20px; padding: 0 18px; box-shadow: 0 8px 15px rgba(0,0,0,.02); }
        .sumario-content.open { max-height: 150px; padding: 25px 18px 15px; }
        .sumario-grid { display: flex; justify-content: space-around; text-align: center; }

        /* INPUTS - PADRONIZADOS */
        .input-group { background: #FFF; border-radius: 999px; display: flex; align-items: center; padding: 4px 6px 4px 14px; box-shadow: 0 2px 10px rgba(0,0,0,.02); flex-shrink: 0; }
        .input-group svg.icon-main { width: 18px; height: 18px; stroke: #9CA3AF; stroke-width: 2.2; fill: none; margin-right: 10px; }
        .input-group input { border: none; outline: none; font-size: 14px; flex-grow: 1; background: transparent; height: 42px; color: #1C1C1E; }
        
        .btn-small { width: 34px; height: 34px; border-radius: 50%; border: none; background: #F2F4F8; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: 4px; }
        .btn-small svg { width: 16px; height: 16px; stroke: #1C1C1E; stroke-width: 2; fill: none; }

        /* GRID CARD */
        .grid-card { background: #FFF; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,.04); display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        .grid-header { padding: 16px 18px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .grid-header span { font-size: 10px; font-weight: 700; color: #A1A1AA; text-transform: uppercase; }

        .table-wrapper { flex-grow: 1; overflow: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1000px; }
        th { position: sticky; top: 0; background: #F9FAFB; padding: 10px 12px; font-size: 9px; font-weight: 800; color: #6B7280; border-bottom: 1px solid #F2F4F8; z-index: 5; text-align: right; }
        th:first-child { text-align: left; width: 160px; }
        
        td { padding: 12px 12px; font-size: 12px; border-bottom: 1px solid #F9FAFB; text-align: right; color: #374151; }
        td:first-child { text-align: left; font-weight: 600; color: #1C1C1E; }

        /* PAGINAÇÃO PADRONIZADA */
        .pagination { height: 60px; border-top: 1px solid #F2F4F8; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; flex-shrink: 0; background: #FFF; }
        .page-info { font-size: 12px; color: #8E8E93; font-weight: 600; }
        .page-btns { display: flex; gap: 10px; }
        .page-btn { width: 38px; height: 38px; border-radius: 50%; border: none; background: #F2F4F8; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .page-btn svg { width: 18px; height: 18px; stroke: #007AFF; stroke-width: 3; fill: none; }
        .page-btn.disabled { opacity: 0.2; cursor: not-allowed; }
        .page-btn:active:not(.disabled) { background: #E5E7EB; }
    </style>
</head>
<body>

    <header class="topbar">
        <button class="round-btn" onclick="location.href='dashboard.html'"><svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg></button>
        <div class="topbar-info">
            <h1>Central de Compras</h1>
            <span class="status-tag">status: rascunho</span>
        </div>
        <button class="round-btn"><svg viewBox="0 0 24 24"><path d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
    </header>

    <main class="content">
        <div class="card-total" onclick="toggleSumario()">
            <div style="display:flex; flex-direction:column">
                <span style="font-size:9px; font-weight:700; color:#8E8E93; text-transform:uppercase; letter-spacing:0.5px">Total da Nota</span>
                <span class="total-price">R$ 18.230,00</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px">
                <div class="badge-margin">32% Margem</div>
                <svg id="arrow-sumario" style="width:16px;height:16px;stroke:#8E8E93;fill:none;stroke-width:3; transition: 0.3s" viewBox="0 0 24 24"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </div>
        </div>

        <div class="sumario-content" id="sumario-box">
            <div class="sumario-grid">
                <div><p style="font-size:9px; font-weight:800; color:#A1A1AA">ITENS</p><p style="font-size:14px; font-weight:700">85</p></div>
                <div style="width:1px; background:#F2F4F8"></div>
                <div><p style="font-size:9px; font-weight:800; color:#A1A1AA">GANHO PREVISTO</p><p style="font-size:14px; font-weight:700; color:#10B981">R$ 5.833,60</p></div>
            </div>
        </div>

        <div class="input-group">
            <svg class="icon-main" viewBox="0 0 24 24"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
            <input type="text" placeholder="Selecionar Fornecedor...">
            <div style="display:flex">
                <button class="btn-small"><svg viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg></button>
                <button class="btn-small"><svg viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg></button>
                <button class="btn-small"><svg viewBox="0 0 24 24"><path d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
            </div>
        </div>

        <div class="input-group">
            <svg class="icon-main" viewBox="0 0 24 24"><path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
            <input type="text" placeholder="Adicionar Produto...">
        </div>

        <div class="grid-card">
            <div class="grid-header"><span>Itens do Pedido</span><div style="background:#F2F4F8; padding:2px 6px; border-radius:4px; font-size:9px; font-weight:800; color:#71717A">85</div></div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>PRODUTOS</th>
                            <th>EST.INI</th>
                            <th>CT.INI</th>
                            <th>QT1</th>
                            <th>QT2</th>
                            <th>COMP</th>
                            <th>CUST</th>
                            <th>PM</th>
                            <th>MKT</th>
                            <th>T1</th>
                            <th>T2</th>
                            <th>GAN</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Abacate Paulista</td>
                            <td>1.500</td><td>200</td><td>10</td><td>20</td><td>30</td><td>30,00</td><td>25,00</td><td>20%</td><td>900</td><td>1.080</td><td style="color:#10B981; font-weight:700">180</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="page-info">1-10 de 85</span>
                <div class="page-btns">
                    <button class="page-btn disabled"><svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg></button>
                    <button class="page-btn"><svg viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg></button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSumario() {
            const box = document.getElementById('sumario-box');
            const arrow = document.getElementById('arrow-sumario');
            box.classList.toggle('open');
            arrow.style.transform = box.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
        }
    </script>
</body>
</html>
