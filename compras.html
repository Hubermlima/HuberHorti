<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>HuberHorti - Compras v28</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ESTRUTURA APP-LIKE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html, body { height: 100%; overflow: hidden; background: #F2F4F8; color: #1C1C1E; }
body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

/* TOPBAR */
.topbar { height: 88px; padding: 20px 18px 10px; display: flex; align-items: flex-start; flex-shrink: 0; position: relative; }
.round-btn { width: 44px; height: 44px; border: none; border-radius: 50%; background: #FFF; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,.06); cursor: pointer; }
.round-btn svg { width: 22px; height: 22px; stroke: #1C1C1E; fill: none; stroke-width: 2.2; }

.topbar-info { flex-grow: 1; padding-left: 14px; padding-top: 2px; }
.topbar-info h1 { font-size: 17px; font-weight: 700; color: #1C1C1E; }
.status-tag { font-size: 11px; color: #10B981; font-weight: 600; text-transform: lowercase; }

/* CONTEÚDO PRINCIPAL */
.content { flex-grow: 1; display: flex; flex-direction: column; padding: 0 16px 16px; overflow: hidden; }

/* CARD TOTAL */
.card-total { background: #FFF; border-radius: 24px; padding: 16px 20px; box-shadow: 0 4px 15px rgba(0,0,0,.03); display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-shrink: 0; }
.total-price { font-size: 22px; font-weight: 700; color: #2563EB; }
.badge-margin { background: #E1F9F0; color: #10B981; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; }

/* BUSCAS / SELETORES */
.input-group { background: #FFF; border-radius: 999px; display: flex; align-items: center; padding: 4px 6px 4px 16px; box-shadow: 0 4px 12px rgba(0,0,0,.02); margin-bottom: 10px; flex-shrink: 0; position: relative; }
.input-group svg.icon-main { width: 18px; height: 18px; stroke: #9CA3AF; stroke-width: 2; fill: none; margin-right: 12px; }
.input-group input { border: none; outline: none; font-size: 14px; flex-grow: 1; background: transparent; height: 44px; }
.btn-actions { display: flex; gap: 6px; }
.btn-small { width: 34px; height: 34px; border-radius: 50%; border: none; background: #F2F4F8; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-small svg { width: 16px; height: 16px; stroke: #1C1C1E; stroke-width: 2; fill: none; }

/* GRID CARD */
.grid-card { background: #FFF; border-radius: 28px; box-shadow: 0 4px 20px rgba(0,0,0,.04); display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
.grid-header { padding: 20px 20px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.grid-header span { font-size: 11px; font-weight: 700; color: #A1A1AA; text-transform: uppercase; letter-spacing: 0.5px; }

.table-wrapper { flex-grow: 1; overflow: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 800px; }
th { position: sticky; top: 0; background: #F9FAFB; padding: 12px 16px; text-align: left; font-size: 10px; font-weight: 700; color: #6B7280; border-bottom: 1px solid #F2F4F8; z-index: 2; }
td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid #F9FAFB; }

/* PAGINAÇÃO */
.pagination { height: 68px; border-top: 1px solid #F2F4F8; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
.page-btn { width: 38px; height: 38px; border-radius: 50%; border: none; background: #F2F4F8; display: flex; align-items: center; justify-content: center; }
.page-btn svg { width: 20px; height: 20px; stroke: #007AFF; stroke-width: 2.5; fill: none; }
</style>
</head>
<body>

<header class="topbar">
    <button class="round-btn"><svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg></button>
    <div class="topbar-info">
        <h1>Central de Compras</h1>
        <span class="status-tag">status: rascunho</span>
    </div>
    <button class="round-btn"><svg viewBox="0 0 24 24"><path d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
</header>

<main class="content">
    <div class="card-total">
        <div style="display:flex; flex-direction:column">
            <span style="font-size:11px; font-weight:600; color:#8E8E93; text-transform:uppercase">Total da Nota</span>
            <span class="total-price">R$ 18.230,00</span>
        </div>
        <div style="display:flex; align-items:center; gap:12px">
            <div class="badge-margin">32% Margem</div>
            <svg style="width:20px;height:20px;stroke:#8E8E93;fill:none;stroke-width:2" viewBox="0 0 24 24"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
        </div>
    </div>

    <div class="input-group">
        <svg class="icon-main" viewBox="0 0 24 24"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
        <input type="text" placeholder="Selecionar Fornecedor...">
        <div class="btn-actions">
            <button class="btn-small"><svg viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg></button>
            <button class="btn-small"><svg viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166"/></svg></button>
            <button class="btn-small"><svg viewBox="0 0 24 24"><path d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
        </div>
    </div>

    <div class="input-group">
        <svg class="icon-main" viewBox="0 0 24 24"><path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
        <input type="text" placeholder="Adicionar Produto ao Pedido...">
    </div>

    <div class="grid-card">
        <div class="grid-header">
            <span>Itens do Pedido</span>
            <div style="background:#F2F4F8; padding:2px 8px; border-radius:6px; font-size:10px; font-weight:700; color:#71717A">85</div>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>PRODUTOS</th>
                        <th>EST.INI</th>
                        <th>QT1</th>
                        <th>COMP</th>
                        <th>CUSTO</th>
                        <th>GANHO</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="font-weight:600">Alface Crespa Miúda</td>
                        <td>150</td><td>40</td><td>100</td><td>2,50</td><td style="color:#10B981; font-weight:600">140,00</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination">
            <span style="font-size:13px; color:#8E8E93">1-10 de 85</span>
            <div style="display:flex; gap:10px">
                <button class="page-btn" style="opacity:0.4"><svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg></button>
                <button class="page-btn"><svg viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg></button>
            </div>
        </div>
    </div>
</main>

</body>
</html>
