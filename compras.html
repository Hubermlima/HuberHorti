<!DOCTYPE html>
<html lang="pt-BR">
<head>
    </head>
<body>
    <script>
window.HHUtils.atualizarCicloAtualGlobal();
let currentView = 'QT1';
let timerAutoSave;
let statusAtual = 'sincronizado';
let paginaAtual = 1;
const itensPorPagina = 10;

// --- LÓGICA DO MENU DE AÇÕES ---
const btnAddTopbar = document.getElementById('btn-add-topbar');
const menuDropdown = document.getElementById('menu-dropdown');

btnAddTopbar.addEventListener('click', (e) => {
    e.stopPropagation();
    const isVisible = menuDropdown.style.display === 'block';
    menuDropdown.style.display = isVisible ? 'none' : 'block';
});

document.addEventListener('click', (e) => {
    if (!menuDropdown.contains(e.target) && e.target !== btnAddTopbar) {
        menuDropdown.style.display = 'none';
    }
});

function gerarGuiaColeta() {
    const pedidoId = document.getElementById('num-compra').textContent.replace('#', '');
    if (pedidoId === '-----') {
        alert("Salve a compra antes de gerar a Guia de Coleta.");
        return;
    }
    alert("Gerando Guia de Coleta para o Pedido #" + pedidoId);
}

// ATUALIZADO: Agora salva o estado antes de navegar
function abrirMovimentacoes() {
    const inputBusca = document.getElementById('busca-fornecedor');
    const fornecedorId = inputBusca.dataset.selectedId;
    const fornecedorNome = inputBusca.value;

    if (!fornecedorId || !fornecedorNome || fornecedorNome.trim() === "") {
        alert("Por favor, selecione um fornecedor primeiro.");
        return;
    }

    // Persistência para o retorno
    const estado = {
        id: fornecedorId,
        nome: fornecedorNome,
        data: document.getElementById('data-ciclo').value
    };
    localStorage.setItem('huber_last_session', JSON.stringify(estado));

    const nomeUrl = encodeURIComponent(fornecedorNome);
    window.location.href = `movimentacoes_fornecedores.html?fornecedor_id=${fornecedorId}&fornecedor_nome=${nomeUrl}`;
}

// --- FUNÇÕES DE UTILIDADE ---
document.getElementById('corpo-grid').addEventListener('focusin', (e) => {
    if (e.target.classList.contains('grid-input')) {
        setTimeout(() => e.target.select(), 50);
    }
});

function aplicarMascaraBanco(input) {
    let value = input.value.replace(/\D/g, '');
    if (value === '') return "0,00";
    let valorNumerico = (parseInt(value) / 100).toFixed(2);
    return valorNumerico.replace('.', ',');
}

const parseVal = (v) => {
    if (!v) return 0;
    let s = String(v).replace('R$', '').replace(/\s/g, '').replace('-', '').trim();
    if (s.indexOf(',') !== -1) {
        s = s.replace(/\./g, '').replace(',', '.');
    }
    return parseFloat(s) || 0;
};

// --- LÓGICA DE NEGÓCIO ---
document.getElementById('data-ciclo').addEventListener('change', async () => {
    const fornecedorId = document.getElementById('busca-fornecedor').dataset.selectedId;
    if (fornecedorId) await carregarProdutosEstoque(fornecedorId);
});

async function acaoExcluirCompra() {
    const numCompraEl = document.getElementById('num-compra');
    const pedidoId = numCompraEl.textContent.replace('#', '');
    if (pedidoId === '-----') return alert("Não há uma compra salva.");
    if (!confirm("Excluir esta compra permanentemente?")) return;
    setEstado('salvando');
    try {
        await window.db.from('itens_pedidos_compras').delete().eq('pedido_compra_id', pedidoId);
        await window.db.from('pedidos_compras').delete().eq('id', pedidoId);
        location.reload();
    } catch (err) { setEstado('erro', err.message); }
}

// LÓGICA DE SWIPE
const card = document.getElementById('mainCard');
let startX = 0, currentTranslate = 0;
const threshold = -150;

card.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    card.style.transition = 'none';
}, {passive: true});

card.addEventListener('touchmove', (e) => {
    const diff = e.touches[0].clientX - startX;
    if (diff < 0) {
        currentTranslate = Math.max(diff, -200);
        card.style.transform = `translateX(${currentTranslate}px)`;
    }
}, {passive: true});

card.addEventListener('touchend', () => {
    card.style.transition = 'transform 0.3s ease';
    if (currentTranslate < threshold) {
        card.style.transform = `translateX(-100%)`;
        setTimeout(() => { acaoExcluirCompra(); card.style.transform = `translateX(0)`; }, 300);
    } else { card.style.transform = `translateX(0)`; }
    currentTranslate = 0;
});

function setEstado(novoStatus, msgErro = '') {
    const elStatus = document.getElementById('status-sinc');
    statusAtual = novoStatus;
    const botoes = ['btn-voltar', 'btn-add-topbar'];
    if (novoStatus === 'editando') {
        elStatus.textContent = 'Editando...';
        elStatus.style.color = '#F59E0B';
        botoes.forEach(id => document.getElementById(id)?.classList.add('btn-disabled'));
    } else if (novoStatus === 'salvando') {
        elStatus.textContent = 'Salvando...';
        elStatus.style.color = '#3B82F6';
    } else if (novoStatus === 'erro') {
        elStatus.textContent = `ERRO: [${msgErro}]`;
        elStatus.style.color = '#EF4444';
    } else {
        elStatus.textContent = 'Sincronizado';
        elStatus.style.color = '#10B981';
        botoes.forEach(id => document.getElementById(id)?.classList.remove('btn-disabled'));
    }
}

async function salvarDadosSinc() {
    if (statusAtual !== 'editando') return;
    setEstado('salvando');
    const numCompraEl = document.getElementById('num-compra');
    const valorTotalNum = parseVal(document.getElementById('total-geral').textContent);
    const fornecedorId = document.getElementById('busca-fornecedor').dataset.selectedId;
    const dataCompra = document.getElementById('data-ciclo').value;
    let pedidoId = numCompraEl.textContent.replace('#', '');
    const isNovo = pedidoId === '-----';

    try {
        if (isNovo) {
            const { data: pData, error: pErr } = await window.db.from('pedidos_compras').insert({
                data: dataCompra, fornecedor_id: fornecedorId, valor_total: valorTotalNum, em_aberto: valorTotalNum
            }).select();
            if (pErr) throw pErr;
            pedidoId = pData[0].id;
            numCompraEl.textContent = `#${pedidoId}`;
        } else {
            await window.db.from('pedidos_compras').update({
                data: dataCompra, valor_total: valorTotalNum, em_aberto: valorTotalNum
            }).eq('id', pedidoId);
        }

        await window.db.from('itens_pedidos_compras').delete().eq('pedido_compra_id', pedidoId);
        const linhas = document.querySelectorAll('#corpo-grid tr');
        const itens = [];
        const updatesProd = [];

        linhas.forEach(tr => {
            const comp = parseVal(tr.querySelector('.col-comp').value);
            if (comp > 0) {
                const prodId = tr.dataset.id;
                const cust = parseVal(tr.querySelector('.col-custo-input').value);
                const mkt = parseVal(tr.querySelector('.col-mkt-input').value);
                const t1 = parseVal(tr.querySelector('.col-t1-input').value);
                const gan = parseVal(tr.querySelector('.col-ganho-input').value);
                const pm = parseVal(tr.querySelector('.col-pm').textContent);

                itens.push({
                    pedido_compra_id: pedidoId, produto_id: prodId, quantidade: comp,
                    preco_unitario: cust, valor_total: t1, ganho: gan, preco_compra_mkt: mkt
                });
                updatesProd.push(window.db.from('produtos').update({ preco_medio_compra: pm }).eq('id', prodId));
            }
        });

        if (itens.length > 0) {
            await window.db.from('itens_pedidos_compras').insert(itens);
            await Promise.all(updatesProd);
        }
        setEstado('sincronizado');
    } catch (err) { setEstado('erro', err.message); }
}

async function carregarProdutosEstoque(fornecedorUuid) {
    setEstado('salvando');
    paginaAtual = 1;
    const dataCiclo = document.getElementById('data-ciclo').value;
    corpoGrid.innerHTML = '<tr><td colspan="12" style="text-align:center; padding:20px;">Carregando...</td></tr>';

    try {
        const { data: pedidoExistente } = await window.db.from('pedidos_compras')
            .select('id, valor_total').eq('fornecedor_id', fornecedorUuid).eq('data', dataCiclo).maybeSingle();

        let mapaItensSalvos = {};
        if (pedidoExistente) {
            document.getElementById('num-compra').textContent = `#${pedidoExistente.id}`;
            const { data: itensDB } = await window.db.from('itens_pedidos_compras').select('*').eq('pedido_compra_id', pedidoExistente.id);
            if (itensDB) itensDB.forEach(it => { mapaItensSalvos[it.produto_id] = it; });
        } else {
            document.getElementById('num-compra').textContent = '#-----';
        }

        const { data: produtos } = await window.db.from('produtos')
            .select(`id, nome, preco_medio_compra, estoque_inicial (quantidade_inicial, custo_unitario_inicial)`)
            .eq('fornecedor_id', fornecedorUuid).order('nome', { ascending: true });

        const ciclo = window.cicloAtual;
        const d0_ant = new Date(ciclo.d0); d0_ant.setDate(d0_ant.getDate() - 7);
        const d7_ant = new Date(ciclo.d7); d7_ant.setDate(d7_ant.getDate() - 7);
        
        const { data: vendasAnteriores } = await window.db.from('itens_pedidos_vendas').select('quantidade, produto_id, pedidos_vendas!inner(data)')
            .gte('pedidos_vendas.data', d0_ant.toISOString()).lte('pedidos_vendas.data', d7_ant.toISOString());
        const mapaVendas = {};
        if (vendasAnteriores) vendasAnteriores.forEach(v => { mapaVendas[v.produto_id] = (mapaVendas[v.produto_id] || 0) + parseFloat(v.quantidade || 0); });

        const { data: vendasFuturas } = await window.db.from('itens_pedidos_vendas').select('quantidade, produto_id, pedidos_vendas!pedido_venda_id!inner(data)')
            .gte('pedidos_vendas.data', `${dataCiclo}T00:00:00+00:00`);
        const mapaQT2 = {};
        if (vendasFuturas) vendasFuturas.forEach(v => { mapaQT2[v.produto_id] = (mapaQT2[v.produto_id] || 0) + parseFloat(v.quantidade || 0); });

        if (produtos) {
            corpoGrid.innerHTML = produtos.map(p => {
                const estIni = p.estoque_inicial?.[0]?.quantidade_inicial || 0;
                const custoIni = p.estoque_inicial?.[0]?.custo_unitario_inicial || 0;
                const vQT1 = mapaVendas[p.id] || 0;
                const vQT2 = mapaQT2[p.id] || 0;
                const itemSalvo = mapaItensSalvos[p.id];
                const vComp = itemSalvo ? itemSalvo.quantidade : (vQT1 + vQT2) - estIni;
                const vCusto = itemSalvo ? itemSalvo.preco_unitario : 0;
                const vMkt = itemSalvo ? itemSalvo.preco_compra_mkt : 0;
                const pm = p.preco_medio_compra || 0;
                const t1 = vComp * vCusto;
                const t2 = vComp * vMkt;

                return `
                    <tr data-id="${p.id}">
                        <td>${p.nome}</td>
                        <td class="col-est-ini col-standard">${estIni}</td>
                        <td class="col-ct-ini col-standard">${custoIni.toFixed(2).replace('.', ',')}</td>
                        <td class="td-qt1 col-standard">${vQT1}</td>
                        <td class="td-qt2 col-hidden" style="font-weight:700; color:#1C1C1E">${vQT2}</td>
                        <td><input type="tel" class="grid-input col-comp" value="${vComp.toFixed(2).replace('.', ',')}"></td>
                        <td><input type="tel" class="grid-input col-custo-input" value="${vCusto.toFixed(2).replace('.', ',')}"></td>
                        <td><input type="tel" class="grid-input col-mkt-input" value="${vMkt.toFixed(2).replace('.', ',')}"></td>
                        <td class="col-pm">${pm.toFixed(2).replace('.', ',')}</td>
                        <td><input type="text" class="grid-input col-t1-input" value="${t1.toFixed(2)}" readonly></td>
                        <td><input type="text" class="grid-input col-t2-input" value="${t2.toFixed(2)}" readonly></td>
                        <td><input type="text" class="grid-input col-ganho-input" value="${(t2 - t1).toFixed(2)}" readonly style="color:#10B981; font-weight:700"></td>
                    </tr>
                `;
            }).join('');
            atualizarSumario();
        }
    } catch (err) { setEstado('erro', err.message); } finally { if(statusAtual !== 'erro') setEstado('sincronizado'); }
}

const setupDataDefault = () => {
    const campoData = document.getElementById('data-ciclo');
    if (campoData) {
        const hoje = new Date(); hoje.setDate(hoje.getDate() + 1);
        campoData.value = hoje.toISOString().split('T')[0];
    }
};
setupDataDefault();

function setViewMode(mode) {
    currentView = mode;
    paginaAtual = 1;
    document.getElementById('opt-qt1').classList.toggle('active', mode === 'QT1');
    document.getElementById('opt-qt2').classList.toggle('active', mode === 'QT2');
    document.querySelector('.th-qt1').classList.toggle('col-hidden', mode !== 'QT1');
    document.querySelector('.th-qt2').classList.toggle('col-hidden', mode !== 'QT2');
    atualizarSumario();
}

const inputBusca = document.getElementById('busca-fornecedor');
const listaResultados = document.getElementById('resultados-fornecedor');
const corpoGrid = document.getElementById('corpo-grid');

inputBusca.addEventListener('input', async (e) => {
    const termo = e.target.value;
    if (termo.length < 1) { listaResultados.style.display = 'none'; return; }
    const { data: fornecedores } = await window.db.from('fornecedores').select('id, nome').ilike('nome', `%${termo}%`).limit(10);
    if (fornecedores) {
        listaResultados.innerHTML = fornecedores.map(f => `<div class="autocomplete-item" onclick="selecionarFornecedor('${f.nome}', '${f.id}')">${f.nome}</div>`).join('');
        listaResultados.style.display = 'block';
    }
});

// --- LÓGICA FINANCEIRA ---
async function atualizarExtratoComprasEmAberto(fornecedorId) {
    if (!fornecedorId) return;
    try {
        const { data, error } = await window.db.from('pedidos_compras').select('em_aberto').eq('fornecedor_id', fornecedorId);
        if (error) throw error;
        const totalEmAberto = data.reduce((acc, curr) => acc + (parseFloat(curr.em_aberto) || 0), 0);
        document.getElementById('extrato-aberto').textContent = totalEmAberto.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        recalcularSaldoExtrato();
    } catch (err) { console.error(err.message); }
}

async function atualizarPagamentosRealizados(fornecedorId) {
    if (!fornecedorId) return;
    try {
        const { data, error } = await window.db.from('movimentos_fornecedores').select('valor').eq('fornecedor_id', fornecedorId).eq('status', 0);
        if (error) throw error;
        const totalPagos = data.reduce((acc, curr) => acc + (parseFloat(curr.valor) || 0), 0);
        document.getElementById('extrato-pagos').textContent = `- ${totalPagos.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}`;
        recalcularSaldoExtrato();
    } catch (err) { console.error(err.message); }
}

function recalcularSaldoExtrato() {
    const aberto = parseVal(document.getElementById('extrato-aberto').textContent);
    const atual = parseVal(document.getElementById('extrato-atual').textContent);
    const pagos = parseVal(document.getElementById('extrato-pagos').textContent);
    const saldoTotal = (aberto + atual) - pagos;
    const elSaldo = document.getElementById('extrato-saldo');
    elSaldo.textContent = saldoTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    elSaldo.style.color = saldoTotal > 0 ? '#007AFF' : '#10B981';
}

async function selecionarFornecedor(nome, id) {
    inputBusca.value = nome;
    listaResultados.style.display = 'none';
    inputBusca.dataset.selectedId = id;
    await Promise.all([
        atualizarExtratoComprasEmAberto(id),
        atualizarPagamentosRealizados(id),
        carregarProdutosEstoque(id)
    ]);
}

function atualizarSumario() {
    const todasLinhas = Array.from(document.querySelectorAll('#corpo-grid tr'));
    const linhasFiltradas = todasLinhas.filter(tr => {
        const vQT1 = parseFloat(tr.querySelector('.td-qt1')?.textContent) || 0;
        const vQT2 = parseFloat(tr.querySelector('.td-qt2')?.textContent) || 0;
        const ativo = currentView === 'QT1' ? vQT1 : vQT2;
        return ativo > 0;
    });

    const totalPaginas = Math.ceil(linhasFiltradas.length / itensPorPagina) || 1;
    const inicio = (paginaAtual - 1) * itensPorPagina;
    todasLinhas.forEach(tr => tr.style.display = 'none');
    linhasFiltradas.slice(inicio, inicio + itensPorPagina).forEach(tr => tr.style.display = 'table-row');

    let somaT1 = 0, somaGAN = 0;
    linhasFiltradas.forEach(tr => {
        somaT1 += parseVal(tr.querySelector('.col-t1-input').value);
        somaGAN += parseVal(tr.querySelector('.col-ganho-input').value);
    });

    const format = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    document.getElementById('total-geral').textContent = format(somaT1);
    document.getElementById('subtotal-card').textContent = format(somaT1);
    document.getElementById('ganho-card').textContent = format(somaGAN);
    document.getElementById('qtd-itens').textContent = linhasFiltradas.length;
    document.getElementById('info-pag').textContent = `Página ${paginaAtual} de ${totalPaginas}`;
    document.getElementById('extrato-atual').textContent = format(somaT1);
    recalcularSaldoExtrato();

    const pill = document.getElementById('pill-margem');
    if (somaT1 > 0) {
        const margemPct = (somaGAN / somaT1) * 100;
        pill.textContent = `${margemPct.toFixed(1)}%`;
        pill.style.display = 'inline-block';
        pill.className = `badge-margem ${margemPct >= 0 ? 'margem-positiva' : 'margem-negativa'}`;
    } else { pill.style.display = 'none'; }
}

document.getElementById('btn-pag-prev').addEventListener('click', () => { if (paginaAtual > 1) { paginaAtual--; atualizarSumario(); } });
document.getElementById('btn-pag-next').addEventListener('click', () => {
    const totalPaginas = Math.ceil(parseInt(document.getElementById('qtd-itens').textContent) / itensPorPagina);
    if (paginaAtual < totalPaginas) { paginaAtual++; atualizarSumario(); }
});

corpoGrid.addEventListener('input', (e) => {
    if (e.target.classList.contains('grid-input')) {
        const tr = e.target.closest('tr');
        const campo = e.target;
        if (campo.classList.contains('col-comp') || campo.classList.contains('col-custo-input') || campo.classList.contains('col-mkt-input')) {
            campo.value = aplicarMascaraBanco(campo);
        }
        const comp = parseVal(tr.querySelector('.col-comp').value);
        const cust = parseVal(tr.querySelector('.col-custo-input').value);
        const estIni = parseVal(tr.querySelector('.col-est-ini').textContent);
        const ctIni = parseVal(tr.querySelector('.col-ct-ini').textContent);

        if (campo.classList.contains('col-custo-input')) {
            tr.querySelector('.col-mkt-input').value = cust.toFixed(2).replace('.', ',');
        }
        const mkt = parseVal(tr.querySelector('.col-mkt-input').value);
        const divisor = comp + estIni;
        const pm = divisor !== 0 ? ((mkt * comp) + (estIni * ctIni)) / divisor : 0;
        
        tr.querySelector('.col-pm').textContent = pm.toFixed(2).replace('.', ',');
        const t1 = comp * cust; tr.querySelector('.col-t1-input').value = t1.toFixed(2);
        const t2 = comp * mkt; tr.querySelector('.col-t2-input').value = t2.toFixed(2);
        tr.querySelector('.col-ganho-input').value = (t2 - t1).toFixed(2);

        atualizarSumario();
        setEstado('editando');
        clearTimeout(timerAutoSave);
        timerAutoSave = setTimeout(salvarDadosSinc, 8000);
    }
});

function toggleCard() { document.getElementById('mainCard').classList.toggle('expanded'); }
function toggleExtrato() { document.getElementById('extratoCard').classList.toggle('active'); }

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();

// NOVA LÓGICA: Recupera o fornecedor ao voltar para a tela
document.addEventListener('DOMContentLoaded', async () => {
    const session = localStorage.getItem('huber_last_session');
    if (session) {
        const { id, nome, data } = JSON.parse(session);
        
        // Restaura visualmente e dispara carregamento
        inputBusca.value = nome;
        inputBusca.dataset.selectedId = id;
        document.getElementById('data-ciclo').value = data;

        await selecionarFornecedor(nome, id);

        // Limpa para não repetir o comportamento sem necessidade
        localStorage.removeItem('huber_last_session');
    }
});
</script>
</body>
</html>
