<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>HuberHorti v28</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body { font-family: 'Inter', sans-serif; background: #F2L4F8; color: #1C1C1E; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER CENTRALIZADO */
        .topbar { height: 80px; padding: 0 18px; display: flex; align-items: center; justify-content: space-between; position: relative; flex-shrink: 0; }
        .round-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: #FFF; box-shadow: 0 4px 12px rgba(0,0,0,.08); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
        .round-btn svg { width: 20px; height: 20px; stroke: #1C1C1E; fill: none; stroke-width: 2.5; }
        .topbar-info { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; width: 200px; }
        .topbar-info h1 { font-size: 16px; font-weight: 700; }
        .status-tag { font-size: 11px; color: #10B981; font-weight: 600; }

        .content { flex: 1; padding: 0 16px 16px; overflow: hidden; display: flex; flex-direction: column; }

        /* CARDS COM ESPAÇAMENTO FORÇADO */
        .card-total { background: #FFF; border-radius: 20px; padding: 14px 20px; box-shadow: 0 2px 10px rgba(0,0,0,.04); display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px !important; cursor: pointer; z-index: 5; }
        .total-price { font-size: 17px !important; font-weight: 600; color: #2563EB; }
        
        .sumario-content { max-height: 0; overflow: hidden; transition: 0.3s ease; background: #FFF; border-radius: 0 0 20px 20px; margin-top: -30px; margin-bottom: 16px; padding: 0 20px; }
        .sumario-content.open { max-height: 150px; padding: 40px 20px 20px; border: 1px solid #EEE; }

        .input-group { background: #FFF; border-radius: 999px; padding: 4px 6px 4px 16px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,.02); margin-bottom: 16px !important; }
        .input-group input { border: none; outline: none; flex: 1; height: 44px; font-size: 14px; }
        
        .btn-small { width: 34px; height: 34px; border-radius: 50%; border: none; background: #F2F4F8; margin-left: 5px; display: flex; align-items: center; justify-content: center; }
        .btn-small svg { width: 16px; height: 16px; stroke: #1C1C1E; stroke-width: 2.5; fill: none; }

        /* GRID REFINADO */
        .grid-card { background: #FFF; border-radius: 24px; flex: 1; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.05); }
        .table-wrapper { flex: 1; overflow: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th { position: sticky; top: 0; background: #F9FAFB; padding: 12px 8px; font-size: 9px; color: #8E8E93; text-align: right; border-bottom: 1px solid #F2F4F8; }
        th:first-child { text-align: left; width: 150px; padding-left: 18px; }
        td { padding: 12px 8px; font-size: 12px; text-align: right; border-bottom: 1px solid #F9FAFB; }
        td:first-child { text-align: left; font-weight: 600; padding-left: 18px; }

        /* PAGINAÇÃO PADRONIZADA */
        .pagination { height: 64px; border-top: 1px solid #F2F4F8; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #FFF; }
        .page-btn { width: 42px !important; height: 42px !important; border-radius: 50%; border: none; background: #F2F4F8; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .page-btn svg { width: 20px !important; height: 20px !important; stroke: #007AFF !important; stroke-width: 3; fill: none; }
        .page-btn.disabled { opacity: 0.2; }
    </style>
</head>
<body>

    <header class="topbar">
        <button class="round-btn"><svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg></button>
        <div class="topbar-info">
            <h1>Central de Compras</h1>
            <span class="status-tag">status: rascunho</span>
        </div>
        <button class="round-btn"><svg viewBox="0 0 24 24"><path d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
    </header>

    <main class="content">
        <div class="card-total" onclick="toggleSumario()">
            <div>
                <p style="font-size:9px; font-weight:700; color:#8E8E93; text-transform:uppercase">Total da Nota</p>
                <p class="total-price">R$ 18.230,00</p>
            </div>
            <div style="display:flex; align-items:center; gap:8px">
                <span style="background:#E1F9F0; color:#10B981; padding:4px 10px; border-radius:8px; font-size:11px; font-weight:700">32% Margem</span>
                <svg id="arrow-sumario" style="width:16px; stroke:#8E8E93; transition:0.3s" viewBox="0 0 24 24" fill="none" stroke-width="3"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </div>
        </div>

        <div class="sumario-content" id="sumario-box">
            <div style="display:flex; justify-content:space-between; text-align:center">
                <div><p style="font-size:9px; color:#A1A1AA">ITENS</p><p style="font-weight:700">85</p></div>
                <div><p style="font-size:9px; color:#A1A1AA">INVESTIMENTO</p><p style="font-weight:700">R$ 12.396,40</p></div>
                <div><p style="font-size:9px; color:#A1A1AA">GANHO</p><p style="font-weight:700; color:#10B981">R$ 5.833,60</p></div>
            </div>
        </div>

        <div class="input-group">
            <input type="text" placeholder="Selecionar Fornecedor...">
            <button class="btn-small"><svg viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg></button>
            <button class="btn-small"><svg viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg></button>
            <button class="btn-small"><svg viewBox="0 0 24 24"><path d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
        </div>

        <div class="grid-card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>PRODUTOS</th><th>EST.</th><th>CT.</th><th>QT1</th><th>QT2</th><th>CUSTO</th><th>PM</th><th>GANHO</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Abacate Paulista</td><td>1.500</td><td>200</td><td>10</td><td>20</td><td>30,00</td><td>25,00</td><td style="color:#10B981; font-weight:700">180</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span style="font-size:12px; color:#8E8E93; font-weight:600">1-10 de 85</span>
                <div style="display:flex; gap:12px">
                    <button class="page-btn disabled"><svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg></button>
                    <button class="page-btn"><svg viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg></button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSumario() {
            const box = document.getElementById('sumario-box');
            const arrow = document.getElementById('arrow-sumario');
            box.classList.toggle('open');
            arrow.style.transform = box.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
        }
    </script>
</body>
</html>
