<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HuberHorti - Mockup Compras</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* CSS ORIGINAL REUTILIZADO PARA MANTER O LOOK & FEEL */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(180deg,#F6F7FB 0%,#F2F4F8 100%);color:#1A1D23;min-height:100vh}

.topbar{position:fixed;top:0;left:0;right:0;height:78px;background:#F2F4F8;padding:14px 18px 6px;gap:14px;display:flex;align-items:flex-start;z-index:100}
.back-btn{width:44px;height:44px;border:none;border-radius:999px;background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 14px 30px rgba(15,23,42,.14);cursor:pointer}
.back-btn svg{width:22px;height:22px;stroke:#1C1C1E;fill:none;stroke-width:2.75;stroke-linecap:round;stroke-linejoin:round}

.topbar-copy{display:flex;flex-direction:column;padding-top:6px;gap:4px}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:15px}
.autosave-status{font-size:12px;color:#6B7280}

.main{margin-top:78px;padding:4px 16px 104px}

.top-info-row{display:grid;grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr);gap:14px;margin-bottom:14px}
.top-date-card, .top-total-card{background:rgba(255,255,255,.96);border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:14px 16px}

.meta-label{display:block;font-size:12px;font-weight:600;color:#8E8E93;margin-bottom:8px}
.date-card-day{font-size:14px;font-weight:400;color:#1C1C1E}
.price-tag{font-size:18px;font-weight:800;color:#2563EB;line-height:1.05}

.busca-wrap{position:relative;margin-bottom:14px}
.busca-input{width:100%;padding:14px 12px 14px 44px;background:rgba(255,255,255,.96);border:none;border-radius:999px;font-size:15px;box-shadow:0 10px 30px rgba(0,0,0,.08);outline:none}
.busca-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:#9CA3AF;fill:none;stroke-width:2}

.tabela-wrap{background:rgba(255,255,255,.96);border-radius:26px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:14px 0 6px;overflow:hidden}
.grid-card-title{padding:0 18px 3px;font-size:8px;font-weight:400;color:#8E8E93;text-transform:uppercase}
.t-head{display:grid;grid-template-columns:1fr 50px 70px 70px;padding:10px 18px;border-bottom:1px solid #F0F1F4;font-size:10px;font-weight:500;color:#6B7280}
.t-row{display:grid;grid-template-columns:1fr 50px 70px 70px;padding:12px 18px;border-bottom:1px solid #F5F5F7;align-items:center}
.t-nome{font-size:12px;font-weight:500;color:#1A1D23}
.t-unid{font-size:10px;color:#9CA3AF}
.t-input{width:100%;padding:6px;border:1px solid #ECEEF2;border-radius:8px;font-size:12px;font-weight:600;text-align:center;background:#F7F8FA;outline:none}
.t-total{font-size:11px;font-weight:600;text-align:right;color:#1A1D23}

.btn-finalizar{width:100%;margin-top:20px;padding:16px;background:#1A1D23;color:white;border:none;border-radius:18px;font-weight:700;font-size:15px;box-shadow:0 10px 20px rgba(0,0,0,0.1)}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="breadcrumb"><span class="active">Central de Compras</span></div>
    <div class="autosave-status">Status: rascunho</div>
  </div>
</div>

<div class="main">
  <div class="top-info-row">
    <div class="top-date-card">
      <span class="meta-label">Data Compra</span>
      <div class="date-card-day">07 de abr de 2026</div>
    </div>
    <div class="top-total-card">
      <span class="meta-label">Total da Nota</span>
      <div class="price-tag">R$ 0,00</div>
    </div>
  </div>

  <div class="busca-wrap">
    <svg class="busca-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="busca-input" type="text" placeholder="Buscar produto no estoque...">
  </div>

  <div class="tabela-wrap">
    <div class="grid-card-title">Itens da Compra · 3</div>
    <div class="t-head">
      <div>PRODUTO</div>
      <div style="text-align:center">QTD</div>
      <div style="text-align:center">CUSTO</div>
      <div style="text-align:right">TOTAL</div>
    </div>

    <div class="t-row">
      <div>
        <div class="t-nome">Abacate Paulista</div>
        <div class="t-unid">Cx 20kg</div>
      </div>
      <input type="number" class="t-input" value="0">
      <input type="number" class="t-input" value="30.00">
      <div class="t-total">R$ 0,00</div>
    </div>

    <div class="t-row">
      <div>
        <div class="t-nome">Alho Roxo</div>
        <div class="t-unid">Kg</div>
      </div>
      <input type="number" class="t-input" value="0">
      <input type="number" class="t-input" value="15.50">
      <div class="t-total">R$ 0,00</div>
    </div>
  </div>

  <button class="btn-finalizar">Finalizar Compra</button>
</div>

</body>
</html>
