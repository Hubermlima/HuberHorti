<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Compras</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{font-family:Arial;padding:20px}

/* container correto */
#forn-busca{position:relative;max-width:400px}

/* input */
.cli-input{
  width:100%;
  padding:10px;
  border:1px solid #ECEEF2;
  border-radius:10px;
}

/* dropdown correto */
.cli-lista{
  position:absolute;
  top:calc(100% + 6px);
  left:0;
  right:0;
  background:#fff;
  border:1px solid #ECEEF2;
  border-radius:10px;
  display:none;
  max-height:240px;
  overflow:auto;
  z-index:9999;
}

.cli-lista.open{display:block}

.ac-item{
  padding:10px;
  cursor:pointer;
}

.ac-item:active{background:#F7F8FA}
</style>
</head>

<body>

<h3>Autocomplete Fornecedor</h3>

<div id="forn-busca">
  <input class="cli-input"
    id="forn-input"
    type="text"
    placeholder="Digite o nome do fornecedor..."
    oninput="buscarFornecedor()"
    autocomplete="off"/>

  <div class="cli-lista" id="forn-lista"></div>
</div>

<script>
const db = window.db;
let fornecedores = [];

function normalizar(valor){
  return String(valor || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .toLowerCase()
    .trim();
}

async function carregarDados(){
  const { data } = await db.from('fornecedores').select('*').order('nome');
  fornecedores = data || [];
}

function buscarFornecedor(){
  const q = normalizar(document.getElementById('forn-input').value);
  const ac = document.getElementById('forn-lista');

  if(!q){
    ac.classList.remove('open');
    ac.innerHTML='';
    return;
  }

  const filtro = fornecedores
    .filter(f => normalizar(f.nome).includes(q))
    .slice(0,8);

  ac.innerHTML = filtro.map(f =>
    `<div class="ac-item">${f.nome}</div>`
  ).join('');

  ac.classList.add('open');
}

document.addEventListener('click',function(e){
  if(!e.target.closest('#forn-busca')){
    document.getElementById('forn-lista').classList.remove('open');
  }
});

carregarDados();
</script>

</body>
</html>
