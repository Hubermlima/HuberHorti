<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Compras</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{font-family:Arial;padding:20px}
.cli-wrap{position:relative}
.cli-input{width:100%;padding:10px 12px 10px 34px;border:1px solid #ECEEF2;border-radius:10px}
.cli-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%)}
.cli-lista{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ECEEF2;border-radius:10px;display:none;max-height:200px;overflow:auto}
.cli-lista.open{display:block}
.ac-item{padding:10px;cursor:pointer}
.ac-cod{font-size:11px;color:#999}
</style>
</head>

<body>

<h3>Autocomplete Fornecedor</h3>

<div id="forn-busca">
  <div class="cli-wrap">
    <input class="cli-input"
      id="forn-input"
      type="text"
      placeholder="Digite o nome do fornecedor..."
      oninput="buscarFornecedor()"
      autocomplete="off"/>
  </div>
  <div class="cli-lista" id="forn-lista"></div>
</div>


<script>

const db = window.db;

let fornecedores = [];


async function carregarDados(){
  const { data } = await db.from('fornecedores').select('*').order('nome');
  fornecedores = data || [];
}

function normalizarTexto(valor){
  return String(valor || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .trim();
}

function buscarFornecedor(){
  const q = normalizarTexto(document.getElementById('forn-input').value);
  const ac = document.getElementById('forn-lista');

  if(!q){
    ac.classList.remove('open');
    ac.innerHTML='';
    return;
  }

  const filtro = fornecedores
    .filter(f => normalizarTexto(f.nome).includes(q))
    .slice(0,8);

  if(!filtro.length){
    ac.innerHTML = '<div class="ac-item">Nenhum fornecedor encontrado</div>';
    ac.classList.add('open');
    return;
  }

  ac.innerHTML = filtro.map(f =>
    `<div class="ac-item">${f.nome}</div>`
  ).join('');

  ac.classList.add('open');
}

carregarDados();

</script>

</body>
</html>
