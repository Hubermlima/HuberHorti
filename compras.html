<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Compras v25.9</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>

<style>
/* RESET & BASE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Inter',sans-serif;
    background:#F2F4F8;
    color:#1C1C1E;
    height: 100vh; 
    height: calc(var(--vh, 1vh) * 100);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* TOPBAR */
.topbar{
    height: 64px;
    padding: 0 18px;
    padding-top: env(safe-area-inset-top);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px}
.autosave-status{font-size:10px;color:#10B981;font-weight:500}

/* ÁREA PRINCIPAL */
.main{
    flex-shrink: 0;
    padding: 0 16px; 
    display: flex;
    flex-direction: column;
}

.unified-card {
    background: #FFF;
    border-radius: 28px;
    box-shadow: 0 2px 10px rgba(0,0,0,.02);
    flex-shrink: 0;
    overflow: visible !important; 
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    z-index: 100;
}

/* AUTOCOMPLETE */
.autocomplete-wrapper { position: relative; width: 100%; }
.autocomplete-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #FFF;
    border-radius: 18px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    z-index: 9999;
    max-height: 220px;
    overflow-y: auto;
    display: none;
    margin-top: 8px;
    border: 1px solid #F2F2F7;
    -webkit-overflow-scrolling: touch;
}

.search-count {
    padding: 10px 18px;
    font-size: 10px;
    font-weight: 700;
    color: #8E8E93;
    text-transform: uppercase;
    background: #F9FAFB;
    border-bottom: 1px solid #F2F2F7;
    position: sticky;
    top: 0;
}

.autocomplete-item {
    padding: 14px 18px;
    font-size: 14px;
    border-bottom: 1px solid #F2F2F7;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:active { background: #F2F2F7; }
.autocomplete-item span { color: #8E8E93; font-size: 11px; font-weight: 500; }

.card-search-section { padding: 14px 14px 8px 14px; }
.busca-wrap-ios {
    position: relative;
    display: flex;
    align-items: center;
    background: #F8F8FA;
    border-radius: 16px;
    padding: 4px 10px;
}
.busca-input {
    flex-grow: 1;
    padding: 8px 8px 8px 32px;
    background: transparent;
    border: none;
    font-size: 15px;
    outline: none;
    color: #1C1C1E;
}
.busca-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    stroke: #8E8E93;
    stroke-width: 2.5;
    fill: none;
}

/* TOTAL E AÇÕES */
.total-info-section { 
    padding: 4px 18px 14px 18px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
}
.total-label { font-size: 9px; font-weight: 700; color: #8E8E93; text-transform: uppercase; margin-bottom: 2px; display: block; }
.price-tag { font-size: 18px; font-weight: 700; color: #1C1C1E; letter-spacing: -0.5px; }

.card-actions { display: flex; gap: 8px; align-items: center; }
.btn-card-action {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: #F2F2F7; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    cursor: pointer;
}
.btn-card-action svg { width: 14px; height: 14px; stroke: #1C1C1E; stroke-width: 2.5; fill: none; }
.btn-card-action.expand-btn { transition: transform 0.3s ease; }
.unified-card.expanded .expand-btn { transform: rotate(180deg); }

.details-content {
    max-height: 0;
    opacity: 0;
    padding: 0 18px;
    transition: all 0.4s ease;
    display: grid;
    grid-template-columns: 1fr 1fr; 
    gap: 20px;
    overflow: hidden;
}
.unified-card.expanded .details-content {
    max-height: 200px;
    opacity: 1;
    padding-bottom: 20px;
    border-top: 1px solid #F3F4F6;
    padding-top: 15px;
}

.detail-item { 
    font-size: 11px; 
    color: #8E8E93; 
    margin-bottom: 8px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    min-height: 20px;
}
.detail-item b { color: #1C1C1E; }

.input-data-edit {
    border: none;
    background: transparent;
    color: #1C1C1E;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    outline: none;
    text-align: right;
    padding: 0;
    margin: 0;
    appearance: none;
    -webkit-appearance: none;
    min-width: 0;
    flex-shrink: 1;
}

/* TABELA / GRID */
.footer-grid-card {
    background: #FFF; 
    border-radius: 32px 32px 0 0;
    box-shadow: 0 -4px 15px rgba(0,0,0,.05);
    display: flex; 
    flex-direction: column;
    flex: 1; 
    min-height: 0; 
    margin-top: 12px;
    overflow: hidden;
}
.grid-scroll { flex: 1; overflow: auto; }

table { border-collapse: collapse; width: max-content; font-size: 10px; table-layout: fixed; }
th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #F9FAFB; color: #48484A; width: 75px; }
th:first-child, td:first-child { 
    width: 150px; position: sticky; left: 0; background: #FFF; 
    text-align: left; font-weight: 700; z-index: 5; border-right: 1px solid #F3F4F6; padding-left: 20px;
}
thead th { position: sticky; top: 0; background: #F9FAFB; padding: 12px 8px; color: #8E8E93; z-index: 10; border-bottom: 1px solid #F3F4F6; }

.grid-input {
    width: 100%;
    border: 1px solid #E5E5EA;
    border-radius: 6px;
    padding: 5px;
    text-align: center;
    font-size: 10px;
    background: #F9FAFB;
    outline: none;
}
.grid-input:focus { border-color: #007AFF; background: #FFF; }
.grid-input[readonly] { background: transparent; border-color: transparent; font-weight: 600; color: #48484A; }

.pagination-footer {
  flex-shrink: 0; height: 65px; padding: 0 20px calc(8px + env(safe-area-inset-bottom));
  background: #FFF; border-top: 1px solid #F3F4F6; display: flex; justify-content: space-between; align-items: center;
}
.ios-btn-float { width: 38px; height: 38px; border-radius: 50%; border: none; background: #FFF; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn-float" onclick="history.back()">
    <svg viewBox="0 0 24 24" style="width:18px; height:18px; stroke:#1C1C1E; stroke-width:2.2; fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
  </button>
  <div class="topbar-copy">
    <div class="breadcrumb"><span class="active">Central de Compras</span></div>
    <div class="autosave-status" id="status-sinc">Sincronizado</div>
  </div>
  <button class="ios-btn-float">
    <svg viewBox="0 0 24 24" style="width:18px; height:18px; stroke:#1C1C1E; stroke-width:2.2; fill:none"><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0 M12 8v8 M8 12h8"/></svg>
  </button>
</div>

<div class="main">
  <div class="unified-card" id="mainCard">
    <div class="card-search-section">
      <div class="autocomplete-wrapper">
        <div class="busca-wrap-ios">
          <svg class="busca-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          <input id="busca-fornecedor" class="busca-input" type="text" placeholder="Buscar Fornecedor..." autocomplete="off">
        </div>
        <div id="resultados-fornecedor" class="autocomplete-results"></div>
      </div>
    </div>

    <div class="total-info-section">
      <div onclick="toggleCard()" style="flex-grow: 1; cursor: pointer;">
        <span class="total-label">Total da Compra</span>
        <div style="display:flex; align-items:center">
          <span class="price-tag" id="total-geral">R$ 0,00</span>
          <div id="badge-ganho" style="padding:1px 6px;background:#E1F9F0;color:#10B981;border-radius:6px;font-size:9px;font-weight:700;margin-left:8px; display:none">0%</div>
        </div>
      </div>
      
      <div class="card-actions">
        <button class="btn-card-action" title="Nova Compra"><svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><path d="M13 2v7h7"/></svg></button>
        <button class="btn-card-action" title="Excluir Compra"><svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg></button>
        <button class="btn-card-action expand-btn" onclick="toggleCard()"><svg viewBox="0 0 24 24"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg></button>
      </div>
    </div>

    <div class="details-content">
      <div>
        <div class="detail-item">Data: <input type="date" id="data-ciclo" class="input-data-edit"></div>
        <div class="detail-item">Número: <b id="num-compra">#-----</b></div>
        <div class="detail-item">Itens: <b id="qtd-itens">0</b></div>
      </div>
      <div>
        <div class="detail-item">Subtotal: <b id="subtotal-card">R$ 0,00</b></div>
        <div class="detail-item">Ganho: <b id="ganho-card" style="color:#10B981">R$ 0,00</b></div>
        <div class="detail-item">Status: <b>Aberto</b></div>
      </div>
    </div>
  </div>
</div>

<div class="footer-grid-card">
  <div class="grid-scroll">
    <table id="tabela-produtos">
      <thead>
        <tr>
          <th>PRODUTOS</th>
          <th>EST INI</th>
          <th>CT. INI</th>
          <th>QT1</th>
          <th>QT2</th>
          <th>COMP</th>
          <th>CUST</th>
          <th>PM</th>
          <th>MKT</th>
          <th>T1</th>
          <th>T2</th>
          <th>GAN</th>
        </tr>
      </thead>
      <tbody id="corpo-grid">
      </tbody>
    </table>
  </div>

  <div class="pagination-footer">
    <span id="info-pag" style="font-size:10px; color:#8E8E93; font-weight:600">Selecione um fornecedor</span>
    <div style="display:flex; gap:10px">
      <button class="ios-btn-float" style="width:34px; height:34px"><svg viewBox="0 0 24 24" style="width:16px; stroke:#1C1C1E; stroke-width:2.5; fill:none"><path d="M15 18l-6-6 6-6" /></svg></button>
      <button class="ios-btn-float" style="width:34px; height:34px"><svg viewBox="0 0 24 24" style="width:16px; stroke:#1C1C1E; stroke-width:2.5; fill:none"><path d="M9 18l6-6-6-6" /></svg></button>
    </div>
  </div>
</div>

<script>
window.HHUtils.atualizarCicloAtualGlobal();

const setupDataDefault = () => {
    const campoData = document.getElementById('data-ciclo');
    if (campoData) {
        const hoje = new Date();
        hoje.setDate(hoje.getDate() + 1); 
        const yyyy = hoje.getFullYear();
        const mm = String(hoje.getMonth() + 1).padStart(2, '0');
        const dd = String(hoje.getDate()).padStart(2, '0');
        campoData.value = `${yyyy}-${mm}-${dd}`;
    }
};
setupDataDefault();

const inputBusca = document.getElementById('busca-fornecedor');
const listaResultados = document.getElementById('resultados-fornecedor');
const corpoGrid = document.getElementById('corpo-grid');

inputBusca.addEventListener('input', async (e) => {
    const termo = e.target.value;
    if (termo.length < 1) {
        listaResultados.style.display = 'none';
        return;
    }
    try {
        const { data: fornecedores, error } = await window.db
            .from('fornecedores')
            .select('id, codigo, nome')
            .ilike('nome', `%${termo}%`)
            .limit(20);

        if (error) throw error;

        if (fornecedores && fornecedores.length > 0) {
            const flagContagem = `<div class="search-count">Encontrados: ${fornecedores.length} registros</div>`;
            const itensHtml = fornecedores.map(f => `
                <div class="autocomplete-item" onclick="selecionarFornecedor('${f.nome}', '${f.codigo}', '${f.id}')">
                    ${f.nome} <span>COD: ${f.codigo}</span>
                </div>
            `).join('');
            listaResultados.innerHTML = flagContagem + itensHtml;
            listaResultados.style.display = 'block';
        }
    } catch (err) { console.error('Erro busca:', err.message); }
});

async function selecionarFornecedor(nome, codigo, id) {
    inputBusca.value = nome;
    listaResultados.style.display = 'none';
    inputBusca.dataset.selectedId = id;
    inputBusca.dataset.selectedCod = codigo;
    await carregarProdutosEstoque(id);
}

// Escutador para cálculos em tempo real
corpoGrid.addEventListener('input', (e) => {
    if (e.target.classList.contains('grid-input')) {
        const tr = e.target.closest('tr');
        const comp = parseFloat(tr.querySelector('.col-comp').value) || 0;
        const cust = parseFloat(tr.querySelector('.col-custo-input').value) || 0;
        const estIni = parseFloat(tr.querySelector('.col-est-ini').textContent) || 0;
        const ctIni = parseFloat(tr.querySelector('.col-ct-ini').textContent) || 0;

        // Regra PM: ((CUST x COMP) + (EST INI x CT. INI)) / (COMP + EST INI)
        const divisor = comp + estIni;
        let pm = 0;
        if (divisor !== 0) {
            pm = ((cust * comp) + (estIni * ctIni)) / divisor;
        }
        tr.querySelector('.col-pm').textContent = pm.toFixed(2);
        
        // Regra MKT: MKT = PM (se a mudança não for no próprio input MKT)
        if (!e.target.classList.contains('col-mkt-input')) {
            tr.querySelector('.col-mkt-input').value = pm.toFixed(2);
        }
        
        // Regra T1: COMP x CUST
        const t1Value = comp * cust;
        tr.querySelector('.col-t1-input').value = t1Value.toFixed(2);

        // Regra T2: COMP x MKT
        const mkt = parseFloat(tr.querySelector('.col-mkt-input').value) || 0;
        const t2Value = comp * mkt;
        tr.querySelector('.col-t2-input').value = t2Value.toFixed(2);
    }
});

async function carregarProdutosEstoque(fornecedorUuid) {
    document.getElementById('status-sinc').textContent = "Sincronizando estoque...";
    const dataCiclo = document.getElementById('data-ciclo').value;
    corpoGrid.innerHTML = '<tr><td colspan="12" style="text-align:center; padding:20px;">Processando dados...</td></tr>';

    try {
        const ciclo = window.cicloAtual;
        const d0_ant = new Date(ciclo.d0); d0_ant.setDate(d0_ant.getDate() - 7);
        const d7_ant = new Date(ciclo.d7); d7_ant.setDate(d7_ant.getDate() - 7);

        const { data: produtos, error: errProd } = await window.db
            .from('produtos')
            .select(`id, nome, estoque_inicial (quantidade_inicial, custo_unitario_inicial)`)
            .eq('fornecedor_id', fornecedorUuid)
            .order('nome', { ascending: true });

        if (errProd) throw errProd;

        const { data: vendasAnteriores } = await window.db
            .from('itens_pedidos_vendas')
            .select('quantidade, produto_id, pedidos_vendas!inner(data)')
            .gte('pedidos_vendas.data', d0_ant.toISOString())
            .lte('pedidos_vendas.data', d7_ant.toISOString());

        const mapaVendas = {};
        if (vendasAnteriores) {
            vendasAnteriores.forEach(v => {
                mapaVendas[v.produto_id] = (mapaVendas[v.produto_id] || 0) + parseFloat(v.quantidade || 0);
            });
        }

        const { data: vendasFuturas } = await window.db
            .from('itens_pedidos_vendas')
            .select('quantidade, produto_id, pedidos_vendas!pedido_venda_id!inner(data)')
            .gte('pedidos_vendas.data', `${dataCiclo}T00:00:00+00:00`);

        const mapaQT2 = {};
        if (vendasFuturas) {
            vendasFuturas.forEach(v => {
                mapaQT2[v.produto_id] = (mapaQT2[v.produto_id] || 0) + parseFloat(v.quantidade || 0);
            });
        }

        if (produtos && produtos.length > 0) {
            corpoGrid.innerHTML = produtos.map(p => {
                const estIni = p.estoque_inicial?.[0]?.quantidade_inicial || 0;
                const custoIni = p.estoque_inicial?.[0]?.custo_unitario_inicial || 0;
                const valorQT1 = mapaVendas[p.id] || 0;
                const valorQT2 = mapaQT2[p.id] || 0;
                const valorComp = (valorQT1 + valorQT2) - estIni;
                
                const divisor = valorComp + estIni;
                const pmInicial = divisor !== 0 ? ((0 * valorComp) + (estIni * custoIni)) / divisor : 0;
                const t1Inicial = valorComp * 0;
                const t2Inicial = valorComp * pmInicial;

                return `
                    <tr data-id="${p.id}">
                        <td>${p.nome}</td>
                        <td class="col-est-ini" style="color:#8E8E93">${estIni}</td>
                        <td class="col-ct-ini" style="color:#8E8E93">${parseFloat(custoIni).toFixed(2)}</td>
                        <td style="color:#8E8E93">${valorQT1}</td>
                        <td style="font-weight:700; color:#1C1C1E">${valorQT2}</td>
                        <td><input type="number" class="grid-input col-comp" value="${valorComp}"></td>
                        <td><input type="number" class="grid-input col-custo-input" value="0.00" step="0.01"></td>
                        <td class="col-pm" style="font-weight:700; color:#48484A">${pmInicial.toFixed(2)}</td>
                        <td><input type="number" class="grid-input col-mkt-input" value="${pmInicial.toFixed(2)}" step="0.01"></td>
                        <td><input type="number" class="grid-input col-t1-input" value="${t1Inicial.toFixed(2)}" readonly></td>
                        <td><input type="number" class="grid-input col-t2-input" value="${t2Inicial.toFixed(2)}" readonly></td>
                        <td style="color:#10B981; font-weight:700" class="col-ganho">0.00</td>
                    </tr>
                `;
            }).join('');
            document.getElementById('info-pag').textContent = `${produtos.length} produtos encontrados`;
            document.getElementById('qtd-itens').textContent = produtos.length;
        } else {
            corpoGrid.innerHTML = '<tr><td colspan="12" style="text-align:center; padding:20px;">Nenhum produto encontrado.</td></tr>';
        }
    } catch (err) {
        console.error('Erro:', err.message);
        corpoGrid.innerHTML = '<tr><td colspan="12" style="text-align:center; color:red; padding:20px;">Erro ao carregar dados.</td></tr>';
    } finally { document.getElementById('status-sinc').textContent = "Sincronizado"; }
}

document.addEventListener('click', (e) => {
    if (!inputBusca.contains(e.target) && !listaResultados.contains(e.target)) listaResultados.style.display = 'none';
});

function toggleCard() { document.getElementById('mainCard').classList.toggle('expanded'); }

const fixIOSHeight = () => {
    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
};
window.addEventListener('resize', fixIOSHeight);
fixIOSHeight();
</script>

</body>
</html>
