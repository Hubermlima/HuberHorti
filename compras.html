<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Compras v25.9</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>

<style>
/* Estilos base mantendo sua UI limpa e padrão iOS */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Inter',sans-serif;
    background:#F2F4F8;
    color:#1C1C1E;
    height: 100vh; 
    height: calc(var(--vh, 1vh) * 100);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.btn-disabled { opacity: 0.4 !important; pointer-events: none !important; filter: grayscale(1); }

.topbar{
    height: 64px; padding: 0 18px; padding-top: env(safe-area-inset-top);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px}
.autosave-status{font-size:10px;font-weight:700;transition: all 0.3s ease; cursor: default;}

.main{ flex-shrink: 0; padding: 0 16px; display: flex; flex-direction: column; }
.unified-card { background: #FFF; border-radius: 28px; box-shadow: 0 2px 10px rgba(0,0,0,.02); position: relative; z-index: 100; }

/* Busca e Inputs */
.busca-wrap-ios { position: relative; display: flex; align-items: center; background: #F8F8FA; border-radius: 16px; padding: 4px 10px; margin: 14px; }
.busca-input { flex-grow: 1; padding: 8px 8px 8px 32px; background: transparent; border: none; font-size: 15px; outline: none; }
.busca-icon { position: absolute; left: 12px; width: 16px; height: 16px; stroke: #8E8E93; stroke-width: 2.5; fill: none; }

.autocomplete-results {
    position: absolute; top: 100%; left: 14px; right: 14px; background: #FFF; border-radius: 18px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.15); z-index: 9999; max-height: 220px; overflow-y: auto; display: none;
}
.autocomplete-item { padding: 14px 18px; font-size: 14px; border-bottom: 1px solid #F2F2F7; }

.total-info-section { padding: 4px 18px 14px 18px; display: flex; justify-content: space-between; align-items: center; }
.price-tag { font-size: 18px; font-weight: 700; }

/* Grid de Produtos */
.footer-grid-card {
    background: #FFF; border-radius: 32px 32px 0 0; box-shadow: 0 -4px 15px rgba(0,0,0,.05);
    display: flex; flex-direction: column; flex: 1; min-height: 0; margin-top: 12px; overflow: hidden;
}
.grid-scroll { flex: 1; overflow: auto; }
table { border-collapse: collapse; width: max-content; font-size: 10px; }
th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #F9FAFB; width: 75px; }
th:first-child, td:first-child { width: 150px; position: sticky; left: 0; background: #FFF; text-align: left; font-weight: 700; z-index: 5; }

.grid-input { width: 100%; border: 1px solid #E5E5EA; border-radius: 6px; padding: 5px; text-align: center; font-size: 10px; background: #F9FAFB; }

.ios-btn-float { width: 38px; height: 38px; border-radius: 50%; border: none; background: #FFF; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
</style>
</head>
<body>

<div class="topbar">
  <button id="btn-voltar" class="ios-btn-float" onclick="history.back()">
    <svg viewBox="0 0 24 24" style="width:18px; stroke:#1C1C1E; stroke-width:2.2; fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
  </button>
  <div class="topbar-copy">
    <div class="breadcrumb"><span class="active">Central de Compras</span></div>
    <div class="autosave-status" id="status-sinc">Sincronizado</div>
  </div>
  <button id="btn-add-topbar" class="ios-btn-float">
    <svg viewBox="0 0 24 24" style="width:18px; stroke:#1C1C1E; stroke-width:2.2; fill:none"><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0 M12 8v8 M8 12h8"/></svg>
  </button>
</div>

<div class="main">
  <div class="unified-card">
    <div class="busca-wrap-ios">
      <svg class="busca-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
      <input id="busca-fornecedor" class="busca-input" type="text" placeholder="Buscar Fornecedor..." autocomplete="off">
      <div id="resultados-fornecedor" class="autocomplete-results"></div>
    </div>

    <div class="total-info-section">
      <div>
        <span style="font-size:9px; font-weight:700; color:#8E8E93; text-transform:uppercase">Total da Compra</span>
        <div class="price-tag" id="total-geral">R$ 0,00</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px; color:#8E8E93">Número: <b id="num-compra">#-----</b></div>
        <input type="date" id="data-ciclo" style="border:none; font-size:11px; font-weight:700; color:#007AFF; background:transparent">
      </div>
    </div>
  </div>
</div>

<div class="footer-grid-card">
  <div class="grid-scroll">
    <table id="tabela-produtos">
      <thead>
        <tr>
          <th>PRODUTOS</th>
          <th>EST INI</th>
          <th>CT. INI</th>
          <th>QT1</th>
          <th>COMP</th>
          <th>CUST</th>
          <th>MKT</th>
          <th>PM</th>
          <th>T1</th>
          <th>GAN</th>
        </tr>
      </thead>
      <tbody id="corpo-grid"></tbody>
    </table>
  </div>
</div>

<script>
window.HHUtils.atualizarCicloAtualGlobal();
let statusAtual = 'sincronizado';
let timerAutoSave;
let ultimoErro = null;

// ATUALIZAÇÃO DA FLAG DE ERRO
function setEstado(novoStatus, infoErro = null) {
    const el = document.getElementById('status-sinc');
    statusAtual = novoStatus;
    ultimoErro = infoErro;

    if (novoStatus === 'erro') {
        el.textContent = 'ERRO DE GRAVAÇÃO (Ver Detalhes)';
        el.style.color = '#FF3B30';
        el.style.cursor = 'pointer';
        el.onclick = () => {
            alert(`TABELA: ${ultimoErro.tabela}\nMENSAGEM: ${ultimoErro.erro.message}\nDICA: ${ultimoErro.erro.hint || 'Nenhuma dica disponível'}`);
            console.error("Erro Detalhado:", ultimoErro);
        };
        return;
    }

    el.onclick = null;
    el.style.cursor = 'default';

    if (novoStatus === 'editando') {
        el.textContent = 'Editando...';
        el.style.color = '#FF9500';
    } else if (novoStatus === 'salvando') {
        el.textContent = 'Sincronizando...';
        el.style.color = '#007AFF';
    } else {
        el.textContent = 'Sincronizado';
        el.style.color = '#34C759';
    }
}

async function salvarDadosSinc() {
    if (statusAtual !== 'editando') return;
    setEstado('salvando');

    const numCompraEl = document.getElementById('num-compra');
    const fornecedorId = document.getElementById('busca-fornecedor').dataset.selectedId;
    const dataCompra = document.getElementById('data-ciclo').value;
    const valorTotal = parseFloat(document.getElementById('total-geral').textContent.replace(/[^\d,.-]/g, '').replace(',', '.')) || 0;
    
    let pedidoId = numCompraEl.textContent.replace('#', '').trim();

    try {
        // 1. Cabeçalho
        let resCab;
        if (pedidoId === '-----') {
            resCab = await window.db.from('pedidos_compras').insert({
                data: dataCompra, fornecedor_id: fornecedorId, valor_total: valorTotal, em_aberto: valorTotal
            }).select();
        } else {
            resCab = await window.db.from('pedidos_compras').update({
                data: dataCompra, valor_total: valorTotal, em_aberto: valorTotal
            }).eq('id', pedidoId).select();
        }

        if (resCab.error) throw {tabela: 'pedidos_compras', erro: resCab.error};
        pedidoId = resCab.data[0].id;
        numCompraEl.textContent = `#${pedidoId}`;

        // 2. Limpar Itens
        const { error: delErr } = await window.db.from('itens_pedidos_compras').delete().eq('pedido_compra_id', pedidoId);
        if (delErr) throw {tabela: 'limpeza_itens', erro: delErr};

        // 3. Preparar Itens e Updates de PM
        const linhas = document.querySelectorAll('#corpo-grid tr');
        const itens = [];
        const promessasPM = [];

        linhas.forEach(tr => {
            const comp = parseFloat(tr.querySelector('.col-comp').value) || 0;
            const prodId = tr.dataset.id;
            const pmVal = parseFloat(tr.querySelector('.col-pm').textContent) || 0;

            if (comp > 0) {
                itens.push({
                    pedido_compra_id: pedidoId,
                    produto_id: prodId,
                    quantidade: comp,
                    preco_unitario: parseFloat(tr.querySelector('.col-custo-input').value) || 0,
                    valor_total: parseFloat(tr.querySelector('.col-t1-input').value) || 0,
                    ganho: parseFloat(tr.querySelector('.col-ganho-input').value) || 0,
                    preco_compra_mkt: parseFloat(tr.querySelector('.col-mkt-input').value) || 0
                });
                promessasPM.push(window.db.from('produtos').update({ preco_medio_compra: pmVal }).eq('id', prodId));
            }
        });

        // 4. Inserir Itens
        if (itens.length > 0) {
            const { error: insErr } = await window.db.from('itens_pedidos_compras').insert(itens);
            if (insErr) throw {tabela: 'itens_pedidos_compras', erro: insErr};
            
            // 5. Atualizar PM na tabela produtos
            const resultadosPM = await Promise.all(promessasPM);
            const erroPM = resultadosPM.find(r => r.error);
            if (erroPM) throw {tabela: 'produtos_pm', erro: erroPM.error};
        }

        setEstado('sincronizado');
    } catch (err) {
        setEstado('erro', err);
    }
}

// Funções Auxiliares de UI
const setupData = () => {
    const d = new Date(); d.setDate(d.getDate() + 1);
    document.getElementById('data-ciclo').value = d.toISOString().split('T')[0];
};
setupData();

const inputBusca = document.getElementById('busca-fornecedor');
const listaRes = document.getElementById('resultados-fornecedor');
const corpoGrid = document.getElementById('corpo-grid');

inputBusca.addEventListener('input', async (e) => {
    const t = e.target.value; if(t.length < 2) return;
    const { data: f } = await window.db.from('fornecedores').select('id, nome').ilike('nome', `%${t}%`).limit(10);
    if(f) {
        listaRes.innerHTML = f.map(x => `<div class="autocomplete-item" onclick="selecionarFornecedor('${x.nome}', '${x.id}')">${x.nome}</div>`).join('');
        listaRes.style.display = 'block';
    }
});

async function selecionarFornecedor(nome, id) {
    inputBusca.value = nome; listaRes.style.display = 'none';
    inputBusca.dataset.selectedId = id;
    await carregarGrid(id);
}

async function carregarGrid(fId) {
    corpoGrid.innerHTML = '<tr><td colspan="10">Carregando...</td></tr>';
    const { data: produtos } = await window.db.from('produtos').select('*').eq('fornecedor_id', fId);
    if(produtos) {
        corpoGrid.innerHTML = produtos.map(p => `
            <tr data-id="${p.id}">
                <td>${p.nome}</td>
                <td class="col-est-ini">0</td>
                <td class="col-ct-ini">0.00</td>
                <td>0</td>
                <td><input type="number" class="grid-input col-comp" value="0"></td>
                <td><input type="number" class="grid-input col-custo-input" value="0.00"></td>
                <td><input type="number" class="grid-input col-mkt-input" value="0.00"></td>
                <td class="col-pm">${(p.preco_medio_compra || 0).toFixed(2)}</td>
                <td><input type="number" class="grid-input col-t1-input" value="0.00" readonly></td>
                <td><input type="number" class="grid-input col-ganho-input" value="0.00" readonly></td>
            </tr>
        `).join('');
    }
}

corpoGrid.addEventListener('input', (e) => {
    if(e.target.classList.contains('grid-input')) {
        const tr = e.target.closest('tr');
        const comp = parseFloat(tr.querySelector('.col-comp').value) || 0;
        const cust = parseFloat(tr.querySelector('.col-custo-input').value) || 0;
        const mkt = parseFloat(tr.querySelector('.col-mkt-input').value) || 0;
        
        tr.querySelector('.col-t1-input').value = (comp * cust).toFixed(2);
        tr.querySelector('.col-ganho-input').value = ((comp * mkt) - (comp * cust)).toFixed(2);
        
        let total = 0;
        document.querySelectorAll('.col-t1-input').forEach(i => total += parseFloat(i.value) || 0);
        document.getElementById('total-geral').textContent = total.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        
        setEstado('editando');
        clearTimeout(timerAutoSave);
        timerAutoSave = setTimeout(salvarDadosSinc, 2000);
    }
});
</script>
</body>
</html>
