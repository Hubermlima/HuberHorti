<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Compras v25.9</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>

<style>
/* CSS IGUAL AO ANTERIOR - SEM ALTERAÇÕES */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh, 1vh) * 100);display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:64px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px}
.autosave-status{font-size:10px;color:#10B981;font-weight:500}
.main{flex-shrink:0;padding:0 16px;display:flex;flex-direction:column;}
.unified-card{background:#FFF;border-radius:28px;box-shadow:0 2px 10px rgba(0,0,0,.02);flex-shrink:0;overflow:visible!important;transition:all 0.4s cubic-bezier(0.4,0,0.2,1);position:relative;z-index:100;}
.autocomplete-wrapper{position:relative;width:100%;}
.autocomplete-results{position:absolute;top:100%;left:0;right:0;background:#FFF;border-radius:18px;box-shadow:0 12px 30px rgba(0,0,0,0.15);z-index:9999;max-height:220px;overflow-y:auto;display:none;margin-top:8px;border:1px solid #F2F2F7;}
.search-count{padding:10px 18px;font-size:10px;font-weight:700;color:#8E8E93;text-transform:uppercase;background:#F9FAFB;border-bottom:1px solid #F2F2F7;position:sticky;top:0;}
.autocomplete-item{padding:14px 18px;font-size:14px;border-bottom:1px solid #F2F2F7;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.autocomplete-item span{color:#8E8E93;font-size:11px;font-weight:500;}
.card-search-section{padding:14px 14px 8px 14px;}
.busca-wrap-ios{position:relative;display:flex;align-items:center;background:#F8F8FA;border-radius:16px;padding:4px 10px;}
.busca-input{flex-grow:1;padding:8px 8px 8px 32px;background:transparent;border:none;font-size:15px;outline:none;color:#1C1C1E;}
.busca-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:#8E8E93;stroke-width:2.5;fill:none;}
.total-info-section{padding:4px 18px 14px 18px;display:flex;justify-content:space-between;align-items:center;}
.total-label{font-size:9px;font-weight:700;color:#8E8E93;text-transform:uppercase;margin-bottom:2px;display:block;}
.price-tag{font-size:18px;font-weight:700;color:#1C1C1E;letter-spacing:-0.5px;}
.card-actions{display:flex;gap:8px;align-items:center;}
.btn-card-action{width:32px;height:32px;border-radius:50%;border:none;background:#F2F2F7;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.btn-card-action svg{width:14px;height:14px;stroke:#1C1C1E;stroke-width:2.5;fill:none;}
.details-content{max-height:0;opacity:0;padding:0 18px;transition:all 0.4s ease;display:grid;grid-template-columns:1fr 1fr;gap:20px;overflow:hidden;}
.unified-card.expanded .details-content{max-height:200px;opacity:1;padding-bottom:20px;border-top:1px solid #F3F4F6;padding-top:15px;}
.detail-item{font-size:11px;color:#8E8E93;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;min-height:20px;}
.input-data-edit{border:none;background:transparent;color:#1C1C1E;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;outline:none;text-align:right;}
.footer-grid-card{background:#FFF;border-radius:32px 32px 0 0;box-shadow:0 -4px 15px rgba(0,0,0,.05);display:flex;flex-direction:column;flex:1;min-height:0;margin-top:12px;overflow:hidden;}
.grid-scroll{flex:1;overflow:auto;}
table{border-collapse:collapse;width:max-content;font-size:10px;table-layout:fixed;}
th,td{padding:12px 8px;text-align:center;border-bottom:1px solid #F9FAFB;color:#48484A;width:75px;}
th:first-child,td:first-child{width:150px;position:sticky;left:0;background:#FFF;text-align:left;font-weight:700;z-index:5;border-right:1px solid #F3F4F6;padding-left:20px;}
thead th{position:sticky;top:0;background:#F9FAFB;padding:12px 8px;color:#8E8E93;z-index:10;border-bottom:1px solid #F3F4F6;}
.pagination-footer{flex-shrink:0;height:65px;padding:0 20px calc(8px + env(safe-area-inset-bottom));background:#FFF;border-top:1px solid #F3F4F6;display:flex;justify-content:space-between;align-items:center;}
.ios-btn-float{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn-float" onclick="history.back()">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
  </button>
  <div class="topbar-copy">
    <div class="breadcrumb"><span class="active">Central de Compras</span></div>
    <div class="autosave-status" id="status-sinc">Sincronizado</div>
  </div>
  <button class="ios-btn-float">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0 M12 8v8 M8 12h8"/></svg>
  </button>
</div>

<div class="main">
  <div class="unified-card" id="mainCard">
    <div class="card-search-section">
      <div class="autocomplete-wrapper">
        <div class="busca-wrap-ios">
          <svg class="busca-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          <input id="busca-fornecedor" class="busca-input" type="text" placeholder="Buscar Fornecedor..." autocomplete="off">
        </div>
        <div id="resultados-fornecedor" class="autocomplete-results"></div>
      </div>
    </div>
    <div class="total-info-section">
      <div onclick="toggleCard()" style="flex-grow:1;cursor:pointer;">
        <span class="total-label">Total da Compra</span>
        <div style="display:flex;align-items:center">
          <span class="price-tag" id="total-geral">R$ 0,00</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-card-action expand-btn" onclick="toggleCard()"><svg viewBox="0 0 24 24"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg></button>
      </div>
    </div>
    <div class="details-content">
      <div>
        <div class="detail-item">Data: <input type="date" id="data-ciclo" class="input-data-edit"></div>
        <div class="detail-item">Itens: <b id="qtd-itens">0</b></div>
      </div>
    </div>
  </div>
</div>

<div class="footer-grid-card">
  <div class="grid-scroll">
    <table id="tabela-produtos">
      <thead>
        <tr>
          <th>PRODUTOS</th>
          <th>EST INI</th>
          <th>CT. INI</th>
          <th>QT1</th>
          <th>QT2</th>
          <th>COMP</th>
          <th>CUST</th>
          <th>GAN</th>
        </tr>
      </thead>
      <tbody id="corpo-grid"></tbody>
    </table>
  </div>
  <div class="pagination-footer">
    <span id="info-pag" style="font-size:10px;color:#8E8E93;font-weight:600">Selecione um fornecedor</span>
  </div>
</div>

<script>
// --- BLINDAGEM DE FORMATAÇÃO ---
const fmtM = (v) => Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtQ = (v) => Number(v || 0).toLocaleString('pt-BR');

const inputBusca = document.getElementById('busca-fornecedor');
const listaResultados = document.getElementById('resultados-fornecedor');
const corpoGrid = document.getElementById('corpo-grid');

// Inicialização de Data
const hoje = new Date();
hoje.setDate(hoje.getDate() + 1);
document.getElementById('data-ciclo').value = hoje.toISOString().split('T')[0];

inputBusca.addEventListener('input', async (e) => {
    const termo = e.target.value;
    if (termo.length < 1) { listaResultados.style.display = 'none'; return; }
    const { data } = await window.db.from('fornecedores').select('id, nome').ilike('nome', `%${termo}%`).limit(10);
    if (data) {
        listaResultados.innerHTML = data.map(f => `<div class="autocomplete-item" onclick="selecionarFornecedor('${f.nome}','${f.id}')">${f.nome}</div>`).join('');
        listaResultados.style.display = 'block';
    }
});

async function selecionarFornecedor(nome, id) {
    inputBusca.value = nome;
    listaResultados.style.display = 'none';
    await carregarProdutosEstoque(id);
}

async function carregarProdutosEstoque(fornecedorUuid) {
    document.getElementById('status-sinc').textContent = "Buscando...";
    const dataCard = document.getElementById('data-ciclo').value;

    try {
        // 1. Busca Produtos e Estoque Inicial
        const { data: produtos } = await window.db.from('produtos')
            .select(`id, nome, estoque_inicial(quantidade_inicial, custo_unitario_inicial)`)
            .eq('fornecedor_id', fornecedorUuid).order('nome');

        // 2. Busca Vendas QT2 (Filtro ajustado para pedido_venda_id e Fuso Horário)
        const { data: vendas, error: erroVendas } = await window.db
            .from('itens_pedidos_vendas')
            .select(`
                quantidade, 
                produto_id, 
                pedidos_vendas!pedido_venda_id!inner(data)
            `)
            .gte('pedidos_vendas.data', `${dataCard}T00:00:00+00:00`);

        if (erroVendas) console.error("Erro Supabase:", erroVendas);

        const mapaQT2 = {};
        if (vendas) {
            vendas.forEach(v => {
                const qtd = parseFloat(v.quantidade) || 0;
                mapaQT2[v.produto_id] = (mapaQT2[v.produto_id] || 0) + qtd;
            });
        }

        // 3. Renderização
        corpoGrid.innerHTML = produtos.map(p => {
            const ei = p.estoque_inicial?.[0]?.quantidade_inicial || 0;
            const ci = p.estoque_inicial?.[0]?.custo_unitario_inicial || 0;
            const q2 = mapaQT2[p.id] || 0;

            return `<tr>
                <td>${p.nome}</td>
                <td>${fmtQ(ei)}</td>
                <td>${fmtM(ci)}</td>
                <td>0,00</td>
                <td style="font-weight:700; color:#1C1C1E">${fmtQ(q2)}</td>
                <td>0,00</td>
                <td>0,00</td>
                <td>0,00</td>
            </tr>`;
        }).join('');

        document.getElementById('qtd-itens').textContent = produtos.length;
        document.getElementById('info-pag').textContent = `Fornecedor: ${inputBusca.value}`;

    } catch (err) { 
        console.error("Erro Geral:", err); 
    } finally { 
        document.getElementById('status-sinc').textContent = "Sincronizado"; 
    }
}

function toggleCard() { document.getElementById('mainCard').classList.toggle('expanded'); }
</script>
</body>
</html>
