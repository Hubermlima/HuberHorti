<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Compras v25.9</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>

<style>
/* RESET & BASE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Inter',sans-serif;
    background:#F2F4F8;
    color:#1C1C1E;
    height: 100vh; 
    height: calc(var(--vh, 1vh) * 100);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* ESTADO BLOQUEADO */
.btn-disabled { opacity: 0.4 !important; pointer-events: none !important; filter: grayscale(1); }

/* TOPBAR */
.topbar{
    height: 64px;
    padding: 0 18px;
    padding-top: env(safe-area-inset-top);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px}
.autosave-status{font-size:10px;color:#10B981;font-weight:500;transition: all 0.3s ease; cursor: pointer;}

/* ÁREA PRINCIPAL */
.main{ flex-shrink: 0; padding: 0 16px; display: flex; flex-direction: column; }
.unified-card {
    background: #FFF; border-radius: 28px; box-shadow: 0 2px 10px rgba(0,0,0,.02);
    flex-shrink: 0; overflow: visible !important; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative; z-index: 100;
}

/* AUTOCOMPLETE */
.autocomplete-wrapper { position: relative; width: 100%; }
.autocomplete-results {
    position: absolute; top: 100%; left: 0; right: 0; background: #FFF; border-radius: 18px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.15); z-index: 9999; max-height: 220px;
    overflow-y: auto; display: none; margin-top: 8px; border: 1px solid #F2F2F7; -webkit-overflow-scrolling: touch;
}
.autocomplete-item {
    padding: 14px 18px; font-size: 14px; border-bottom: 1px solid #F2F2F7; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
}
.autocomplete-item:active { background: #F2F2F7; }

.card-search-section { padding: 14px 14px 8px 14px; }
.busca-wrap-ios {
    position: relative; display: flex; align-items: center; background: #F8F8FA; border-radius: 16px; padding: 4px 10px;
}
.busca-input { flex-grow: 1; padding: 8px 8px 8px 32px; background: transparent; border: none; font-size: 15px; outline: none; color: #1C1C1E; }
.busca-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: #8E8E93; stroke-width: 2.5; fill: none; }

/* TOTAL E AÇÕES */
.total-info-section { padding: 4px 18px 14px 18px; display: flex; justify-content: space-between; align-items: center; }
.total-label { font-size: 9px; font-weight: 700; color: #8E8E93; text-transform: uppercase; margin-bottom: 2px; display: block; }
.price-tag { font-size: 18px; font-weight: 700; color: #1C1C1E; letter-spacing: -0.5px; }

.badge-margem { padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; margin-left: 10px; display: none; }
.margem-positiva { background: #E1F9F0; color: #10B981; }
.margem-negativa { background: #FEE2E2; color: #EF4444; }

.card-actions { display: flex; gap: 8px; align-items: center; }
.btn-card-action {
    width: 32px; height: 32px; border-radius: 50%; border: none; background: #F2F2F7;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.btn-card-action svg { width: 14px; height: 14px; stroke: #1C1C1E; stroke-width: 2.5; fill: none; }

.details-content { max-height: 0; opacity: 0; padding: 0 18px; transition: all 0.4s ease; overflow: hidden; }
.unified-card.expanded .details-content { max-height: 250px; opacity: 1; padding-bottom: 20px; border-top: 1px solid #F3F4F6; padding-top: 15px; }

.details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.detail-item { font-size: 11px; color: #8E8E93; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

.view-selector { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: #C7C7CC; }
.view-opt.active { color: #007AFF; }
.col-hidden { display: none !important; }

/* TABELA / GRID */
.footer-grid-card {
    background: #FFF; border-radius: 32px 32px 0 0; box-shadow: 0 -4px 15px rgba(0,0,0,.05);
    display: flex; flex-direction: column; flex: 1; min-height: 0; margin-top: 12px; overflow: hidden;
}
.grid-scroll { flex: 1; overflow: auto; }
table { border-collapse: collapse; width: max-content; font-size: 10px; table-layout: fixed; }
th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #F9FAFB; color: #1C1C1E; width: 75px; }
th:first-child, td:first-child { 
    width: 150px; position: sticky; left: 0; background: #FFF; text-align: left; font-weight: 700; z-index: 5; border-right: 1px solid #F3F4F6; padding-left: 20px;
}
thead th { position: sticky; top: 0; background: #F9FAFB; z-index: 10; border-bottom: 1px solid #F3F4F6; color: #8E8E93; }

.grid-input {
    width: 100%; border: 1px solid #E5E5EA; border-radius: 6px; padding: 5px; text-align: center; font-size: 10px;
    background: #F9FAFB; outline: none; color: #1C1C1E; font-weight: 600; touch-action: manipulation;
}
.grid-input:focus { border-color: #007AFF; background: #FFF; }
.grid-input[readonly] { background: transparent; border-color: transparent; }

.pagination-footer {
  flex-shrink: 0; height: 65px; padding: 0 20px calc(8px + env(safe-area-inset-bottom));
  background: #FFF; border-top: 1px solid #F3F4F6; display: flex; justify-content: space-between; align-items: center;
  border-radius: 0 0 32px 32px; margin-bottom: 12px;
}
.ios-btn-float { width: 38px; height: 38px; border-radius: 50%; border: none; background: #FFF; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
</style>
</head>
<body>

<div class="topbar">
  <button id="btn-voltar" class="ios-btn-float" onclick="history.back()">
    <svg viewBox="0 0 24 24" style="width:18px; stroke:#1C1C1E; stroke-width:2.2; fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
  </button>
  <div class="topbar-copy">
    <div class="breadcrumb"><span class="active">Central de Compras</span></div>
    <div class="autosave-status" id="status-sinc">Sincronizado</div>
  </div>
  <button id="btn-add-topbar" class="ios-btn-float">
    <svg viewBox="0 0 24 24" style="width:18px; stroke:#1C1C1E; stroke-width:2.2; fill:none"><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0 M12 8v8 M8 12h8"/></svg>
  </button>
</div>

<div class="main">
  <div class="unified-card" id="mainCard">
    <div class="card-search-section">
      <div class="autocomplete-wrapper">
        <div class="busca-wrap-ios">
          <svg class="busca-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          <input id="busca-fornecedor" class="busca-input" type="text" placeholder="Buscar Fornecedor..." autocomplete="off">
        </div>
        <div id="resultados-fornecedor" class="autocomplete-results"></div>
      </div>
    </div>

    <div class="total-info-section">
      <div onclick="toggleCard()" style="flex-grow: 1; cursor: pointer;">
        <span class="total-label">Total da Compra</span>
        <div style="display:flex; align-items:center">
          <span class="price-tag" id="total-geral">R$ 0,00</span>
          <span id="pill-margem" class="badge-margem">0%</span>
        </div>
      </div>
      <div class="card-actions">
        <button id="btn-excluir-compra" class="btn-card-action"><svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg></button>
        <button class="btn-card-action" onclick="toggleCard()"><svg viewBox="0 0 24 24" style="stroke-width:2.5"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg></button>
      </div>
    </div>

    <div class="details-content">
      <div class="details-grid">
        <div>
          <div class="detail-item">Data: <input type="date" id="data-ciclo" style="border:none; font-weight:700"></div>
          <div class="detail-item">Número: <b id="num-compra">#-----</b></div>
          <div class="detail-item">
             <div class="view-selector"><span class="view-opt active" id="opt-qt1" onclick="setViewMode('QT1')">QT1</span><span>•</span><span class="view-opt" id="opt-qt2" onclick="setViewMode('QT2')">QT2</span></div>
             <b id="qtd-itens">0</b>
          </div>
        </div>
        <div>
          <div class="detail-item">Total: <b id="subtotal-card">R$ 0,00</b></div>
          <div class="detail-item">Ganho: <b id="ganho-card" style="color:#10B981">R$ 0,00</b></div>
          <div class="detail-item">Status: <b>Aberto</b></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="footer-grid-card">
  <div class="grid-scroll">
    <table id="tabela-produtos">
      <thead>
        <tr><th>PRODUTOS</th><th>EST INI</th><th>CT. INI</th><th class="th-qt1">QT1</th><th class="th-qt2 col-hidden">QT2</th><th>COMP</th><th>CUST</th><th>MKT</th><th>PM</th><th>T1</th><th>T2</th><th>GAN</th></tr>
      </thead>
      <tbody id="corpo-grid"></tbody>
    </table>
  </div>
  <div class="pagination-footer">
    <span id="info-pag" style="font-size:10px; color:#8E8E93">Selecione um fornecedor</span>
    <div style="display:flex; gap:10px">
      <button id="btn-pag-prev" class="ios-btn-float"><svg viewBox="0 0 24 24" style="width:16px; stroke:#1C1C1E; stroke-width:2.5; fill:none"><path d="M15 18l-6-6 6-6" /></svg></button>
      <button id="btn-pag-next" class="ios-btn-float"><svg viewBox="0 0 24 24" style="width:16px; stroke:#1C1C1E; stroke-width:2.5; fill:none"><path d="M9 18l6-6-6-6" /></svg></button>
    </div>
  </div>
</div>

<script>
window.HHUtils.atualizarCicloAtualGlobal();
let currentView = 'QT1', timerAutoSave, statusAtual = 'sincronizado', paginaAtual = 1;
const itensPorPagina = 10, corpoGrid = document.getElementById('corpo-grid');

// FUNÇÕES DE ESTADO E CARREGAMENTO (Simplificadas para o exemplo)
function setEstado(s, m='') { 
    statusAtual = s; const el = document.getElementById('status-sinc');
    el.textContent = s === 'editando' ? 'Editando...' : s === 'salvando' ? 'Salvando...' : s === 'erro' ? m : 'Sincronizado';
    el.style.color = s === 'editando' ? '#F59E0B' : s === 'salvando' ? '#3B82F6' : s === 'erro' ? '#EF4444' : '#10B981';
}

async function carregarProdutosEstoque(fId) {
    setEstado('salvando');
    const { data: produtos } = await window.db.from('produtos').select('*').eq('fornecedor_id', fId).order('nome');
    corpoGrid.innerHTML = produtos.map(p => `
        <tr data-id="${p.id}">
            <td>${p.nome}</td><td class="col-est-ini">0</td><td class="col-ct-ini">0.00</td>
            <td class="td-qt1">0</td><td class="td-qt2 col-hidden">0</td>
            <td><input type="text" inputmode="numeric" class="grid-input col-comp" value="0.00"></td>
            <td><input type="text" inputmode="numeric" class="grid-input col-custo-input" value="0.00"></td>
            <td><input type="text" inputmode="numeric" class="grid-input col-mkt-input" value="0.00"></td>
            <td class="col-pm">0.00</td>
            <td><input type="text" class="grid-input col-t1-input" value="0.00" readonly></td>
            <td><input type="text" class="grid-input col-t2-input" value="0.00" readonly></td>
            <td><input type="text" class="grid-input col-ganho-input" value="0.00" readonly style="color:#10B981"></td>
        </tr>`).join('');
    atualizarSumario(); setEstado('sincronizado');
}

// AUTO-SELEÇÃO AO FOCAR (Funciona em todos, incluindo COMP)
corpoGrid.addEventListener('focusin', (e) => {
    if (e.target.classList.contains('grid-input') && !e.target.readOnly) {
        setTimeout(() => e.target.select(), 50);
    }
});

// MÁSCARA FINANCEIRA COMPLETA (BANCO)
corpoGrid.addEventListener('input', (e) => {
    if (e.target.classList.contains('grid-input')) {
        const input = e.target;
        
        // Aplica máscara em COMP, CUSTO e MKT
        if (input.classList.contains('col-comp') || input.classList.contains('col-custo-input') || input.classList.contains('col-mkt-input')) {
            let val = input.value.replace(/\D/g, '');
            input.value = (parseFloat(val || 0) / 100).toFixed(2);
        }

        const tr = input.closest('tr');
        const comp = parseFloat(tr.querySelector('.col-comp').value) || 0;
        const cust = parseFloat(tr.querySelector('.col-custo-input').value) || 0;
        if (input.classList.contains('col-custo-input')) tr.querySelector('.col-mkt-input').value = cust.toFixed(2);
        const mkt = parseFloat(tr.querySelector('.col-mkt-input').value) || 0;
        
        const t1 = comp * cust; tr.querySelector('.col-t1-input').value = t1.toFixed(2);
        const t2 = comp * mkt; tr.querySelector('.col-t2-input').value = t2.toFixed(2);
        tr.querySelector('.col-ganho-input').value = (t2 - t1).toFixed(2);
        
        atualizarSumario(); setEstado('editando');
        clearTimeout(timerAutoSave); timerAutoSave = setTimeout(() => {}, 5000); // Trigger save logic here
    }
});

function atualizarSumario() {
    let s1 = 0, sg = 0;
    document.querySelectorAll('#corpo-grid tr').forEach(tr => {
        s1 += parseFloat(tr.querySelector('.col-t1-input').value) || 0;
        sg += parseFloat(tr.querySelector('.col-ganho-input').value) || 0;
    });
    document.getElementById('total-geral').textContent = s1.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
    const pill = document.getElementById('pill-margem');
    if (s1 > 0) {
        const m = (sg / s1) * 100; pill.textContent = m.toFixed(1) + '%';
        pill.style.display = 'inline-block'; pill.className = `badge-margem ${m >= 0 ? 'margem-positiva' : 'margem-negativa'}`;
    } else { pill.style.display = 'none'; }
}

const inputBusca = document.getElementById('busca-fornecedor');
const listaResultados = document.getElementById('resultados-fornecedor');
inputBusca.addEventListener('input', async (e) => {
    const { data } = await window.db.from('fornecedores').select('id, nome').ilike('nome', `%${e.target.value}%`);
    listaResultados.innerHTML = data.map(f => `<div class="autocomplete-item" onclick="selecionarFornecedor('${f.nome}', '${f.id}')">${f.nome}</div>`).join('');
    listaResultados.style.display = 'block';
});
function selecionarFornecedor(n, id) { inputBusca.value = n; listaResultados.style.display = 'none'; carregarProdutosEstoque(id); }
function toggleCard() { document.getElementById('mainCard').classList.toggle('expanded'); }
const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();
</script>
</body>
</html>
