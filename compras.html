<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HuberHorti - Compras v22</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* BASE E ESTRUTURA FULL SCREEN */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html, body { height: 100%; overflow: hidden; } /* Evita scroll na página toda */
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1A1D23;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{height:78px;background:#F2F4F8;padding:14px 18px;display:flex;align-items:flex-start;flex-shrink:0}
.round-btn{width:44px;height:44px;border:none;border-radius:999px;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,.06);cursor:pointer}
.round-btn svg{width:22px;height:22px;stroke:#1C1C1E;fill:none;stroke-width:2}
.topbar-copy{display:flex;flex-direction:column;padding-left:14px;padding-top:4px;flex-grow:1}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:16px}

/* CONTAINER PRINCIPAL QUE PREENCHE O RESTO */
.main {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    padding: 0 16px 16px;
    overflow: hidden;
}

.busca-wrap{position:relative;margin-bottom:12px;display:flex;align-items:center;background:#FFF;border-radius:999px;box-shadow:0 6px 15px rgba(0,0,0,.03);flex-shrink:0}
.busca-input{flex-grow:1;padding:14px 16px 14px 44px;background:transparent;border:none;font-size:14px;outline:none}
.busca-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:#9CA3AF;stroke-width:2}

/* CARD DO GRID EXPANSÍVEL */
.tabela-card {
    background: #FFF;
    border-radius: 24px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.04);
    display: flex;
    flex-direction: column;
    flex-grow: 1; /* Faz o card ocupar todo o espaço restante */
    overflow: hidden;
}

.grid-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 24px 20px 16px;
    flex-shrink: 0;
}
.grid-header-label { font-size: 10px; font-weight: 700; color: #A1A1AA; text-transform: uppercase; letter-spacing: 1px; }
.item-count-badge { font-size: 10px; font-weight: 700; background: #F2F4F8; color: #71717A; padding: 2px 8px; border-radius: 6px; }

/* ÁREA DE DADOS COM SCROLL */
.grid-container {
    flex-grow: 1;
    width: 100%;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
}

table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 950px; }

th {
    position: sticky;
    top: 0;
    background: #F9FAFB;
    padding: 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: #4B5563;
    border-bottom: 1px solid #EDEDF2;
    z-index: 10;
}

.col-produto {
    position: sticky;
    left: 0;
    background: #FFF;
    z-index: 11;
    min-width: 220px;
    font-weight: 600;
    border-right: 1px solid #F9FAFB;
}
th.col-produto { z-index: 12; background: #F9FAFB; }

td { padding: 14px 12px; font-size: 12px; border-bottom: 1px solid #F9FAFB; color: #1A1D23; }
.col-num { text-align: center; color: #374151; font-family: 'Inter', sans-serif; }

/* PAGINAÇÃO PADRÃO iOS */
.pagination-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: #FFF;
    border-top: 1px solid #F2F4F8;
    flex-shrink: 0;
}

.page-info { font-size: 13px; color: #8E8E93; }
.page-btns { display: flex; gap: 12px; }

.page-btn-ios {
    width: 36px;
    height: 36px;
    border-radius: 999px; /* Botão 100% Redondo */
    border: none;
    background: #F2F4F8;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
}
.page-btn-ios:active { background: #E5E7EB; }
.page-btn-ios svg { width: 18px; height: 18px; stroke: #007AFF; stroke-width: 2.5; } /* Azul iOS */
.page-btn-ios.disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<div class="topbar">
  <button class="round-btn"><svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5" /></svg></button>
  <div class="topbar-copy">
    <div class="breadcrumb"><span class="active">Central de Compras</span></div>
  </div>
</div>

<div class="main">
  <div class="busca-wrap">
    <svg class="busca-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>
    <input class="busca-input" type="text" placeholder="Filtrar itens...">
  </div>

  <div class="tabela-card">
    <div class="grid-title-row">
        <span class="grid-header-label">Itens do Pedido</span>
        <span class="item-count-badge">85</span>
    </div>
    
    <div class="grid-container">
      <table>
        <thead>
          <tr>
            <th class="col-produto">PRODUTOS</th>
            <th class="col-num">EST.INI</th>
            <th class="col-num">CT.INI</th>
            <th class="col-num">QT1</th>
            <th class="col-num">QT2</th>
            <th class="col-num">COMP</th>
            <th class="col-num">CUST</th>
            <th class="col-num">PM</th>
            <th class="col-num">MKT</th>
            <th class="col-num">T1</th>
            <th class="col-num">T2</th>
            <th class="col-num">GAN</th>
          </tr>
        </thead>
        <tbody>
          <tr><td class="col-produto">Abacate Paulista</td><td class="col-num">1.500</td><td class="col-num">200</td><td class="col-num">10</td><td class="col-num">20</td><td class="col-num">30</td><td class="col-num">30,00</td><td class="col-num">25,00</td><td class="col-num">20%</td><td class="col-num">900</td><td class="col-num">1.080</td><td class="col-num">180</td></tr>
          <tr><td class="col-produto">Banana Nanica</td><td class="col-num">800</td><td class="col-num">150</td><td class="col-num">5</td><td class="col-num">10</td><td class="col-num">15</td><td class="col-num">12,00</td><td class="col-num">10,00</td><td class="col-num">20%</td><td class="col-num">180</td><td class="col-num">216</td><td class="col-num">36</td></tr>
          <tr><td class="col-produto">Cebola Branca</td><td class="col-num">3.000</td><td class="col-num">1.200</td><td class="col-num">50</td><td class="col-num">50</td><td class="col-num">100</td><td class="col-num">5,50</td><td class="col-num">4,10</td><td class="col-num">30%</td><td class="col-num">550</td><td class="col-num">715</td><td class="col-num">165</td></tr>
          </tbody>
      </table>
    </div>

    <div class="pagination-bar">
        <div class="page-info">Mostrando <b>1-10</b> de 85</div>
        <div class="page-btns">
            <button class="page-btn-ios disabled"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15.75 19.5L8.25 12l7.5-7.5" /></svg></button>
            <button class="page-btn-ios"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg></button>
        </div>
    </div>
  </div>
</div>

</body>
</html>
