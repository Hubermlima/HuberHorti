<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HuberHorti - Compras v17</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* CSS BASE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1A1D23;min-height:100vh}

.topbar{position:fixed;top:0;left:0;right:0;height:78px;background:#F2F4F8;padding:14px 18px;display:flex;align-items:flex-start;z-index:100}
.round-btn{width:44px;height:44px;border:none;border-radius:999px;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,.06);cursor:pointer}
.round-btn svg{width:22px;height:22px;stroke:#1C1C1E;fill:none;stroke-width:1.5}
.fin-btn{position:absolute;right:18px;top:14px}

.topbar-copy{display:flex;flex-direction:column;padding-left:14px;padding-top:4px;flex-grow:1}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:16px}
.autosave-status{font-size:11px;color:#10B981;font-weight:500}

.main{margin-top:78px;padding:4px 16px 80px}

/* TOTAL CARD */
.total-card-compact{background:#FFF;border-radius:24px;box-shadow:0 6px 20px rgba(0,0,0,.04);padding:12px 20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.total-left{display:flex;align-items:baseline;gap:8px}
.total-left .meta-label{font-size:11px;font-weight:600;color:#8E8E93;text-transform:uppercase}
.total-left .price-tag{font-size:20px;font-weight:700;color:#2563EB}
.margin-badge{padding:3px 10px;background:#E1F9F0;color:#10B981;border-radius:999px;font-size:12px;font-weight:700}

.action-btn-sm{width:32px;height:32px;border-radius:999px;background:#F2F4F8;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
.action-btn-sm svg{width:18px;height:18px;stroke:#1C1C1E;stroke-width:1.5}

/* FORNECEDOR COM BOTÕES EMBUTIDOS */
.busca-wrap{position:relative;margin-bottom:10px;display:flex;align-items:center;background:#FFF;border-radius:999px;box-shadow:0 6px 15px rgba(0,0,0,.03);padding:0 8px 0 0}
.busca-input{flex-grow:1;padding:14px 16px 14px 44px;background:transparent;border:none;font-size:14px;outline:none}
.busca-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:#9CA3AF;stroke-width:2}
.btns-internos{display:flex;gap:6px;padding-right:4px}

.tabela-wrap{background:#FFF;border-radius:24px;box-shadow:0 6px 20px rgba(0,0,0,.04);padding:14px 0}
.grid-card-title{padding:0 20px 8px;font-size:11px;font-weight:700;color:#8E8E93;text-transform:uppercase}
</style>
</head>
<body>

<div class="topbar">
  <button class="round-btn" onclick="history.back()">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
  </button>
  <div class="topbar-copy">
    <div class="breadcrumb"><span class="active">Central de Compras</span></div>
    <div class="autosave-status">Status: rascunho</div>
  </div>
  <button class="round-btn fin-btn">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
  </button>
</div>

<div class="main">
  <div class="total-card-compact">
    <div class="total-left">
      <span class="meta-label">Total</span>
      <span class="price-tag">R$ 0,00</span>
    </div>
    <div style="display:flex; align-items:center; gap:12px">
      <div class="margin-badge">100%</div>
      <button class="action-btn-sm"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg></button>
    </div>
  </div>

  <div class="busca-wrap">
    <svg class="busca-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
    <input class="busca-input" type="text" placeholder="Fornecedor...">
    <div class="btns-internos">
      <button class="action-btn-sm"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg></button>
      <button class="action-btn-sm"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg></button>
      <button class="action-btn-sm"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></button>
    </div>
  </div>

  <div class="busca-wrap" style="padding-right: 0;">
    <svg class="busca-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>
    <input class="busca-input" type="text" placeholder="Produto...">
  </div>

  <div class="tabela-wrap">
    <div class="grid-card-title">Itens da Compra</div>
    <div style="height: 60px; display: flex; align-items: center; justify-content: center; color: #9CA3AF; font-size: 13px;">Lista vazia</div>
  </div>
</div>
</body>
</html>
