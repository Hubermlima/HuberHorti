<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>HuberHorti - Compras v25.9</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* BASE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* BOTÕES GERAIS */
.ios-btn-float {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  background: #FFF;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  cursor: pointer;
  flex-shrink: 0;
}
.ios-btn-float svg { width: 18px; height: 18px; stroke: #1C1C1E; stroke-width: 2.2; fill: none; }

/* BOTÕES CIRCULARES DE SISTEMA (CINZA SUAVE) */
.btn-action-sys {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: none;
  background: #F2F2F7;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.btn-action-sys svg { width: 14px; height: 14px; stroke: #1C1C1E; stroke-width: 2.5; fill: none; }

/* TOPBAR */
.topbar{height:64px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px}
.autosave-status{font-size:10px;color:#10B981;font-weight:500}

/* ÁREA PRINCIPAL */
.main{flex:1;padding:0 16px 12px;display:flex;flex-direction:column;gap:8px;min-height:0}

/* TOTAL CARD - ESTRUTURA VERTICAL */
.total-container{background:#FFF;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.02);flex-shrink:0}
.total-card-compact{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.total-label{font-size:9px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;display:block}
.price-tag{font-size:18px;font-weight:700;color:#1C1C1E;letter-spacing:-0.5px}
.margin-badge{padding:2px 6px;background:#E1F9F0;color:#10B981;border-radius:6px;font-size:9px;font-weight:700;margin-left:6px}

/* BUSCAS */
.busca-col{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.busca-wrap{position:relative;display:flex;align-items:center;background:#FFF;border-radius:10px;padding:4px 6px}
.busca-input{flex-grow:1;padding:8px 8px 8px 30px;background:transparent;border:none;font-size:13px;outline:none;color:#1C1C1E}
.busca-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:#8E8E93;stroke-width:2;fill:none}

/* TABELA */
.tabela-wrap{background:#FFF;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,.03);flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.grid-container{flex:1;overflow:auto;border-top:1px solid #F3F4F6}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:11px; min-width: 750px;}
thead th{position:sticky;top:0;background:#F9FAFB;padding:10px 12px;text-align:right;color:#8E8E93;font-weight:600;z-index:10}
tbody td{padding:8px 12px;text-align:right;border-bottom:1px solid #F3F4F6}
tbody td:first-child{position:sticky;left:0;background:#FFF;text-align:left;min-width:150px;z-index:5;font-weight:600}

.cell-edit { width: 38px; padding: 4px; border: 1px solid #F2F2F7; border-radius: 4px; text-align: center; background: #F9FAFB; color: #1C1C1E; font-weight: 600; font-size: 11px; }

/* PAGINAÇÃO */
.pagination{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;background:#FFF;border-top:1px solid #F3F4F6;width:100%;box-sizing:border-box}
.pag-info{font-size:10px;color:#8E8E93;font-weight:600}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn-float" onclick="history.back()">
    <svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
  </button>
  <div class="topbar-copy">
    <div class="breadcrumb"><span class="active">Central de Compras</span></div>
    <div class="autosave-status">Sincronizado</div>
  </div>
  <button class="ios-btn-float">
    <svg viewBox="0 0 24 24"><path d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
  </button>
</div>

<div class="main">
  <div class="total-container">
    <div class="total-card-compact">
      <div>
        <span class="total-label">Total da Compra</span>
        <div style="display:flex; align-items:center">
          <span class="price-tag">R$ 1.240,50</span>
          <div class="margin-badge">28%</div>
        </div>
      </div>
      <button class="btn-action-sys">
        <svg viewBox="0 0 24 24"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
      </button>
    </div>
  </div>

  <div class="busca-col">
    <div class="busca-wrap">
      <svg class="busca-icon" viewBox="0 0 24 24"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
      <input class="busca-input" type="text" placeholder="Fornecedor...">
      <div style="display:flex; gap:8px; margin-left:8px">
        <button class="btn-action-sys" title="Incluir"><svg viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15" /></svg></button>
        <button class="btn-action-sys" title="Excluir"><svg viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79" /></svg></button>
      </div>
    </div>
    
    <div class="busca-wrap">
      <svg class="busca-icon" viewBox="0 0 24 24"><path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>
      <input class="busca-input" type="text" placeholder="Filtrar produto...">
    </div>
  </div>

  <div class="tabela-wrap">
    <div class="grid-container">
      <table>
        <thead>
          <tr>
            <th>PRODUTO</th>
            <th>QT1</th>
            <th>QT2</th>
            <th>TOTAL</th>
            <th>GANHO</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Alface Americana<br><small style="color:#8E8E93">Premium</small></td>
            <td><input type="number" class="cell-edit" value="10"></td>
            <td><input type="number" class="cell-edit" value="5"></td>
            <td><strong>15</strong></td>
            <td style="color:#10B981; font-weight:700">0.30</td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <div class="pagination">
      <span class="pag-info">Pág 1 de 4</span>
      <div style="display:flex; gap:8px">
        <button class="ios-btn-float" style="width:32px; height:32px"><svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5" /></svg></button>
        <button class="ios-btn-float" style="width:32px; height:32px"><svg viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg></button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
