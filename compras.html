<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>HuberHorti - Compras v25.9</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* BASE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* BOTÕES GERAIS */
.ios-btn-float {
  width: 38px; height: 38px; border-radius: 50%; border: none;
  background: #FFF; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; flex-shrink: 0;
}
.ios-btn-float svg { width: 18px; height: 18px; stroke: #1C1C1E; stroke-width: 2.2; fill: none; }

.btn-action-sys {
  width: 30px; height: 30px; border-radius: 50%; border: none;
  background: #F2F2F7; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.2s;
}
.btn-action-sys svg { width: 14px; height: 14px; stroke: #1C1C1E; stroke-width: 2.5; fill: none; }

/* TOPBAR */
.topbar{height:64px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px}
.autosave-status{font-size:10px;color:#10B981;font-weight:500}

/* ÁREA PRINCIPAL - CORREÇÃO 3: ESPAÇAMENTO PADRONIZADO */
.main{
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 12px; /* Espaço uniforme entre Total e Buscas */
  flex-shrink: 0;
}

/* CARD RETRÁTIL (TOTAL) */
.total-container{background:#FFF;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.02);overflow:hidden;transition: all 0.3s ease;}
.total-card-compact{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.total-label{font-size:9px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;display:block}
.price-tag{font-size:18px;font-weight:700;color:#1C1C1E;letter-spacing:-0.5px}
.margin-badge{padding:2px 6px;background:#E1F9F0;color:#10B981;border-radius:6px;font-size:9px;font-weight:700;margin-left:6px}

.details-content {
  max-height: 0; padding: 0 16px; opacity: 0; transition: all 0.3s ease;
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border-top: 0 solid #F3F4F6;
}
.total-container.expanded .details-content { max-height: 200px; padding: 12px 16px; opacity: 1; border-top-width: 1px; }

/* BUSCAS */
.busca-col{display:flex;flex-direction:column;gap:12px;flex-shrink:0}
.busca-wrap{position:relative;display:flex;align-items:center;background:#FFF;border-radius:10px;padding:4px 6px}
.busca-input{flex-grow:1;padding:8px 8px 8px 30px;background:transparent;border:none;font-size:14px;outline:none;color:#1C1C1E}
.busca-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:#8E8E93;stroke-width:2;fill:none}

/* DATAGRID - CORREÇÃO 1: FLEX E ALTURA */
.footer-grid-card {
  background: #FFF; 
  border-radius: 20px 20px 0 0; 
  box-shadow: 0 -4px 15px rgba(0,0,0,.05);
  display: flex; 
  flex-direction: column;
  flex: 1; 
  margin-top: 12px; /* Padronizado com o gap da .main */
  min-height: 0; /* Essencial para o scroll interno funcionar no Chrome/Safari */
  overflow: hidden;
}
.grid-header { padding: 14px 16px; border-bottom: 1px solid #F3F4F6; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.grid-header h3 { font-size: 12px; font-weight: 700; color: #1C1C1E; text-transform: uppercase; }

.grid-scroll { flex: 1; overflow: auto; background: #FFF; }

/* CORREÇÃO 2: LARGURA PADRONIZADA DAS COLUNAS */
table { border-collapse: collapse; width: 100%; font-size: 10px; table-layout: fixed; min-width: 800px; }
th, td { width: 70px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
th:first-child, td:first-child { width: 140px; text-align: left; position: sticky; left: 0; background: #FFF; z-index: 5; padding-left: 16px; border-right: 1px solid #F3F4F6; }

thead th { position: sticky; top: 0; background: #F9FAFB; padding: 12px 8px; color: #8E8E93; font-weight: 600; z-index: 10; border-bottom: 1px solid #F3F4F6; }
tbody td { padding: 10px 8px; border-bottom: 1px solid #F9FAFB; color: #48484A; }

.cell-input { width: 100%; border: 1px solid #E5E5EA; border-radius: 6px; padding: 6px 2px; text-align: center; font-size: 11px; background: #F9FAFB; outline: none; }

/* PAGINAÇÃO - CORREÇÃO 1: GARANTIR VISIBILIDADE */
.pagination-footer {
  flex-shrink: 0; /* Não deixa a paginação sumir */
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  background: #FFF; border-top: 1px solid #F3F4F6;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 20;
}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn-float" onclick="history.back()">
    <svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
  </button>
  <div class="topbar-copy">
    <div class="breadcrumb"><span class="active">Central de Compras</span></div>
    <div class="autosave-status">Sincronizado</div>
  </div>
  <button class="ios-btn-float"><svg viewBox="0 0 24 24"><path d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></button>
</div>

<div class="main">
  <div class="total-container" id="totalCard">
    <div class="total-card-compact" onclick="toggleCard()">
      <div>
        <span class="total-label">Total da Compra</span>
        <div style="display:flex; align-items:center">
          <span class="price-tag">R$ 1.240,50</span>
          <div class="margin-badge">28%</div>
        </div>
      </div>
      <button class="btn-action-sys">
        <svg viewBox="0 0 24 24"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
      </button>
    </div>
    <div class="details-content">
      <div class="detail-column">
        <div class="detail-item">Data: <b>07/04/2026</b></div>
        <div class="detail-item">Itens: <b>42</b></div>
      </div>
      <div class="detail-column">
        <div class="detail-item">Total: <b>R$ 1.240,50</b></div>
        <div class="detail-item">Ganhos: <b style="color:#10B981">R$ 347,34</b></div>
      </div>
    </div>
  </div>

  <div class="busca-col">
    <div class="busca-wrap">
      <svg class="busca-icon" viewBox="0 0 24 24"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
      <input class="busca-input" type="text" placeholder="Fornecedor...">
    </div>
    <div class="busca-wrap">
      <svg class="busca-icon" viewBox="0 0 24 24"><path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>
      <input class="busca-input" type="text" placeholder="Filtrar produto...">
    </div>
  </div>
</div>

<div class="footer-grid-card">
  <div class="grid-header">
    <h3>Listagem de Itens</h3>
    <button class="btn-action-sys"><svg viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15" /></svg></button>
  </div>
  
  <div class="grid-scroll">
    <table>
      <thead>
        <tr>
          <th>PRODUTOS</th>
          <th>EST INI</th>
          <th>CT. INI</th>
          <th>QT1</th>
          <th>QT2</th>
          <th>COMP</th>
          <th>CUST</th>
          <th>GAN</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Alface Americana</td>
          <td>999,00</td>
          <td>999,00</td>
          <td><input type="number" class="cell-input" value="5"></td>
          <td><input type="number" class="cell-input" value="5"></td>
          <td>20</td>
          <td>2.30</td>
          <td style="color:#10B981; font-weight:700">0.50</td>
        </tr>
        <tr>
          <td>Couve Manteiga</td>
          <td>5</td>
          <td>1.80</td>
          <td><input type="number" class="cell-input" value="10"></td>
          <td><input type="number" class="cell-input" value="10"></td>
          <td>30</td>
          <td>1.50</td>
          <td style="color:#10B981; font-weight:700">0.30</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pagination-footer">
    <span style="font-size:10px; color:#8E8E93; font-weight:600">Pág 1 de 4</span>
    <div style="display:flex; gap:8px">
      <button class="ios-btn-float" style="width:32px; height:32px"><svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5" /></svg></button>
      <button class="ios-btn-float" style="width:32px; height:32px"><svg viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg></button>
    </div>
  </div>
</div>

<script>
function toggleCard() {
  document.getElementById('totalCard').classList.toggle('expanded');
}
</script>

</body>
</html>
