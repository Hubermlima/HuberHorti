<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Guia de Coleta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-y:none;}
.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-weight:700;font-size:11px;letter-spacing:0.8px;color:#1C1C1E;}
.topbar-sub{font-size:10px;color:#8E8E93;font-weight:500;}
.ios-btn-float{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;}

/* Fornecedor */
.fornecedor-wrap{padding:10px 16px 10px;flex-shrink:0;position:relative;z-index:1001;}

.fornecedor-card{background:#FFF;border-radius:14px;padding:10px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.fornecedor-label{font-size:9px;color:#8E8E93;text-transform:uppercase;letter-spacing:0.4px;}
.fornecedor-input{width:100%;border:none;outline:none;font-size:15px;font-weight:700;color:#1C1C1E;font-family:'Inter',sans-serif;background:transparent;margin-top:2px;}
.fornecedor-input::placeholder{color:#C7C7CC;font-weight:400;}
.autocomplete-list{position:fixed;left:16px;right:16px;background:#FFF;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:2000;overflow:hidden;display:none;}


.autocomplete-item{padding:12px 16px;font-size:14px;color:#1C1C1E;cursor:pointer;border-bottom:0.5px solid #F5F5F5;}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:active{background:#F5F5F5;}

/* Grid */
.grid-card{flex:1;margin:0 16px;background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.grid-scroll{flex:1;overflow-x:auto;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.thead-row{display:flex;align-items:center;position:sticky;top:0;background:#F9FAFB;border-bottom:1px solid #F0F0F5;z-index:10;width:max-content;min-width:100%;}
.swipe-row{display:flex;align-items:center;background:#FFF;width:max-content;min-width:100%;}
.swipe-wrap{border-bottom:0.5px solid #F0F0F5;}
.cell-nome{width:100px;flex-shrink:0;padding:11px 8px 11px 12px;font-size:11px;position:sticky;left:0;background:#FFF;z-index:2;}
.th.left{width:100px;flex-shrink:0;position:sticky;left:0;background:#F9FAFB;z-index:11;}



.cell-total{width:70px;flex-shrink:0;padding:6px 4px;text-align:center;}

.cell-vendas{width:52px;flex-shrink:0;padding:6px 4px;text-align:center;}
.cell-sobra{width:52px;flex-shrink:0;padding:6px 4px;text-align:center;}
.cell-faturar{width:56px;flex-shrink:0;padding:6px 4px;text-align:center;}
.cell-faturar-vol{width:56px;flex-shrink:0;padding:6px 4px;text-align:center;}

.total-wrap{padding:10px 16px;border-top:0.5px solid #E5E5EA;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;}
.total-label{font-size:10px;color:#8E8E93;}
.total-val{font-size:15px;font-weight:700;color:#1C1C1E;}

.th{padding:10px 8px;color:#8E8E93;font-weight:600;font-size:10px;text-align:center;}
.th.left{text-align:left;padding-left:12px;}
.empty-state{padding:40px 20px;text-align:center;font-size:13px;color:#8E8E93;}
.grid-input{width:100%;border:1px solid #E5E5EA;border-radius:8px;padding:6px 4px;font-size:12px;font-family:'Inter',sans-serif;text-align:center;color:#1C1C1E;background:#FFF;outline:none;}
.grid-input:focus{border-color:#007AFF;}
.grid-input[readonly]{background:#F9FAFB;border-color:transparent;color:#8E8E93;}

/* Rodapé */
.rodape{display:none;}
.action-card{background:rgba(255,255,255,0.92);border-radius:50px;box-shadow:0 2px 8px rgba(0,0,0,0.08);padding:4px;display:flex;flex-direction:row;gap:4px;}

.action-btn{width:38px;height:38px;border-radius:50%;border:none;background:#F2F2F7;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.action-btn:disabled{opacity:0.35;pointer-events:none;}
.action-btn svg{stroke:#1C1C1E;}

/* Modal incluir produto */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:999;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:#FFF;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-width:480px;}
.modal-title{font-size:15px;font-weight:700;color:#1C1C1E;margin-bottom:14px;}
.modal-input{width:100%;border:1px solid #E5E5EA;border-radius:10px;padding:10px 14px;font-size:14px;font-family:'Inter',sans-serif;outline:none;color:#1C1C1E;}
.modal-input:focus{border-color:#007AFF;}
.modal-lista{margin-top:8px;border-radius:10px;overflow:hidden;border:0.5px solid #E5E5EA;max-height:200px;overflow-y:auto;}
.modal-item{padding:12px 14px;font-size:14px;color:#1C1C1E;cursor:pointer;border-bottom:0.5px solid #F5F5F5;}
.modal-item:last-child{border-bottom:none;}
.modal-item:active{background:#F5F5F5;}
.modal-cancel{width:100%;margin-top:12px;padding:13px;border-radius:50px;border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;background:#F2F2F7;color:#1C1C1E;cursor:pointer;}
.pdf-sheet{position:fixed;inset:0;z-index:9999;background:#FFF;display:none;flex-direction:column;}
.pdf-sheet.active{display:flex;}
.pdf-topbar{height:52px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;background:#FFF;border-bottom:0.5px solid #E5E5EA;flex-shrink:0;}
.pdf-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px;}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn-float" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Guia de Coleta</div>
    <div class="topbar-sub" id="data-sub">—</div>
  </div>
  <div class="action-card">
    <button class="action-btn" onclick="abrirModalProduto()" id="btn-incluir" disabled>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#1C1C1E" stroke-width="2.2"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
    </button>
    <button class="action-btn" onclick="gravar()" id="btn-gravar" disabled>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#1C1C1E" stroke-width="2.2"><path d="M4.5 12.75l6 6 9-13.5"/></svg>
    </button>
    <button class="action-btn" onclick="gerarPDF()" id="btn-pdf" disabled>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#1C1C1E" stroke-width="2.2"><path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
    </button>
  </div>
</div>


<div class="fornecedor-wrap" id="fornecedor-wrap">
  <div class="fornecedor-card">
    <input class="fornecedor-input" id="fornecedor-input" placeholder="Buscar fornecedor..." autocomplete="off"/>
  </div>
  <div class="autocomplete-list" id="autocomplete-list"></div>
</div>

<div class="grid-card">
  <div class="grid-scroll" id="grid-scroll">
    <div class="thead-row" id="thead-row">
      <div class="th" style="width:36px;display:none;">Und</div>
      <div class="th left" style="flex:1;min-width:90px;">Produto</div>

      <div class="th cell-vendas" style="width:52px;text-align:left;padding-left:8px;">Vendas</div>
      <div class="th cell-total" style="width:52px;">Total</div>
      <div class="th cell-sobra" style="width:52px;">Sobra</div>
      <div class="th" style="width:56px;">Faturar</div>
      <div class="th cell-faturar-vol" style="width:56px;">Fat.Vol</div>
    </div>
    <div id="corpo"><div class="empty-state">Selecione um fornecedor</div></div>
  </div>
  <div class="total-wrap">
    <span class="total-label">Total Peso Líquido</span>
    <span class="total-val" id="total-peso">— kg</span>
  </div>
</div>



<!-- Modal incluir produto -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Incluir Produto</div>
    <input class="modal-input" id="modal-input" placeholder="Buscar produto..." autocomplete="off"/>
    <div class="modal-lista" id="modal-lista"></div>
    <button class="modal-cancel" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<script>
const fmtNum = v => Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
function parseV(v) { return parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0; }
function aplicarMascara(input) {
  let value = input.value.replace(/\D/g, '');
  if (value === '') { input.value = '0,00'; return; }
  input.value = fmtNum(parseInt(value, 10) / 100);
}

let colunasVisiveis = true;
let _fornecedorId = null;
let _fornecedorNome = '';
let _dataSub = '';
let _todosFornecedores = [];
let _todosProdutosFornecedor = [];
let _itensNovosPendentes = []; // produtos incluídos ainda não gravados

// Data
const hoje = new Date();
_dataSub = hoje.toLocaleDateString('pt-BR', {timeZone:'America/Manaus', day:'2-digit', month:'2-digit', year:'numeric'});
document.getElementById('data-sub').textContent = _dataSub;

function toggleColunas() {
  colunasVisiveis = !colunasVisiveis;
  document.querySelectorAll('.cell-total, .cell-sobra, .cell-vendas').forEach(el => el.classList.toggle('col-oculta', !colunasVisiveis));
  const btn = document.getElementById('btn-ocultar');
  btn.style.background = colunasVisiveis ? '#FFF' : '#007AFF';
  document.getElementById('icon-ocultar').style.stroke = colunasVisiveis ? '#1C1C1E' : '#FFF';
}

function marcarPendente() {
  const btn = document.querySelector('.ios-btn-float');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.4'; }
}

function recalcular(input) {

  const wrap = input.closest('.swipe-wrap');
  const inputs = wrap.querySelectorAll('.grid-input');
  const total = parseV(inputs[1].value);
  const sobra = parseV(inputs[2].value);
  const faturar = Math.max(0, total - sobra);
    inputs[3].value = fmtNum(faturar);
  const peso = parseFloat(wrap.dataset.peso) || 1;
  inputs[4].value = fmtNum(faturar / peso);
  atualizarTotal();

}

function atualizarTotal() {
  let totalPeso = 0;
  document.querySelectorAll('#corpo .swipe-wrap').forEach(wrap => {
    const inputs = wrap.querySelectorAll('.grid-input');
    const faturar = parseV(inputs[3].value);
    totalPeso += faturar;
  });
  document.getElementById('total-peso').textContent = `${fmtNum(totalPeso)} kg`;
}


function aplicarSwipe(wrap) {
  let timer = null;
  wrap.addEventListener('touchstart', () => {
    timer = setTimeout(() => abrirModalExcluir(wrap), 600);
  }, {passive:true});
  wrap.addEventListener('touchend', () => clearTimeout(timer), {passive:true});
  wrap.addEventListener('touchmove', () => clearTimeout(timer), {passive:true});
}

let _wrapParaExcluir = null;

function abrirModalExcluir(wrap) {
  _wrapParaExcluir = wrap;
  document.getElementById('modal-excluir').style.display = 'flex';
}

async function confirmarExcluir() {
  if (!_wrapParaExcluir) return;
  const guiaId = _wrapParaExcluir.dataset.guiaId;
  if (guiaId) await window.db.from('guia_embarque').delete().eq('id', guiaId);
  _wrapParaExcluir.remove();
  _wrapParaExcluir = null;
  document.getElementById('modal-excluir').style.display = 'none';
  atualizarTotal();
}

function cancelarExcluir() {
  _wrapParaExcluir = null;
  document.getElementById('modal-excluir').style.display = 'none';
}
  function habilitarBotoes(sim) {
  ['btn-incluir','btn-gravar','btn-pdf'].forEach(id => {
    const btn = document.getElementById(id);
    btn.disabled = !sim;
    btn.style.opacity = sim ? '1' : '0.4';
  });
}


// Autocomplete fornecedor
async function carregarFornecedores() {
  const { data } = await window.db.from('fornecedores').select('id, nome').order('nome');
  _todosFornecedores = data || [];
}

const inputForn = document.getElementById('fornecedor-input');
const listForn = document.getElementById('autocomplete-list');

inputForn.addEventListener('input', () => {
  const t = inputForn.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if (!t) { listForn.style.display = 'none'; return; }
  const filtrados = _todosFornecedores.filter(f =>
    f.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(t)
  ).slice(0, 6);
  if (filtrados.length === 0) { listForn.style.display = 'none'; return; }
  listForn.innerHTML = filtrados.map(f =>
    `<div class="autocomplete-item" onclick="selecionarFornecedor('${f.id}','${f.nome.replace(/'/g,"\\'")}')"> ${f.nome}</div>`
  ).join('');
  const rect = inputForn.getBoundingClientRect();
  listForn.style.top = (rect.bottom + 4) + 'px';
  listForn.style.display = 'block';

});

async function selecionarFornecedor(id, nome) {
  _fornecedorId = id;
  _fornecedorNome = nome;
  inputForn.value = nome;
  listForn.style.display = 'none';
  await carregarLista();
  await carregarProdutosFornecedor();
  habilitarBotoes(true);
}

async function carregarProdutosFornecedor() {
  const { data } = await window.db.from('produtos')
    .select('id, nome, unid_venda, unid_compra, peso_por_unid')
    .eq('fornecedor_id', _fornecedorId)
    .order('nome');
  _todosProdutosFornecedor = data || [];
}

async function carregarLista() {
  const corpo = document.getElementById('corpo');
  corpo.innerHTML = '<div class="empty-state">Carregando...</div>';

  const { data: produtos } = await window.db.from('produtos')
    .select('id, nome, unid_venda, unid_compra, peso_por_unid, estoque_inicial(quantidade_inicial)')
    .eq('fornecedor_id', _fornecedorId)
    .order('nome');

  const produtosMap = {};
  (produtos || []).forEach(p => { produtosMap[p.id] = p; });

  const produtoIds = (produtos || []).map(p => p.id);
  if (produtoIds.length === 0) { corpo.innerHTML = '<div class="empty-state">Nenhum produto cadastrado para este fornecedor</div>'; return; }

  const { data: guia } = await window.db.from('guia_embarque')
    .select('id, produto_id, total, faturar')
    .in('produto_id', produtoIds);

  if (!guia || guia.length === 0) {
    corpo.innerHTML = '<div class="empty-state">Nenhum item no guia. Use "+ Produto" para adicionar.</div>';
    return;
  }

  // Calcular d0 e d7 do ciclo atual
  const hoje = new Date();
  const diaSemana = hoje.getDay();
  const diasDesdeQuarta = (diaSemana - 3 + 7) % 7;
  const d0 = new Date(hoje);
  d0.setDate(hoje.getDate() - diasDesdeQuarta);
  const d0Str = d0.toLocaleDateString('en-CA', {timeZone:'America/Manaus'});
    const d0ISO = `${d0Str}T00:00:00+00:00`;
  const d7ISO = new Date(new Date(d0ISO).getTime() + 7 * 86400000).toISOString();

  const { data: pedidosCiclo } = await window.db.from('pedidos_vendas')
    .select('id').gte('data', d0ISO).lt('data', d7ISO);

  const pedidoIds = (pedidosCiclo || []).map(p => p.id);

  // Buscar itens vendidos do ciclo para os produtos do fornecedor
  const vendasMap = {};
  if (pedidoIds.length > 0) {
    const { data: itens } = await window.db.from('itens_pedidos_vendas')
      .select('produto_id, quantidade')
      .in('pedido_venda_id', pedidoIds)
      .in('produto_id', produtoIds);
    (itens || []).forEach(i => {
      vendasMap[i.produto_id] = (vendasMap[i.produto_id] || 0) + (parseFloat(i.quantidade) || 0);
    });
  }

  corpo.innerHTML = guia.map(g => {
    const p = produtosMap[g.produto_id];
    if (!p) return '';
        const totalNum = parseFloat(g.total) || 0;
    const faturarNum = parseFloat(g.faturar) || 0;
    const sobraNum = Math.max(0, totalNum - faturarNum);
    const vendasNum = vendasMap[g.produto_id] || 0;
    return criarLinhaHtml(g.id, g.produto_id, p.nome, p.unid_venda || '', p.unid_compra || '', p.peso_por_unid || 1, totalNum, sobraNum, faturarNum, vendasNum);

  }).join('');

  document.querySelectorAll('#corpo .swipe-wrap').forEach(wrap => aplicarSwipe(wrap));
  atualizarTotal();
}

function criarLinhaHtml(guiaId, produtoId, nome, unidVenda, unidCompra, peso, totalNum, sobraNum, faturarNum, vendasNum = 0, totalBranco = false) {
  return `<div class="swipe-wrap" data-peso="${peso}" data-guia-id="${guiaId || ''}" data-produto-id="${produtoId}" data-unid-compra="${unidCompra || unidVenda}">
    <div class="swipe-row">
      <div class="cell-und" style="display:none;">${unidVenda}</div>
      <div class="cell-nome">${nome}</div>

      <div class="cell-vendas"><input class="grid-input" value="${fmtNum(vendasNum)}" readonly></div>
      <div class="cell-total"><input class="grid-input" inputmode="decimal" value="${totalBranco ? '' : fmtNum(totalNum)}" placeholder="0,00" oninput="aplicarMascara(this);recalcular(this);marcarPendente()"></div>
      <div class="cell-sobra"><input class="grid-input" inputmode="decimal" value="${fmtNum(sobraNum)}" oninput="aplicarMascara(this);recalcular(this);marcarPendente()"></div>
      <div class="cell-faturar"><input class="grid-input" value="${fmtNum(faturarNum)}" readonly></div>
      <div class="cell-faturar-vol"><input class="grid-input" value="${fmtNum(peso > 0 ? faturarNum / peso : 0)}" readonly></div>
    </div>
  </div>`;
}

// Modal incluir produto
function abrirModalProduto() {
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-lista').innerHTML = '';
  document.getElementById('modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('modal-input').focus(), 100);
}

function fecharModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.getElementById('modal-input').addEventListener('input', () => {
  const t = document.getElementById('modal-input').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const jaNaLista = [...document.querySelectorAll('#corpo .swipe-wrap')].map(w => w.dataset.produtoId);
  const filtrados = _todosProdutosFornecedor.filter(p =>
    !jaNaLista.includes(p.id) &&
    p.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(t)
  ).slice(0, 8);
  document.getElementById('modal-lista').innerHTML = filtrados.map(p =>
    `<div class="modal-item" onclick="incluirProduto('${p.id}','${p.nome.replace(/'/g,"\\'")}','${p.unid_venda||''}','${p.unid_compra||''}',${p.peso_por_unid||1})">${p.nome}</div>`
  ).join('');
});

async function incluirProduto(produtoId, nome, unid, unidCompra, peso) {
  const hoje = new Date();
  const diaSemana = hoje.getDay();
  const diasDesdeQuarta = (diaSemana - 3 + 7) % 7;
  const d0 = new Date(hoje);
  d0.setDate(hoje.getDate() - diasDesdeQuarta);
  const d0Str = d0.toLocaleDateString('en-CA', {timeZone:'America/Manaus'});
  const d0ISO = `${d0Str}T00:00:00+00:00`;
  const d7ISO = new Date(new Date(d0ISO).getTime() + 7 * 86400000).toISOString();

  const [estRes, pedidosRes] = await Promise.all([
    window.db.from('estoque_inicial').select('quantidade_inicial').eq('produto_id', produtoId).maybeSingle(),
    window.db.from('pedidos_vendas').select('id').gte('data', d0ISO).lt('data', d7ISO)
  ]);

  const sobraNum = parseFloat(estRes.data?.quantidade_inicial || 0);
  const pedidoIds = (pedidosRes.data || []).map(p => p.id);
  let vendasNum = 0;
  if (pedidoIds.length > 0) {
    const { data: itens } = await window.db.from('itens_pedidos_vendas')
      .select('quantidade').eq('produto_id', produtoId).in('pedido_venda_id', pedidoIds);
    vendasNum = (itens || []).reduce((a, i) => a + (parseFloat(i.quantidade) || 0), 0);
  }

  const faturarNum = Math.max(0, 0 - sobraNum);
  const linha = criarLinhaHtml('', produtoId, nome, unid, unidCompra, peso, 0, sobraNum, faturarNum, vendasNum, true);


  const corpo = document.getElementById('corpo');
  const empty = corpo.querySelector('.empty-state');
  if (empty) empty.remove();

  // Injeta em ordem alfabética
  const wraps = [...corpo.querySelectorAll('.swipe-wrap')];
  const nomeNorm = nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  let inserido = false;
  for (const wrap of wraps) {
    const nomeWrap = wrap.querySelector('.cell-nome').textContent.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    if (nomeNorm < nomeWrap) {
      wrap.insertAdjacentHTML('beforebegin', linha);
      inserido = true;
      break;
    }
  }
  if (!inserido) corpo.insertAdjacentHTML('beforeend', linha);

  const novoWrap = corpo.querySelector(`[data-produto-id="${produtoId}"]`);
  if (novoWrap) aplicarSwipe(novoWrap);
  atualizarTotal();
  fecharModal();
}

// Gravar
async function gravar() {
  const btn = document.getElementById('btn-gravar');
  btn.style.background = '#FF9500';
btn.disabled = true;


  try {
    const inserts = [];
    const updates = [];

    document.querySelectorAll('#corpo .swipe-wrap').forEach(wrap => {
      const produtoId = wrap.dataset.produtoId;
      const guiaId = wrap.dataset.guiaId;
      const inputs = wrap.querySelectorAll('.grid-input');
      const total = parseV(inputs[1].value);
      const faturar = parseV(inputs[3].value);
      if (guiaId) {
        updates.push({ id: guiaId, produto_id: produtoId, total, faturar });
      } else {
        inserts.push({ produto_id: produtoId, total, faturar });
      }
    });

        if (updates.length > 0) {
      await window.db.from('guia_embarque').upsert(updates, {onConflict: 'id'});
    }
    if (inserts.length > 0) {
      const { data: inseridos } = await window.db.from('guia_embarque').insert(inserts).select('id, produto_id');
      if (inseridos) {
        inseridos.forEach(row => {
          const wrap = document.querySelector(`#corpo .swipe-wrap[data-produto-id="${row.produto_id}"][data-guia-id=""]`);
          if (wrap) wrap.dataset.guiaId = row.id;
        });
      }
    }

        setTimeout(() => { btn.disabled = false; btn.style.background = ''; }, 1500);



  } catch (err) {
    alert('Erro ao gravar: ' + err.message);
    btn.textContent = 'Gravar';
    btn.disabled = false;
  }
}

// PDF
function fecharPDF() {
  document.getElementById('pdf-sheet').classList.remove('active');
}

function gerarPDF() {
  const linhas = [];
  let totalPeso = 0;

  document.querySelectorAll('#corpo .swipe-wrap').forEach(wrap => {
    const row = wrap.querySelector('.swipe-row');
    const und = wrap.dataset.unidCompra || row.querySelector('.cell-und').textContent.trim();
    const nome = row.querySelector('.cell-nome').textContent.trim();
    const inputs = wrap.querySelectorAll('.grid-input');
    const peso = parseFloat(wrap.dataset.peso) || 1;
    const totalKg = parseV(inputs[1].value);
    const sobraKg = parseV(inputs[2].value);
    const faturarKg = parseV(inputs[3].value);
    totalPeso += faturarKg;
    linhas.push({ und, nome, total: fmtNum(totalKg / peso), sobra: fmtNum(sobraKg / peso), faturar: fmtNum(faturarKg / peso) });
  });

  const linhasHtml = linhas.map(l => `
    <tr>
            <td style="width:40px;color:#8E8E93;font-size:12px;padding:5px 8px;border-bottom:0.5px solid #E5E5EA;">${l.und}</td>
      <td style="font-size:12px;padding:5px 8px;border-bottom:0.5px solid #E5E5EA;">${l.nome}</td>
      <td style="width:60px;text-align:right;font-size:12px;padding:5px 8px;border-bottom:0.5px solid #E5E5EA;">${l.total}</td>
      <td style="width:60px;text-align:right;font-size:12px;padding:5px 8px;border-bottom:0.5px solid #E5E5EA;">${l.sobra}</td>
      <td style="width:60px;text-align:right;font-size:12px;padding:5px 8px;border-bottom:0.5px solid #E5E5EA;">${l.faturar}</td>

    </tr>`).join('');

  document.getElementById('pdf-conteudo').innerHTML = `
    <div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;">HuberHorti</div>
      <div style="font-size:18px;font-weight:700;color:#1C1C1E;margin-bottom:4px;">Fornecedor: ${_fornecedorNome}</div>
      <div style="font-size:12px;color:#8E8E93;">${_dataSub}</div>
    </div>
    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr>
          <th style="width:40px;text-align:left;font-size:10px;font-weight:600;color:#8E8E93;padding:8px 8px;border-bottom:1px solid #E5E5EA;">Und</th>
          <th style="text-align:left;font-size:10px;font-weight:600;color:#8E8E93;padding:8px 8px;border-bottom:1px solid #E5E5EA;">Produto</th>
          <th style="width:60px;text-align:right;font-size:10px;font-weight:600;color:#8E8E93;padding:8px 8px;border-bottom:1px solid #E5E5EA;">Total</th>
          <th style="width:60px;text-align:right;font-size:10px;font-weight:600;color:#8E8E93;padding:8px 8px;border-bottom:1px solid #E5E5EA;">Sobra</th>
          <th style="width:60px;text-align:right;font-size:10px;font-weight:600;color:#8E8E93;padding:8px 8px;border-bottom:1px solid #E5E5EA;">Faturar</th>
        </tr>
      </thead>
      <tbody>${linhasHtml}</tbody>
    </table>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:14px;border-top:1px solid #1C1C1E;">
      <span style="font-size:12px;color:#8E8E93;">Total Peso Líquido</span>
      <span style="font-size:14px;font-weight:700;color:#1C1C1E;">${fmtNum(totalPeso)} kg</span>
    </div>`;

  document.getElementById('pdf-sheet').classList.add('active');
}

document.getElementById('corpo').addEventListener('focusin', e => {
  if (e.target.classList.contains('grid-input') && !e.target.readOnly) {
    setTimeout(() => e.target.select(), 50);
  }
});

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight);
fixHeight();

carregarFornecedores();
</script>
