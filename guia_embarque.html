<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Guia de Coleta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-y:none;}
.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-weight:700;font-size:11px;letter-spacing:0.8px;color:#1C1C1E;}
.topbar-sub{font-size:10px;color:#8E8E93;font-weight:500;}
.ios-btn-float{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;}
.fornecedor-wrap{padding:0 16px 10px;flex-shrink:0;}
.fornecedor-card{background:#FFF;border-radius:14px;padding:10px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.fornecedor-label{font-size:9px;color:#8E8E93;}
.fornecedor-nome{font-size:15px;font-weight:700;color:#1C1C1E;margin-top:2px;}
.grid-card{flex:1;margin:0 16px;background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.grid-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}
table{border-collapse:collapse;width:100%;font-size:11px;}
thead th{position:sticky;top:0;background:#F9FAFB;padding:10px 8px;color:#8E8E93;font-weight:600;font-size:10px;border-bottom:1px solid #F0F0F5;text-align:center;}
thead th.left{text-align:left;padding-left:12px;}
td{padding:11px 8px;border-bottom:0.5px solid #F0F0F5;text-align:center;color:#1C1C1E;vertical-align:middle;}
td.left{text-align:left;padding-left:12px;font-weight:500;}
.grid-input{width:100%;border:1px solid #E5E5EA;border-radius:6px;padding:5px;text-align:center;font-size:11px;background:#F9FAFB;outline:none;color:#1C1C1E;font-weight:600;font-family:'Inter',sans-serif;}
.grid-input:focus{border-color:#007AFF;background:#FFF;}
.grid-input[readonly]{background:transparent;border-color:transparent;}
.col-oculta{display:none !important;}

/* Swipe delete */
.swipe-wrap{position:relative;overflow:hidden;}
.swipe-del{position:absolute;right:0;top:0;bottom:0;width:70px;background:#EF4444;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#FFF;cursor:pointer;z-index:0;}
.swipe-row{position:relative;z-index:1;background:#FFF;transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);}

.total-wrap{padding:10px 16px;border-top:0.5px solid #E5E5EA;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;}
.total-label{font-size:10px;color:#8E8E93;}
.total-val{font-size:15px;font-weight:700;color:#1C1C1E;}
.rodape{padding:12px 16px 28px;flex-shrink:0;display:flex;gap:10px;}
.rodape-btn{flex:1;padding:13px;border-radius:50px;border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.rodape-btn.secondary{background:#F2F2F7;color:#1C1C1E;}
.rodape-btn.primary{background:#007AFF;color:#FFF;}

@media print{
  body{background:#FFF;height:auto;overflow:visible;}
  .topbar,.rodape,.total-wrap{display:none;}
  .fornecedor-wrap{padding:0 0 12px;}
  .grid-card{box-shadow:none;border-radius:0;margin:0;overflow:visible;}
  .grid-scroll{overflow:visible;}
  .col-total,.col-sobra{display:none !important;}
  .swipe-del{display:none;}
  .grid-input{border:none;background:transparent;}
  .print-fornecedor{display:block!important;font-size:13px;font-weight:700;margin-bottom:16px;}
  .print-total{display:block!important;text-align:center;font-size:13px;font-weight:700;margin-top:16px;}
}
.print-fornecedor{display:none;}
.print-total{display:none;}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn-float" onclick="window.location.href='compras.html'">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Guia de Coleta</div>
    <div class="topbar-sub" id="data-sub">—</div>
  </div>
  <button class="ios-btn-float" id="btn-ocultar" onclick="toggleColunas()">
    <svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:#1C1C1E;stroke-width:2;fill:none" id="icon-ocultar"><path d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
  </button>
</div>

<div class="fornecedor-wrap">
  <div class="fornecedor-card">
    <div class="fornecedor-label">Fornecedor</div>
    <div class="fornecedor-nome" id="fornecedor-nome">—</div>
  </div>
</div>

<div class="grid-card">
  <div class="grid-scroll">
    <div class="print-fornecedor" id="print-fornecedor"></div>
    <table id="tabela">
      <thead>
        <tr>
          <th style="width:36px;">Und</th>
          <th class="left">Produto</th>
          <th class="col-total" style="width:52px;">Total</th>
          <th class="col-sobra" style="width:52px;">Sobra</th>
          <th style="width:56px;">Faturar</th>
        </tr>
      </thead>
      <tbody id="corpo"></tbody>
    </table>
    <div class="print-total" id="print-total"></div>
  </div>
  <div class="total-wrap">
    <span class="total-label">Total Peso Líquido</span>
    <span class="total-val" id="total-peso">— kg</span>
  </div>
</div>

<div class="rodape">
  <button class="rodape-btn secondary" onclick="window.location.href='compras.html'">Voltar</button>
  <button class="rodape-btn primary" onclick="window.print()">PDF</button>
</div>

<script>
const fmtNum = v => Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});

function parseV(v) {
  return parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0;
}

function aplicarMascara(input) {
  let digits = input.value.replace(/\D/g,'');
  if (!digits) { input.value = '0,00'; return; }
  input.value = fmtNum(parseInt(digits, 10) / 100);
}

let colunasVisiveis = true;
let _itens = [];

function toggleColunas() {
  colunasVisiveis = !colunasVisiveis;
  document.querySelectorAll('.col-total, .col-sobra').forEach(el => {
    el.classList.toggle('col-oculta', !colunasVisiveis);
  });
  const btn = document.getElementById('btn-ocultar');
  btn.style.background = colunasVisiveis ? '#FFF' : '#007AFF';
  document.getElementById('icon-ocultar').style.stroke = colunasVisiveis ? '#1C1C1E' : '#FFF';
}

function recalcular(input) {
  const tr = input.closest('tr');
  const inputs = tr.querySelectorAll('.grid-input');
  const total = parseV(inputs[0].value);
  const sobra = parseV(inputs[1].value);
  const faturar = Math.max(0, total - sobra);
  inputs[2].value = fmtNum(faturar);
  atualizarTotal();
}

function atualizarTotal() {
  let totalPeso = 0;
  document.querySelectorAll('#corpo .swipe-wrap').forEach(wrap => {
    const tr = wrap.querySelector('.swipe-row');
    if (!tr) return;
    const inputs = tr.querySelectorAll('.grid-input');
    const faturar = parseV(inputs[2].value);
    const peso = parseFloat(tr.dataset.peso) || 1;
    totalPeso += faturar * peso;
  });
  const totalFmt = fmtNum(totalPeso);
  document.getElementById('total-peso').textContent = `${totalFmt} kg`;
  document.getElementById('print-total').textContent = `Total Peso Líquido: ${totalFmt} kg`;
}

function aplicarSwipe(wrap) {
  const row = wrap.querySelector('.swipe-row');
  let startX = 0, currentX = 0, dragging = false;
  wrap.addEventListener('touchstart', e => { startX = e.touches[0].clientX; currentX = 0; dragging = true; }, {passive:true});
  wrap.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dx = e.touches[0].clientX - startX;
    if (dx > 0) return;
    currentX = Math.max(dx, -70);
    row.style.transform = `translateX(${currentX}px)`;
    row.style.transition = 'none';
  }, {passive:true});
  wrap.addEventListener('touchend', () => {
    dragging = false;
    row.style.transition = '';
    row.style.transform = currentX < -35 ? 'translateX(-70px)' : 'translateX(0)';
  });
  wrap.querySelector('.swipe-del').addEventListener('click', () => {
    wrap.remove();
    atualizarTotal();
  });
}

function init() {
  const fornecedor = sessionStorage.getItem('guia_fornecedor') || '—';
  const itensRaw = sessionStorage.getItem('guia_itens');
  sessionStorage.removeItem('guia_fornecedor');
  sessionStorage.removeItem('guia_itens');

  _itens = itensRaw ? JSON.parse(itensRaw) : [];

  document.getElementById('fornecedor-nome').textContent = fornecedor;
  document.getElementById('print-fornecedor').textContent = `Fornecedor: ${fornecedor}`;

  const hoje = new Date();
  const dd = String(hoje.getDate()).padStart(2,'0');
  const mm = String(hoje.getMonth()+1).padStart(2,'0');
  const aaaa = hoje.getFullYear();
  document.getElementById('data-sub').textContent = `${dd}/${mm}/${aaaa}`;

  const corpo = document.getElementById('corpo');
  corpo.innerHTML = _itens.map((item, i) => {
    const total = fmtNum(item.qt1);
    const sobra = fmtNum(item.estIni);
    const faturar = fmtNum(Math.max(0, item.qt1 - item.estIni));
    return `<tr class="swipe-wrap" id="wrap-${i}">
      <td colspan="5" style="padding:0;border:none;">
        <div class="swipe-wrap" style="display:table;width:100%;">
          <div class="swipe-del">Excluir</div>
          <table style="width:100%;border-collapse:collapse;">
            <tr class="swipe-row" data-peso="${item.peso}">
              <td style="width:36px;text-align:center;color:#8E8E93;padding:11px 8px;border-bottom:0.5px solid #F0F0F5;">${item.unid}</td>
              <td class="left" style="padding:11px 8px 11px 12px;font-weight:500;border-bottom:0.5px solid #F0F0F5;">${item.nome}</td>
              <td class="col-total" style="width:52px;text-align:center;padding:11px 8px;border-bottom:0.5px solid #F0F0F5;"><input class="grid-input" value="${total}" oninput="aplicarMascara(this);recalcular(this)"></td>
              <td class="col-sobra" style="width:52px;text-align:center;padding:11px 8px;border-bottom:0.5px solid #F0F0F5;"><input class="grid-input" value="${sobra}" oninput="aplicarMascara(this);recalcular(this)"></td>
              <td style="width:56px;text-align:center;padding:11px 8px;border-bottom:0.5px solid #F0F0F5;"><input class="grid-input" value="${faturar}" readonly></td>
            </tr>
          </table>
        </div>
      </td>
    </tr>`;
  }).join('');

  // Aplicar swipe em cada linha
  document.querySelectorAll('#corpo .swipe-wrap').forEach(wrap => aplicarSwipe(wrap));

  atualizarTotal();
}

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight);
fixHeight();
init();
</script>
</body>
</html>
