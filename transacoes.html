<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Transações</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;}

.topbar{height:64px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1}
.topbar-title{color:#1C1C1E;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px}
.topbar-sub{font-size:11px;color:#8E8E93;font-weight:500;margin-top:1px}
.ios-btn-float{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;flex-shrink:0;}
.ios-btn-float:active{opacity:0.7}

/* Header do ativo */
.ativo-header{
    margin:0 16px 10px;
    background:#FFF;border-radius:20px;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
    padding:16px 18px;
    display:flex;align-items:center;justify-content:space-between;
    flex-shrink:0;
}
.ativo-header-left{}
.ativo-header-ticker{font-size:18px;font-weight:800;color:#1C1C1E;}
.ativo-header-nome{font-size:12px;color:#8E8E93;font-weight:500;margin-top:2px;}
.ativo-header-right{text-align:right;}
.ativo-header-preco{font-size:20px;font-weight:800;color:#007AFF;letter-spacing:-0.5px;}
.ativo-header-var{font-size:12px;font-weight:600;margin-top:2px;}
.var-pos{color:#10B981}
.var-neg{color:#EF4444}

/* Botões de ação */
.action-row{display:flex;gap:8px;padding:0 16px 10px;flex-shrink:0;}
.btn-action{
    flex:1;padding:11px;border:none;border-radius:100px;
    font-size:13px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;
}
.btn-consolidado{background:#FFF;color:#1C1C1E;border:none;box-shadow:0 2px 8px rgba(0,0,0,0.08);}

.btn-nova{background:#007AFF;color:#FFF;}

/* Lista */
.lista-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px calc(24px + env(safe-area-inset-bottom));}
.section-card{background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;margin-bottom:12px;}

.transacao-item{
    display:flex;align-items:center;padding:16px 18px;gap:12px;
    cursor:pointer;transition:background 0.15s;
}

.transacao-item:not(:last-child){border-bottom:0.5px solid #F2F2F7}
.transacao-item:active{background:#F5F5F7}

.transacao-badge{
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;flex-shrink:0;
}
.badge-c{background:#E1F9F0;color:#10B981}
.badge-v{background:#FEE2E2;color:#EF4444}

.transacao-info{flex:1;min-width:0;}
.transacao-data{font-size:13px;font-weight:600;color:#1C1C1E;}
.transacao-qtd{font-size:11px;color:#8E8E93;font-weight:500;margin-top:2px;}
.transacao-right{text-align:right;flex-shrink:0;}
.transacao-valor{font-size:14px;font-weight:700;color:#1C1C1E;}
.transacao-preco-unit{font-size:10px;color:#C7C7CC;margin-top:2px;}

.empty-state{text-align:center;padding:60px 20px;font-size:13px;color:#8E8E93;font-weight:500;}
.empty-icon{font-size:40px;margin-bottom:12px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:2000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex}
.modal-sheet{background:#FFF;border-radius:24px;padding:28px 22px 26px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,0.18),0 4px 16px rgba(0,0,0,0.10);animation:modalPop 0.28s cubic-bezier(0.34,1.56,0.64,1);}

@keyframes modalPop{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:16px;font-weight:700;color:#1C1C1E;margin-bottom:16px;text-align:center;}
.seg-track{position:relative;display:flex;background:#F2F2F7;border-radius:100px;padding:3px;height:40px;margin-bottom:16px;}
.seg-thumb{position:absolute;top:3px;left:3px;width:calc(50% - 3px);height:calc(100% - 6px);background:#FFF;border-radius:100px;box-shadow:0 2px 6px rgba(0,0,0,0.1);transition:transform 0.28s cubic-bezier(0.34,1.2,0.64,1);pointer-events:none;}
.seg-track.venda .seg-thumb{transform:translateX(100%)}
.seg-opt{flex:1;z-index:1;background:transparent;border:none;font-size:13px;font-weight:600;color:#8E8E93;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:color 0.2s;border-radius:100px;}
.seg-opt.selected{color:#1C1C1E}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.modal-field-full{margin-bottom:14px;}
.modal-label{font-size:11px;font-weight:600;color:#8E8E93;margin-bottom:7px;display:block;}
.modal-input{width:100%;padding:14px 15px;border:1.5px solid #E5E5EA;border-radius:14px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;color:#1C1C1E;background:#FFF;outline:none;box-sizing:border-box;}

.modal-input:focus{border-color:#007AFF}
.modal-divider{height:1px;background:#F2F2F7;margin:12px 0;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-btn-cancelar{flex:1;padding:13px;background:#F2F2F7;color:#1C1C1E;border:none;border-radius:100px;font-size:15px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;}
.modal-btn-salvar{flex:1;padding:13px;background:#007AFF;color:#FFF;border:none;border-radius:100px;font-size:15px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;}
.modal-btn-salvar:disabled{opacity:0.4;pointer-events:none}

/* Slider */
.slider-wrap{margin-bottom:16px;}
.slider-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.slider-label{font-size:11px;font-weight:600;color:#8E8E93;}
.slider-pct{font-size:16px;font-weight:800;color:#007AFF;}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:100px;background:#E5E5EA;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:#007AFF;box-shadow:0 2px 8px rgba(0,122,255,0.35);cursor:pointer;}
input[type=range]::-webkit-slider-runnable-track{border-radius:100px;}
.slider-ref{display:flex;justify-content:space-between;margin-top:4px;}
.slider-ref span{font-size:10px;color:#8E8E93;font-weight:600;}

.cotacao-badge{background:#F2F2F7;border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.cotacao-badge-label{font-size:11px;color:#8E8E93;font-weight:600;}
.cotacao-badge-val{font-size:14px;font-weight:800;color:#007AFF;}
.modal-input[type=date]{font-size:13px;min-width:0;}
.detalhe-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #F2F2F7;}
.detalhe-row:last-child{border-bottom:none;}
.detalhe-label{font-size:13px;color:#8E8E93;font-weight:500;}
.detalhe-value{font-size:13px;font-weight:700;color:#374151;}

/* Bottom sheet consolidado */
.sheet-item-value{color:#111827}
.sheet-item-value.pos{color:#16A34A}
.sheet-item-value.neg{color:#DC2626}
.sheet-item-value.zero{color:#6B7280}
.sheet-item-value.pm{color:#2563EB;font-size:15px;}



</style>
</head>
<body>

<div class="topbar">
    <button class="ios-btn-float" onclick="window.history.back()">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
    </button>
    <div class="topbar-copy">
        <div class="topbar-title" id="topbar-title">Transações</div>
        <div class="topbar-sub" id="topbar-sub">—</div>
    </div>
    <div style="width:38px"></div>
</div>

<!-- Header do ativo -->
<div class="ativo-header" id="ativo-header">
    <div class="ativo-header-left">
        <div class="ativo-header-ticker" id="header-ticker">—</div>
        <div class="ativo-header-nome" id="header-nome">—</div>
    </div>
    <div class="ativo-header-right">
        <div class="ativo-header-preco" id="header-preco">—</div>
        <div class="ativo-header-var" id="header-var">—</div>
    </div>
</div>

<!-- Botões -->
<div class="action-row">
    <button class="btn-action btn-consolidado" onclick="abrirConsolidado()">Consolidado</button>
    <button class="btn-action btn-nova" onclick="abrirModalNova()">+ Nova Transação</button>
</div>

<!-- Lista -->
<div class="lista-wrap">
    <div class="empty-state" id="empty-state">
        <div class="empty-icon">📋</div>
        Nenhuma transação registrada
    </div>
    <div class="section-card" id="section-card" style="display:none"></div>
</div>

<!-- Modal nova transação -->
<div class="modal-overlay" id="modal-nova" onclick="fecharModalFora(event,'modal-nova')">
    <div class="modal-sheet">
        <div class="modal-title">Nova Transação</div>

        <!-- Cotação -->
        <div class="cotacao-badge">
            <span class="cotacao-badge-label">Cotação Atual</span>
            <span class="cotacao-badge-val" id="nova-cotacao">—</span>
        </div>

        <!-- Segmented -->
        <div class="seg-track" id="seg-track-nova">
            <div class="seg-thumb"></div>
            <button class="seg-opt selected" id="seg-c" onclick="setTipoNova('C')">Compra</button>
            <button class="seg-opt" id="seg-v" onclick="setTipoNova('V')">Venda</button>
        </div>

        <!-- Slider -->
        <div class="slider-wrap">
            <div class="slider-header">
                <span class="slider-label" id="slider-label">% do Saldo Disponível</span>
                <span class="slider-pct" id="slider-pct-val">0%</span>
            </div>
            <input type="range" id="nova-slider" min="0" max="100" value="0" step="1" oninput="onSlider(this.value)">
            <div class="slider-ref">
                <span>0%</span>
                <span id="slider-ref-max">Saldo: —</span>
                <span>100%</span>
            </div>
        </div>

        <div class="modal-divider"></div>

        <!-- Campos calculados -->
        <div class="modal-grid" style="gap:12px;margin-bottom:14px;">
            <div>
                <label class="modal-label">Quantidade</label>
                <input id="nova-qtd" class="modal-input" type="tel" inputmode="decimal" placeholder="0,00000000">
            </div>
            <div>
                <label class="modal-label">Valor Total USD</label>
                <input id="nova-valor" class="modal-input" type="number" inputmode="decimal" step="0.00000001" placeholder="0.00000000">

            </div>
            <div>
                <label class="modal-label">Taxa</label>
                <input id="nova-taxa" class="modal-input" type="tel" inputmode="decimal" placeholder="0,00000000">
            </div>
            <div>
                <label class="modal-label">Data</label>
                <input id="nova-data" class="modal-input" type="date">
            </div>
        </div>


        <div class="modal-actions">
            <button class="modal-btn-cancelar" onclick="fecharModal('modal-nova')">Cancelar</button>
            <button class="modal-btn-salvar" id="btn-salvar-nova" onclick="salvarNova()">Salvar</button>
        </div>
    </div>
</div>

<!-- Modal detalhe -->
<div class="modal-overlay" id="modal-detalhe" onclick="fecharModalFora(event,'modal-detalhe')">
    <div class="modal-sheet">
        <div class="modal-title" id="detalhe-titulo">Detalhe</div>
        <div id="detalhe-corpo"></div>
        <div class="modal-actions" style="margin-top:20px;">
            <button class="modal-btn-cancelar" onclick="fecharModal('modal-detalhe')">Fechar</button>
        </div>
    </div>
</div>

<!-- Modal consolidado -->
<div class="modal-overlay" id="sheet-consolidado" onclick="fecharSheetFora(event)">
    <div class="modal-sheet">
        <div class="modal-title" id="sheet-titulo">Consolidado</div>
        <div id="sheet-grid"></div>
        <div class="modal-actions" style="margin-top:16px">
            <button class="modal-btn-cancelar" onclick="fecharSheet()">Fechar</button>
        </div>
    </div>
</div>


<script>
const db = window.db;
let _ativoId = null;
let _ticker = '';
let _nome = '';
let _precoAtual = 0;
let _varPct = 0;
let _transacoes = [];
let _tipoNova = 'C';
let _saldoCorretora = 0;

const parseVal = v => parseFloat(String(v || '0').replace(/,/g,'.').replace(/\.(?=.*\.)/g,'')) || 0;

const mascara8 = input => {
    let v = input.value.replace(/\D/g,'');
    if (v === '') { input.value = ''; return; }
    input.value = (parseInt(v)/100000000).toLocaleString('pt-BR',{minimumFractionDigits:8,maximumFractionDigits:8});
};
const mascara2 = input => {
    let v = input.value.replace(/\D/g,'');
    if (v === '') { input.value = ''; return; }
    input.value = (parseInt(v)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
};
const fmtUSD = v => parseFloat(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtQtd = v => parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:8,maximumFractionDigits:8});

document.getElementById('nova-qtd').addEventListener('input', function(){ mascara8(this); });
document.getElementById('nova-taxa').addEventListener('input', function(){ mascara8(this); });


async function init() {
    const params = new URLSearchParams(window.location.search);
    _ativoId   = params.get('ativo_id');
    _ticker    = params.get('ticker') || '—';
    _nome      = params.get('nome') || '';
    _precoAtual = parseFloat(params.get('preco') || '0');
    _varPct    = parseFloat(params.get('var_pct') || '0');
    _saldoCorretora = parseFloat(params.get('saldo') || '0');

    // Header
    document.getElementById('topbar-title').textContent = _ticker;
    document.getElementById('header-ticker').textContent = _ticker;
    document.getElementById('header-nome').textContent = _nome;
    document.getElementById('header-preco').textContent = fmtUSD(_precoAtual) + ' USD';
    const varEl = document.getElementById('header-var');
    varEl.textContent = (_varPct >= 0 ? '+' : '') + _varPct.toFixed(2) + '%';
    varEl.className = 'ativo-header-var ' + (_varPct >= 0 ? 'var-pos' : 'var-neg');

    // Data default
    const hoje = new Date();
    const aa = hoje.getFullYear(), mm = String(hoje.getMonth()+1).padStart(2,'0'), dd = String(hoje.getDate()).padStart(2,'0');
    document.getElementById('nova-data').value = `${aa}-${mm}-${dd}`;

    // Busca saldo da corretora ANTES de tudo
    if (_ativoId) {
        const { data: ativo } = await db.from('ativos').select('corretora_id').eq('id', _ativoId).single();
        if (ativo?.corretora_id) {
            const { data: transfs } = await db.from('transferencias').select('tipo, valor_origem, valor_destino').eq('corretora_id', ativo.corretora_id);
            const { data: txs } = await db.from('transacoes').select('tipo_operacao, valor_total_usd, ativos!inner(corretora_id)').eq('ativos.corretora_id', ativo.corretora_id);
            let saldo = 0;
            (transfs||[]).forEach(t => { saldo += t.tipo === 'D' ? parseFloat(t.valor_destino)||0 : -(parseFloat(t.valor_origem)||0); });
            (txs||[]).forEach(t => { saldo += t.tipo_operacao === 'V' ? parseFloat(t.valor_total_usd)||0 : -(parseFloat(t.valor_total_usd)||0); });
            _saldoCorretora = Math.max(0, saldo);
        }
    }

    await carregarTransacoes();
}

async function carregarTransacoes() {
    if (!_ativoId) return;
    const { data } = await db.from('transacoes')
        .select('*')
        .eq('ativo_id', _ativoId)
        .order('data', {ascending: true});
    _transacoes = data || [];
    document.getElementById('topbar-sub').textContent = `${_transacoes.length} operação${_transacoes.length !== 1 ? 'ões' : ''}`;
    renderizar();
}

function renderizar() {
    const card = document.getElementById('section-card');
    const empty = document.getElementById('empty-state');
    const lista = [..._transacoes].reverse(); // mais recente primeiro

    if (lista.length === 0) {
        card.style.display = 'none';
        empty.style.display = 'block';
        return;
    }

    empty.style.display = 'none';
    card.style.display = 'block';
    card.innerHTML = lista.map(t => {
        const comp = t.tipo_operacao === 'C';
        const data = t.data ? new Date(t.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '—';
        const precoUnit = parseFloat(t.quantidade_ativo) > 0
            ? parseFloat(t.valor_total_usd) / parseFloat(t.quantidade_ativo)
            : 0;
        return `
        <div class="transacao-item" onclick="abrirDetalhe('${t.id}')">
            <div class="transacao-badge ${comp ? 'badge-c' : 'badge-v'}">${comp ? 'C' : 'V'}</div>
            <div class="transacao-info">
                <div class="transacao-data">${data}</div>
                <div class="transacao-qtd">${fmtQtd(t.quantidade_ativo)} ${_ticker}</div>
            </div>
            <div class="transacao-right">
                <div class="transacao-valor">USD ${fmtUSD(t.valor_total_usd)}</div>
                <div class="transacao-preco-unit">@ ${fmtUSD(precoUnit)}</div>
            </div>
        </div>`;
    }).join('');
}

// ── Consolidado ───────────────────────────────────────────────────
function calcularConsolidado() {
    let qtdAberta = 0;
    let custoAberto = 0;
    let pm = 0;
    let lucroRealizado = 0;
    let custoRealizado = 0;

    const sorted = [..._transacoes].sort((a,b) => new Date(a.data) - new Date(b.data));

    sorted.forEach(t => {
        const qtd = parseFloat(t.quantidade_ativo) || 0;
        const valor = parseFloat(t.valor_total_usd) || 0;

        if (t.tipo_operacao === 'C') {
            const novoCusto = custoAberto + valor;
            const novaQtd = qtdAberta + qtd;
            pm = novaQtd > 0 ? novoCusto / novaQtd : 0;
            qtdAberta = novaQtd;
            custoAberto = novoCusto;
        } else {
            const custoVendido = qtd * pm;
            custoRealizado += custoVendido;
            lucroRealizado += valor - custoVendido;
            qtdAberta -= qtd;
            custoAberto = qtdAberta * pm;
        }
    });

    const valorMercado = qtdAberta * _precoAtual;
    const lucroNaoRealizado = valorMercado - custoAberto;

    return { qtdAberta, pm, custoAberto, valorMercado, lucroRealizado, lucroNaoRealizado, custoRealizado };
}

function abrirConsolidado() {
    const c = calcularConsolidado();
    const grid = document.getElementById('sheet-grid');
    document.getElementById('sheet-titulo').textContent = `Consolidado · ${_ticker}`;

            const items = [
        { label: 'Qtd. Aberta', value: fmtQtd(c.qtdAberta), cls: '' },
        { label: 'Preço Médio', value: 'USD ' + fmtUSD(c.pm), cls: 'pm' },
        { label: 'Custo Aberto', value: 'USD ' + fmtUSD(c.custoAberto), cls: '' },
        { label: 'Valor de Mercado', value: 'USD ' + fmtUSD(c.valorMercado), cls: '' },
        { label: 'Custo Realizado', value: 'USD ' + fmtUSD(c.custoRealizado), cls: '' },
        { label: 'Lucro Realizado', value: 'USD ' + fmtUSD(c.lucroRealizado), cls: c.lucroRealizado > 0 ? 'pos' : c.lucroRealizado < 0 ? 'neg' : 'zero' },
        { label: 'L/P Não Realizado', value: 'USD ' + fmtUSD(c.lucroNaoRealizado), cls: c.lucroNaoRealizado > 0 ? 'pos' : c.lucroNaoRealizado < 0 ? 'neg' : 'zero' },
    ];


        grid.innerHTML = items.map(i => `
        <div class="detalhe-row">
            <span class="detalhe-label">${i.label}</span>
            <span class="detalhe-value sheet-item-value ${i.cls}">${i.value}</span>
        </div>`).join('');



    document.getElementById('sheet-consolidado').classList.add('active');
}

function fecharSheet() { document.getElementById('sheet-consolidado').classList.remove('active'); }
function fecharSheetFora(e) { if (e.target === document.getElementById('sheet-consolidado')) fecharSheet(); }


// ── Modal nova ────────────────────────────────────────────────────
function setTipoNova(tipo) {
    _tipoNova = tipo;
    document.getElementById('seg-c').classList.toggle('selected', tipo === 'C');
    document.getElementById('seg-v').classList.toggle('selected', tipo === 'V');
    document.getElementById('seg-track-nova').classList.toggle('venda', tipo === 'V');
    // Atualiza contexto do slider
    const c = calcularConsolidado();
    if (tipo === 'C') {
        document.getElementById('slider-label').textContent = '% do Saldo Disponível';
        document.getElementById('slider-ref-max').textContent = `Saldo: USD ${fmtUSD(_saldoCorretora)}`;
    } else {
        document.getElementById('slider-label').textContent = '% da Qtd. em Aberto';
        document.getElementById('slider-ref-max').textContent = `Aberto: ${fmtQtd(c.qtdAberta)}`;
    }
    document.getElementById('nova-slider').value = 0;
    document.getElementById('slider-pct-val').textContent = '0%';
    document.getElementById('nova-qtd').value = '';
    document.getElementById('nova-valor').value = '';
}

function onSlider(pct) {
    document.getElementById('slider-pct-val').textContent = pct + '%';
    const cotacao = _precoAtual;
    if (_tipoNova === 'C') {
        const valorUSD = (_saldoCorretora * pct / 100);
        const qtd = cotacao > 0 ? valorUSD / cotacao : 0;
        document.getElementById('nova-valor').value = valorUSD.toFixed(8);


        document.getElementById('nova-qtd').value = qtd.toFixed(8).replace('.',',');
    } else {
        const c = calcularConsolidado();
        const qtd = c.qtdAberta * pct / 100;
        const valorUSD = qtd * cotacao;
        document.getElementById('nova-qtd').value = qtd.toFixed(8).replace('.',',');
        document.getElementById('nova-valor').value = fmtUSD(valorUSD);

    }
}

function abrirModalNova() {
    document.getElementById('nova-qtd').value = '';
    document.getElementById('nova-valor').value = '';
    document.getElementById('nova-taxa').value = '';
    document.getElementById('nova-slider').value = 0;
    document.getElementById('slider-pct-val').textContent = '0%';
    document.getElementById('nova-cotacao').textContent = fmtUSD(_precoAtual) + ' USD';
    setTipoNova('C');
    document.getElementById('modal-nova').classList.add('active');
}

async function salvarNova() {
    const quantidade_ativo = parseVal(document.getElementById('nova-qtd').value);
    const valor_total_usd  = parseVal(document.getElementById('nova-valor').value);
    const taxa_operacao    = parseVal(document.getElementById('nova-taxa').value);
    const data             = document.getElementById('nova-data').value;
    if (!quantidade_ativo || !valor_total_usd || !data) return;

    document.getElementById('btn-salvar-nova').disabled = true;
    const { data: d, error } = await db.from('transacoes').insert({
        ativo_id: _ativoId,
        tipo_operacao: _tipoNova,
        data: data + 'T12:00:00-04:00',
        quantidade_ativo,
        valor_total_usd,
        taxa_operacao
    }).select().single();

    document.getElementById('btn-salvar-nova').disabled = false;
    if (!error && d) {
        _transacoes.push(d);
        _transacoes.sort((a,b) => new Date(a.data) - new Date(b.data));
        document.getElementById('topbar-sub').textContent = `${_transacoes.length} operações`;
        fecharModal('modal-nova');
        renderizar();
    }
}

// ── Modal detalhe ─────────────────────────────────────────────────
function abrirDetalhe(id) {
    const t = _transacoes.find(x => x.id === id);
    if (!t) return;
    const comp = t.tipo_operacao === 'C';
    const data = t.data ? new Date(t.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
    const precoUnit = parseFloat(t.quantidade_ativo) > 0 ? parseFloat(t.valor_total_usd)/parseFloat(t.quantidade_ativo) : 0;

    document.getElementById('detalhe-titulo').textContent = comp ? 'Compra' : 'Venda';
    document.getElementById('detalhe-corpo').innerHTML = [
        { label: 'Data', value: data },
        { label: 'Ativo', value: _ticker },
        { label: 'Quantidade', value: fmtQtd(t.quantidade_ativo) },
        { label: 'Valor Total', value: 'USD ' + fmtUSD(t.valor_total_usd) },
        { label: 'Preço Unitário', value: 'USD ' + fmtUSD(precoUnit) },
        { label: 'Taxa', value: fmtQtd(t.taxa_operacao) },
    ].map(r => `
        <div class="detalhe-row">
            <span class="detalhe-label">${r.label}</span>
            <span class="detalhe-value">${r.value}</span>
        </div>`).join('');

    document.getElementById('modal-detalhe').classList.add('active');
}

function fecharModal(id) { document.getElementById(id).classList.remove('active'); }
function fecharModalFora(e, id) { if (e.target === document.getElementById(id)) fecharModal(id); }

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();
init();
</script>
</body>
</html>
