<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Auditoria</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F2F4F8;padding:12px;}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.topbar h1{font-size:14px;font-weight:800;color:#1C1C1E;}
select{flex:1;padding:10px 12px;border-radius:100px;border:none;background:#FFF;font-size:13px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;color:#1C1C1E;box-shadow:0 2px 8px rgba(0,0,0,0.08);outline:none;-webkit-appearance:none;appearance:none;}
h2{font-size:10px;font-weight:800;color:#6B7280;text-transform:uppercase;letter-spacing:0.8px;margin:12px 0 6px;}
table{width:100%;border-collapse:collapse;background:#FFF;border-radius:10px;overflow:hidden;margin-bottom:6px;}
th{padding:5px 4px;background:#F9FAFB;font-size:8px;font-weight:700;color:#6B7280;text-transform:uppercase;text-align:right;}
th:first-child{text-align:left;}
td{padding:5px 4px;font-size:9px;font-weight:600;color:#111827;text-align:right;border-top:1px solid #F3F4F6;}
td:first-child{text-align:left;}
.pos{color:#16A34A}.neg{color:#DC2626}
tfoot td{font-weight:800;font-size:10px;background:#F9FAFB;}
.resumo{background:#1C1C1E;color:#FFF;border-radius:10px;padding:10px 12px;margin-top:10px;}
.resumo-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;}
.resumo-label{color:rgba(255,255,255,0.6);}
.resumo-value{font-weight:800;}
.empty{text-align:center;padding:30px;color:#9CA3AF;font-size:12px;}
</style>
</head>
<body>

<div class="topbar">
  <button onclick="window.location.href='consolidado.html'" style="width:36px;height:36px;border-radius:50%;border:none;background:#FFF;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">
    <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <h1>🔍 Auditoria</h1>
  <select id="select-ativo" onchange="renderAtivo()">
    <option value="">Selecione o ativo...</option>
  </select>
</div>

<div id="content"><div class="empty">Selecione um ativo acima</div></div>

<script>
const db = window.db;
const fmt = v => parseFloat(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtQ = v => parseFloat(v||0).toFixed(4);
const sign = v => v > 0 ? '+' : '';

let _todasTxs = {};

async function init() {
    const { data: txs } = await db.from('transacoes')
        .select('*, ativos(ticker)')
        .order('data');

    if (!txs || !txs.length) { document.getElementById('content').innerHTML = '<div class="empty">Sem dados.</div>'; return; }

    txs.forEach(t => {
        const ticker = t.ativos?.ticker || '?';
        if (!_todasTxs[ticker]) _todasTxs[ticker] = [];
        _todasTxs[ticker].push(t);
    });

    const sel = document.getElementById('select-ativo');
    Object.keys(_todasTxs).sort().forEach(ticker => {
        const opt = document.createElement('option');
        opt.value = ticker;
        opt.textContent = ticker;
        sel.appendChild(opt);
    });
}

function renderAtivo() {
    const ticker = document.getElementById('select-ativo').value;
    if (!ticker) { document.getElementById('content').innerHTML = '<div class="empty">Selecione um ativo acima</div>'; return; }

    const txs = [..._todasTxs[ticker]].sort((a,b) => new Date(a.data)-new Date(b.data));

    let pm = 0, qtdAberta = 0, custoAberto = 0;
    let pmS = 0, qtdShort = 0;
    const longs = [], shorts = [];

    txs.forEach(t => {
        const qtd = parseFloat(t.quantidade_ativo)||0;
        const val = parseFloat(t.valor_total_usd)||0;
        const dt = new Date(t.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});

        if (t.tipo_operacao==='LA') {
            pm = (qtdAberta+qtd)>0 ? (custoAberto+val)/(qtdAberta+qtd) : 0;
            qtdAberta+=qtd; custoAberto+=val;
            longs.push({dt,tipo:'LA',qtd,val,pm,custo:null,lucro:null});
        } else if (t.tipo_operacao==='LF') {
            const custo=qtd*pm, lucro=val-custo;
            longs.push({dt,tipo:'LF',qtd,val,pm,custo,lucro});
            qtdAberta-=qtd; custoAberto=qtdAberta*pm;
        } else if (t.tipo_operacao==='SA') {
            pmS = (qtdShort+qtd)>0 ? (qtdShort*pmS+val)/(qtdShort+qtd) : 0;
            qtdShort+=qtd;
            shorts.push({dt,tipo:'SA',qtd,val,pm:pmS,custo:null,lucro:null});
        } else if (t.tipo_operacao==='SF') {
            const custo=qtd*pmS, lucro=custo-val;
            shorts.push({dt,tipo:'SF',qtd,val,pm:pmS,custo,lucro});
            qtdShort-=qtd;
        }
    });

    const somaL = longs.filter(r=>r.lucro!==null).reduce((s,r)=>s+r.lucro,0);
    const somaS = shorts.filter(r=>r.lucro!==null).reduce((s,r)=>s+r.lucro,0);

    const tbl = (rows, titulo) => {
        if (!rows.length) return '';
        const soma = rows.filter(r=>r.lucro!==null).reduce((s,r)=>s+r.lucro,0);
        return `<h2>${titulo}</h2>
        <table>
            <thead><tr><th>Dt</th><th>Tp</th><th>Qtd</th><th>Valor</th><th>PM</th><th>Custo</th><th>Lucro</th></tr></thead>
            <tbody>${rows.map(r=>`<tr>
                <td>${r.dt}</td><td>${r.tipo}</td><td>${fmtQ(r.qtd)}</td>
                <td>${fmt(r.val)}</td><td>${fmt(r.pm)}</td>
                <td>${r.custo!==null?fmt(r.custo):'—'}</td>
                <td class="${r.lucro>0?'pos':r.lucro<0?'neg':''}">${r.lucro!==null?sign(r.lucro)+fmt(r.lucro):'—'}</td>
            </tr>`).join('')}</tbody>
            <tfoot><tr><td colspan="6">Total</td><td class="${soma>=0?'pos':'neg'}">${sign(soma)}${fmt(soma)}</td></tr></tfoot>
        </table>`;
    };

    document.getElementById('content').innerHTML =
        tbl(longs,'Long') + tbl(shorts,'Short') +
        `<div class="resumo">
            <div class="resumo-row"><span class="resumo-label">Lucro Long</span><span class="resumo-value ${somaL>=0?'pos':'neg'}">${sign(somaL)}USD ${fmt(somaL)}</span></div>
            <div class="resumo-row"><span class="resumo-label">Lucro Short</span><span class="resumo-value ${somaS>=0?'pos':'neg'}">${sign(somaS)}USD ${fmt(somaS)}</span></div>
            <div class="resumo-row" style="border-top:1px solid rgba(255,255,255,0.15);margin-top:4px;padding-top:4px;">
                <span style="color:#FFF;font-weight:700;font-size:12px;">Total ${ticker}</span>
                <span class="resumo-value ${(somaL+somaS)>=0?'pos':'neg'}" style="font-size:13px;">${sign(somaL+somaS)}USD ${fmt(somaL+somaS)}</span>
            </div>
        </div>`;
}

init();
</script>
</body>
</html>
