<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Plano de Contas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-y:none;}
.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#1C1C1E;}
.ios-btn{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;flex-shrink:0;}

.busca-wrap{padding:0 16px 10px;flex-shrink:0;}
.busca-inner{position:relative;display:flex;align-items:center;background:#FFF;border-radius:14px;padding:4px 10px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.busca-icon{position:absolute;left:14px;width:16px;height:16px;stroke:#8E8E93;stroke-width:2.5;fill:none;}
.busca-input{flex-grow:1;padding:9px 9px 9px 34px;background:transparent;border:none;font-size:15px;outline:none;color:#1C1C1E;font-family:'Inter',sans-serif;}

.lista-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 32px;}

.section-label{font-size:11px;color:#8E8E93;font-weight:500;padding:14px 4px 6px;}

.item-wrap{position:relative;margin-bottom:1px;border-radius:14px;overflow:hidden;}
.item-delete-bg{position:absolute;inset:0;background:#EF4444;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;border-radius:14px;}
.item-delete-bg svg{width:20px;height:20px;stroke:#FFF;stroke-width:2;fill:none;}
.item{background:#FFF;border-radius:14px;display:flex;align-items:center;padding:13px 16px;gap:12px;position:relative;z-index:1;transition:transform 0.2s ease;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.item:active{background:#F9F9F9;}
.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.item-dot.entrada{background:#10B981;}
.item-dot.saida{background:#EF4444;}
.item-info{flex:1;min-width:0;}
.item-nome{font-size:14px;color:#1C1C1E;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-grupo{font-size:11px;color:#8E8E93;margin-top:2px;}
.item-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;flex-shrink:0;}
.item-badge.despesa{background:#FEE2E2;color:#EF4444;}
.item-chevron{width:14px;height:14px;stroke:#C7C7CC;stroke-width:2;fill:none;flex-shrink:0;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:999;display:none;align-items:center;justify-content:center;}
.overlay.active{display:flex;}
.modal{background:#FFF;border-radius:20px;padding:20px 20px 24px;width:calc(100% - 48px);max-width:360px;box-shadow:0 32px 64px rgba(0,0,0,0.22),0 8px 24px rgba(0,0,0,0.10);animation:floatIn 0.2s cubic-bezier(0.4,0,0.2,1);}
@keyframes floatIn{from{opacity:0;transform:scale(0.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:15px;font-weight:600;color:#1C1C1E;}
.modal-close{width:26px;height:26px;border-radius:50%;border:none;background:#F2F2F7;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.modal-close svg{width:12px;height:12px;stroke:#1C1C1E;stroke-width:2.5;fill:none;}

.field{margin-bottom:14px;}
.field input, .field select{width:100%;padding:12px 14px;background:#F8F8FA;border:1.5px solid #F0F0F0;border-radius:12px;font-size:14px;font-family:'Inter',sans-serif;color:#1C1C1E;outline:none;-webkit-appearance:none;appearance:none;}
.field input:focus, .field select:focus{border-color:#007AFF;background:#FFF;}
.field input::placeholder{color:#C7C7CC;}

.tipo-row{display:flex;gap:8px;margin-bottom:14px;}
.tipo-opt{flex:1;padding:10px;border-radius:12px;border:1.5px solid #F0F0F0;background:#F8F8FA;font-size:13px;font-weight:500;color:#8E8E93;cursor:pointer;text-align:center;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.tipo-opt.active.entrada{background:#D1FAE5;border-color:#10B981;color:#059669;}
.tipo-opt.active.saida{background:#FEE2E2;border-color:#EF4444;color:#DC2626;}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#F8F8FA;border-radius:12px;margin-bottom:14px;}
.toggle-label{font-size:13px;color:#1C1C1E;}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:#E2E8F0;border-radius:34px;transition:0.3s;cursor:pointer;}
.toggle-thumb{position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#FFF;border-radius:50%;transition:0.3s;pointer-events:none;}


.modal-btns{display:flex;gap:10px;margin-top:4px;}
.btn{flex:1;padding:13px;border:none;border-radius:100px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn:active{opacity:0.8;}
.btn-cancel{background:#F2F2F7;color:#1C1C1E;}
.btn-save{background:#007AFF;color:#FFF;}
.btn-delete{width:100%;margin-top:10px;padding:12px;border:none;border-radius:100px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:#EF4444;background:#FEE2E2;cursor:pointer;}

.empty{text-align:center;padding:48px 20px;color:#C7C7CC;font-size:13px;}
.loading{text-align:center;padding:40px;color:#C7C7CC;font-size:13px;}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Plano de Contas</div>
  </div>
  <button class="ios-btn" onclick="abrirNova()">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<div class="busca-wrap">
  <div class="busca-inner">
    <svg class="busca-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input class="busca-input" id="busca" type="text" placeholder="Buscar conta..." oninput="renderLista()">
  </div>
</div>

<div class="lista-wrap" id="lista">
  <div class="loading">Carregando...</div>
</div>

<div class="overlay" id="overlay" onclick="fecharModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nova conta</span>
      <button class="modal-close" onclick="fechar()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="field">
      <input type="text" id="f-descricao" placeholder="Nome da conta">
    </div>

    <div class="tipo-row">
      <div class="tipo-opt entrada active" id="opt-entrada" onclick="selectTipo('Receita')">Entrada</div>
      <div class="tipo-opt saida" id="opt-saida" onclick="selectTipo('Despesa')">Saída</div>
    </div>

    <div class="field">
      <select id="f-grupo">
        <option value="">Grupo...</option>
        <option>Pessoal</option>
        <option>Operacional</option>
        <option>Despesas Extras</option>
        <option>Cartao Credito</option>
        <option>Fornecedor</option>
        <option>Entradas Pix</option>
        <option>Entradas Dinheiro</option>
        <option>Aplicacao</option>
      </select>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">É uma despesa?</span>
      <div class="toggle" id="toggle-wrap" onclick="toggleDespesa()">
  <div class="toggle-track" id="toggle-track"></div>
  <div class="toggle-thumb" id="toggle-thumb"></div>
</div>

    </div>

    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="fechar()">Cancelar</button>
      <button class="btn btn-save" onclick="salvar()">Salvar</button>
    </div>
    <button class="btn-delete" id="btn-delete" style="display:none" onclick="excluir()">Excluir conta</button>

    <input type="hidden" id="f-id">
  </div>
</div>

<script>
const SUPA_URL='https://suwaqkxkhhfopjkhsptf.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1d2Fxa3hraGhmb3Bqa2hzcHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDI2MDQsImV4cCI6MjA5MDM3ODYwNH0.HcLs3bkZZ0lATGSQbWtTt7oIxcM8inYmLZHm2K5v39U';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();

let _contas = [];
let _tipoSelecionado = 'Receita';
let _swipeEl = null;

async function carregar() {
  const { data } = await db.from('contas_contabeis').select('*').order('descricao');
  _contas = data || [];
  renderLista();
}

function renderLista() {
  const q = document.getElementById('busca').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const lista = document.getElementById('lista');

  const filtradas = _contas.filter(c =>
    c.descricao.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(q) ||
    (c.grupo || '').toLowerCase().includes(q)
  );

  if (!filtradas.length) {
    lista.innerHTML = '<div class="empty">Nenhuma conta encontrada</div>';
    return;
  }

  const entradas = filtradas.filter(c => c.tipo === 'Receita');
  const saidas = filtradas.filter(c => c.tipo === 'Despesa');

  let html = '';
  if (entradas.length) {
    html += `<div class="section-label">Entradas</div>`;
    entradas.forEach(c => html += itemHTML(c));
  }
  if (saidas.length) {
    html += `<div class="section-label">Saídas</div>`;
    saidas.forEach(c => html += itemHTML(c));
  }

  lista.innerHTML = html;
  bindSwipe();
}

function itemHTML(c) {
  const tipo = c.tipo === 'Receita' ? 'entrada' : 'saida';
  return `<div class="item-wrap" id="wrap-${c.id}">
    <div class="item-delete-bg">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
    </div>
    <div class="item" id="item-${c.id}" onclick="abrirEditar(${JSON.stringify(c).replace(/"/g,'&quot;')})">
      <div class="item-dot ${tipo}"></div>
      <div class="item-info">
        <div class="item-nome">${c.descricao}</div>
        <div class="item-grupo">${c.grupo || '—'}</div>
      </div>
      ${c.is_despesa ? '<span class="item-badge despesa">despesa</span>' : ''}
      <svg class="item-chevron" viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
    </div>
  </div>`;
}

function bindSwipe() {
  document.querySelectorAll('.item').forEach(el => {
    let startX = 0;
    let currentX = 0;
    const id = el.id.replace('item-', '');

    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      el.style.transition = 'none';
      if (_swipeEl && _swipeEl !== el) resetSwipe(_swipeEl);
    }, {passive:true});

    el.addEventListener('touchmove', e => {
      const diff = e.touches[0].clientX - startX;
      if (diff < 0) {
        currentX = Math.max(diff, -80);
        el.style.transform = `translateX(${currentX}px)`;
      }
    }, {passive:true});

    el.addEventListener('touchend', () => {
      el.style.transition = 'transform 0.2s ease';
      if (currentX < -40) {
        el.style.transform = 'translateX(-80px)';
        _swipeEl = el;
        el.onclick = null;
        setTimeout(() => {
          el.onclick = () => abrirEditar(JSON.parse(el.getAttribute('data-conta')));
        }, 300);
        // toque no bg apaga
        const wrap = document.getElementById(`wrap-${id}`);
        wrap.querySelector('.item-delete-bg').onclick = () => confirmarExcluir(id);
      } else {
        resetSwipe(el);
      }
      currentX = 0;
    });
  });
}

function resetSwipe(el) {
  el.style.transition = 'transform 0.2s ease';
  el.style.transform = 'translateX(0)';
}

function confirmarExcluir(id) {
  if (!confirm('Excluir esta conta?')) return;
  excluirPorId(id);
}

async function excluirPorId(id) {
  await db.from('contas_contabeis').delete().eq('id', id);
  _contas = _contas.filter(c => c.id !== id);
  renderLista();
}

function selectTipo(tipo) {
  _tipoSelecionado = tipo;
  document.getElementById('opt-entrada').className = 'tipo-opt entrada' + (tipo === 'Receita' ? ' active' : '');
  document.getElementById('opt-saida').className = 'tipo-opt saida' + (tipo === 'Despesa' ? ' active' : '');
}

let _isDespesa = false;

function toggleDespesa() {
  _isDespesa = !_isDespesa;
  document.getElementById('toggle-track').style.background = _isDespesa ? '#007AFF' : '#E2E8F0';
  document.getElementById('toggle-thumb').style.left = _isDespesa ? '23px' : '3px';
}

function setToggle(val) {
  _isDespesa = val;
  document.getElementById('toggle-track').style.background = val ? '#007AFF' : '#E2E8F0';
  document.getElementById('toggle-thumb').style.left = val ? '23px' : '3px';
}


function setToggle(val) {
  const cb = document.getElementById('f-is-despesa');
  cb.checked = val;
  document.getElementById('toggle-thumb').style.left = val ? '23px' : '3px';
    const track = document.getElementById('toggle-track');
  track.style.background = val ? '#007AFF' : '#E2E8F0';
  track.onclick = () => {
    cb.checked = !cb.checked;
    document.getElementById('toggle-thumb').style.left = cb.checked ? '23px' : '3px';
    track.style.background = cb.checked ? '#007AFF' : '#E2E8F0';
  };

}

function abrirNova() {
  document.getElementById('modal-title').textContent = 'Nova conta';
  document.getElementById('f-id').value = '';
  document.getElementById('f-descricao').value = '';
  document.getElementById('f-grupo').value = '';
  document.getElementById('btn-delete').style.display = 'none';
  selectTipo('Receita');
  setToggle(false);
  document.getElementById('overlay').classList.add('active');
}

function abrirEditar(c) {
  if (typeof c === 'string') c = JSON.parse(c);
  document.getElementById('modal-title').textContent = 'Editar conta';
  document.getElementById('f-id').value = c.id;
  document.getElementById('f-descricao').value = c.descricao;
  document.getElementById('f-grupo').value = c.grupo || '';
  document.getElementById('btn-delete').style.display = 'block';
  selectTipo(c.tipo);
  setToggle(c.is_despesa === true);
  document.getElementById('overlay').classList.add('active');
}

function fechar() {
  document.getElementById('overlay').classList.remove('active');
}

function fecharModal(e) {
  if (e.target === document.getElementById('overlay')) fechar();
}

async function salvar() {
  const descricao = document.getElementById('f-descricao').value.trim();
  const grupo = document.getElementById('f-grupo').value;
  const id = document.getElementById('f-id').value;
  const is_despesa = _isDespesa;


  if (!descricao) { alert('Informe o nome da conta'); return; }
  if (!grupo) { alert('Selecione o grupo'); return; }

  const payload = { descricao, tipo: _tipoSelecionado, grupo, is_despesa };

  if (id) {
    await db.from('contas_contabeis').update(payload).eq('id', id);
  } else {
    await db.from('contas_contabeis').insert(payload);
  }

  fechar();
  carregar();
}

async function excluir() {
  const id = document.getElementById('f-id').value;
  if (!confirm('Excluir esta conta?')) return;
  await db.from('contas_contabeis').delete().eq('id', id);
  fechar();
  carregar();
}

carregar();
</script>
</body>
</html>
