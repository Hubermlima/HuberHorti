<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Corretoras</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#F2F4F8;
    color:#1C1C1E;
    height:100vh;
    height:calc(var(--vh,1vh)*100);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}
.topbar{
    height:64px;
    padding:0 18px;
    padding-top:env(safe-area-inset-top);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1}
.breadcrumb .active{color:#1C1C1E;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px}
.ios-btn-float{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;flex-shrink:0;}
.ios-btn-float:active{opacity:0.7}

.lista-wrap{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:12px 16px calc(24px + env(safe-area-inset-bottom));
}

/* Cards da lista */
.section-card{
    background:#FFF;
    border-radius:20px;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
    overflow:hidden;
    margin-bottom:12px;
}
.corretora-item{
    display:flex;
    align-items:center;
    padding:16px 18px;
    gap:14px;
    cursor:pointer;
    transition:background 0.15s;
    position:relative;
    overflow:hidden;
}
.corretora-item:not(:last-child){border-bottom:0.5px solid #F2F2F7}
.corretora-item:active{background:#F5F5F7}
.corretora-icon{
    width:42px;height:42px;border-radius:12px;
    background:#EBF4FF;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;
    font-size:14px;font-weight:800;color:#007AFF;
}
.corretora-info{flex:1;min-width:0}
.corretora-nome{font-size:15px;font-weight:600;color:#1C1C1E}
.corretora-moeda{font-size:12px;color:#8E8E93;font-weight:500;margin-top:2px}
.corretora-chevron{
    width:16px;height:16px;stroke:#C7C7CC;stroke-width:2.5;fill:none;flex-shrink:0;
}

.empty-state{
    text-align:center;padding:60px 20px;
    font-size:13px;color:#8E8E93;font-weight:500;
}
.empty-icon{font-size:40px;margin-bottom:12px}

/* Swipe */
.swipe-wrap{position:relative;overflow:hidden;border-radius:0}
.swipe-wrap:not(:last-child) .corretora-item{border-bottom:0.5px solid #F2F2F7}
.swipe-del{
    position:absolute;right:0;top:0;bottom:0;
    width:80px;background:#FF3B30;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
}
.swipe-del span{color:#FFF;font-size:12px;font-weight:700}

/* Modal */
.modal-overlay{
    display:none;position:fixed;inset:0;
    z-index:2000;align-items:center;justify-content:center;padding:24px;
}
.modal-overlay.active{display:flex}
.modal-sheet{
    background:#FFF;border-radius:24px;
    padding:28px 22px 24px;width:100%;max-width:360px;
    box-shadow:0 24px 60px rgba(0,0,0,0.18),0 4px 16px rgba(0,0,0,0.10);
    animation:modalPop 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalPop{
    from{opacity:0;transform:scale(0.85)}
    to{opacity:1;transform:scale(1)}
}
.modal-title{font-size:16px;font-weight:700;color:#1C1C1E;margin-bottom:20px;text-align:center}
.modal-field{margin-bottom:14px}
.modal-label{font-size:11px;font-weight:600;color:#8E8E93;margin-bottom:6px;display:block}
.modal-input{
    width:100%;padding:13px 16px;
    border:1.5px solid #E5E5EA;border-radius:14px;
    font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;
    color:#1C1C1E;background:#FFF;outline:none;box-sizing:border-box;
}
.modal-input:focus{border-color:#007AFF}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-btn-cancelar{
    flex:1;padding:14px;background:#F2F2F7;color:#1C1C1E;
    border:none;border-radius:100px;font-size:15px;font-weight:600;
    font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;
}
.modal-btn-salvar{
    flex:1;padding:14px;background:#007AFF;color:#FFF;
    border:none;border-radius:100px;font-size:15px;font-weight:700;
    font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;
}
.modal-btn-salvar:disabled{opacity:0.4;pointer-events:none}
</style>
</head>
<body>

<div class="topbar">
    <button class="ios-btn-float" onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
    </button>
    <div class="topbar-copy">
        <div class="breadcrumb"><span class="active">Corretoras</span></div>
    </div>
    <button class="ios-btn-float" onclick="abrirModal()">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M12 5v14M5 12h14"/></svg>
    </button>
</div>

<div class="lista-wrap" id="lista-wrap">
    <div class="empty-state" id="empty-state">
        <div class="empty-icon">🏦</div>
        Nenhuma corretora cadastrada
    </div>
    <div class="section-card" id="section-card" style="display:none"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal-sheet">
        <div class="modal-title" id="modal-title">Nova Corretora</div>
        <div class="modal-field">
            <label class="modal-label">Nome</label>
            <input id="campo-nome" class="modal-input" type="text" placeholder="Ex: Bitget, Inter" autocomplete="off">
        </div>
        <div class="modal-field">
            <label class="modal-label">Moeda Base</label>
            <input id="campo-moeda" class="modal-input" type="text" placeholder="Ex: USDT, USD, BRL" autocomplete="off" style="text-transform:uppercase">
        </div>
        <div class="modal-actions">
            <button class="modal-btn-cancelar" onclick="fecharModal()">Cancelar</button>
            <button class="modal-btn-salvar" id="btn-salvar" onclick="salvar()">Salvar</button>
        </div>
    </div>
</div>

<script>
let _corretoras = [];
let _editandoId = null;

const db = window.supabase;

async function init() {
    const { data, error } = await db.from('corretoras').select('*').order('nome');
    if (error) { console.error(error); return; }
    _corretoras = data || [];
    renderizar();
}

function renderizar() {
    const card = document.getElementById('section-card');
    const empty = document.getElementById('empty-state');

    if (_corretoras.length === 0) {
        card.style.display = 'none';
        empty.style.display = 'block';
        return;
    }

    empty.style.display = 'none';
    card.style.display = 'block';
    card.innerHTML = _corretoras.map(c => `
        <div class="swipe-wrap" id="swipe-${c.id}">
            <div class="swipe-del" onclick="excluir('${c.id}')"><span>Excluir</span></div>
            <div class="corretora-item" id="item-${c.id}" onclick="abrirModal('${c.id}')">
                <div class="corretora-icon">${c.nome.substring(0,2).toUpperCase()}</div>
                <div class="corretora-info">
                    <div class="corretora-nome">${c.nome}</div>
                    <div class="corretora-moeda">${c.moeda_base}</div>
                </div>
                <svg class="corretora-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
            </div>
        </div>
    `).join('');

    // Swipe
    _corretoras.forEach(c => aplicarSwipe(c.id));
}

function aplicarSwipe(id) {
    const wrap = document.getElementById(`swipe-${id}`);
    const item = document.getElementById(`item-${id}`);
    if (!wrap || !item) return;
    let startX = 0, currentX = 0, dragging = false;
    const THRESHOLD = 60;

    item.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        dragging = true;
        item.style.transition = 'none';
    }, {passive:true});

    item.addEventListener('touchmove', e => {
        if (!dragging) return;
        const diff = e.touches[0].clientX - startX;
        if (diff < 0) {
            currentX = Math.max(diff, -80);
            item.style.transform = `translateX(${currentX}px)`;
        }
    }, {passive:true});

    item.addEventListener('touchend', () => {
        dragging = false;
        item.style.transition = 'transform 0.3s ease';
        if (currentX < -THRESHOLD) {
            item.style.transform = 'translateX(-80px)';
        } else {
            item.style.transform = 'translateX(0)';
        }
        currentX = 0;
    });
}

function abrirModal(id = null) {
    _editandoId = id;
    const c = id ? _corretoras.find(x => x.id === id) : null;
    document.getElementById('modal-title').textContent = id ? 'Editar Corretora' : 'Nova Corretora';
    document.getElementById('campo-nome').value = c?.nome || '';
    document.getElementById('campo-moeda').value = c?.moeda_base || '';
    document.getElementById('modal').classList.add('active');
    setTimeout(() => document.getElementById('campo-nome').focus(), 200);
}

function fecharModal() {
    document.getElementById('modal').classList.remove('active');
    _editandoId = null;
}

async function salvar() {
    const nome = document.getElementById('campo-nome').value.trim();
    const moeda_base = document.getElementById('campo-moeda').value.trim().toUpperCase();
    if (!nome || !moeda_base) return;

    document.getElementById('btn-salvar').disabled = true;

    if (_editandoId) {
        const { error } = await db.from('corretoras').update({ nome, moeda_base }).eq('id', _editandoId);
        if (!error) {
            const idx = _corretoras.findIndex(x => x.id === _editandoId);
            if (idx !== -1) _corretoras[idx] = { ..._corretoras[idx], nome, moeda_base };
        }
    } else {
        const { data, error } = await db.from('corretoras').insert({ nome, moeda_base }).select().single();
        if (!error && data) _corretoras.push(data);
    }

    document.getElementById('btn-salvar').disabled = false;
    fecharModal();
    renderizar();
}

async function excluir(id) {
    if (!confirm('Excluir esta corretora?')) return;
    const { error } = await db.from('corretoras').delete().eq('id', id);
    if (!error) {
        _corretoras = _corretoras.filter(x => x.id !== id);
        renderizar();
    }
}

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();

init();
</script>
</body>
</html>
