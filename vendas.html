<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HuberHorti - Vendas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:'Inter',sans-serif;background:#F7F8FA;color:#1A1D23;min-height:100vh}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:48px;background:#fff;border-bottom:1px solid #ECEEF2;z-index:100;display:flex;align-items:center;padding:0 16px;gap:10px}
.menu-btn{width:32px;height:32px;border:none;background:none;cursor:default;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0}
.menu-btn span{display:block;width:18px;height:2px;background:#6B7280;border-radius:2px}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:12px;color:#9CA3AF;flex:1}
.breadcrumb svg{width:14px;height:14px;stroke:#9CA3AF;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.breadcrumb-sep{font-size:11px;color:#D1D5DB}
.breadcrumb .active{color:#1A1D23;font-weight:600}

/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;display:none}
.sidebar-overlay.open{display:block}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;background:#fff;z-index:201;transform:translateX(-100%);transition:transform .25s;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,.08)}
.sidebar.open{transform:translateX(0)}
.sidebar-head{padding:16px;border-bottom:1px solid #ECEEF2;display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-size:14px;font-weight:700;color:#1A1D23}
.sidebar-cls{width:28px;height:28px;border:none;background:#F7F8FA;border-radius:7px;cursor:pointer;font-size:16px;color:#6B7280}
.sidebar-body{flex:1;overflow-y:auto;padding:12px 8px}
.sidebar-section{margin-bottom:4px}
.sidebar-label{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.8px;padding:8px 10px 4px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:#1A1D23;-webkit-tap-highlight-color:transparent}
.sidebar-item:active{background:#F7F8FA}
.sidebar-item svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.sidebar-item.primary{color:#2563EB}
.sidebar-item.danger{color:#EF4444}
.sidebar-item.green{color:#16A34A}
.sidebar-item.purple{color:#7C3AED}
.sidebar-sep{height:1px;background:#ECEEF2;margin:8px 10px}

/* CLIENTE */
.main{margin-top:48px;padding:16px 16px 100px}
.cli-label{font-size:11px;font-weight:600;color:#2563EB;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
#cli-busca{position:relative;z-index:360}
.cli-wrap{position:relative;overflow:visible}
.cli-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:#9CA3AF;fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
.cli-input{width:100%;padding:10px 12px 10px 34px;background:#fff;border:1px solid #ECEEF2;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;color:#1A1D23;outline:none;-webkit-appearance:none;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cli-input:focus{border-color:#2563EB}
.cli-input::placeholder{color:#D1D5DB}
.cli-lista{position:absolute;top:calc(100% + 6px);left:0;right:0;width:100%;background:#fff;border:1px solid #ECEEF2;border-radius:14px;display:none;max-height:240px;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,.10);z-index:380}
.cli-lista.open{display:block}
.ac-item{padding:12px 14px;cursor:pointer;font-size:13px;color:#1A1D23;border-bottom:1px solid #F7F8FA;background:#fff}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:#F7F8FA}
.ac-cod{font-size:11px;color:#9CA3AF;margin-top:2px}
.cli-selected{display:flex;align-items:center;gap:10px;padding:10px 0}
.cli-av{display:none}
.cli-info{flex:1;min-width:0}
.cli-nome-el{font-size:14px;font-weight:600;color:#1A1D23}
.cli-meta-el{font-size:11px;color:#9CA3AF;margin-top:1px}
.btn-dots,.btn-more-actions{display:flex;align-items:center;justify-content:center;width:34px;height:34px;background:#F2F2F7;border:none;border-radius:999px;cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0;color:#1A1D23}
.btn-dots svg,.btn-more-actions svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.dots-menu,.more-menu{position:absolute;right:0;top:calc(100% + 8px);background:rgba(255,255,255,.96);border:none;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.08);min-width:240px;z-index:250;display:none;overflow:hidden}
.dots-menu.open,.more-menu.open{display:block}
.dots-header,.more-header{font-size:15px;font-weight:600;color:#1A1D23;text-transform:none;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.btn-buscar-hist{font-size:11px;font-weight:600;color:#2563EB;background:#EFF6FF;border:none;border-radius:6px;padding:3px 8px;cursor:pointer;font-family:'Inter',sans-serif}
.dots-lista{min-height:32px}
.dots-item,.more-item{padding:14px 16px;font-size:15px;font-weight:400;color:#1A1D23;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:10px;border-bottom:1px solid #F2F2F7}
.dots-item:last-child,.more-item:last-child{border-bottom:none}
.dots-item:active,.more-item:active{background:#F7F8FA}
.dots-item.selected{background:#EFF6FF;color:#2563EB}
.dots-item svg,.more-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.more-item.green,.more-item.purple{color:#1A1D23}
.dots-acoes{display:none;padding:8px 10px;border-top:1px solid #F1F5F9;gap:6px}
.dots-acoes.show{display:flex}
.btn-carregar{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none;background:#2563EB;color:#fff}
.btn-cancelar-dots{padding:8px 10px;border-radius:8px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:1px solid #ECEEF2;background:#F7F8FA;color:#6B7280}

/* TABELA */
.nota-num{font-size:11px;color:#9CA3AF}
.busca-wrap{position:relative;margin-bottom:12px}
.busca-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:#9CA3AF;fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
.busca-input{width:100%;padding:9px 12px 9px 32px;background:#fff;border:1px solid #ECEEF2;border-radius:9px;font-size:13px;font-family:'Inter',sans-serif;color:#1A1D23;outline:none;-webkit-appearance:none}
.busca-input::placeholder{color:#D1D5DB}
#prod-ac{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #ECEEF2;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.06);z-index:200;max-height:200px;overflow-y:auto;display:none}
#prod-ac.open{display:block}
.tabela-wrap{overflow-x:auto;overflow-y:auto;max-height:400px;-webkit-overflow-scrolling:touch;margin-bottom:12px}
.tabela{min-width:500px;width:100%}
.t-head{display:grid;grid-template-columns:24px 1fr 52px 58px 58px 58px 58px 46px;padding:0 4px 8px;border-bottom:1px solid #ECEEF2}
.t-th{font-size:10px;font-weight:500;color:#6B7280;text-transform:uppercase;letter-spacing:.4px;text-align:center}
.t-th:nth-child(2){text-align:left}
.t-row{display:grid;grid-template-columns:24px 1fr 52px 58px 58px 58px 58px 46px;padding:9px 4px;border-bottom:1px solid #F7F8FA;align-items:center}
.t-row:last-child{border-bottom:none}
.t-cd{font-size:10px;color:#D1D5DB;font-weight:500;text-align:center}
.t-nome{font-size:12px;font-weight:500;color:#1A1D23;line-height:1.3}
.t-unid{font-size:10px;color:#9CA3AF}
.t-input{width:46px;padding:4px;border:1px solid #ECEEF2;border-radius:6px;font-size:12px;font-family:'Inter',sans-serif;font-weight:600;color:#1A1D23;text-align:center;outline:none;background:#F7F8FA}
.t-input:focus{border-color:#2563EB;background:#fff}
.t-input.ok{border-color:#D1FAE5;background:#F0FDF4;color:#16A34A}
.t-input.low{border-color:#FEE2E2;background:#FEF2F2;color:#EF4444}
.t-input.preco{color:#EA580C;width:52px}
.t-cell{font-size:11px;font-weight:600;text-align:center;color:#1A1D23}
.t-cell.red{color:#EF4444}
.t-cell.green{color:#16A34A}
.t-estq{font-size:10px;font-weight:500;text-align:center}
.t-estq.ok{color:#16A34A}
.t-estq.low{color:#EF4444}
.t-estq.zero{color:#D1D5DB}

/* IOS LAYOUT SAFE PATCH */
body{background:linear-gradient(180deg,#F6F7FB 0%,#F2F4F8 100%)}
.topbar{height:78px;background:#F2F4F8;backdrop-filter:none;border-bottom:none;padding:14px 18px 6px;gap:14px;box-shadow:none;display:flex;align-items:flex-start}
.back-btn{
  width:44px;height:44px;border:none;border-radius:999px;
  background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;
  box-shadow: 0 14px 30px rgba(15,23,42,.14), 0 4px 10px rgba(15,23,42,.08), inset 0 1px 0 rgba(255,255,255,.95);
}
.back-btn:active{transform:scale(.96);background:linear-gradient(180deg,#F8F8FA 0%,#EAEAEE 100%)}
.back-btn svg{width:22px;height:22px;stroke:#1C1C1E;fill:none;stroke-width:2.75;stroke-linecap:round;stroke-linejoin:round}
.topbar-copy{display:flex;flex-direction:column;justify-content:flex-start;align-items:flex-start;min-width:0;flex:1;padding-top:6px;gap:4px}
.breadcrumb .active{display:block;color:#1C1C1E;font-weight:700;letter-spacing:-.01em;font-size:15px}
.main{margin-top:78px;padding:4px 16px 104px}

.summary-toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;background:rgba(255,255,255,.96);border:none;border-radius:20px;padding:14px 16px;cursor:pointer;font-size:13px;font-weight:700;color:#2563EB;box-shadow:0 10px 30px rgba(0,0,0,.08)}
#r-venda-btn{font-size:18px;font-weight:800;line-height:1.05;color:#2563EB}
.summary-toggle-margin{display:inline-flex;align-items:center;justify-content:center;padding:6px 12px;border-radius:999px;background:#DCFCE7;color:#16A34A;font-size:13px;font-weight:800;line-height:1}

.summary-card{display:none;background:rgba(255,255,255,.96)!important;border-radius:20px!important;padding:16px!important;margin-bottom:14px!important;box-shadow:0 10px 30px rgba(0,0,0,.08);grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:14px!important}
.r-label{display:block;font-size:12px;font-weight:600;color:#8E8E93;margin-bottom:6px}
.r-val{font-size:15px;font-weight:600;color:#1C1C1E}

.cli-input{width:100%;padding:14px 142px 14px 44px;background:rgba(255,255,255,.96);border:none;border-radius:999px;font-size:15px;color:#1C1C1E;outline:none;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.cli-action-btn{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border:none;background:#F2F2F7;border-radius:999px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cli-add{right:46px}.cli-del{right:10px}

.tabela-wrap{background:rgba(255,255,255,.96);border-radius:26px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:14px 0 6px}
.grid-card-title{padding:0 18px 3px;font-size:8px;font-weight:400;color:#8E8E93}

.hidden-col{filter:blur(6px);user-select:none}
.margin-alert-danger{background:#FEF2F2!important;color:#DC2626!important;border:1px solid #FECACA!important}
.margin-alert-ok{background:#ECFDF5!important;color:#16A34A!important;border:1px solid #BBF7D0!important}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#1A1D23;color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:500;z-index:999;opacity:0;transition:all .25s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:#16A34A}
.toast.err{background:#EF4444}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="irDashboard()">
    <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="breadcrumb"><span class="active">Central de Vendas</span></div>
    <div class="autosave-status" id="autosave-status" style="font-size: 11px; color:#9CA3AF;">Status: pronto</div>
  </div>
</div>

<div class="main">
  <div class="top-info-row" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:14px;">
    <div style="background:#fff; border-radius:20px; padding:14px; box-shadow:0 10px 30px rgba(0,0,0,.05); position:relative;">
      <span class="r-label">Data</span>
      <div id="nota-data-display" style="font-size:14px; font-weight:600;">--/--/--</div>
      <input type="datetime-local" id="nota-data" style="position:absolute; inset:0; opacity:0; cursor:pointer;"/>
    </div>
    <button class="summary-toggle" onclick="toggleResumo()">
      <div style="display:flex; flex-direction:column; align-items:flex-start;">
        <span id="r-venda-btn">R$ 0,00</span>
        <span class="summary-toggle-margin" id="r-margem-top">0%</span>
      </div>
      <svg id="resumo-arrow" style="width:12px;" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>

  <div id="resumo-expanded" class="summary-card">
    <div class="r-item"><div class="r-label">Nota</div><div class="r-val" id="nota-num">--</div></div>
    <div class="r-item"><div class="r-label">Itens</div><div class="r-val" id="r-itens">0</div></div>
    <div class="r-item"><div class="r-label">Lucro</div><div class="r-val" id="r-lucro" style="color:#16A34A">R$ 0,00</div></div>
    <div class="r-item"><div class="r-label">Privacidade</div><button onclick="togglePrivado()" style="border:none; background:#F2F2F7; border-radius:8px; padding:4px 8px; font-size:11px;">Ocultar</button></div>
  </div>

  <div id="cli-busca" style="position:relative; margin-bottom:14px;">
    <input class="cli-input" id="cli-input" type="text" placeholder="Buscar cliente..." oninput="buscarCliente()" autocomplete="off"/>
    <div class="cli-lista" id="cli-lista"></div>
    <button class="cli-action-btn cli-add" onclick="novaVenda()"><svg style="width:18px" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" fill="none"/></svg></button>
    <button class="cli-action-btn cli-del" onclick="excluirVenda()"><svg style="width:18px" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6" stroke="currentColor" stroke-width="2" fill="none"/></svg></button>
  </div>

  <div id="cli-sel" style="display:none; margin-bottom:14px; background:#fff; padding:12px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.05)">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div id="cli-nome" style="font-weight:700;">--</div>
        <div id="cli-meta" style="font-size:11px; color:#9CA3AF;">--</div>
      </div>
      <button onclick="resetTelaNovaVenda()" style="border:none; background:#FEE2E2; color:#EF4444; border-radius:99px; width:32px; height:32px;">✕</button>
    </div>
  </div>

  <div class="busca-wrap">
    <input class="busca-input" id="prod-search" type="text" placeholder="Adicionar produto..." oninput="buscarProduto()" autocomplete="off"/>
    <div id="prod-ac"></div>
  </div>

  <div class="tabela-wrap">
    <div class="tabela">
      <div class="grid-card-title">Itens da Venda</div>
      <div class="t-head">
        <div class="t-th">CD</div><div class="t-th">Produto</div><div class="t-th">Qtd</div><div class="t-th">Unit</div><div class="t-th">Total</div><div class="t-th">Lucro</div><div class="t-th">Estq</div>
      </div>
      <div id="itens-lista">
        <div style="text-align:center;padding:40px 0;color:#9CA3AF;font-size:13px">Selecione um cliente</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const db = window.db;
  let clientes = [], produtos = [], clienteSel = null, itens = [], pedidoAtual = null, privado = false;

  async function carregarDados() {
    const { data: cli } = await db.from('clientes').select('*').order('nome');
    clientes = cli || [];
    const { data: prod } = await db.from('produtos').select('*').order('nome');
    produtos = prod || [];
    
    document.getElementById('nota-data').value = new Date().toISOString().slice(0, 16);
    atualizarDataDisplay();
  }

  function atualizarDataDisplay() {
    const d = new Date(document.getElementById('nota-data').value);
    document.getElementById('nota-data-display').textContent = d.toLocaleDateString('pt-BR');
  }

  window.buscarCliente = function() {
    const q = document.getElementById('cli-input').value.toLowerCase();
    const ac = document.getElementById('cli-lista');
    const filtro = clientes.filter(c => c.nome.toLowerCase().includes(q)).slice(0, 5);
    ac.innerHTML = filtro.map(c => `<div class="ac-item" onclick="selCliente('${c.id}')">${c.nome}</div>`).join('');
    ac.classList.add('open');
  };

  window.selCliente = async function(id) {
    clienteSel = clientes.find(c => c.id === id);
    document.getElementById('cli-busca').style.display = 'none';
    document.getElementById('cli-sel').style.display = 'block';
    document.getElementById('cli-nome').textContent = clienteSel.nome;
    document.getElementById('cli-meta').textContent = clienteSel.cidade;
    
    // Buscar último pedido
    const { data: peds } = await db.from('pedidos_vendas')
      .select('*').eq('cliente_id', id).order('data', {ascending:false}).limit(1);
    
    if (peds && peds.length > 0) carregarPedido(peds[0].id);
    else carregarItensPadrao();
  };

  async function carregarPedido(id) {
    const { data: ped } = await db.from('pedidos_vendas').select('*').eq('id', id).single();
    const { data: it } = await db.from('itens_pedidos_vendas').select('*').eq('pedido_venda_id', id);
    
    pedidoAtual = id;
    document.getElementById('nota-num').textContent = id.substring(0,6).toUpperCase();
    
    itens = it.map(item => {
      const p = produtos.find(x => x.id === item.produto_id);
      return { 
        produto: p, 
        quantidade: item.quantidade, 
        preco_unit: item.preco_unit, 
        total: item.total_venda, 
        lucro: item.lucro,
        custo_unit: item.custo_unit
      };
    });
    renderTabela();
  }

  function carregarItensPadrao() {
    itens = [];
    renderTabela();
  }

  window.onQtyChange = function(idx, val) {
    const i = itens[idx];
    i.quantidade = parseFloat(val) || 0;
    i.total = i.quantidade * i.preco_unit;
    i.lucro = i.total - (i.quantidade * (i.custo_unit || 0));
    atualizarResumo();
  };

  function atualizarResumo() {
    const total = itens.reduce((s, i) => s + i.total, 0);
    const lucro = itens.reduce((s, i) => s + i.lucro, 0);
    document.getElementById('r-venda-btn').textContent = 'R$ ' + total.toFixed(2);
    document.getElementById('r-lucro').textContent = 'R$ ' + lucro.toFixed(2);
    document.getElementById('r-margem-top').textContent = total > 0 ? ((lucro/total)*100).toFixed(0)+'%' : '0%';
  }

  window.salvarNota = async function() {
    if(!clienteSel) return;
    const dadosPedido = {
      cliente_id: clienteSel.id,
      data: document.getElementById('nota-data').value,
      total_venda: itens.reduce((s, i) => s + i.total, 0),
      total_lucro: itens.reduce((s, i) => s + i.lucro, 0)
    };

    let pId = pedidoAtual;
    if(!pId) {
      const { data } = await db.from('pedidos_vendas').insert(dadosPedido).select().single();
      pId = data.id;
    } else {
      await db.from('pedidos_vendas').update(dadosPedido).eq('id', pId);
      await db.from('itens_pedidos_vendas').delete().eq('pedido_venda_id', pId);
    }

    const itensParaInserir = itens.filter(i => i.quantidade > 0).map(i => ({
      pedido_venda_id: pId, // Padronizado conforme solicitado
      produto_id: i.produto.id,
      quantidade: i.quantidade,
      preco_unit: i.preco_unit,
      total_venda: i.total,
      lucro: i.lucro,
      custo_unit: i.custo_unit
    }));

    await db.from('itens_pedidos_vendas').insert(itensParaInserir);
    toast("Salvo com sucesso!", "ok");
  };

  function renderTabela() {
    const container = document.getElementById('itens-lista');
    if(itens.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;">Nenhum item adicionado</div>';
      return;
    }
    container.innerHTML = itens.map((item, i) => `
      <div class="t-row">
        <div class="t-cd">${item.produto.codigo || ''}</div>
        <div class="t-nome">${item.produto.nome}</div>
        <input class="t-input" type="number" value="${item.quantidade}" oninput="onQtyChange(${i}, this.value)">
        <div class="t-cell">${item.preco_unit.toFixed(2)}</div>
        <div class="t-cell ${privado ? 'hidden-col' : ''}">${item.total.toFixed(2)}</div>
        <div class="t-cell green ${privado ? 'hidden-col' : ''}">${item.lucro.toFixed(2)}</div>
        <div class="t-estq">--</div>
      </div>
    `).join('');
    atualizarResumo();
  }

  window.togglePrivado = function() {
    privado = !privado;
    renderTabela();
  };

  window.irDashboard = () => window.location.href = 'dashboard.html';
  window.toggleResumo = () => {
    const el = document.getElementById('resumo-expanded');
    el.style.display = el.style.display === 'grid' ? 'none' : 'grid';
  };

  function toast(m, t) {
    const el = document.getElementById('toast');
    el.textContent = m;
    el.className = `toast show ${t}`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  carregarDados();
});
</script>
</body>
</html>
