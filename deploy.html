<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Deploy Worker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:#F2F4F8;min-height:100vh;display:flex;flex-direction:column;}
.topbar{height:56px;padding:0 16px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;gap:12px;background:#FFF;border-bottom:1px solid #E2E8F0;}
.back-btn{width:34px;height:34px;border-radius:50%;border:none;background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.topbar-title{font-size:15px;font-weight:700;color:#1C1C1E;}
.body{flex:1;padding:20px 16px;display:flex;flex-direction:column;gap:12px;max-width:480px;width:100%;margin:0 auto;}
.card{background:#FFF;border-radius:20px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.card-title{font-size:13px;font-weight:700;color:#1C1C1E;margin-bottom:4px;}
.card-sub{font-size:12px;color:#8E8E93;font-weight:500;line-height:1.5;}
.worker-status{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;background:#F8FAFC;margin-top:12px;}
.worker-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.worker-dot.ok{background:#10B981;}
.worker-dot.err{background:#EF4444;}
.worker-dot.loading{background:#F59E0B;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.worker-info{flex:1;}
.worker-name{font-size:13px;font-weight:600;color:#1C1C1E;}
.worker-detail{font-size:11px;color:#8E8E93;margin-top:2px;}
label{font-size:11px;font-weight:700;color:#8E8E93;letter-spacing:0.5px;display:block;margin-bottom:6px;}
.input-wrap{position:relative;}
input[type=password],input[type=text]{width:100%;padding:13px 44px 13px 14px;border:1.5px solid #E5E5EA;border-radius:14px;font-size:14px;font-family:-apple-system,sans-serif;color:#1C1C1E;outline:none;background:#FFF;}
input:focus{border-color:#007AFF;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;}
.btn-deploy{width:100%;padding:15px;background:#007AFF;color:#FFF;border:none;border-radius:16px;font-size:15px;font-weight:700;font-family:-apple-system,sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s;}
.btn-deploy:disabled{opacity:0.35;pointer-events:none;}
.btn-deploy:active{opacity:0.8;}
.status-banner{border-radius:14px;padding:13px 15px;display:none;align-items:center;gap:10px;font-size:13px;font-weight:600;}
.status-banner.ok{background:#E1F9F0;color:#065F46;display:flex;}
.status-banner.err{background:#FEE2E2;color:#991B1B;display:flex;}
.status-banner.warn{background:#FFF7ED;color:#92400E;display:flex;}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#FFF;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #F2F2F7;}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:12px;color:#8E8E93;font-weight:500;}
.info-val{font-size:12px;font-weight:700;color:#1C1C1E;font-family:monospace;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="window.history.back()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C1C1E" stroke-width="2.2"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <span class="topbar-title">Deploy Worker</span>
</div>
<div class="body">
  <div class="card">
    <div class="card-title">worker.js</div>
    <div class="card-sub">Código que será enviado para o Cloudflare</div>
    <div class="worker-status">
      <div class="worker-dot loading" id="worker-dot"></div>
      <div class="worker-info">
        <div class="worker-name" id="worker-name">Carregando...</div>
        <div class="worker-detail" id="worker-detail">Buscando worker.js</div>
      </div>
    </div>
    <div id="worker-meta" style="margin-top:12px;display:none;">
      <div class="info-row">
        <span class="info-label">Destino</span>
        <span class="info-val">huberhorti-push</span>
      </div>
      <div class="info-row">
        <span class="info-label">Tamanho</span>
        <span class="info-val" id="worker-size">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Endpoints Bitget</span>
        <span class="info-val" id="worker-endpoints">—</span>
      </div>
    </div>
  </div>
  <div class="card">
    <label>API TOKEN CLOUDFLARE</label>
    <div class="input-wrap">
      <input type="password" id="token" placeholder="cfut_...">
      <button class="eye-btn" onclick="toggleToken()">
        <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div style="font-size:11px;color:#8E8E93;margin-top:8px;">🔒 Token usado apenas nesta sessão — nunca armazenado</div>
  </div>
  <div class="status-banner" id="status-banner">
    <span id="status-msg">—</span>
  </div>
  <button class="btn-deploy" id="btn-deploy" onclick="deploy()" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    Deploy huberhorti-push
  </button>
</div>
<script>
const ACCOUNT_ID = 'a05872e593f0b5078dcfaf16b9e3067f';
const SCRIPT_NAME = 'huberhorti-push';
let _workerCode = null;

async function carregarWorker() {
  try {
    const res = await fetch('worker.js?t=' + Date.now());
    if (!res.ok) throw new Error('worker.js não encontrado na mesma pasta');
    _workerCode = await res.text();
    const endpoints = (_workerCode.match(/path === '\/bitget\//g) || []).length;
    const sizeKB = (_workerCode.length / 1024).toFixed(1);
    document.getElementById('worker-dot').className = 'worker-dot ok';
    document.getElementById('worker-name').textContent = 'worker.js carregado ✓';
    document.getElementById('worker-detail').textContent = 'Pronto para deploy';
    document.getElementById('worker-size').textContent = sizeKB + ' KB';
    document.getElementById('worker-endpoints').textContent = endpoints;
    document.getElementById('worker-meta').style.display = 'block';
    document.getElementById('btn-deploy').disabled = false;
  } catch(e) {
    document.getElementById('worker-dot').className = 'worker-dot err';
    document.getElementById('worker-name').textContent = 'Erro ao carregar';
    document.getElementById('worker-detail').textContent = e.message;
    showStatus('err', '❌ ' + e.message);
  }
}

function toggleToken() {
  const input = document.getElementById('token');
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function deploy() {
  const token = document.getElementById('token').value.trim();
  if (!token) { showStatus('warn', 'Cole o token antes de fazer o deploy'); return; }
  if (!_workerCode) { showStatus('err', 'worker.js não carregado'); return; }
  const btn = document.getElementById('btn-deploy');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Fazendo deploy...';
  document.getElementById('status-banner').style.display = 'none';
  try {
    const form = new FormData();
    form.append('metadata', JSON.stringify({
      main_module: 'worker.js',
      compatibility_date: '2024-01-01',
      compatibility_flags: ['nodejs_compat']
    }));
    form.append('worker.js', new Blob([_workerCode], { type: 'application/javascript+module' }), 'worker.js');
    const res = await fetch(`https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${SCRIPT_NAME}`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}` },
      body: form
    });
    const data = await res.json();
    if (data.success) {
      showStatus('ok', '✅ Deploy realizado com sucesso!');
      document.getElementById('worker-detail').textContent = 'Último deploy: agora';
    } else {
      showStatus('err', '❌ ' + (data.errors?.[0]?.message || 'Erro desconhecido'));
    }
  } catch(e) {
    showStatus('err', '❌ ' + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg> Deploy huberhorti-push';
}

function showStatus(type, msg) {
  const el = document.getElementById('status-banner');
  if (!type) { el.style.display = 'none'; return; }
  el.className = 'status-banner ' + type;
  document.getElementById('status-msg').textContent = msg;
}

carregarWorker();
</script>
<script>
  console.log('deploy.html carregado');
  console.log('btn:', document.getElementById('btn-deploy'));
  console.log('worker code:', _workerCode ? 'carregado' : 'null');
</script>
</body>
</html>
