<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Deploy Worker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#F2F4F8;min-height:100vh;display:flex;flex-direction:column;}
.topbar{height:56px;padding:0 16px;display:flex;align-items:center;gap:12px;background:#FFF;border-bottom:1px solid #E2E8F0;}
.back-btn{width:34px;height:34px;border-radius:50%;border:none;background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.topbar-title{font-size:15px;font-weight:700;color:#1C1C1E;}
.body{flex:1;padding:20px 16px;display:flex;flex-direction:column;gap:12px;max-width:480px;width:100%;margin:0 auto;}
.card{background:#FFF;border-radius:20px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.card-title{font-size:13px;font-weight:700;color:#1C1C1E;margin-bottom:4px;}
.card-sub{font-size:12px;color:#8E8E93;line-height:1.5;}
.worker-status{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;background:#E1F9F0;margin-top:12px;}
.dot{width:8px;height:8px;border-radius:50%;background:#10B981;flex-shrink:0;}
.worker-name{font-size:13px;font-weight:600;color:#1C1C1E;}
.worker-detail{font-size:11px;color:#8E8E93;margin-top:2px;}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #F2F2F7;}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:12px;color:#8E8E93;}
.info-val{font-size:12px;font-weight:700;color:#1C1C1E;font-family:monospace;}
label{font-size:11px;font-weight:700;color:#8E8E93;letter-spacing:0.5px;display:block;margin-bottom:6px;}
.input-wrap{position:relative;}
input[type=password],input[type=text]{width:100%;padding:13px 44px 13px 14px;border:1.5px solid #E5E5EA;border-radius:14px;font-size:14px;color:#1C1C1E;outline:none;background:#FFF;}
input:focus{border-color:#007AFF;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;}
.btn{width:100%;padding:15px;background:#007AFF;color:#FFF;border:none;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:active{opacity:0.8;}
.status{border-radius:14px;padding:13px 15px;font-size:13px;font-weight:600;display:none;margin-bottom:0;}
.status.ok{background:#E1F9F0;color:#065F46;display:block;}
.status.err{background:#FEE2E2;color:#991B1B;display:block;}
.status.warn{background:#FFF7ED;color:#92400E;display:block;}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#FFF;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="window.history.back()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C1C1E" stroke-width="2.2"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <span class="topbar-title">Deploy Worker</span>
</div>
<div class="body">
  <div class="card">
    <div class="card-title">worker.js</div>
    <div class="card-sub">Código embutido — pronto para deploy</div>
    <div class="worker-status">
      <div class="dot"></div>
      <div>
        <div class="worker-name">worker.js carregado ✓</div>
        <div class="worker-detail" id="worker-detail">Pronto para deploy</div>
      </div>
    </div>
    <div style="margin-top:12px;">
      <div class="info-row"><span class="info-label">Destino</span><span class="info-val">huberhorti-push</span></div>
      <div class="info-row"><span class="info-label">Tamanho</span><span class="info-val">9.1 KB</span></div>
      <div class="info-row"><span class="info-label">Endpoints Bitget</span><span class="info-val">6</span></div>
    </div>
  </div>
  <div class="card">
    <label>API TOKEN CLOUDFLARE</label>
    <div class="input-wrap">
      <input type="password" id="token" placeholder="cfut_...">
      <button class="eye-btn" onclick="var i=document.getElementById('token');i.type=i.type==='password'?'text':'password'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div style="font-size:11px;color:#8E8E93;margin-top:8px;">🔒 Token usado apenas nesta sessão</div>
  </div>
  <div class="status" id="status"></div>
  <button class="btn" id="btn" onclick="deploy()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    Deploy huberhorti-push
  </button>
</div>
<script>
const ACCOUNT_ID = 'a05872e593f0b5078dcfaf16b9e3067f';
const SCRIPT_NAME = 'huberhorti-push';
const WORKER_CODE = "const VAPID_JWK = {\n  kty: 'EC', crv: 'P-256',\n  d: 'IBcTQxA0GcoRK8Kp6BB4D1qAQOySOMWBstyrGuKYlUw',\n  x: 'D_THAjYHkyMPyiNw97D6Pr6NnfN09doryo1LcORc0gQ',\n  y: 'D7Hia1THsR_1Nb8XcsAg_qIpdr1U72vmt5aInVOB6WE',\n  key_ops: ['sign']\n};\nconst VAPID_PUBLIC_KEY = 'BA_0xwI2B5MjD8ojcPew-j6-jZ3zdPXaK8qNS3DkXNIED7Hia1THsR_1Nb8XcsAg_qIpdr1U72vmt5aInVOB6WE';\nconst CORS = {\n  'Access-Control-Allow-Origin': '*',\n  'Access-Control-Allow-Methods': 'GET, POST, OPTIONS',\n  'Access-Control-Allow-Headers': 'Content-Type'\n};\nasync function bitgetRequest(env, method, path, body = null) {\n  const timestamp = Date.now().toString();\n  const bodyStr = body ? JSON.stringify(body) : '';\n  const prehash = timestamp + method.toUpperCase() + path + bodyStr;\n  const keyBytes = new TextEncoder().encode(env.BITGET_SECRET_KEY);\n  const msgBytes = new TextEncoder().encode(prehash);\n  const cryptoKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);\n  const sigBytes = await crypto.subtle.sign('HMAC', cryptoKey, msgBytes);\n  const signature = btoa(String.fromCharCode(...new Uint8Array(sigBytes)));\n  const res = await fetch('https://api.bitget.com' + path, {\n    method,\n    headers: {\n      'ACCESS-KEY': env.BITGET_API_KEY,\n      'ACCESS-SIGN': signature,\n      'ACCESS-TIMESTAMP': timestamp,\n      'ACCESS-PASSPHRASE': env.BITGET_PASSPHRASE,\n      'Content-Type': 'application/json',\n      'User-Agent': 'PostmanRuntime/7.43.0'\n    },\n    body: body ? bodyStr : undefined\n  });\n  return res.json();\n}\nexport default {\n  async fetch(request, env) {\n    const url = new URL(request.url);\n    const path = url.pathname;\n    if (request.method === 'OPTIONS') return new Response(null, { headers: CORS });\n    if (request.method === 'GET' && path === '/bitget/saldo') {\n      try { const data = await bitgetRequest(env, 'GET', '/api/v2/spot/account/assets'); return Response.json(data, { headers: CORS }); }\n      catch (e) { return Response.json({ error: e.message }, { status: 500, headers: CORS }); }\n    }\n    if (request.method === 'GET' && path === '/bitget/saldo-futuros') {\n      try { const productType = url.searchParams.get('productType') || 'usdt-futures'; const data = await bitgetRequest(env, 'GET', `/api/v2/mix/account/accounts?productType=${productType}`); return Response.json(data, { headers: CORS }); }\n      catch (e) { return Response.json({ error: e.message }, { status: 500, headers: CORS }); }\n    }\n    if (request.method === 'GET' && path === '/bitget/candles') {\n      try { const symbol = url.searchParams.get('symbol') || 'BTCUSDT'; const granularity = url.searchParams.get('granularity') || '4H'; const limit = url.searchParams.get('limit') || '100'; const res = await fetch(`https://api.bitget.com/api/v2/spot/market/candles?symbol=${symbol}&granularity=${granularity}&limit=${limit}`, { headers: { 'User-Agent': 'PostmanRuntime/7.43.0' } }); const data = await res.json(); return Response.json(data, { headers: CORS }); }\n      catch (e) { return Response.json({ error: e.message }, { status: 500, headers: CORS }); }\n    }\n    if (request.method === 'GET' && path === '/bitget/cotacao') {\n      try { const symbol = url.searchParams.get('symbol') || 'BTCUSDT'; const res = await fetch(`https://api.bitget.com/api/v2/spot/market/tickers?symbol=${symbol}`); const data = await res.json(); return Response.json(data, { headers: CORS }); }\n      catch (e) { return Response.json({ error: e.message }, { status: 500, headers: CORS }); }\n    }\n    if (request.method === 'GET' && path === '/bitget/posicoes') {\n      try { const productType = url.searchParams.get('productType') || 'USDT-FUTURES'; const symbol = url.searchParams.get('symbol') || ''; const query = symbol ? `/api/v2/mix/position/single-position?productType=${productType}&symbol=${symbol}` : `/api/v2/mix/position/all-position?productType=${productType}`; const data = await bitgetRequest(env, 'GET', query); return Response.json(data, { headers: CORS }); }\n      catch (e) { return Response.json({ error: e.message }, { status: 500, headers: CORS }); }\n    }\n    if (request.method === 'GET' && path === '/bitget/ordens') {\n      try { const [futuros, spot] = await Promise.all([bitgetRequest(env, 'GET', '/api/v2/mix/order/orders-pending?productType=usdt-futures'), bitgetRequest(env, 'GET', '/api/v2/spot/trade/unfilled-orders')]); return Response.json({ futuros, spot }, { headers: CORS }); }\n      catch (e) { return Response.json({ error: e.message }, { status: 500, headers: CORS }); }\n    }\n    if (request.method !== 'POST') return new Response('Method not allowed', { status: 405 });\n    const { subscription, title, body } = await request.json();\n    try { await sendPush(subscription, JSON.stringify({ title, body })); return new Response('OK', { status: 200, headers: { 'Access-Control-Allow-Origin': '*' } }); }\n    catch (e) { return new Response('Error: ' + e.message, { status: 500, headers: { 'Access-Control-Allow-Origin': '*' } }); }\n  }\n};\nasync function sendPush(subscription, payload) {\n  const endpoint = subscription.endpoint; const p256dh = subscription.keys.p256dh; const auth = subscription.keys.auth;\n  const exp = Math.floor(Date.now() / 1000) + 12 * 60 * 60;\n  const jwt = await buildVapidJwt(endpoint, exp);\n  const { ciphertext } = await encrypt(payload, p256dh, auth);\n  const response = await fetch(endpoint, { method: 'POST', headers: { 'Authorization': `vapid t=${jwt}, k=${VAPID_PUBLIC_KEY}`, 'Content-Encoding': 'aes128gcm', 'Content-Type': 'application/octet-stream', 'TTL': '86400' }, body: ciphertext });\n  if (!response.ok) { const text = await response.text(); throw new Error(`Push failed: ${response.status} ${text}`); }\n}\nasync function encrypt(payloadStr, p256dh, auth) {\n  const encoder = new TextEncoder(); const payload = encoder.encode(payloadStr);\n  const serverKeyPair = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-256' }, true, ['deriveBits']);\n  const serverPublicKeyRaw = new Uint8Array(await crypto.subtle.exportKey('raw', serverKeyPair.publicKey));\n  const clientPublicKeyRaw = b64decode(p256dh);\n  const clientPublicKey = await crypto.subtle.importKey('raw', clientPublicKeyRaw, { name: 'ECDH', namedCurve: 'P-256' }, false, []);\n  const sharedSecretBits = await crypto.subtle.deriveBits({ name: 'ECDH', public: clientPublicKey }, serverKeyPair.privateKey, 256);\n  const sharedSecret = new Uint8Array(sharedSecretBits);\n  const authSecret = b64decode(auth); const salt = crypto.getRandomValues(new Uint8Array(16));\n  const prkKey = await hkdfExtract(authSecret, sharedSecret);\n  const keyInfo = concat(encoder.encode('WebPush: info\\x00'), clientPublicKeyRaw, serverPublicKeyRaw);\n  const ikm = await hkdfExpand(prkKey, keyInfo, 32); const prk = await hkdfExtract(salt, ikm);\n  const cek = await hkdfExpand(prk, encoder.encode('Content-Encoding: aes128gcm\\x00'), 16);\n  const nonce = await hkdfExpand(prk, encoder.encode('Content-Encoding: nonce\\x00'), 12);\n  const plaintext = concat(payload, new Uint8Array([0x02]));\n  const encKey = await crypto.subtle.importKey('raw', cek, 'AES-GCM', false, ['encrypt']);\n  const ciphertextRaw = new Uint8Array(await crypto.subtle.encrypt({ name: 'AES-GCM', iv: nonce }, encKey, plaintext));\n  const header = new Uint8Array(16 + 4 + 1 + serverPublicKeyRaw.length);\n  header.set(salt, 0); new DataView(header.buffer, 16, 4).setUint32(0, 4096, false);\n  header[20] = serverPublicKeyRaw.length; header.set(serverPublicKeyRaw, 21);\n  return { ciphertext: concat(header, ciphertextRaw), salt, serverPublicKey: serverPublicKeyRaw };\n}\nasync function hkdfExtract(salt, ikm) { const saltKey = await crypto.subtle.importKey('raw', salt, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']); return new Uint8Array(await crypto.subtle.sign('HMAC', saltKey, ikm)); }\nasync function hkdfExpand(prk, info, length) { const prkKey = await crypto.subtle.importKey('raw', prk, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']); const result = new Uint8Array(await crypto.subtle.sign('HMAC', prkKey, concat(info, new Uint8Array([0x01])))); return result.slice(0, length); }\nasync function buildVapidJwt(endpoint, exp) {\n  const url = new URL(endpoint); const header = b64url(JSON.stringify({ typ: 'JWT', alg: 'ES256' }));\n  const payload = b64url(JSON.stringify({ aud: url.origin, exp, sub: 'mailto:huber.produtos@gmail.com' }));\n  const unsigned = header + '.' + payload;\n  const cryptoKey = await crypto.subtle.importKey('jwk', VAPID_JWK, { name: 'ECDSA', namedCurve: 'P-256' }, false, ['sign']);\n  const sig = await crypto.subtle.sign({ name: 'ECDSA', hash: 'SHA-256' }, cryptoKey, new TextEncoder().encode(unsigned));\n  return unsigned + '.' + b64url2(new Uint8Array(sig));\n}\nfunction concat(...arrays) { const total = arrays.reduce((s, a) => s + a.length, 0); const result = new Uint8Array(total); let offset = 0; for (const a of arrays) { result.set(a, offset); offset += a.length; } return result; }\nfunction b64decode(s) { return new Uint8Array([...atob(s.replace(/-/g, '+').replace(/_/g, '/'))].map(c => c.charCodeAt(0))); }\nfunction b64url(str) { return btoa(str).replace(/\\+/g, '-').replace(/\\//g, '_').replace(/=/g, ''); }\nfunction b64url2(arr) { return btoa(String.fromCharCode(...arr)).replace(/\\+/g, '-').replace(/\\//g, '_').replace(/=/g, ''); }\n";

async function deploy() {
  console.log('deploy iniciado');
  const token = document.getElementById('token').value.trim();
  console.log('token:', token ? 'preenchido' : 'vazio');
  console.log('worker code length:', WORKER_CODE.length);
  try {
    const form = new FormData();
    console.log('form criado');


  if (!token) { showStatus('warn', 'Cole o token antes de fazer o deploy'); return; }
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Fazendo deploy...';
  showStatus('', '');
  try {
    const form = new FormData();
    form.append('metadata', JSON.stringify({
      main_module: 'worker.js',
      compatibility_date: '2024-01-01',
      compatibility_flags: ['nodejs_compat']
    }));
    form.append('worker.js', new Blob([WORKER_CODE], { type: 'application/javascript+module' }), 'worker.js');
    const res = await fetch(`https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${SCRIPT_NAME}`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}` },
      body: form
    });
    const data = await res.json();
    if (data.success) {
      showStatus('ok', '✅ Deploy realizado com sucesso!');
      document.getElementById('worker-detail').textContent = 'Último deploy: agora';
    } else {
      showStatus('err', '❌ ' + (data.errors?.[0]?.message || JSON.stringify(data.errors)));
    }
  } catch(e) {
    showStatus('err', '❌ ' + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg> Deploy huberhorti-push';
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  if (!type) { el.style.display = 'none'; return; }
  el.className = 'status ' + type;
  el.textContent = msg;
}
</script>
</body>
</html>
