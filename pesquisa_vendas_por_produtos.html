<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Vendas por Produto</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-y:none;}
.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-weight:700;font-size:11px;letter-spacing:0.8px;color:#1C1C1E;}
.topbar-sub{font-size:10px;color:#8E8E93;font-weight:500;}
.ios-btn-float{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;}
.busca-wrap{padding:0 16px 10px;flex-shrink:0;position:relative;}
.busca-inner{position:relative;display:flex;align-items:center;background:#FFF;border-radius:14px;padding:4px 10px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.busca-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:#8E8E93;stroke-width:2.5;fill:none;}
.busca-input{flex-grow:1;padding:9px 9px 9px 34px;background:transparent;border:none;font-size:15px;outline:none;color:#1C1C1E;font-family:'Inter',sans-serif;}
.autocomplete-results{position:absolute;top:100%;left:0;right:0;background:#FFF;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:9999;max-height:220px;overflow-y:auto;display:none;margin-top:4px;border:1px solid #F2F2F7;}
.autocomplete-item{padding:13px 16px;font-size:14px;border-bottom:0.5px solid #F2F2F7;cursor:pointer;color:#1C1C1E;}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:active{background:#F2F2F7;}
.totais-wrap{display:flex;gap:10px;padding:0 16px 10px;flex-shrink:0;}
.total-card{flex:1;background:#FFF;border-radius:14px;padding:10px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.total-label{font-size:9px;color:#8E8E93;}
.total-val{font-size:13px;font-weight:400;color:#1C1C1E;margin-top:3px;}
.total-val.verde{color:#10B981;}
.total-row{display:flex;align-items:baseline;gap:6px;margin-top:3px;}
.total-pct{font-size:11px;color:#10B981;}
.lista-card{flex:1;margin:0 16px;background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.lista-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.item-row{display:flex;align-items:center;padding:11px 16px;border-bottom:0.5px solid #E0E0E0;cursor:pointer;gap:8px;border-left:3px solid transparent;}
.item-row.negativo{border-left-color:#FECACA;}
.item-row:last-child{border-bottom:none;}
.item-row:active{background:#F5F5F5;}
.item-info{flex:1;display:flex;flex-direction:column;gap:2px;}
.item-nome{font-size:13px;color:#1C1C1E;}
.item-sub{font-size:11px;color:#8E8E93;}
.item-qtd{font-size:13px;font-weight:500;color:#1C1C1E;flex-shrink:0;text-align:right;}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:#C7C7CC;padding:40px;text-align:center;}
.paginacao{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 16px;border-top:0.5px solid #E0E0E0;flex-shrink:0;}
.pag-btns{display:flex;align-items:center;gap:12px;}
.pag-btn{width:32px;height:32px;border-radius:50%;border:none;background:#007AFF;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.pag-btn:disabled{opacity:0.3;pointer-events:none;}
.pag-info{font-size:12px;font-weight:500;color:#8E8E93;}
.pag-vendas{font-size:11px;color:#8E8E93;}
.filtro-overlay{position:fixed;inset:0;z-index:9990;display:none;}
.filtro-overlay.active{display:block;}
.filtro-menu{position:fixed;z-index:9991;width:220px;background:#FFF;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.14);overflow:hidden;display:none;}
.filtro-titulo{padding:13px 16px;font-size:12px;font-weight:600;color:#8E8E93;border-bottom:0.5px solid #F2F2F7;}
.filtro-item{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;font-size:14px;cursor:pointer;border-bottom:0.5px solid #F2F2F7;color:#1C1C1E;}
.filtro-item:last-of-type{border-bottom:none;}
.filtro-item:active{background:#F5F5F5;}
.radio{width:18px;height:18px;border-radius:50%;border:2px solid #D1D1D6;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.radio.checked{border-color:#007AFF;}
.radio.checked::after{content:'';width:9px;height:9px;border-radius:50%;background:#007AFF;}
.filtro-confirmar{width:calc(100% - 24px);margin:10px 12px 12px;padding:13px;background:#007AFF;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:#FFF;cursor:pointer;display:block;}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn-float" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Vendas por Produto</div>
    <div class="topbar-sub" id="status-sub">Carregando...</div>
  </div>
  <button class="ios-btn-float" id="btn-filtro" onclick="abrirFiltro(event)">
    <svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:#1C1C1E;stroke-width:2;fill:none"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
  </button>
</div>

<div class="busca-wrap">
  <div class="busca-inner">
    <svg class="busca-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input class="busca-input" id="busca-produto" type="text" placeholder="Buscar produto..." autocomplete="off">
  </div>
  <div class="autocomplete-results" id="autocomplete-results"></div>
</div>

<div class="totais-wrap">
  <div class="total-card">
    <div class="total-label">Quantidade</div>
    <div class="total-val" id="total-qtd">—</div>
  </div>
  <div class="total-card">
    <div class="total-label">Faturamento</div>
    <div class="total-val" id="total-fat">—</div>
  </div>
  <div class="total-card">
    <div class="total-label">Lucro</div>
    <div class="total-row">
      <span class="total-val verde" id="total-lucro">—</span>
      <span class="total-pct" id="total-margem"></span>
    </div>
  </div>
</div>

<div class="lista-card">
  <div class="lista-scroll" id="lista-scroll">
    <div class="empty-state">Busque um produto para ver as vendas do ciclo</div>
  </div>
  <div class="paginacao">
    <span class="pag-vendas" id="pag-vendas">—</span>
    <div class="pag-btns">
      <button class="pag-btn" id="btn-prev" onclick="mudarPagina(-1)" disabled>
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#FFF;stroke-width:2.5;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
      </button>
      <span class="pag-info" id="pag-info">1 / 1</span>
      <button class="pag-btn" id="btn-next" onclick="mudarPagina(1)" disabled>
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#FFF;stroke-width:2.5;fill:none"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="filtro-overlay" id="filtro-overlay" onclick="fecharFiltro()"></div>
<div class="filtro-menu" id="filtro-menu">
  <div class="filtro-titulo">Período</div>
  <div class="filtro-item" onclick="selecionarPeriodoTemp('atual')">
    Ciclo Atual
    <div class="radio checked" id="radio-atual"></div>
  </div>
  <div class="filtro-item" onclick="selecionarPeriodoTemp('anterior')">
    Ciclo Anterior
    <div class="radio" id="radio-anterior"></div>
  </div>
  <button class="filtro-confirmar" onclick="aplicarFiltroPeriodo()">Confirmar</button>
</div>

<script>
const POR_PAGINA = 15;
const fmtNum = v => Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});

let _ciclo = null;
let _cicloAnterior = null;
let _periodoAtivo = 'atual';
let _periodoTemp = 'atual';
let _produtos = [];
let _itens = [];
let _paginaAtual = 1;
let _produtoSelecionado = null;

async function init() {
  window.HHUtils.atualizarCicloAtualGlobal();
  _ciclo = window.cicloAtual;
  _cicloAnterior = {
    d0: new Date(_ciclo.d0.getTime() - 7 * 24 * 60 * 60 * 1000),
    d7: new Date(_ciclo.d7.getTime() - 7 * 24 * 60 * 60 * 1000)
  };
  atualizarStatus();
  const { data } = await window.db.from('produtos').select('id, nome, unid_venda').order('nome');
  _produtos = data || [];
}

function atualizarStatus() {
  const c = _periodoAtivo === 'atual' ? _ciclo : _cicloAnterior;
  document.getElementById('status-sub').textContent = `${HHUtils.formatarDataBR(c.d0)} — ${HHUtils.formatarDataBR(c.d7)}`;
}

function abrirFiltro(event) {
  _periodoTemp = _periodoAtivo;
  document.querySelectorAll('.radio').forEach(r => r.classList.remove('checked'));
  document.getElementById(`radio-${_periodoAtivo}`).classList.add('checked');
  const btn = document.getElementById('btn-filtro');
  const rect = btn.getBoundingClientRect();
  const menu = document.getElementById('filtro-menu');
  menu.style.top = (rect.bottom + 6) + 'px';
  menu.style.right = '18px';
  menu.style.display = 'block';
  document.getElementById('filtro-overlay').classList.add('active');
}

function fecharFiltro() {
  document.getElementById('filtro-menu').style.display = 'none';
  document.getElementById('filtro-overlay').classList.remove('active');
}

function selecionarPeriodoTemp(p) {
  _periodoTemp = p;
  document.querySelectorAll('.radio').forEach(r => r.classList.remove('checked'));
  document.getElementById(`radio-${p}`).classList.add('checked');
}

function aplicarFiltroPeriodo() {
  _periodoAtivo = _periodoTemp;
  atualizarStatus();
  fecharFiltro();
  if (_produtoSelecionado) carregarDados();
}

document.getElementById('busca-produto').addEventListener('input', e => {
  const termo = e.target.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const results = document.getElementById('autocomplete-results');
  if (termo.length < 1) { results.style.display = 'none'; return; }
  const filtrados = _produtos.filter(p =>
    p.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes(termo)
  ).slice(0, 10);
  if (filtrados.length > 0) {
    results.innerHTML = filtrados.map(p =>
      `<div class="autocomplete-item" onclick="selecionarProduto('${p.id}','${p.nome.replace(/'/g,"\\'")}','${p.unid_venda || ''}')">${p.nome}</div>`
    ).join('');
    results.style.display = 'block';
  } else {
    results.style.display = 'none';
  }
});

document.addEventListener('touchstart', e => {
  if (!e.target.closest('.busca-wrap')) {
    document.getElementById('autocomplete-results').style.display = 'none';
  }
}, {passive: true});

async function selecionarProduto(id, nome, unid) {
  _produtoSelecionado = { id, nome, unid };
  document.getElementById('busca-produto').value = nome;
  document.getElementById('autocomplete-results').style.display = 'none';
  await carregarDados();
}

async function carregarDados() {
  const c = _periodoAtivo === 'atual' ? _ciclo : _cicloAnterior;
  const d0ISO = c.d0.toISOString();
  const d7ISO = new Date(c.d7.getFullYear(), c.d7.getMonth(), c.d7.getDate(), 23, 59, 59).toISOString();

  const { data: itensDB } = await window.db
    .from('itens_pedidos_vendas')
    .select('quantidade, preco_unit, total_venda, lucro, pedidos_vendas!inner(id, data, clientes(id, nome))')
    .eq('produto_id', _produtoSelecionado.id)
    .gte('pedidos_vendas.data', d0ISO)
    .lte('pedidos_vendas.data', d7ISO);

  _itens = (itensDB || []).map(i => ({
    clienteNome: i.pedidos_vendas?.clientes?.nome || '—',
    data: i.pedidos_vendas?.data || '',
    pedidoId: i.pedidos_vendas?.id || '',
    quantidade: parseFloat(i.quantidade) || 0,
    precoUnit: parseFloat(i.preco_unit) || 0,
    totalVenda: parseFloat(i.total_venda) || 0,
    lucro: parseFloat(i.lucro) || 0
  })).sort((a, b) => new Date(a.data) - new Date(b.data));

  _paginaAtual = 1;
  renderizar();
}

function renderizar() {
  const total = _itens.length;
  const totalPags = Math.max(1, Math.ceil(total / POR_PAGINA));
  if (_paginaAtual > totalPags) _paginaAtual = totalPags;

  const inicio = (_paginaAtual - 1) * POR_PAGINA;
  const pagina = _itens.slice(inicio, inicio + POR_PAGINA);
  const lista = document.getElementById('lista-scroll');
  const unid = _produtoSelecionado?.unid || '';

  if (pagina.length === 0) {
    lista.innerHTML = '<div class="empty-state">Nenhuma venda encontrada no período</div>';
  } else {
    lista.innerHTML = pagina.map(i => {
      const dataFmt = i.data ? i.data.split('T')[0].split('-').reverse().slice(0,2).join('/') : '—';
      const negativo = i.lucro < 0;
      return `<div class="item-row${negativo ? ' negativo' : ''}">
        <div class="item-info">
          <span class="item-nome">${i.clienteNome}</span>
          <span class="item-sub">${dataFmt}</span>
        </div>
        <span class="item-qtd">${fmtNum(i.quantidade)} ${unid}</span>
      </div>`;
    }).join('');
  }

  const somaQtd = _itens.reduce((a, i) => a + i.quantidade, 0);
  const somaFat = _itens.reduce((a, i) => a + i.totalVenda, 0);
  const somaLucro = _itens.reduce((a, i) => a + i.lucro, 0);
  const margem = somaFat > 0 ? (somaLucro / somaFat * 100) : 0;

  document.getElementById('total-qtd').textContent = `${fmtNum(somaQtd)} ${unid}`;
  document.getElementById('total-fat').textContent = fmtNum(somaFat);
  document.getElementById('total-lucro').textContent = fmtNum(somaLucro);
  document.getElementById('total-margem').textContent = `${margem.toFixed(1)}%`;
  document.getElementById('pag-vendas').textContent = `${total} venda${total !== 1 ? 's' : ''}`;
  document.getElementById('pag-info').textContent = `${_paginaAtual} / ${totalPags}`;
  document.getElementById('btn-prev').disabled = _paginaAtual === 1;
  document.getElementById('btn-next').disabled = _paginaAtual === totalPags;
}

function mudarPagina(delta) {
  _paginaAtual += delta;
  renderizar();
  document.getElementById('lista-scroll').scrollTop = 0;
}

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight);
fixHeight();
init();
</script>
</body>
</html>
