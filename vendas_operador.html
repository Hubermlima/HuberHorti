<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Novo Pedido</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}

/* TOPBAR */
.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#F2F4F8;}
.topbar-title{font-size:17px;font-weight:700;color:#1C1C1E;}
.ios-btn-float{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;flex-shrink:0;}

/* CONTEÚDO PRINCIPAL */
.main{flex:1;padding:0 16px 100px;display:flex;flex-direction:column;gap:14px;}

/* CARD GENÉRICO */
.card{background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);padding:16px 18px;}

/* AUTOCOMPLETE CLIENTE */
.autocomplete-wrapper{position:relative;width:100%;}
.busca-wrap-ios{position:relative;display:flex;align-items:center;background:#FFF;border-radius:14px;padding:4px 10px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.busca-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:#8E8E93;stroke-width:2.5;fill:none;}
.busca-input{flex-grow:1;padding:10px 10px 10px 34px;background:transparent;border:none;font-size:15px;outline:none;color:#1C1C1E;font-family:'Inter',sans-serif;}
.busca-input::placeholder{color:#C7C7CC;}
.autocomplete-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#FFF;border-radius:18px;box-shadow:0 12px 30px rgba(0,0,0,0.15);z-index:9999;max-height:220px;overflow-y:auto;display:none;border:1px solid #F2F2F7;-webkit-overflow-scrolling:touch;}
.autocomplete-item{padding:14px 18px;font-size:14px;border-bottom:1px solid #F2F2F7;cursor:pointer;color:#1C1C1E;}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:active{background:#F2F2F7;}

/* CAMPO DATA */
.field-row{display:flex;align-items:center;justify-content:space-between;}
.field-label{font-size:14px;color:#8E8E93;font-weight:500;}
.field-date{border:none;font-size:15px;font-weight:600;color:#1C1C1E;text-align:right;outline:none;background:transparent;font-family:'Inter',sans-serif;}

/* CARD PRODUTOS */
.produtos-card{background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);overflow:hidden;}
.produtos-header{padding:14px 18px 10px;border-bottom:0.5px solid #F0F0F5;}
.produtos-header-title{font-size:15px;font-weight:700;color:#1C1C1E;}

/* LISTA DE PRODUTOS */
.produto-item{padding:7px 18px;border-bottom:0.5px solid #F5F5F5;display:flex;flex-direction:column;gap:6px;}
.produto-item:last-child{border-bottom:none;}
.produto-nome{font-size:13px;font-weight:500;color:#1C1C1E;}

/* INPUTS INLINE */
.produto-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.input-group{display:flex;flex-direction:column;gap:4px;}
.input-group-label{font-size:11px;font-weight:600;color:#8E8E93;}
.input-group input{width:100%;background:transparent;border:1px solid #E5E5EA;border-radius:10px;padding:7px 10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:#1C1C1E;outline:none;-webkit-appearance:none;text-align:right;}
.input-group input:focus{background:transparent;border-color:#007AFF;}
.input-group input.total-input{background:transparent;border:1px solid #E5E5EA;border-radius:10px;padding:7px 10px;color:#007AFF;font-weight:700;pointer-events:none;width:100%;text-align:right;font-family:'Inter',sans-serif;font-size:14px;}

/* TOTAL GERAL */
.total-bar{padding:14px 18px;background:#007AFF;border-top:none;display:flex;align-items:center;justify-content:space-between;}
.total-bar-label{font-size:12px;font-weight:600;color:rgba(255,255,255,0.75);text-transform:uppercase;letter-spacing:0.4px;}
.total-bar-val{font-size:20px;font-weight:800;color:#FFF;letter-spacing:-0.5px;}

/* BOTÃO GRAVAR */
.btn-gravar{position:fixed;bottom:0;left:0;right:0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(to top,#F2F4F8 70%,transparent);z-index:100;}
.btn-gravar button{width:100%;padding:16px;background:#007AFF;color:#FFF;border:none;border-radius:100px;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,122,255,0.35);}
.btn-gravar button:active{opacity:0.88;}
.btn-gravar button:disabled{background:#C7C7CC;box-shadow:none;}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1C1C1E;color:#FFF;padding:12px 22px;border-radius:100px;font-size:14px;font-weight:500;z-index:99999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* SEÇÃO LABEL */
.section-label{font-size:11px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.6px;padding:0 4px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="ios-btn-float" onclick="history.back()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C1C1E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <span class="topbar-title">Pedido Venda Express</span>
  <button class="ios-btn-float" id="btn-sessao" onclick="abrirSessao()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C1C1E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
  </button>
</div>

<!-- CONTEÚDO -->
<div class="main">

  <!-- CLIENTE -->
  <div class="autocomplete-wrapper">
    <div class="busca-wrap-ios">
      <svg class="busca-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="busca-input" id="busca-cliente" type="text" placeholder="Buscar cliente..." autocomplete="off" autocorrect="off">
    </div>
    <div class="autocomplete-results" id="resultados-cliente"></div>
  </div>

  <!-- DATA -->
  <div class="card" style="padding:14px 18px;">
    <div class="field-row">
      <span class="field-label">Data do pedido</span>
      <input class="field-date" id="data-pedido" type="date">
    </div>
  </div>

  <!-- TOTAL -->
  <div class="card" style="padding:12px 18px;">
    <div style="display:flex;align-items:center;">
      <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
        <span style="font-size:11px;color:#8E8E93;font-weight:500;">Itens</span>
        <span id="total-itens" style="font-size:15px;font-weight:700;color:#1C1C1E;">0</span>
      </div>
      <div style="width:1px;height:36px;background:#E5E5EA;flex-shrink:0;"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:2px;padding-left:18px;">
        <span style="font-size:11px;color:#8E8E93;font-weight:500;">Total Geral</span>
        <span id="total-geral" style="font-size:15px;font-weight:700;color:#1C1C1E;">R$ 0,00</span>
      </div>
    </div>
  </div>

  <!-- PRODUTOS FAVORITOS -->
  <div class="produtos-card" id="produtos-card">
    <div class="produtos-header">
      <span class="produtos-header-title">Produtos favoritos</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px 18px 4px;border-bottom:0.5px solid #F0F0F5;">
      <span style="font-size:11px;font-weight:600;color:#8E8E93;text-align:right;">Qtd</span>
      <span style="font-size:11px;font-weight:600;color:#8E8E93;text-align:right;">Preço unit.</span>
      <span style="font-size:11px;font-weight:600;color:#8E8E93;text-align:right;">Total</span>
    </div>
    <div id="lista-produtos">
      <div style="padding:24px 18px;text-align:center;font-size:13px;color:#C7C7CC;">Carregando produtos...</div>
    </div>
  </div>

</div>

<!-- BOTÃO GRAVAR -->
<div class="btn-gravar">
  <button id="btn-gravar" onclick="gravarPedido()" disabled>Gravar pedido</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── Estado ───────────────────────────────────────────────────────────────────
let _clienteSelecionado = null; // { id, nome }
let _produtos = [];             // produtos favoritos carregados
let _itens = {};                // { produto_id: { quantidade, preco_unit, total, custo_unit, total_custo, lucro } }
let _pedidoAtualId = null;      // id do pedido em edição
let _pedidosSessao = [];        // pedidos gravados nesta sessão

const UNIDADES = ['kg','un','cx','pct','dz','frd'];

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtBRL(val) {
  if (!val && val !== 0) return '';
  return Number(val).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function parseNum(str) {
  if (!str) return 0;
  return parseFloat(String(str).replace(/\./g,'').replace(',','.')) || 0;
}

// ── Máscara estilo app de banco (centavos acumulando da direita) ─────────────
function mascaraBanco(el) {
  const digits = el.value.replace(/\D/g, '');
  if (!digits) { el.value = ''; return; }
  const num = parseInt(digits, 10) / 100;
  el.value = num.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function getInput(prodId, campo) {
  return document.querySelector(`[data-prodid="${prodId}"][data-campo="${campo}"]`);
}

function calcularItem(prodId) {
  const qtdStr   = getInput(prodId, 'quantidade').value;
  const precoStr = getInput(prodId, 'preco').value;
  const qtd   = parseNum(qtdStr);
  const preco = parseNum(precoStr);
  const total = qtd * preco;
  const totalEl = getInput(prodId, 'total');
  totalEl.value = total > 0
    ? total.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})
    : '';

  const prod = _produtos.find(p => p.id === prodId);
  const custoUnit = parseFloat(prod?.preco_medio_compra) || 0;
  const totalCusto = custoUnit * qtd;
  const lucro = total - totalCusto;

  if (qtd > 0 && preco > 0) {
    _itens[prodId] = {
      produto_id: prodId,
      quantidade: qtd,
      preco_unit: preco,
      custo_unit: custoUnit,
      total_venda: total,
      total_custo: totalCusto,
      lucro,
      quant_despacho: qtd,
      unid_despacho: prod?.unid_venda || null
    };
  } else {
    delete _itens[prodId];
  }
  recalcularTotalGeral();
  atualizarBotao();
}

function salvarUnidade(prodId, valor) {
  if (!_itens[prodId]) _itens[prodId] = {};
  _itens[prodId].unidade = valor;
}

function registrarItem(prodId) {
  calcularItem(prodId);
}

function showToast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── Data padrão (Manaus -04:00) ──────────────────────────────────────────────
function setDataHoje() {
  const hoje = new Date().toLocaleDateString('en-CA', {timeZone:'America/Manaus'});
  document.getElementById('data-pedido').value = hoje;
}
setDataHoje();

// ── Autocomplete de clientes ─────────────────────────────────────────────────
let _todosClientes = [];
window.db.from('clientes').select('id, nome').order('nome').then(({ data }) => {
  if (data) _todosClientes = data;
});

const inputBusca = document.getElementById('busca-cliente');
const listaResultados = document.getElementById('resultados-cliente');

inputBusca.addEventListener('input', () => {
  _clienteSelecionado = null;
  atualizarBotao();
  const termo = inputBusca.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if (termo.length < 1) { listaResultados.style.display = 'none'; return; }
  const filtrados = _todosClientes.filter(c =>
    c.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(termo)
  ).slice(0, 10);
  if (filtrados.length > 0) {
    listaResultados.innerHTML = filtrados.map(c =>
      `<div class="autocomplete-item" onclick="selecionarCliente('${c.id}','${c.nome.replace(/'/g,"\\'")}')">
        ${c.nome}
      </div>`
    ).join('');
    listaResultados.style.display = 'block';
  } else {
    listaResultados.style.display = 'none';
  }
});

function selecionarCliente(id, nome) {
  _clienteSelecionado = { id, nome };
  inputBusca.value = nome;
  inputBusca.dataset.selectedId = id;
  listaResultados.style.display = 'none';
  atualizarBotao();
}

document.addEventListener('touchstart', (e) => {
  if (!e.target.closest('.autocomplete-wrapper')) {
    listaResultados.style.display = 'none';
  }
}, {passive:true});

// ── Carregar produtos favoritos ───────────────────────────────────────────────
async function carregarFavoritos() {
  const { data, error } = await window.db
    .from('produtos')
    .select('id, nome, unid_venda, preco_medio_compra, peso_por_unid')
    .eq('favoritos', true)
    .order('nome');

  if (error || !data || data.length === 0) {
    document.getElementById('lista-produtos').innerHTML =
      '<div style="padding:24px 18px;text-align:center;font-size:13px;color:#C7C7CC;">Nenhum produto favorito cadastrado.</div>';
    return;
  }
  _produtos = data;
  renderizarProdutos();
}

function renderizarProdutos() {
  const lista = document.getElementById('lista-produtos');
  lista.innerHTML = _produtos.map(p => {
    const custo     = parseFloat(p.preco_medio_compra) || 0;
    const peso      = parseFloat(p.peso_por_unid) || 1;
    const sugerido  = Math.floor((custo + 40 / peso) * 10) / 10;
    const sugeridoFmt = sugerido > 0
      ? sugerido.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})
      : '';
    return `
      <div class="produto-item">
        <span class="produto-nome">${p.nome}</span>
        <div class="produto-inputs">
          <div class="input-group">
            <input type="tel" inputmode="numeric" placeholder="0,00"
              data-prodid="${p.id}" data-campo="quantidade"
              oninput="mascaraBanco(this);calcularItem('${p.id}')"
              onfocus="this.select()">
          </div>
          <div class="input-group">
            <input type="tel" inputmode="numeric" placeholder="0,00"
              value="${sugeridoFmt}"
              data-prodid="${p.id}" data-campo="preco"
              oninput="mascaraBanco(this);calcularItem('${p.id}')"
              onfocus="this.select()">
          </div>
          <div class="input-group">
            <input class="total-input" type="text" readonly
              data-prodid="${p.id}" data-campo="total"
              placeholder="0,00">
          </div>
        </div>
      </div>`;
  }).join('');
}

function getInput(prodId, campo) {
  return document.querySelector(`[data-prodid="${prodId}"][data-campo="${campo}"]`);
}

function recalcularTotalGeral() {
  const itens = Object.values(_itens);
  const soma = itens.reduce((acc, i) => acc + (i.total_venda || 0), 0);
  document.getElementById('total-geral').textContent =
    soma.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
  document.getElementById('total-itens').textContent = itens.length;
}

function atualizarBotao() {
  const temCliente = !!_clienteSelecionado;
  const temItens = Object.keys(_itens).length > 0;
  document.getElementById('btn-gravar').disabled = !(temCliente && temItens);
}

// ── Gravar pedido ─────────────────────────────────────────────────────────────
async function gravarPedido() {
  if (!_clienteSelecionado) return showToast('Selecione um cliente');
  const itens = Object.values(_itens).filter(i => i.quantidade > 0);
  if (itens.length === 0) return showToast('Adicione ao menos um item');

  const dataInput = document.getElementById('data-pedido').value;
  if (!dataInput) return showToast('Informe a data');

  const btn = document.getElementById('btn-gravar');
  btn.disabled = true;
  btn.textContent = 'Gravando...';

  const valorTotalNum = Math.floor(itens.reduce((a, i) => a + i.total_venda, 0));
  const totalCustoNum = itens.reduce((a, i) => a + i.total_custo, 0);
  const totalLucroNum = valorTotalNum - totalCustoNum;
  const margemPctNum  = valorTotalNum > 0 ? (totalLucroNum / valorTotalNum) * 100 : 0;
  const isNovo = !_pedidoAtualId;

  try {
    if (isNovo) {
      const agora = new Date();
      const hh = String(agora.getHours()).padStart(2,'0');
      const mi = String(agora.getMinutes()).padStart(2,'0');
      const dataComHora = `${dataInput}T${hh}:${mi}:00-04:00`;
      const { data: pData, error: pErr } = await window.db.from('pedidos_vendas').insert({
        data: dataComHora,
        cliente_id: _clienteSelecionado.id,
        total_venda: valorTotalNum,
        em_aberto: valorTotalNum,
        total_custo: totalCustoNum,
        total_lucro: totalLucroNum,
        margem_pct: margemPctNum
      }).select();
      if (pErr) throw pErr;
      _pedidoAtualId = pData[0].id;
    } else {
      const { error: pErr } = await window.db.from('pedidos_vendas').update({
        total_venda: valorTotalNum,
        em_aberto: valorTotalNum,
        total_custo: totalCustoNum,
        total_lucro: totalLucroNum,
        margem_pct: margemPctNum
      }).eq('id', _pedidoAtualId);
      if (pErr) throw pErr;
    }

    // Itens existentes no banco
    const { data: itensExistentes } = await window.db.from('itens_pedidos_vendas')
      .select('id, produto_id, quant_despacho, unid_despacho')
      .eq('pedido_venda_id', _pedidoAtualId);

    const mapaExistentes = {};
    (itensExistentes || []).forEach(e => { mapaExistentes[e.produto_id] = e; });

    // Deletar itens removidos
    const produtosAtivos = itens.map(i => i.produto_id);
    const idsParaDeletar = (itensExistentes || [])
      .filter(e => !produtosAtivos.includes(e.produto_id))
      .map(e => e.id);
    if (idsParaDeletar.length) {
      await window.db.from('itens_pedidos_vendas').delete().in('id', idsParaDeletar);
    }

    // Insert ou update de cada item
    for (const i of itens) {
      const ex = mapaExistentes[i.produto_id];
      const payload = {
        pedido_venda_id: _pedidoAtualId,
        produto_id: i.produto_id,
        quantidade: i.quantidade,
        preco_unit: i.preco_unit,
        custo_unit: i.custo_unit,
        total_venda: i.total_venda,
        total_custo: i.total_custo,
        lucro: i.lucro,
        quant_despacho: i.quant_despacho != null ? i.quant_despacho : i.quantidade,
        unid_despacho: i.unid_despacho || null,
        operador_confirmou: false
      };
      if (ex) {
        if (ex.quant_despacho != null && i.quant_despacho == null) {
          payload.quant_despacho = ex.quant_despacho;
          payload.unid_despacho  = ex.unid_despacho;
        }
        await window.db.from('itens_pedidos_vendas').update(payload).eq('id', ex.id);
      } else {
        await window.db.from('itens_pedidos_vendas').insert(payload);
      }
    }

    showToast('Pedido gravado com sucesso!');

    // Registra ou atualiza na sessão
    const dataFormatada = dataInput.split('-').reverse().join('/').substring(0, 5);
    const idxSessao = _pedidosSessao.findIndex(p => p.id === _pedidoAtualId);
    const entradaSessao = { id: _pedidoAtualId, clienteId: _clienteSelecionado.id, clienteNome: _clienteSelecionado.nome, data: dataFormatada, dataISO: dataInput };
    if (idxSessao >= 0) _pedidosSessao[idxSessao] = entradaSessao;
    else _pedidosSessao.push(entradaSessao);

    btn.disabled = false;
    btn.textContent = 'Gravar pedido';

  } catch (err) {
    showToast('Erro: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Gravar pedido';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
carregarFavoritos();
</script>

<!-- MODAL SESSÃO -->
<div id="sessao-overlay" onclick="fecharSessao()" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.3);"></div>
<div id="sessao-modal" style="display:none;position:fixed;top:64px;right:16px;z-index:9999;background:#FFF;border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,0.18);width:260px;overflow:hidden;animation:floatIn 0.18s cubic-bezier(0.4,0,0.2,1);">
  <div id="sessao-lista"></div>
</div>
<style>
@keyframes floatIn{from{opacity:0;transform:scale(0.95) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.sessao-item{padding:14px 18px;font-size:14px;color:#1C1C1E;cursor:pointer;border-bottom:0.5px solid #F2F2F7;display:flex;flex-direction:column;gap:2px;}
.sessao-item:last-child{border-bottom:none;}
.sessao-item:active{background:#F2F2F7;}
.sessao-item-nome{font-weight:600;font-size:14px;color:#1C1C1E;}
.sessao-item-sub{font-size:12px;color:#8E8E93;}
.sessao-item-novo{padding:14px 18px;font-size:14px;font-weight:600;color:#007AFF;cursor:pointer;display:flex;align-items:center;gap:8px;}
.sessao-item-novo:active{background:#F2F2F7;}
.sessao-item.ativo .sessao-item-nome{color:#007AFF;}
</style>

<script>
// ── Sessão ────────────────────────────────────────────────────────────────────
function abrirSessao() {
  const lista = document.getElementById('sessao-lista');
  lista.innerHTML = _pedidosSessao.map((p, i) => `
    <div class="sessao-item${_pedidoAtualId === p.id ? ' ativo' : ''}" onclick="carregarPedidoSessao(${i})">
      <span class="sessao-item-nome">${p.clienteNome}</span>
      <span class="sessao-item-sub">${p.data}</span>
    </div>`
  ).join('') + `
  <div class="sessao-item-novo" onclick="novoPedido()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Novo Pedido
  </div>`;
  document.getElementById('sessao-overlay').style.display = 'block';
  document.getElementById('sessao-modal').style.display = 'block';
}

function fecharSessao() {
  document.getElementById('sessao-overlay').style.display = 'none';
  document.getElementById('sessao-modal').style.display = 'none';
}

function novoPedido() {
  fecharSessao();
  _pedidoAtualId = null;
  _clienteSelecionado = null;
  _itens = {};
  inputBusca.value = '';
  inputBusca.dataset.selectedId = '';
  setDataHoje();
  renderizarProdutos();
  recalcularTotalGeral();
  atualizarBotao();
}

async function carregarPedidoSessao(idx) {
  fecharSessao();
  const p = _pedidosSessao[idx];
  if (!p) return;

  // Restaura cliente
  _clienteSelecionado = { id: p.clienteId, nome: p.clienteNome };
  inputBusca.value = p.clienteNome;
  inputBusca.dataset.selectedId = p.clienteId;
  _pedidoAtualId = p.id;

  // Restaura data
  document.getElementById('data-pedido').value = p.dataISO;

  // Busca itens do banco
  const { data: itens } = await window.db.from('itens_pedidos_vendas')
    .select('produto_id, quantidade, preco_unit, custo_unit, total_venda, total_custo, lucro, quant_despacho, unid_despacho')
    .eq('pedido_venda_id', p.id);

  _itens = {};
  (itens || []).forEach(i => {
    _itens[i.produto_id] = {
      produto_id: i.produto_id,
      quantidade: parseFloat(i.quantidade),
      preco_unit: parseFloat(i.preco_unit),
      custo_unit: parseFloat(i.custo_unit),
      total_venda: parseFloat(i.total_venda),
      total_custo: parseFloat(i.total_custo),
      lucro: parseFloat(i.lucro),
      quant_despacho: i.quant_despacho,
      unid_despacho: i.unid_despacho
    };
  });

  // Re-renderiza e preenche inputs
  renderizarProdutos();
  Object.entries(_itens).forEach(([prodId, i]) => {
    const qtdEl = getInput(prodId, 'quantidade');
    const precoEl = getInput(prodId, 'preco');
    const totalEl = getInput(prodId, 'total');
    if (qtdEl) qtdEl.value = i.quantidade.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
    if (precoEl) precoEl.value = i.preco_unit.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
    if (totalEl) totalEl.value = i.total_venda.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  });

  recalcularTotalGeral();
  atualizarBotao();
}
</script>

</body>
</html>
