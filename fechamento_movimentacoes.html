<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Fechamento de Movimentações</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-y:none;}
.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#1C1C1E;}
.topbar-sub{font-size:10px;color:#8E8E93;font-weight:400;margin-top:1px;}
.ios-btn{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;}

.card-wrap{padding:0 16px calc(env(safe-area-inset-bottom) + 16px);flex-shrink:0;}
.card{
  background:#FFF;
  border-radius:20px;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
  overflow:hidden;
  flex:1;
  display:flex;
  flex-direction:column;
}

.status-wrap{
  display:flex;
  flex-direction:column;
  flex:1;
}

.card-footer{
  display:flex;
  gap:10px;
  padding:12px 16px calc(env(safe-area-inset-bottom) + 14px);
  border-top:0.5px solid #F0F0F0;
  margin-top:auto;
}
.status-wrap{display:flex;flex-direction:column;}
.status-item{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:0.5px solid #F5F5F5;}
.status-item:last-child{border-bottom:none;}
.status-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.status-icon.idle{background:#F2F2F7;}
.status-icon.running{background:#FFF9E6;}
.status-icon.done{background:#D1FAE5;}
.status-icon.warn{background:#FEF9C3;}
.status-icon.error{background:#FEE2E2;}
.status-icon svg{width:16px;height:16px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.status-icon.idle svg{stroke:#C7C7CC;}
.status-icon.running svg{stroke:#F59E0B;}
.status-icon.done svg{stroke:#10B981;}
.status-icon.warn svg{stroke:#D97706;}
.status-icon.error svg{stroke:#EF4444;}
.status-text{flex:1;}
.status-label{font-size:13px;color:#1C1C1E;font-weight:500;}
.status-sub{font-size:11px;color:#8E8E93;margin-top:2px;}
.card-footer{
  display:flex;
  gap:10px;
  padding:12px 16px 14px;
  border-top:0.5px solid #F0F0F0;
}

.btn{
  flex:1;
  height:46px;
  border:none;
  border-radius:14px;
  font-family:'Inter',sans-serif;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s ease;
  -webkit-tap-highlight-color:transparent;
}

.btn:active{
  transform:scale(0.98);
}

.btn-secundario{
  background:#F2F2F7;
  color:#1C1C1E;
}

.btn-primario{
  background:#007AFF;
  color:#FFF;
}

.btn-primario:disabled{
  background:#D1D1D6;
  color:#FFFFFF;
  cursor:default;
  transform:none;
}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn" onclick="voltarParaOrigem()">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Fechamento de Movimentações</div>
    <div class="topbar-sub" id="topbar-ciclo"></div>
  </div>
  <div style="width:38px;"></div>
</div>

<div class="card-wrap" style="flex:1;display:flex;flex-direction:column;">

  <div class="card">
    <div class="status-wrap">
      <div class="status-item">
        <div class="status-icon idle" id="icon-clientes">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
        <div class="status-text">
          <div class="status-label">Movimentos de Clientes</div>
          <div class="status-sub" id="sub-clientes">Aguardando pré-análise...</div>
        </div>
      </div>
      <div class="status-item">
        <div class="status-icon idle" id="icon-fornecedores">
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </div>
        <div class="status-text">
          <div class="status-label">Movimentos de Fornecedores</div>
          <div class="status-sub" id="sub-fornecedores">Aguardando pré-análise...</div>
        </div>
      </div>
      <div class="status-item">
        <div class="status-icon idle" id="icon-limpeza">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        </div>
        <div class="status-text">
          <div class="status-label">Limpeza de Pendentes</div>
          <div class="status-sub" id="sub-limpeza">Aguardando pré-análise...</div>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <button class="btn btn-secundario" id="btn-pre" onclick="preAnalise()">Pré-Análise</button>
      <button class="btn btn-primario" id="btn-exec" disabled onclick="executarConsolidacao()">Executar Consolidação</button>
    </div>
  </div>
</div>

<script>
window.HHUtils.atualizarCicloAtualGlobal();
const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();

function voltarParaOrigem() { window.location.href = 'dashboard.html'; }

function setIconEstado(id, estado) {
  document.getElementById(id).className = `status-icon ${estado}`;
}
function setSubTexto(id, texto) {
  document.getElementById(id).textContent = texto;
}

document.getElementById('topbar-ciclo').textContent =
  `${window.HHUtils.formatarDataBR(window.cicloAtual.d0)} — ${window.HHUtils.formatarDataBR(window.cicloAtual.d7)}`;

let _dadosVerificados = null;

async function preAnalise() {
  const btnPre = document.getElementById('btn-pre');
  const btnExec = document.getElementById('btn-exec');
  btnPre.disabled = true;
  btnPre.textContent = 'Analisando...';
  btnExec.disabled = true;

  setIconEstado('icon-clientes', 'running'); setSubTexto('sub-clientes', 'Verificando...');
  setIconEstado('icon-fornecedores', 'running'); setSubTexto('sub-fornecedores', 'Verificando...');
  setIconEstado('icon-limpeza', 'running'); setSubTexto('sub-limpeza', 'Verificando...');

  try {
    const { data: movsCli } = await window.db.from('movimentos_clientes')
      .select('id, cliente_id, valor').eq('status', 0).not('data', 'is', null);
    const { data: movsFor } = await window.db.from('movimentos_fornecedores')
      .select('id, fornecedor_id, valor').eq('status', 0).not('data', 'is', null);
    const { data: pendentes } = await window.db.from('movimentos_clientes')
      .select('id').is('data', null);

    const nCli = new Set((movsCli||[]).map(m=>m.cliente_id)).size;
    const nFor = new Set((movsFor||[]).map(m=>m.fornecedor_id)).size;
    const nPend = (pendentes||[]).length;
    const tudoZero = nCli===0 && nFor===0 && nPend===0;

    setIconEstado('icon-clientes', nCli>0?'warn':'done');
    setSubTexto('sub-clientes', nCli>0 ? `${nCli} cliente${nCli>1?'s':''} encontrado${nCli>1?'s':''}` : 'Nenhum movimento encontrado');
    setIconEstado('icon-fornecedores', nFor>0?'warn':'done');
    setSubTexto('sub-fornecedores', nFor>0 ? `${nFor} fornecedor${nFor>1?'es':''} encontrado${nFor>1?'s':''}` : 'Nenhum movimento encontrado');
    setIconEstado('icon-limpeza', nPend>0?'warn':'done');
    setSubTexto('sub-limpeza', nPend>0 ? `${nPend} movimento${nPend>1?'s':''} encontrado${nPend>1?'s':''}` : 'Nada a apagar');

    _dadosVerificados = { movsCli: movsCli||[], movsFor: movsFor||[], nPend };
    btnPre.disabled = false;
    btnPre.textContent = 'Pré-Análise';
    btnExec.disabled = tudoZero;

  } catch(err) {
    alert('Erro: ' + err.message);
    btnPre.disabled = false;
    btnPre.textContent = 'Pré-Análise';
    setIconEstado('icon-clientes','idle'); setSubTexto('sub-clientes','Aguardando pré-análise...');
    setIconEstado('icon-fornecedores','idle'); setSubTexto('sub-fornecedores','Aguardando pré-análise...');
    setIconEstado('icon-limpeza','idle'); setSubTexto('sub-limpeza','Aguardando pré-análise...');
  }
}

async function executarConsolidacao() {
  const btnPre = document.getElementById('btn-pre');
  const btnExec = document.getElementById('btn-exec');
  btnPre.disabled = true;
  btnExec.disabled = true;
  btnExec.textContent = 'Processando...';

  const resumo = { clientes:0, notasCli:0, fornecedores:0, notasFor:0, apagados:0 };
  const { movsCli, movsFor, nPend } = _dadosVerificados;

  try {
    // CLIENTES
    setIconEstado('icon-clientes','running'); setSubTexto('sub-clientes','Processando...');
    const mapaCli = {};
    movsCli.forEach(m => { mapaCli[m.cliente_id] = (mapaCli[m.cliente_id]||0) + (parseFloat(m.valor)||0); });
    const clienteIds = Object.keys(mapaCli);
    resumo.clientes = clienteIds.length;
    for (const cid of clienteIds) {
      let saldo = mapaCli[cid];
      const { data: pedidos } = await window.db.from('pedidos_vendas')
        .select('id,em_aberto').eq('cliente_id',cid).gt('em_aberto',0).order('data',{ascending:true});
      for (const p of (pedidos||[])) {
        if (saldo<=0) break;
        const ea = parseFloat(p.em_aberto)||0;
        const ab = Math.min(saldo,ea);
        const novo = ea-ab; saldo-=ab;
        await window.db.from('pedidos_vendas').update({em_aberto:novo,status:novo<=0?1:0}).eq('id',p.id);
        resumo.notasCli++;
      }
    }
    const idsCli = movsCli.map(m=>m.id);
    if (idsCli.length>0) await window.db.from('movimentos_clientes').update({status:1}).in('id',idsCli);
    setIconEstado('icon-clientes','done');
    setSubTexto('sub-clientes', `${resumo.clientes} cliente${resumo.clientes!==1?'s':''} processado${resumo.clientes!==1?'s':''}, ${resumo.notasCli} nota${resumo.notasCli!==1?'s':''} baixada${resumo.notasCli!==1?'s':''}`);

    // FORNECEDORES
    setIconEstado('icon-fornecedores','running'); setSubTexto('sub-fornecedores','Processando...');
    const mapaFor = {};
    movsFor.forEach(m => { mapaFor[m.fornecedor_id] = (mapaFor[m.fornecedor_id]||0) + (parseFloat(m.valor)||0); });
    const fornecedorIds = Object.keys(mapaFor);
    resumo.fornecedores = fornecedorIds.length;
    for (const fid of fornecedorIds) {
      let saldo = mapaFor[fid];
      const { data: pedidos } = await window.db.from('pedidos_compras')
        .select('id,em_aberto').eq('fornecedor_id',fid).gt('em_aberto',0).order('data',{ascending:true});
      for (const p of (pedidos||[])) {
        if (saldo<=0) break;
        const ea = parseFloat(p.em_aberto)||0;
        const ab = Math.min(saldo,ea);
        const novo = ea-ab; saldo-=ab;
        await window.db.from('pedidos_compras').update({em_aberto:novo}).eq('id',p.id);
        resumo.notasFor++;
      }
    }
    const idsFor = movsFor.map(m=>m.id);
    if (idsFor.length>0) await window.db.from('movimentos_fornecedores').update({status:1}).in('id',idsFor);
    setIconEstado('icon-fornecedores','done');
    setSubTexto('sub-fornecedores', `${resumo.fornecedores} fornecedor${resumo.fornecedores!==1?'es':''} processado${resumo.fornecedores!==1?'s':''}, ${resumo.notasFor} nota${resumo.notasFor!==1?'s':''} baixada${resumo.notasFor!==1?'s':''}`);

    // LIMPEZA
    setIconEstado('icon-limpeza','running'); setSubTexto('sub-limpeza','Apagando...');
    if (nPend>0) await window.db.from('movimentos_clientes').delete().is('data',null);
    resumo.apagados = nPend;
    setIconEstado('icon-limpeza','done');
    setSubTexto('sub-limpeza', `${resumo.apagados} movimento${resumo.apagados!==1?'s':''} apagado${resumo.apagados!==1?'s':''}`);

    await window.db.from('consolidacao').update({data:new Date().toISOString()}).eq('id',2);

    btnExec.textContent = 'Concluído ✓';
    btnExec.style.background = '#10B981';
    btnExec.style.pointerEvents = 'all';
    btnExec.disabled = false;
    btnExec.onclick = () => voltarParaOrigem();

  } catch(err) {
    alert('Erro: ' + err.message);
    btnPre.disabled = false;
    btnExec.disabled = false;
    btnExec.textContent = 'Executar Consolidação';
  }
}
</script>
</body>
</html>
