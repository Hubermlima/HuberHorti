<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Fechamento de Movimentações</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-y:none;}
.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#1C1C1E;}
.topbar-sub{font-size:10px;color:#8E8E93;font-weight:400;margin-top:1px;}
.ios-btn{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;}

.content{flex:1;display:flex;flex-direction:column;padding:0 16px 32px;gap:16px;overflow-y:auto;}

.card{background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);padding:20px;}

.status-wrap{display:flex;flex-direction:column;gap:10px;}
.status-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid #F5F5F5;}
.status-item:last-child{border-bottom:none;}
.status-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.status-icon.idle{background:#F2F2F7;}
.status-icon.running{background:#FFF9E6;}
.status-icon.done{background:#D1FAE5;}
.status-icon.error{background:#FEE2E2;}
.status-icon svg{width:16px;height:16px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.status-icon.idle svg{stroke:#C7C7CC;}
.status-icon.running svg{stroke:#F59E0B;}
.status-icon.done svg{stroke:#10B981;}
.status-icon.error svg{stroke:#EF4444;}
.status-text{flex:1;}
.status-label{font-size:13px;color:#1C1C1E;font-weight:500;}
.status-sub{font-size:11px;color:#8E8E93;margin-top:2px;}

.resumo-wrap{display:flex;flex-direction:column;gap:8px;}
.resumo-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #F5F5F5;}
.resumo-row:last-child{border-bottom:none;}
.resumo-label{font-size:12px;color:#8E8E93;}
.resumo-val{font-size:13px;font-weight:500;color:#1C1C1E;}
.resumo-val.green{color:#10B981;}
.resumo-val.red{color:#EF4444;}

.log-wrap{max-height:160px;overflow-y:auto;}
.log-item{font-size:11px;color:#8E8E93;padding:3px 0;border-bottom:0.5px solid #F9F9F9;}

.btn-iniciar{width:100%;padding:16px;background:#4A90D9;border:none;border-radius:100px;color:#FFF;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:background 0.3s;}
.btn-iniciar:active{opacity:0.8;}
.btn-iniciar:disabled{background:#C7C7CC;cursor:default;}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(245,158,11,0.3);border-top-color:#F59E0B;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn" onclick="voltarParaOrigem()">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Fechamento de Movimentações</div>
    <div class="topbar-sub" id="topbar-ciclo"></div>
  </div>
  <div style="width:38px;"></div>
</div>

<div class="content">

  <div class="card">
    <div class="status-wrap">
      <div class="status-item">
        <div class="status-icon idle" id="icon-clientes">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
        <div class="status-text">
          <div class="status-label">Movimentos de Clientes</div>
          <div class="status-sub" id="sub-clientes">Aguardando...</div>
        </div>
      </div>
      <div class="status-item">
        <div class="status-icon idle" id="icon-fornecedores">
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </div>
        <div class="status-text">
          <div class="status-label">Movimentos de Fornecedores</div>
          <div class="status-sub" id="sub-fornecedores">Aguardando...</div>
        </div>
      </div>
      <div class="status-item">
        <div class="status-icon idle" id="icon-limpeza">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        </div>
        <div class="status-text">
          <div class="status-label">Limpeza de Pendentes</div>
          <div class="status-sub" id="sub-limpeza">Aguardando...</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card" id="card-resumo" style="display:none;">
    <div style="font-size:11px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;">Resumo</div>
    <div class="resumo-wrap">
      <div class="resumo-row"><span class="resumo-label">Clientes processados</span><span class="resumo-val" id="res-clientes">—</span></div>
      <div class="resumo-row"><span class="resumo-label">Notas baixadas (clientes)</span><span class="resumo-val green" id="res-notas-cli">—</span></div>
      <div class="resumo-row"><span class="resumo-label">Fornecedores processados</span><span class="resumo-val" id="res-fornecedores">—</span></div>
      <div class="resumo-row"><span class="resumo-label">Notas baixadas (fornecedores)</span><span class="resumo-val green" id="res-notas-for">—</span></div>
      <div class="resumo-row"><span class="resumo-label">Movimentos apagados</span><span class="resumo-val red" id="res-apagados">—</span></div>
    </div>
  </div>

</div>

<div style="padding:0 16px 32px;flex-shrink:0;">
  <button class="btn-iniciar" id="btn-iniciar" onclick="iniciarFechamento()">Iniciar Fechamento</button>
</div>

<script>
window.HHUtils.atualizarCicloAtualGlobal();
const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();

function voltarParaOrigem() { window.location.href = 'dashboard.html'; }

function fmtMoeda(v) {
  return Number(v).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
}

function setIconEstado(id, estado) {
  const el = document.getElementById(id);
  el.className = `status-icon ${estado}`;
}

function setSubTexto(id, texto) {
  document.getElementById(id).textContent = texto;
}

document.getElementById('topbar-ciclo').textContent =
  `${window.HHUtils.formatarDataBR(window.cicloAtual.d0)} — ${window.HHUtils.formatarDataBR(window.cicloAtual.d7)}`;

async function iniciarFechamento() {
  const btn = document.getElementById('btn-iniciar');
  btn.disabled = true;
  btn.textContent = 'Processando...';

  const resumo = { clientes: 0, notasCli: 0, fornecedores: 0, notasFor: 0, apagados: 0 };

  try {
    // ── CLIENTES ──
    setIconEstado('icon-clientes', 'running');
    setSubTexto('sub-clientes', 'Buscando clientes...');

    const { data: movsCli } = await window.db.from('movimentos_clientes')
      .select('id, cliente_id, valor').eq('status', 0).not('data', 'is', null);

    const mapaClientes = {};
    (movsCli || []).forEach(m => {
      if (!mapaClientes[m.cliente_id]) mapaClientes[m.cliente_id] = 0;
      mapaClientes[m.cliente_id] += parseFloat(m.valor) || 0;
    });

    const clienteIds = Object.keys(mapaClientes);
    resumo.clientes = clienteIds.length;
    setSubTexto('sub-clientes', `Processando ${clienteIds.length} clientes...`);

    for (const clienteId of clienteIds) {
      let saldo = mapaClientes[clienteId];
      const { data: pedidos } = await window.db.from('pedidos_vendas')
        .select('id, em_aberto').eq('cliente_id', clienteId)
        .gt('em_aberto', 0).order('data', { ascending: true });

      for (const pedido of (pedidos || [])) {
        if (saldo <= 0) break;
        const emAberto = parseFloat(pedido.em_aberto) || 0;
        const abater = Math.min(saldo, emAberto);
        const novoAberto = emAberto - abater;
        saldo -= abater;
        await window.db.from('pedidos_vendas')
          .update({ em_aberto: novoAberto, status: novoAberto <= 0 ? 1 : 0 })
          .eq('id', pedido.id);
        resumo.notasCli++;
      }
    }

    // Marca movimentos de clientes como status 1
    const idsCli = (movsCli || []).map(m => m.id);
    if (idsCli.length > 0) {
      await window.db.from('movimentos_clientes').update({ status: 1 }).in('id', idsCli);
    }

    setIconEstado('icon-clientes', 'done');
    setSubTexto('sub-clientes', `${clienteIds.length} clientes processados`);

    // ── FORNECEDORES ──
    setIconEstado('icon-fornecedores', 'running');
    setSubTexto('sub-fornecedores', 'Buscando fornecedores...');

    const { data: movsFor } = await window.db.from('movimentos_fornecedores')
      .select('id, fornecedor_id, valor').eq('status', 0).not('data', 'is', null);

    const mapaFornecedores = {};
    (movsFor || []).forEach(m => {
      if (!mapaFornecedores[m.fornecedor_id]) mapaFornecedores[m.fornecedor_id] = 0;
      mapaFornecedores[m.fornecedor_id] += parseFloat(m.valor) || 0;
    });

    const fornecedorIds = Object.keys(mapaFornecedores);
    resumo.fornecedores = fornecedorIds.length;
    setSubTexto('sub-fornecedores', `Processando ${fornecedorIds.length} fornecedores...`);

    for (const fornecedorId of fornecedorIds) {
      let saldo = mapaFornecedores[fornecedorId];
      const { data: pedidos } = await window.db.from('pedidos_compras')
        .select('id, em_aberto').eq('fornecedor_id', fornecedorId)
        .gt('em_aberto', 0).order('data', { ascending: true });

      for (const pedido of (pedidos || [])) {
        if (saldo <= 0) break;
        const emAberto = parseFloat(pedido.em_aberto) || 0;
        const abater = Math.min(saldo, emAberto);
        const novoAberto = emAberto - abater;
        saldo -= abater;
        await window.db.from('pedidos_compras')
          .update({ em_aberto: novoAberto })
          .eq('id', pedido.id);
        resumo.notasFor++;
      }
    }

    // Marca movimentos de fornecedores como status 1
    const idsFor = (movsFor || []).map(m => m.id);
    if (idsFor.length > 0) {
      await window.db.from('movimentos_fornecedores').update({ status: 1 }).in('id', idsFor);
    }

    setIconEstado('icon-fornecedores', 'done');
    setSubTexto('sub-fornecedores', `${fornecedorIds.length} fornecedores processados`);

    // ── LIMPEZA ──
    setIconEstado('icon-limpeza', 'running');
    setSubTexto('sub-limpeza', 'Apagando movimentos pendentes...');

    const { data: pendentes } = await window.db.from('movimentos_clientes')
      .select('id').is('data', null);
    const qtdPendentes = (pendentes || []).length;
    if (qtdPendentes > 0) {
      await window.db.from('movimentos_clientes').delete().is('data', null);
    }
    resumo.apagados = qtdPendentes;

    setIconEstado('icon-limpeza', 'done');
    setSubTexto('sub-limpeza', `${qtdPendentes} movimentos apagados`);

    // ── GRAVA CONSOLIDAÇÃO ──
    await window.db.from('consolidacao')
      .update({ data: new Date().toISOString() })
      .eq('id', 2);

    // ── RESUMO ──
    document.getElementById('card-resumo').style.display = 'block';
    document.getElementById('res-clientes').textContent = resumo.clientes;
    document.getElementById('res-notas-cli').textContent = resumo.notasCli;
    document.getElementById('res-fornecedores').textContent = resumo.fornecedores;
    document.getElementById('res-notas-for').textContent = resumo.notasFor;
    document.getElementById('res-apagados').textContent = resumo.apagados;

    btn.textContent = 'Concluído';
    btn.style.background = '#10B981';
    btn.disabled = false;
    btn.onclick = () => voltarParaOrigem();

  } catch(err) {
    alert('Erro: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Tentar Novamente';
  }
}
</script>
</body>
</html>
