<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sistema de Vendas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --bg:#0d0f14; --surface:#151820; --surface2:#1c2030; --border:#252a38;
    --accent:#6c63ff; --accent2:#00d4aa; --danger:#ff4d6d; --warn:#ffb347;
    --text:#e8eaf0; --muted:#6b7280; --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:8px;height:56px;position:sticky;top:0;z-index:100}
  .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--accent);flex:1}
  .nav-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
  .nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  main{padding:20px 16px;max-width:700px;margin:0 auto}
  .section{display:none}.section.active{display:block}
  h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:20px}
  h2 span{color:var(--accent)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .form-group{margin-bottom:14px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  select option{background:var(--surface2)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .2s}
  .btn-success{background:var(--accent2);color:#0d0f14}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn:hover{filter:brightness(1.12)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row .btn{flex:1;justify-content:center;min-width:120px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:14px;z-index:999;transition:transform .3s;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.ok{border-color:var(--accent2);color:var(--accent2)}
  .toast.err{border-color:var(--danger);color:var(--danger)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 12px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
  td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--surface2)}
  .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500}
  .badge-green{background:#00d4aa22;color:var(--accent2);border:1px solid #00d4aa44}
  .badge-red{background:#ff4d6d22;color:var(--danger);border:1px solid #ff4d6d44}
  .badge-purple{background:#6c63ff22;color:var(--accent);border:1px solid #6c63ff44}
  .badge-warn{background:#ffb34722;color:var(--warn);border:1px solid #ffb34744}
  .badge-blue{background:#38bdf822;color:#38bdf8;border:1px solid #38bdf844}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px 20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
  .modal-close{background:var(--surface2);border:none;color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .loading{text-align:center;padding:30px;color:var(--muted);font-size:14px}
  .search-bar{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;width:100%;margin-bottom:16px;transition:border .2s}
  .search-bar:focus{border-color:var(--accent)}
  .fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px #6c63ff66;z-index:50;display:flex;align-items:center;justify-content:center;transition:transform .2s;line-height:1}
  .fab:hover{transform:scale(1.1)}
  .divider{border:none;border-top:1px solid var(--border);margin:16px 0}
  .nivel-ball{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .table-wrap{overflow-x:auto}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">⚡ Vendas</div>
  <button class="nav-btn active" onclick="showTab('config',this)">⚙️ Config</button>
  <button class="nav-btn" onclick="showTab('contas',this)">📊 Contas</button>
</nav>

<main>

  <!-- CONFIGURAÇÕES -->

  <section class="section active" id="tab-config">
    <h2><span>⚙️</span> Configurações</h2>
    <div class="card">
      <div class="loading" id="config-loading">⏳ Carregando...</div>
      <div id="config-fields" style="display:none">
        <div class="form-group">
          <label>Nome da Empresa</label>
          <input id="cfg-empresa" type="text" placeholder="Ex: Minha Empresa Ltda"/>
        </div>
        <div class="form-group">
          <label>CNPJ</label>
          <input id="cfg-cnpj" type="text" placeholder="00.000.000/0000-00"/>
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input id="cfg-telefone" type="text" placeholder="(00) 00000-0000"/>
        </div>
        <div class="form-group">
          <label>Endereço</label>
          <input id="cfg-endereco" type="text" placeholder="Rua, número, cidade - UF"/>
        </div>
        <div class="form-group">
          <label>Chave PIX</label>
          <input id="cfg-pix" type="text" placeholder="CPF, CNPJ, e-mail ou telefone"/>
        </div>
        <div class="form-group">
          <label>URL do Logo</label>
          <input id="cfg-logo" type="text" placeholder="https://..."/>
        </div>
        <hr class="divider"/>
        <div class="row">
          <button class="btn btn-success" onclick="salvarConfig()">💾 Salvar Configurações</button>
        </div>
        <div id="cfg-ultima" style="margin-top:12px;font-size:12px;color:var(--muted);text-align:center"></div>
      </div>
    </div>
  </section>

  <!-- CONTAS CONTÁBEIS -->

  <section class="section" id="tab-contas">
    <h2><span>📊</span> Contas Contábeis</h2>
    <input class="search-bar" id="contas-search" type="text" placeholder="🔍 Buscar por código ou nome..." oninput="filtrarContas()"/>
    <div class="card">
      <div class="loading" id="contas-loading">⏳ Carregando...</div>
      <div id="contas-lista" style="display:none"></div>
    </div>
    <button class="fab" onclick="abrirModal(null)">+</button>
  </section>

</main>

<!-- MODAL CONTA -->

<div class="overlay" id="modal-overlay" onclick="fecharModalFora(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-titulo">Nova Conta</div>
      <button class="modal-close" onclick="fecharModal()">×</button>
    </div>
    <div class="form-group">
      <label>Código *</label>
      <input id="m-codigo" type="text" placeholder="Ex: 1.1.01"/>
    </div>
    <div class="form-group">
      <label>Nome *</label>
      <input id="m-nome" type="text" placeholder="Ex: Vendas de Produtos"/>
    </div>
    <div class="form-group">
      <label>Tipo *</label>
      <select id="m-tipo">
        <option value="">— Selecione —</option>
        <option>Receita</option>
        <option>Despesa</option>
        <option>Custo de Mercadoria</option>
        <option>Imposto</option>
        <option>Investimento</option>
      </select>
    </div>
    <div class="form-group">
      <label>Nível (1 = raiz)</label>
      <input id="m-nivel" type="number" min="1" max="5" value="1"/>
    </div>
    <div class="form-group">
      <label>Conta Pai (opcional)</label>
      <select id="m-pai"><option value="">— Nenhuma —</option></select>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="m-ativo">
        <option value="true">✅ Ativo</option>
        <option value="false">❌ Inativo</option>
      </select>
    </div>
    <input type="hidden" id="m-id"/>
    <hr class="divider"/>
    <div class="row">
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-success" onclick="salvarConta()">💾 Salvar</button>
    </div>
    <div id="m-delete" style="margin-top:10px;display:none">
      <button class="btn btn-danger" style="width:100%;justify-content:center" onclick="deletarConta()">🗑️ Excluir esta conta</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://suwaqkxkhhfopjkhsptf.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1d2Fxa3hraGhmb3Bqa2hzcHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDI2MDQsImV4cCI6MjA5MDM3ODYwNH0.HcLs3bkZZ0lATGSQbWtTt7oIxcM8inYmLZHm2K5v39U';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

let contasAll = [];
let configId = null;

function showTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'contas' && contasAll.length === 0) carregarContas();
}

function toast(msg, tipo = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + tipo;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function badgeTipo(tipo) {
  const map = { 'Receita':'badge-green','Despesa':'badge-red','Custo de Mercadoria':'badge-warn','Imposto':'badge-blue','Investimento':'badge-purple' };
  return `<span class="badge ${map[tipo]||'badge-purple'}">${tipo}</span>`;
}

// ── CONFIGURAÇÕES ────────────────────────────
async function carregarConfig() {
  const { data, error } = await db.from('configuracoes').select('*').limit(1).maybeSingle();
  document.getElementById('config-loading').style.display = 'none';
  document.getElementById('config-fields').style.display = 'block';
  if (error) { toast('Erro ao carregar configurações', 'err'); return; }
  if (data) {
    configId = data.id;
    document.getElementById('cfg-empresa').value  = data.empresa   || '';
    document.getElementById('cfg-cnpj').value     = data.cnpj      || '';
    document.getElementById('cfg-telefone').value = data.telefone  || '';
    document.getElementById('cfg-endereco').value = data.endereco  || '';
    document.getElementById('cfg-pix').value      = data.pix_chave || '';
    document.getElementById('cfg-logo').value     = data.logo      || '';
    if (data.updated_at) {
      const d = new Date(data.updated_at);
      document.getElementById('cfg-ultima').textContent =
        'Última atualização: ' + d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR');
    }
  }
}

async function salvarConfig() {
  const payload = {
    empresa: document.getElementById('cfg-empresa').value.trim(),
    cnpj: document.getElementById('cfg-cnpj').value.trim(),
    telefone: document.getElementById('cfg-telefone').value.trim(),
    endereco: document.getElementById('cfg-endereco').value.trim(),
    pix_chave: document.getElementById('cfg-pix').value.trim(),
    logo: document.getElementById('cfg-logo').value.trim(),
    updated_at: new Date().toISOString()
  };
  let error;
  if (configId) {
    ({ error } = await db.from('configuracoes').update(payload).eq('id', configId));
  } else {
    const res = await db.from('configuracoes').insert(payload).select().single();
    error = res.error;
    if (!error) configId = res.data.id;
  }
  if (error) { toast('❌ ' + error.message, 'err'); return; }
  toast('✅ Configurações salvas!');
  const d = new Date();
  document.getElementById('cfg-ultima').textContent =
    'Última atualização: ' + d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR');
}

// ── CONTAS CONTÁBEIS ─────────────────────────
async function carregarContas() {
  document.getElementById('contas-loading').style.display = 'block';
  document.getElementById('contas-lista').style.display = 'none';
  const { data, error } = await db.from('contas_contabeis').select('*').order('codigo');
  document.getElementById('contas-loading').style.display = 'none';
  document.getElementById('contas-lista').style.display = 'block';
  if (error) { toast('Erro ao carregar contas', 'err'); return; }
  contasAll = data || [];
  renderContas(contasAll);
}

function renderContas(lista) {
  const el = document.getElementById('contas-lista');
  if (!lista.length) {
    el.innerHTML = `<div class="empty"><div style="font-size:40px;margin-bottom:10px">📊</div>Nenhuma conta encontrada.<br><small style="font-size:12px">Toque no + para adicionar.</small></div>`;
    return;
  }
  let html = `<div class="table-wrap"><table><thead><tr>
    <th>Código</th><th>Nome</th><th>Tipo</th><th style="text-align:center">Nv</th><th>Status</th><th></th>
  </tr></thead><tbody>`;
  lista.forEach(c => {
    const indent = (c.nivel - 1) * 10;
    html += `<tr>
      <td style="font-family:monospace;font-size:11px;color:var(--muted)">${c.codigo}</td>
      <td style="padding-left:${indent}px;font-size:13px">${c.nome}</td>
      <td>${badgeTipo(c.tipo)}</td>
      <td style="text-align:center"><span class="nivel-ball">${c.nivel}</span></td>
      <td>${c.ativo ? '<span class="badge badge-green">Ativo</span>' : '<span class="badge badge-red">Inativo</span>'}</td>
      <td><button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick='abrirModal(${JSON.stringify(c)})'>✏️</button></td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function filtrarContas() {
  const q = document.getElementById('contas-search').value.toLowerCase();
  renderContas(contasAll.filter(c => c.nome.toLowerCase().includes(q) || c.codigo.toLowerCase().includes(q)));
}

// ── MODAL ─────────────────────────────────────
function abrirModal(conta) {
  const sel = document.getElementById('m-pai');
  sel.innerHTML = '<option value="">— Nenhuma —</option>';
  contasAll.forEach(c => {
    if (!conta || c.id !== conta.id)
      sel.innerHTML += `<option value="${c.id}">${c.codigo} – ${c.nome}</option>`;
  });
  if (conta) {
    document.getElementById('modal-titulo').textContent = '✏️ Editar Conta';
    document.getElementById('m-id').value     = conta.id;
    document.getElementById('m-codigo').value = conta.codigo;
    document.getElementById('m-nome').value   = conta.nome;
    document.getElementById('m-tipo').value   = conta.tipo;
    document.getElementById('m-nivel').value  = conta.nivel;
    document.getElementById('m-pai').value    = conta.conta_pai_id || '';
    document.getElementById('m-ativo').value  = String(conta.ativo);
    document.getElementById('m-delete').style.display = 'block';
  } else {
    document.getElementById('modal-titulo').textContent = '➕ Nova Conta';
    document.getElementById('m-id').value = '';
    document.getElementById('m-codigo').value = '';
    document.getElementById('m-nome').value = '';
    document.getElementById('m-tipo').value = '';
    document.getElementById('m-nivel').value = '1';
    document.getElementById('m-pai').value = '';
    document.getElementById('m-ativo').value = 'true';
    document.getElementById('m-delete').style.display = 'none';
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function fecharModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function fecharModalFora(e) { if (e.target.id === 'modal-overlay') fecharModal(); }

async function salvarConta() {
  const codigo = document.getElementById('m-codigo').value.trim();
  const nome   = document.getElementById('m-nome').value.trim();
  const tipo   = document.getElementById('m-tipo').value;
  if (!codigo || !nome || !tipo) { toast('⚠️ Preencha código, nome e tipo', 'err'); return; }
  const payload = {
    codigo, nome, tipo,
    nivel: parseInt(document.getElementById('m-nivel').value) || 1,
    conta_pai_id: document.getElementById('m-pai').value || null,
    ativo: document.getElementById('m-ativo').value === 'true',
  };
  const id = document.getElementById('m-id').value;
  let error;
  if (id) {
    ({ error } = await db.from('contas_contabeis').update(payload).eq('id', id));
  } else {
    ({ error } = await db.from('contas_contabeis').insert(payload));
  }
  if (error) { toast('❌ ' + error.message, 'err'); return; }
  toast(id ? '✅ Conta atualizada!' : '✅ Conta criada!');
  fecharModal();
  carregarContas();
}

async function deletarConta() {
  if (!confirm('Excluir esta conta? Não pode ser desfeito.')) return;
  const id = document.getElementById('m-id').value;
  const { error } = await db.from('contas_contabeis').delete().eq('id', id);
  if (error) { toast('❌ ' + error.message, 'err'); return; }
  toast('🗑️ Conta excluída!');
  fecharModal();
  carregarContas();
}

// INIT
carregarConfig();
</script>

</body>
</html>
