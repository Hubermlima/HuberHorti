<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Conferência de Estoque</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-y:none;}
.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#1C1C1E;}
.topbar-sub{font-size:10px;color:#8E8E93;font-weight:400;margin-top:1px;}
.ios-btn{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;}
.card{flex:1;margin:0 16px 24px;background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);display:flex;flex-direction:column;min-height:0;overflow:hidden;}

.col-header{display:grid;grid-template-columns:1fr 44px 64px 72px;padding:10px 16px;border-bottom:0.5px solid #F0F0F0;flex-shrink:0;}
.col-header span{font-size:9px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.4px;}
.col-header span:nth-child(2){text-align:center;}
.col-header span:nth-child(3){text-align:right;}
.col-header span:nth-child(4){text-align:right;}
.lista{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;}
.item{display:grid;grid-template-columns:1fr 44px 64px 72px;padding:14px 16px;border-bottom:0.5px solid #F5F5F5;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}

.item:active{background:#F9F9F9;}
.item-nome{font-size:13px;color:#1C1C1E;font-weight:400;}
.item-unid{font-size:12px;color:#8E8E93;text-align:center;}
.item-sist{font-size:13px;color:#1C1C1E;text-align:right;font-weight:400;}
.item-fisico{display:flex;justify-content:flex-end;}
.item-fisico input{width:68px;text-align:right;border:none;border-bottom:1px solid #E0E0E0;background:transparent;font-family:'Inter',sans-serif;font-size:13px;color:#007AFF;outline:none;padding:2px 0;-webkit-appearance:none;}
.item-fisico input:focus{border-bottom-color:#007AFF;}
.paginacao{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 16px;border-top:0.5px solid #F0F0F0;flex-shrink:0;}
.pag-btn{width:34px;height:34px;border-radius:50%;border:none;background:#F2F2F7;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.pag-btn:active{opacity:0.6;}
.pag-btn:disabled{opacity:0.3;pointer-events:none;}
.pag-btn svg{width:16px;height:16px;stroke:#1C1C1E;stroke-width:2.2;fill:none;}
.pag-info{font-size:12px;color:#8E8E93;font-weight:500;white-space:nowrap;}
.rodape{flex-shrink:0;padding:10px 16px calc(env(safe-area-inset-bottom) + 16px);border-top:0.5px solid #E5E5EA;background:#FFF;}
.rodape-resumo{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.rodape-label{font-size:11px;color:#8E8E93;font-weight:500;}
.rodape-val{font-size:13px;font-weight:600;color:#1C1C1E;}
.rodape-val.red{color:#EF4444;}
.rodape-val.green{color:#10B981;}
.btn-confirmar{width:100%;padding:16px;background:#C7C7CC;border:none;border-radius:100px;color:#FFF;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:0.1px;transition:background 0.3s;pointer-events:none;}
.btn-confirmar:active{opacity:0.8;}
.detalhe-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:999;display:none;align-items:center;justify-content:center;}
.detalhe-overlay.active{display:flex;}
.detalhe-sheet{background:#FFF;border-radius:20px;padding:16px 18px 18px;width:calc(100% - 48px);max-width:360px;box-shadow:0 32px 64px rgba(0,0,0,0.22),0 8px 24px rgba(0,0,0,0.10);animation:floatIn 0.2s cubic-bezier(0.4,0,0.2,1);}
@keyframes floatIn{from{opacity:0;transform:scale(0.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.detalhe-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:0.5px solid #F0F0F0;}
.detalhe-title{font-size:13px;font-weight:600;color:#1C1C1E;}
.detalhe-close{width:26px;height:26px;border-radius:50%;border:none;background:#F2F2F7;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.detalhe-close svg{width:12px;height:12px;stroke:#1C1C1E;stroke-width:2.5;fill:none;}
.detalhe-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #F5F5F5;}
.detalhe-row:last-child{border-bottom:none;}
.detalhe-label{font-size:12px;color:#8E8E93;font-weight:400;}
.detalhe-val{font-size:13px;font-weight:500;color:#1C1C1E;}
.detalhe-val.red{color:#EF4444;}
.detalhe-val.green{color:#10B981;}
.detalhe-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;padding:10px;background:#F0F6FF;border-radius:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;text-decoration:none;}
.detalhe-link span{font-size:13px;color:#007AFF;font-weight:500;}
.detalhe-link svg{width:14px;height:14px;stroke:#007AFF;stroke-width:2;fill:none;}
.empty{font-size:13px;color:#C7C7CC;text-align:center;padding:32px 0;}
.loading{font-size:13px;color:#C7C7CC;text-align:center;padding:32px 0;}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn" onclick="voltarParaOrigem()">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Conferência de Estoque</div>
    <div class="topbar-sub" id="topbar-ciclo"></div>
  </div>
  <div style="width:38px;"></div>
</div>

<div class="card">
  <div class="col-header">
    <span>Produto</span>
    <span>Unid</span>
    <span>Sist.</span>
    <span>Físico</span>
  </div>
  <div class="lista" id="lista">
    <div class="loading">Carregando...</div>
  </div>
  <div class="paginacao" id="paginacao" style="display:none;">
    <button class="pag-btn" id="pag-prev" onclick="mudarPagina(-1)">
      <svg viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
    </button>
    <span class="pag-info" id="pag-info"></span>
    <button class="pag-btn" id="pag-next" onclick="mudarPagina(1)">
      <svg viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
    </button>
  </div>
  <div class="rodape">
    <div class="rodape-resumo">
      <span class="rodape-label">Diferença total</span>
      <span class="rodape-val" id="rodape-dif">0,00</span>
    </div>
    <button class="btn-confirmar" id="btn-confirmar" onclick="confirmarConferencia()">Confirmar Conferência</button>
  </div>
</div>

<div class="detalhe-overlay" id="detalhe-overlay" onclick="fecharDetalhe()">
  <div class="detalhe-sheet" onclick="event.stopPropagation()">
    <div class="detalhe-header">
      <span class="detalhe-title" id="detalhe-title"></span>
      <button class="detalhe-close" onclick="fecharDetalhe()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="detalhe-row"><span class="detalhe-label">Est. Inicial</span><span class="detalhe-val" id="d-inicial"></span></div>
    <div class="detalhe-row"><span class="detalhe-label">Entradas</span><span class="detalhe-val green" id="d-entradas"></span></div>
    <div class="detalhe-row"><span class="detalhe-label">Saídas</span><span class="detalhe-val red" id="d-saidas"></span></div>
    <div class="detalhe-row"><span class="detalhe-label">Sistema</span><span class="detalhe-val" id="d-sist"></span></div>
    <div class="detalhe-row"><span class="detalhe-label">Físico</span><span class="detalhe-val" id="d-fisico"></span></div>
    <div class="detalhe-row"><span class="detalhe-label">Diferença</span><span class="detalhe-val" id="d-dif"></span></div>
    <a class="detalhe-link" id="detalhe-link-vendas" onclick="irParaVendas()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Ver vendas do produto</span>
    </a>
  </div>
</div>

<script>
window.HHUtils.atualizarCicloAtualGlobal();
const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();

function voltarParaOrigem() { window.location.href = 'dashboard.html'; }

function fmtNum(v) {
  return Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function parseNum(str) {
  if (!str) return 0;
  return parseFloat(String(str).replace(/\./g,'').replace(',','.')) || 0;
}
function mascaraInput(el) {
  let digits = el.value.replace(/\D/g,'');
  if (!digits) { el.value = ''; return; }
  let num = parseInt(digits, 10) / 100;
  el.value = fmtNum(num);
}

let _itens = [];
let _pagina = 0;
const POR_PAGINA = 15;
let _produtoDetalheNome = '';

function setBtnEstado(estado) {
  const btn = document.getElementById('btn-confirmar');
  if (estado === 'pendente') {
    btn.textContent = 'Confirmar Conferência';
    btn.style.background = '#4A90D9';
    btn.style.pointerEvents = 'all';
    btn.style.cursor = 'pointer';
  } else if (estado === 'salvando') {
    btn.textContent = 'Salvando...';
    btn.style.background = '#C7C7CC';
    btn.style.pointerEvents = 'none';
    btn.style.cursor = 'default';
  } else if (estado === 'salvo') {
    btn.textContent = 'Conferência Realizada ✓';
    btn.style.background = '#10B981';
    btn.style.pointerEvents = 'none';
    btn.style.cursor = 'default';
  } else {
    // inativo
    btn.textContent = 'Confirmar Conferência';
    btn.style.background = '#C7C7CC';
    btn.style.pointerEvents = 'none';
    btn.style.cursor = 'default';
  }
}

function salvarEstado() {
  const fisicos = {};
  _itens.forEach((item, idx) => {
    const el = document.getElementById(`fisico-${idx}`);
    fisicos[item.produto_id] = el ? el.value : fmtNum(item.fisico);
  });
  sessionStorage.setItem('conf_estoque_fisicos', JSON.stringify(fisicos));
  sessionStorage.setItem('conf_estoque_pagina', _pagina);
}

function restaurarEstado() {
  const fisicosRaw = sessionStorage.getItem('conf_estoque_fisicos');
  const paginaRaw = sessionStorage.getItem('conf_estoque_pagina');
  if (fisicosRaw) {
    const fisicos = JSON.parse(fisicosRaw);
    _itens.forEach(item => {
      if (fisicos[item.produto_id] !== undefined) {
        item.fisico = parseNum(fisicos[item.produto_id]);
      }
    });
    sessionStorage.removeItem('conf_estoque_fisicos');
  }
  if (paginaRaw !== null) {
    _pagina = parseInt(paginaRaw) || 0;
    sessionStorage.removeItem('conf_estoque_pagina');
  }
}

function irParaVendas() {
  salvarEstado();
  window.location.href = `pesquisa_vendas_por_produtos.html?produto_nome=${encodeURIComponent(_produtoDetalheNome)}`;
}

function atualizarRodape() {
  let dif = 0;
  _itens.forEach((item, idx) => {
    const el = document.getElementById(`fisico-${idx}`);
    const fisico = el ? (parseNum(el.value) || item.sist) : item.fisico;
    dif += (fisico - item.sist) * item.custoUni;
  });

  const el = document.getElementById('rodape-dif');
  el.textContent = fmtNum(dif);
  el.className = 'rodape-val' + (dif < 0 ? ' red' : dif > 0 ? ' green' : '');
}

function renderLista() {
  const lista = document.getElementById('lista');
  if (_itens.length === 0) {
    lista.innerHTML = '<div class="empty">Nenhum produto encontrado no ciclo</div>';
    document.getElementById('paginacao').style.display = 'none';
    setBtnEstado('inativo');
    return;
  }
  const totalPags = Math.ceil(_itens.length / POR_PAGINA);
  const inicio = _pagina * POR_PAGINA;
  const fim = Math.min(inicio + POR_PAGINA, _itens.length);
  const itensPag = _itens.slice(inicio, fim);

  lista.innerHTML = itensPag.map((item) => {
    const idx = _itens.indexOf(item);
    return `<div class="item" onclick="abrirDetalhe(${idx})">
      <span class="item-nome">${item.nome}</span>
      <span class="item-unid">${item.unid_venda || '—'}</span>
      <span class="item-sist" id="sist-${idx}">${fmtNum(item.sist)}</span>
      <div class="item-fisico">
        <input
          type="text"
          inputmode="decimal"
          id="fisico-${idx}"
          value="${fmtNum(item.fisico)}"
          onclick="event.stopPropagation();setTimeout(()=>this.select(),50);"
          onfocus="setTimeout(()=>this.select(),50);"
          oninput="mascaraInput(this);atualizarFisico(${idx},this.value);"
        >
      </div>
    </div>`;
  }).join('');

  lista.scrollTop = 0;
  setBtnEstado('inativo');

  const pagEl = document.getElementById('paginacao');
  if (totalPags > 1) {
    pagEl.style.display = 'flex';
    document.getElementById('pag-info').textContent = `${_pagina + 1} de ${totalPags}`;
    document.getElementById('pag-prev').disabled = _pagina === 0;
    document.getElementById('pag-next').disabled = _pagina >= totalPags - 1;
  } else {
    pagEl.style.display = 'none';
  }
}

function mudarPagina(dir) {
  const totalPags = Math.ceil(_itens.length / POR_PAGINA);
  _pagina = Math.max(0, Math.min(_pagina + dir, totalPags - 1));
  renderLista();
}

function atualizarFisico(idx, valor) {
  _itens[idx].fisico = parseNum(valor) || _itens[idx].sist;
  atualizarRodape();
  setBtnEstado('pendente');
}

function abrirDetalhe(idx) {
  const i = _itens[idx];
  const inputEl = document.getElementById(`fisico-${idx}`);
  const fisico = inputEl ? (parseNum(inputEl.value) || i.sist) : i.fisico;
  const dif = fisico - i.sist;
  _produtoDetalheNome = i.nome;
  document.getElementById('detalhe-title').textContent = `${i.nome} · ${i.unid_venda || ''}`;
  document.getElementById('d-inicial').textContent = fmtNum(i.estIni);
  document.getElementById('d-entradas').textContent = '+' + fmtNum(i.entradas);
  document.getElementById('d-saidas').textContent = '−' + fmtNum(i.saidas);
  document.getElementById('d-sist').textContent = fmtNum(i.sist);
  document.getElementById('d-fisico').textContent = fmtNum(fisico);
  const dEl = document.getElementById('d-dif');
  dEl.textContent = (dif >= 0 ? '+' : '') + fmtNum(dif);
  dEl.className = 'detalhe-val' + (dif < 0 ? ' red' : dif > 0 ? ' green' : '');
  document.getElementById('detalhe-overlay').classList.add('active');
}

function fecharDetalhe() {
  document.getElementById('detalhe-overlay').classList.remove('active');
}

async function confirmarConferencia() {
  console.log("Iniciando Fechamento de Estoque...");
  setBtnEstado('salvando');

  try {
    // 1. LIMPEZA: Remove tudo do estoque inicial para garantir que não sobre "lixo"
    const { error: errDelete } = await window.db
      .from('estoque_inicial')
      .delete()
      .neq('produto_id', '00000000-0000-0000-0000-000000000000'); 

    if (errDelete) throw errDelete;

    // 2. FILTRAGEM: Pega apenas os produtos que você contou como maior que zero
    const dadosParaInserir = _itens
      .filter(item => item.fisico > 0)
      .map(item => ({
        produto_id: item.produto_id,
        quantidade_inicial: item.fisico,
        custo_unitario_inicial: item.custoUni || 0
      }));

    // 3. GRAVAÇÃO DOS ITENS: Insere a nova contagem física
    if (dadosParaInserir.length > 0) {
      const { error: errInsert } = await window.db
        .from('estoque_inicial')
        .insert(dadosParaInserir);

      if (errInsert) throw errInsert;
    }

    // 4. CONSOLIDAÇÃO: Atualiza o resumo financeiro com o nome sugerido
    const difTotal = _itens.reduce((acc, item) => acc + (item.fisico - item.sist) * item.custoUni, 0);
    
    const { error: errConsolidacao } = await window.db
      .from('consolidacao')
      .upsert({ 
        id: 1, 
        operacao: 'Fechamento Estoque', // Nome sugestivo atualizado
        valor1: difTotal,               // Diferença total
        valor2: 0,                      // v2 zerado (reservado para outros fechamentos)
        data: new Date().toISOString() 
      }, { onConflict: 'id' });

    if (errConsolidacao) throw errConsolidacao;

    console.log("Processo concluído com sucesso!");
    setBtnEstado('salvo');
    alert('Sucesso! Estoque inicial atualizado e Fechamento de Estoque registrado.');

  } catch (err) {
    console.error("Erro no processo:", err);
    alert('Erro ao processar fechamento: ' + err.message);
    setBtnEstado('pendente');
  }
}



async function carregarDados() {
  const { d0, d7 } = window.cicloAtual;
  const d0Str = d0.toISOString().split('T')[0];
  const d7ISO = new Date(d7.getFullYear(), d7.getMonth(), d7.getDate(), 23, 59, 59).toISOString();
  const d7Str = d7.toISOString().split('T')[0];

  document.getElementById('topbar-ciclo').textContent =
    `${window.HHUtils.formatarDataBR(d0)} — ${window.HHUtils.formatarDataBR(d7)}`;

  const { data: produtos } = await window.db.from('produtos').select('id, nome, unid_venda, preco_medio_compra').order('nome');
  const { data: estoqueIni } = await window.db.from('estoque_inicial').select('produto_id, quantidade_inicial');

  const { data: pedidosCompra } = await window.db.from('pedidos_compras')
    .select('id').gte('data', d0Str).lte('data', d7Str);
  const idsCompra = (pedidosCompra || []).map(p => p.id);
  let compras = [];
  if (idsCompra.length > 0) {
    const { data: itensCompra } = await window.db.from('itens_pedidos_compras')
      .select('produto_id, quantidade').in('pedido_compra_id', idsCompra);
    compras = itensCompra || [];
  }

  const { data: pedidosVenda } = await window.db.from('pedidos_vendas')
    .select('id').gte('data', d0Str).lte('data', d7ISO);
  const idsVenda = (pedidosVenda || []).map(p => p.id);
  let vendas = [];
  if (idsVenda.length > 0) {
    const { data: itensVenda } = await window.db.from('itens_pedidos_vendas')
      .select('produto_id, quantidade').in('pedido_venda_id', idsVenda);
    vendas = itensVenda || [];
  }

  const produtosEnvolvidos = new Set();
  (estoqueIni || []).forEach(e => produtosEnvolvidos.add(e.produto_id));
  compras.forEach(c => produtosEnvolvidos.add(c.produto_id));
  vendas.forEach(v => produtosEnvolvidos.add(v.produto_id));

  _itens = [];
  produtosEnvolvidos.forEach(prodId => {
    const prod = (produtos || []).find(p => p.id === prodId);
    if (!prod) return;
    const estIniRec = (estoqueIni || []).find(e => e.produto_id === prodId);
    const estIni = estIniRec ? parseFloat(estIniRec.quantidade_inicial) || 0 : 0;
    const entradas = compras.filter(c => c.produto_id === prodId).reduce((a,c) => a + (parseFloat(c.quantidade)||0), 0);
    const saidas = vendas.filter(v => v.produto_id === prodId).reduce((a,v) => a + (parseFloat(v.quantidade)||0), 0);
    const sist = estIni + entradas - saidas;
    _itens.push({ produto_id: prodId, nome: prod.nome, unid_venda: prod.unid_venda || '', estIni, entradas, saidas, sist, fisico: sist, custoUni: parseFloat(prod.preco_medio_compra) || 0 });
  });

  _itens.sort((a, b) => a.nome.localeCompare(b.nome));
  _pagina = 0;
  restaurarEstado();
  renderLista();
  atualizarRodape();
}

carregarDados();
</script>

</body>
</html>
