<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Extrato do Cliente</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --bg:        #F2F4F8;
    --surface:   #FFFFFF;
    --border:    #E5E5EA;
    --border-lt: #F2F2F7;
    --txt:       #1C1C1E;
    --txt-sub:   #8E8E93;
    --accent:    #007AFF;
    --green:     #10B981;
    --red:       #EF4444;
    --amber:     #F59E0B;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding-bottom: 48px;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    box-shadow: 0 1px 0 var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px 0;
  }
  .btn-back {
    width: 36px; height: 36px;
    border-radius: 100px;
    background: var(--border-lt);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-title {
    flex: 1;
    font-size: 13px; font-weight: 700;
    color: var(--txt);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    text-align: center;
  }
  .header-spacer { width: 36px; }

  /* BUSCA */
  .busca-wrap {
    padding: 12px 16px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .cliente-wrap {
    flex: 1;
    position: relative;
  }
  .filtro-label {
    font-size: 11px; font-weight: 500;
    color: var(--txt);
    margin-bottom: 4px;
  }
  .filtro-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--txt);
    background: var(--surface);
    outline: none;
    -webkit-appearance: none;
    min-height: 42px;
  }
  .filtro-input:focus { border-color: var(--accent); }

  .dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface);
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.14);
    max-height: 220px;
    overflow-y: auto;
    z-index: 999;
  }
  .dropdown-item {
    padding: 12px 16px;
    font-size: 14px;
    color: var(--txt);
    border-bottom: 0.5px solid var(--border-lt);
    cursor: pointer;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:active { background: var(--border-lt); }

  .btn-buscar {
    width: 42px; height: 42px;
    background: var(--accent);
    border: none; border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-buscar:active { opacity: 0.8; }

  /* RESUMO */
  .content { padding: 16px; }

  .resumo-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: flex;
  }
  .resumo-item {
    flex: 1;
    text-align: center;
    padding: 0 8px;
  }
  .resumo-item:not(:last-child) {
    border-right: 0.5px solid var(--border-lt);
  }
  .resumo-label {
    font-size: 10px; font-weight: 600;
    color: var(--txt);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .resumo-valor {
    font-size: 15px; font-weight: 800;
    color: var(--txt);
  }
  .resumo-valor.azul     { color: var(--accent); }
  .resumo-valor.verde    { color: var(--green); }
  .resumo-valor.vermelho { color: var(--red); }
  .resumo-valor.quitado  { color: var(--green); }

  /* EXTRATO */
  .extrato-card {
    background: var(--surface);
    border-radius: 16px;
    overflow-x: auto;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .extrato-table {
    min-width: 480px;
    width: 100%;
  }
  .extrato-header {
    display: grid;
    grid-template-columns: 72px 52px 1fr 80px 80px 80px;
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .extrato-header span {
    font-size: 10px; font-weight: 700;
    color: var(--txt);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .extrato-header span:nth-child(n+4) { text-align: right; }

  .extrato-row {
    display: grid;
    grid-template-columns: 72px 52px 1fr 80px 80px 80px;
    padding: 11px 14px;
    border-bottom: 0.5px solid var(--border-lt);
    align-items: center;
    background: var(--surface);
  }
  .extrato-row:last-child { border-bottom: none; }

  .extrato-row .r-data  { font-size: 11px; color: var(--txt); }
  .extrato-row .r-doc   { font-size: 11px; color: var(--txt); font-weight: 600; }
  .extrato-row .r-orig  { font-size: 12px; color: var(--txt); font-weight: 500; }
  .extrato-row .r-num   { font-size: 12px; font-weight: 700; text-align: right; display: block; width: 100%; }
  .extrato-row .r-venda { color: var(--red); }
  .extrato-row .r-pgto  { color: var(--green); }
  .extrato-row .r-debito-pos  { color: var(--red); }
  .extrato-row .r-debito-zero { color: var(--green); }

  /* ESTADOS */
  .vazio {
    text-align: center;
    padding: 48px 20px;
    color: var(--txt-sub);
    font-size: 14px;
  }
  .loading {
    text-align: center;
    padding: 32px;
    color: var(--txt-sub);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <button class="btn-back" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="header-title" id="header-title">Extrato do Cliente</div>
    <div class="header-spacer"></div>
  </div>

  <div class="busca-wrap">
    <div class="cliente-wrap">
      <div class="filtro-label">Cliente</div>
      <input class="filtro-input" id="sel-cliente" type="text"
        placeholder="— Selecione o cliente —"
        autocomplete="off">
      <div class="dropdown" id="dropdown-clientes"></div>
    </div>
    <button class="btn-buscar" onclick="buscar()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>
</div>

<div class="content" id="main-content">
  <div class="vazio">Selecione um cliente para ver o extrato</div>
</div>

<script>
const db = window.db;

document.addEventListener('DOMContentLoaded', async () => {
  await carregarClientes();
});

async function carregarClientes() {
  const { data, error } = await db.from('clientes').select('id, nome').order('nome');
  if (error || !data) return;
  window._clientes = data;
}

async function buscar() {
  const clienteId = window._clienteIdSelecionado;
  if (!clienteId) { alert('Selecione um cliente válido'); return; }

  const nomeCli = document.getElementById('sel-cliente').value;
  document.getElementById('header-title').textContent = nomeCli;
  document.getElementById('main-content').innerHTML = '<div class="loading">Carregando...</div>';

  const [resMov, resNotas] = await Promise.all([
    db.from('movimentos_clientes')
      .select('id, data, forma, tipo, valor')
      .eq('cliente_id', clienteId)
      .not('data', 'is', null)
      .order('data', { ascending: true }),
    db.from('pedidos_vendas')
      .select('id, data, total_venda')
      .eq('cliente_id', clienteId)
      .not('data', 'is', null)
      .order('data', { ascending: true })
  ]);

  if (resMov.error)   { alert('Erro movimentos: '   + resMov.error.message); return; }
  if (resNotas.error) { alert('Erro pedidos: '       + resNotas.error.message); return; }

  renderExtrato(resMov.data || [], resNotas.data || []);
}

function renderExtrato(movimentos, notas) {
  const el = document.getElementById('main-content');

  if (!movimentos.length && !notas.length) {
    el.innerHTML = '<div class="vazio">Nenhum registro encontrado para este cliente</div>';
    return;
  }

  const eventos = [];

  notas.forEach(n => {
    eventos.push({ tipo: 'venda', data: n.data, doc: n.id, orig: '—', valor: parseFloat(n.total_venda || 0) });
  });

    movimentos.forEach(m => {
    const forma = capitalize(m.forma || '');
    const tipo  = (m.tipo || '').toLowerCase().trim();
    let orig;
    if (tipo.includes('consumo') && !tipo.includes('não') && !tipo.includes('nao')) {
      orig = 'Consumo';
    } else if (tipo.includes('desconto')) {
      orig = 'Desconto';
    } else {
      orig = forma || '—';
    }
    eventos.push({ tipo: 'pgto', data: m.data, doc: '', orig, valor: parseFloat(m.valor || 0) });
  });


  // Ordena cronologicamente; empate: venda antes de pgto
  eventos.sort((a, b) => {
    const diff = new Date(a.data) - new Date(b.data);
    if (diff !== 0) return diff;
    if (a.tipo === 'venda' && b.tipo === 'pgto') return -1;
    if (a.tipo === 'pgto'  && b.tipo === 'venda') return 1;
    return 0;
  });

  const totalVendas = notas.reduce((s, n) => s + parseFloat(n.total_venda || 0), 0);
  const totalPgtos  = movimentos.reduce((s, m) => s + parseFloat(m.valor || 0), 0);
  const debFinal    = totalVendas - totalPgtos;
  const quitado     = debFinal <= 0.005;

  let debito = 0;
  const linhas = eventos.map(ev => {
    if (ev.tipo === 'venda') debito += ev.valor;
    else                     debito -= ev.valor;

    const debDisplay = Math.max(0, debito);
    const dataFmt    = formatarData(ev.data);
    const debCls     = debDisplay <= 0.005 ? 'r-num r-debito-zero' : 'r-num r-debito-pos';

    const colVenda = ev.tipo === 'venda'
      ? `<span class="r-num r-venda">${fmtVal(ev.valor)}</span>`
      : `<span class="r-num" style="color:var(--border-lt)">—</span>`;

    const colPgto = ev.tipo === 'pgto'
      ? `<span class="r-num r-pgto">${fmtVal(ev.valor)}</span>`
      : `<span class="r-num" style="color:var(--border-lt)">—</span>`;

    return `
      <div class="extrato-row">
        <span class="r-data">${dataFmt}</span>
        <span class="r-doc">${ev.doc ? '#' + String(ev.doc).slice(-4) : ''}</span>
        <span class="r-orig">${ev.orig}</span>
        ${colVenda}
        ${colPgto}
        <span class="${debCls}">${fmtVal(debDisplay)}</span>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="resumo-card">
      <div class="resumo-item">
        <div class="resumo-label">Vendas</div>
        <div class="resumo-valor azul">${fmtVal(totalVendas)}</div>
      </div>
      <div class="resumo-item">
        <div class="resumo-label">Pagamentos</div>
        <div class="resumo-valor verde">${fmtVal(totalPgtos)}</div>
      </div>
      <div class="resumo-item">
        <div class="resumo-label">Débito</div>
        <div class="resumo-valor ${quitado ? 'quitado' : 'vermelho'}">${quitado ? 'Quitado' : fmtVal(debFinal)}</div>
      </div>
    </div>
    <div class="extrato-card">
      <div class="extrato-table">
        <div class="extrato-header">
          <span>Data</span>
          <span>Doc</span>
          <span>Origem</span>
          <span style="text-align:right">Vendas</span>
          <span style="text-align:right">Pgtos</span>
          <span style="text-align:right">Débito</span>
        </div>
        ${linhas}
      </div>
    </div>
  `;
}

function fmtVal(v) {
  return parseFloat(v || 0).toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function formatarData(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('pt-BR', { timeZone:'America/Manaus', day:'2-digit', month:'2-digit', year:'2-digit' });
}

function capitalize(str) {
  if (!str) return '';
  return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
}

// DROPDOWN
let _selecionando = false;

document.getElementById('sel-cliente').addEventListener('input', filtrarClientes);
document.getElementById('sel-cliente').addEventListener('focus', filtrarClientes);
document.getElementById('sel-cliente').addEventListener('blur', () => {
  if (_selecionando) return;
  setTimeout(() => { document.getElementById('dropdown-clientes').style.display = 'none'; }, 150);
});

function filtrarClientes() {
  const q  = document.getElementById('sel-cliente').value.toLowerCase();
  const dd = document.getElementById('dropdown-clientes');
  const filtrados = (window._clientes || []).filter(c => c.nome.toLowerCase().includes(q));
  if (!filtrados.length) { dd.style.display = 'none'; return; }

  dd.innerHTML = '';
  filtrados.forEach(c => {
    const item = document.createElement('div');
    item.className = 'dropdown-item';
    item.textContent = c.nome;
    item.addEventListener('mousedown',  () => { _selecionando = true; });
    item.addEventListener('mouseup',    () => { selecionarCliente(c.id, c.nome); _selecionando = false; });
    item.addEventListener('touchstart', () => { _selecionando = true; }, { passive: true });
    item.addEventListener('touchend',   () => { selecionarCliente(c.id, c.nome); _selecionando = false; });
    dd.appendChild(item);
  });
  dd.style.display = 'block';
}

function selecionarCliente(id, nome) {
  document.getElementById('sel-cliente').value = nome;
  document.getElementById('dropdown-clientes').style.display = 'none';
  window._clienteIdSelecionado = id;
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.cliente-wrap')) {
    document.getElementById('dropdown-clientes').style.display = 'none';
  }
});
</script>
</body>
</html>
