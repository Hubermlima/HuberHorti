<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Extrato do Cliente</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<style> 
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --bg:        #FFFFFF;
    --surface:   #FFFFFF;
    --border:    #E5E5EA;
    --border-lt: #F2F2F7;
    --txt:       #1C1C1E;
    --txt-sub:   #8E8E93;
    --accent:    #007AFF;
    --green:     #10B981;
    --red:       #EF4444;
    --amber:     #F59E0B;

    /* sombras iOS */
    --shadow-card:   0 2px 16px rgba(0,0,0,0.08), 0 0.5px 2px rgba(0,0,0,0.06);
    --shadow-input:  0 1px 4px rgba(0,0,0,0.07), 0 0 0 0.5px rgba(0,0,0,0.06);
    --shadow-header: 0 1px 0 rgba(0,0,0,0.08);

    /* raios aninhados iOS — supercard > card > input > btn-interno */
    --r-super:  28px;
    --r-card:   18px;
    --r-input:  12px;
    --r-btn:    10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding-bottom: 48px;
  }

  /* ── SUPERCARD HEADER ── */
  .header {
    background: var(--surface);
    box-shadow: var(--shadow-header);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    margin: 12px 16px 16px;
    background: var(--surface);
    border-radius: var(--r-super);
    box-shadow: var(--shadow-card);
    padding: 14px 16px 16px;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .btn-back {
    width: 36px; height: 36px;
    border-radius: 100px;
    background: var(--border-lt);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: var(--shadow-input);
  }
  .header-title {
    flex: 1;
    font-size: 13px; font-weight: 700;
    color: var(--txt);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    text-align: center;
  }
  .header-spacer { width: 36px; }

  /* BUSCA dentro do supercard */
  .busca-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .cliente-wrap {
    flex: 1;
    position: relative;
  }
  .filtro-label {
    font-size: 11px; font-weight: 500;
    color: var(--txt);
    margin-bottom: 5px;
  }
  .filtro-input {
    width: 100%;
    padding: 10px 14px;
    border: none;
    border-radius: var(--r-input);
    font-size: 14px;
    font-family: inherit;
    color: var(--txt);
    background: var(--surface);
    outline: none;
    -webkit-appearance: none;
    min-height: 42px;
    box-shadow: var(--shadow-input);
  }
  .filtro-input:focus {
    box-shadow: 0 0 0 2px var(--accent), var(--shadow-input);
  }

  .dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--surface);
    border-radius: var(--r-input);
    box-shadow: 0 6px 24px rgba(0,0,0,0.13);
    max-height: 220px;
    overflow-y: auto;
    z-index: 999;
  }
  .dropdown-item {
    padding: 12px 16px;
    font-size: 14px;
    color: var(--txt);
    border-bottom: 0.5px solid var(--border-lt);
    cursor: pointer;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:active { background: var(--border-lt); }

  .btn-buscar {
    width: 42px; height: 42px;
    background: var(--accent);
    border: none;
    border-radius: var(--r-btn);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,122,255,0.35);
  }
  .btn-buscar:active { opacity: 0.8; }

  /* ── CONTEÚDO ── */
  .content { padding: 14px 16px; }

  /* RESUMO */
  .resumo-card {
    background: var(--surface);
    border-radius: var(--r-card);
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
    display: flex;
  }
  .resumo-item {
    flex: 1;
    text-align: center;
    padding: 0 8px;
  }
  .resumo-item:not(:last-child) {
    border-right: 0.5px solid var(--border-lt);
  }
  .resumo-label {
    font-size: 10px; font-weight: 600;
    color: var(--txt);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .resumo-valor {
    font-size: 15px; font-weight: 800;
    color: var(--txt);
  }
  .resumo-valor.azul     { color: var(--accent); }
  .resumo-valor.verde    { color: var(--green); }
  .resumo-valor.vermelho { color: var(--red); }
  .resumo-valor.quitado  { color: var(--green); }

  /* EXTRATO */
  .extrato-card {
    background: var(--surface);
    border-radius: var(--r-card);
    overflow-x: auto;
    box-shadow: var(--shadow-card);
  }
  .extrato-table {
    min-width: 480px;
    width: 100%;
  }
  .extrato-header {
    display: grid;
    grid-template-columns: 26px 72px 52px 1fr 80px 80px 80px;
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border-lt);
    border-radius: var(--r-card) var(--r-card) 0 0;
  }
  .extrato-header span {
    font-size: 10px; font-weight: 700;
    color: var(--txt);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .extrato-header span:nth-child(n+5) { text-align: right; }

  /* LINHA VENDA */
  .extrato-row {
    display: grid;
    grid-template-columns: 26px 72px 52px 1fr 80px 80px 80px;
    padding: 11px 14px;
    border-bottom: 0.5px solid var(--border-lt);
    align-items: center;
    background: var(--surface);
  }
  .extrato-row:last-child { border-bottom: none; }

  .extrato-row .r-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
  }
  .toggle-btn {
    width: 14px; height: 14px;
    border: 1.5px solid var(--txt);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    color: var(--txt);
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
    background: var(--surface);
    transition: background 0.15s;
    margin-right: 6px;
  }
  .toggle-btn:active { background: var(--border-lt); }

  .extrato-row .r-data  { font-size: 11px; color: var(--txt); }
  .extrato-row .r-doc   { font-size: 11px; color: var(--txt); font-weight: 600; }
  .extrato-row .r-orig  { font-size: 12px; color: var(--txt); font-weight: 500; }
  .extrato-row .r-num   { font-size: 12px; font-weight: 700; text-align: right; display: block; width: 100%; }
  .extrato-row .r-venda { color: var(--red); }
  .extrato-row .r-pgto  { color: var(--green); }
  .extrato-row .r-debito-pos  { color: var(--red); }
  .extrato-row .r-debito-zero { color: var(--green); }

  /* LINHAS PAGAMENTO */
  .pgto-group { display: none; }
  .pgto-group.aberto { display: block; }

  .pgto-row {
    display: grid;
    grid-template-columns: 26px 72px 52px 1fr 80px 80px 80px;
    padding: 9px 14px;
    border-bottom: 0.5px solid var(--border-lt);
    align-items: center;
    background: var(--border-lt);
  }
  .pgto-row:last-child { border-bottom: none; }
  .pgto-row .r-data { font-size: 11px; color: var(--txt); }
  .pgto-row .r-orig { font-size: 11px; color: var(--txt); font-weight: 400; }
  .pgto-row .r-num  { font-size: 12px; font-weight: 700; text-align: right; display: block; width: 100%; }
  .pgto-row .r-pgto { color: var(--green); }
  .pgto-row .r-debito-pos  { color: var(--red); }
  .pgto-row .r-debito-zero { color: var(--green); }

  /* ESTADOS */
  .vazio {
    text-align: center;
    padding: 48px 20px;
    color: var(--txt-sub);
    font-size: 14px;
  }
  .loading {
    text-align: center;
    padding: 32px;
    color: var(--txt-sub);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <button class="btn-back" onclick="history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="header-title" id="header-title">Extrato do Cliente</div>
      <div class="header-spacer"></div>
    </div>

    <div class="busca-wrap">
      <div class="cliente-wrap">
        <div class="filtro-label">Cliente</div>
        <input class="filtro-input" id="sel-cliente" type="text"
          placeholder="— Selecione o cliente —"
          autocomplete="off">
        <div class="dropdown" id="dropdown-clientes"></div>
      </div>
      <button class="btn-buscar" onclick="buscar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="content" id="main-content">
  <div class="vazio">Selecione um cliente para ver o extrato</div>
</div>

<script>
const db = window.db;

document.addEventListener('DOMContentLoaded', async () => {
  await carregarClientes();
});

async function carregarClientes() {
  const { data, error } = await db.from('clientes').select('id, nome').order('nome');
  if (error || !data) return;
  window._clientes = data;
}

async function buscar() {
  const clienteId = window._clienteIdSelecionado;
  if (!clienteId) { alert('Selecione um cliente válido'); return; }

  const nomeCli = document.getElementById('sel-cliente').value;
  document.getElementById('header-title').textContent = nomeCli;
  document.getElementById('main-content').innerHTML = '<div class="loading">Carregando...</div>';

  const [resMov, resNotas] = await Promise.all([
    db.from('movimentos_clientes')
      .select('id, data, forma, tipo, valor')
      .eq('cliente_id', clienteId)
      .not('data', 'is', null)
      .order('data', { ascending: true }),
    db.from('pedidos_vendas')
      .select('id, data, total_venda')
      .eq('cliente_id', clienteId)
      .not('data', 'is', null)
      .order('data', { ascending: true })
  ]);

  if (resMov.error)   { alert('Erro movimentos: '   + resMov.error.message); return; }
  if (resNotas.error) { alert('Erro pedidos: '       + resNotas.error.message); return; }

  renderExtrato(resMov.data || [], resNotas.data || []);
}

function renderExtrato(movimentos, notas) {
  const el = document.getElementById('main-content');

  if (!movimentos.length && !notas.length) {
    el.innerHTML = '<div class="vazio">Nenhum registro encontrado para este cliente</div>';
    return;
  }

  const vendas = notas.map(n => ({
    tipo: 'venda', data: n.data, doc: n.id,
    valor: parseFloat(n.total_venda || 0)
  }));

  const pgtos = movimentos.map(m => {
    const forma = capitalize(m.forma || '');
    const tipo  = (m.tipo || '').toLowerCase().trim();
    let orig;
    if (tipo.includes('consumo') && !tipo.includes('não') && !tipo.includes('nao')) {
      orig = 'Consumo';
    } else if (tipo.includes('desconto')) {
      orig = 'Desconto';
    } else {
      orig = forma || '—';
    }
    return { tipo: 'pgto', data: m.data, orig, valor: parseFloat(m.valor || 0) };
  });

  vendas.sort((a, b) => new Date(a.data) - new Date(b.data));
  pgtos.sort((a, b) => new Date(a.data) - new Date(b.data));

  const grupos = vendas.map(v => ({ venda: v, pgtos: [] }));

  pgtos.forEach(p => {
    const dataP = new Date(p.data);
    let idx = -1;
    for (let i = 0; i < vendas.length; i++) {
      if (new Date(vendas[i].data) <= dataP) idx = i;
      else break;
    }
    if (idx >= 0) grupos[idx].pgtos.push(p);
  });

  const totalVendas = vendas.reduce((s, v) => s + v.valor, 0);
  const totalPgtos  = pgtos.reduce((s, p) => s + p.valor, 0);
  const debFinal    = totalVendas - totalPgtos;
  const quitado     = debFinal <= 0.005;

  let debito = 0;
  let linhas = '';

  grupos.forEach((g, gi) => {
    debito += g.venda.valor;
    const debV     = Math.max(0, debito);
    const debClsV  = debV <= 0.005 ? 'r-num r-debito-zero' : 'r-num r-debito-pos';
    const dataVFmt = formatarData(g.venda.data);
    const docStr   = g.venda.doc ? '#' + String(g.venda.doc).slice(-4) : '';
    const temPgtos = g.pgtos.length > 0;
    const groupId  = `grupo-${gi}`;

    linhas += `
      <div class="extrato-row">
        <span class="r-toggle">
          ${temPgtos ? `<span class="toggle-btn" onclick="toggleGrupo('${groupId}', this)">+</span>` : ''}
        </span>
        <span class="r-data">${dataVFmt}</span>
        <span class="r-doc">${docStr}</span>
        <span class="r-orig">Pedido</span>
        <span class="r-num r-venda">${fmtVal(g.venda.valor)}</span>
        <span class="r-num" style="color:var(--border-lt)">—</span>
        <span class="${debClsV}">${fmtVal(debV)}</span>
      </div>
      <div class="pgto-group" id="${groupId}">`;

    g.pgtos.forEach(p => {
      debito -= p.valor;
      const debP    = Math.max(0, debito);
      const debClsP = debP <= 0.005 ? 'r-num r-debito-zero' : 'r-num r-debito-pos';
      linhas += `
        <div class="pgto-row">
          <span></span>
          <span class="r-data">${formatarData(p.data)}</span>
          <span></span>
          <span class="r-orig">${p.orig}</span>
          <span class="r-num" style="color:var(--border-lt)">—</span>
          <span class="r-num r-pgto">${fmtVal(p.valor)}</span>
          <span class="${debClsP}">${fmtVal(debP)}</span>
        </div>`;
    });

    linhas += `</div>`;
  });

  el.innerHTML = `
    <div class="resumo-card">
      <div class="resumo-item">
        <div class="resumo-label">Vendas</div>
        <div class="resumo-valor azul">${fmtVal(totalVendas)}</div>
      </div>
      <div class="resumo-item">
        <div class="resumo-label">Pagamentos</div>
        <div class="resumo-valor verde">${fmtVal(totalPgtos)}</div>
      </div>
      <div class="resumo-item">
        <div class="resumo-label">Débito</div>
        <div class="resumo-valor ${quitado ? 'quitado' : 'vermelho'}">${quitado ? 'Quitado' : fmtVal(debFinal)}</div>
      </div>
    </div>
    <div class="extrato-card">
      <div class="extrato-table">
        <div class="extrato-header">
          <span></span>
          <span>Data</span>
          <span>Doc</span>
          <span>Origem</span>
          <span style="text-align:right">Vendas</span>
          <span style="text-align:right">Pgtos</span>
          <span style="text-align:right">Débito</span>
        </div>
        ${linhas}
      </div>
    </div>
  `;
}

function toggleGrupo(id, btn) {
  const grupo = document.getElementById(id);
  const aberto = grupo.classList.toggle('aberto');
  btn.textContent = aberto ? '−' : '+';
}

function fmtVal(v) {
  return parseFloat(v || 0).toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function formatarData(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('pt-BR', { timeZone:'America/Manaus', day:'2-digit', month:'2-digit', year:'2-digit' });
}

function capitalize(str) {
  if (!str) return '';
  return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
}

// DROPDOWN
let _selecionando = false;

document.getElementById('sel-cliente').addEventListener('input', filtrarClientes);
document.getElementById('sel-cliente').addEventListener('focus', filtrarClientes);
document.getElementById('sel-cliente').addEventListener('blur', () => {
  if (_selecionando) return;
  setTimeout(() => { document.getElementById('dropdown-clientes').style.display = 'none'; }, 150);
});

function filtrarClientes() {
  const q  = document.getElementById('sel-cliente').value.toLowerCase();
  const dd = document.getElementById('dropdown-clientes');
  const filtrados = (window._clientes || []).filter(c => c.nome.toLowerCase().includes(q));
  if (!filtrados.length) { dd.style.display = 'none'; return; }

  dd.innerHTML = '';
  filtrados.forEach(c => {
    const item = document.createElement('div');
    item.className = 'dropdown-item';
    item.textContent = c.nome;
    item.addEventListener('mousedown',  () => { _selecionando = true; });
    item.addEventListener('mouseup',    () => { selecionarCliente(c.id, c.nome); _selecionando = false; });
    item.addEventListener('touchstart', () => { _selecionando = true; }, { passive: true });
    item.addEventListener('touchend',   () => { selecionarCliente(c.id, c.nome); _selecionando = false; });
    dd.appendChild(item);
  });
  dd.style.display = 'block';
}

function selecionarCliente(id, nome) {
  document.getElementById('sel-cliente').value = nome;
  document.getElementById('dropdown-clientes').style.display = 'none';
  window._clienteIdSelecionado = id;
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.cliente-wrap')) {
    document.getElementById('dropdown-clientes').style.display = 'none';
  }
});
</script>
</body>
</html>
