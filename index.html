<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HuberHorti - Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#FFFFFF;background-image:radial-gradient(ellipse 60% 50% at 50% -10%,#DBEAFE 0%,transparent 70%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{width:100%;max-width:400px;animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.brand{text-align:center;margin-bottom:36px}
.brand-name{font-size:36px;font-weight:800;color:#1E293B;letter-spacing:-1px;line-height:1}
.brand-name span{color:#2563EB}
.brand-sub{font-size:11px;font-weight:500;color:#94A3B8;letter-spacing:2.5px;text-transform:uppercase;margin-top:8px}
.card{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:20px;padding:36px 32px 32px;box-shadow:0 4px 24px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04)}
.card-header{margin-bottom:28px}
.card-header h2{font-size:19px;font-weight:700;color:#1E293B;letter-spacing:-.3px;margin-bottom:5px}
.card-header p{font-size:13.5px;color:#94A3B8;font-weight:400}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12.5px;font-weight:600;color:#475569;margin-bottom:7px;letter-spacing:.2px}
.input-wrap{position:relative}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;display:flex;align-items:center}
.input-icon svg{width:16px;height:16px;stroke:#94A3B8;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
input[type="email"],input[type="password"],input[type="text"]{width:100%;padding:12px 13px 12px 40px;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:12px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:400;color:#1E293B;outline:none;transition:all .15s;-webkit-appearance:none}
input:focus{border-color:#2563EB;background:#FFFFFF;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
input.error{border-color:#EF4444!important;box-shadow:0 0 0 3px rgba(239,68,68,.1)!important}
input::placeholder{color:#CBD5E1;font-weight:400}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:#94A3B8;display:flex;align-items:center;transition:color .15s;-webkit-tap-highlight-color:transparent}
.eye-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.error-msg{display:none;font-size:12px;color:#EF4444;margin-top:5px;font-weight:500}
.error-msg.show{display:block}
.alert{display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:12px 14px;font-size:13px;color:#DC2626;font-weight:500;margin-bottom:20px;align-items:center;gap:8px}
.alert.show{display:flex}
.alert svg{width:16px;height:16px;stroke:#DC2626;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.forgot-row{display:flex;justify-content:flex-end;margin-top:-4px;margin-bottom:24px}
.forgot{font-size:13px;color:#2563EB;text-decoration:none;font-weight:500}
.btn-login{width:100%;padding:13px;background:#2563EB;color:#fff;border:none;border-radius:12px;font-size:14.5px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(37,99,235,.25);-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover:not(:disabled){background:#1D4ED8;transform:translateY(-1px)}
.btn-login:disabled{opacity:.7;cursor:not-allowed}
.spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-login.loading .spinner{display:block}
.btn-login.loading .btn-text{opacity:.7}
.footer{text-align:center;margin-top:20px}
.status-row{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#94A3B8;background:#FFFFFF;border:1px solid #E2E8F0;border-radius:20px;padding:6px 14px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#22C55E;flex-shrink:0;animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.copy{font-size:11.5px;color:#94A3B8;margin-top:14px}
@media(max-width:480px){.card{padding:28px 20px 24px;border-radius:18px}.brand-name{font-size:30px}}
</style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-name">Huber<span>Horti</span></div>
    <div class="brand-sub">Sistema de Gestao Comercial</div>
  </div>
  <div class="card">
    <div class="card-header">
      <h2>Acesse sua conta</h2>
      <p>Digite suas credenciais para continuar</p>
    </div>
    <div class="alert" id="alert">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alert-msg">E-mail ou senha incorretos.</span>
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </span>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" value="huber.produtos@gmail.com"/>
      </div>
      <div class="error-msg" id="email-err">Informe um e-mail valido</div>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="password" placeholder="........" autocomplete="current-password"/>
        <button class="eye-btn" onclick="togglePass()" type="button">
          <svg id="eyeIcon" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="error-msg" id="pass-err">Informe sua senha</div>
    </div>
    <div class="forgot-row">
      <a href="#" class="forgot" onclick="forgotPassword(event)">Esqueci minha senha</a>
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      <div class="spinner"></div>
      <span class="btn-text">Entrar</span>
    </button>
  </div>
  <div class="footer">
    <div class="status-row">
      <div class="status-dot"></div>
      Todos os sistemas operacionais
    </div>
    <div class="copy">HuberHorti 2026</div>
  </div>
</div>
<script>
const SUPA_URL='https://suwaqkxkhhfopjkhsptf.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1d2Fxa3hraGhmb3Bqa2hzcHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDI2MDQsImV4cCI6MjA5MDM3ODYwNH0.HcLs3bkZZ0lATGSQbWtTt7oIxcM8inYmLZHm2K5v39U';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);

db.auth.getSession().then(({data})=>{if(data.session)goToDashboard()});

function goToDashboard(){window.location.href='dashboard.html'}

function focusPassword(){
  const input=document.getElementById('password');
  if(input){
    input.focus();
    try{input.setSelectionRange(input.value.length,input.value.length)}catch(e){}
  }
}

function togglePass(){
  const input=document.getElementById('password');
  const icon=document.getElementById('eyeIcon');
  if(input.type==='password'){
    input.type='text';
    icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }else{
    input.type='password';
    icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
  requestAnimationFrame(focusPassword);
}

function setLoading(on){
  const btn=document.getElementById('btnLogin');
  on?btn.classList.add('loading'):btn.classList.remove('loading');
  btn.disabled=on;
}

function showAlert(msg,success=false){
  const el=document.getElementById('alert');
  document.getElementById('alert-msg').textContent=msg;
  if(success){
    el.style.background='#F0FDF4';
    el.style.borderColor='#BBF7D0';
    el.style.color='#15803D';
  }else{
    el.style.background='#FEF2F2';
    el.style.borderColor='#FECACA';
    el.style.color='#DC2626';
  }
  el.classList.add('show');
}

function hideAlert(){
  const el=document.getElementById('alert');
  el.classList.remove('show');
  el.style.background='#FEF2F2';
  el.style.borderColor='#FECACA';
  el.style.color='#DC2626';
}

function validate(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  let ok=true;
  document.getElementById('email').classList.remove('error');
  document.getElementById('password').classList.remove('error');
  document.getElementById('email-err').classList.remove('show');
  document.getElementById('pass-err').classList.remove('show');
  hideAlert();
  if(!email||!/\S+@\S+\.\S+/.test(email)){
    document.getElementById('email').classList.add('error');
    document.getElementById('email-err').classList.add('show');
    ok=false;
  }
  if(!pass){
    document.getElementById('password').classList.add('error');
    document.getElementById('pass-err').classList.add('show');
    ok=false;
  }
  return ok;
}

async function doLogin(){
  if(!validate())return;
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  setLoading(true);
  const { error } = await db.auth.signInWithPassword({email,password:pass});
  setLoading(false);
  if(error){
    showAlert('E-mail ou senha incorretos. Tente novamente.');
    document.getElementById('password').value='';
    document.getElementById('password').classList.add('error');
    focusPassword();
    return;
  }
  goToDashboard();
}

async function forgotPassword(e){
  e.preventDefault();
  const email=document.getElementById('email').value.trim();
  if(!email||!/\S+@\S+\.\S+/.test(email)){
    document.getElementById('email').classList.add('error');
    document.getElementById('email-err').classList.add('show');
    document.getElementById('email').focus();
    return;
  }
  const { error } = await db.auth.resetPasswordForEmail(email);
  if(!error){
    showAlert('E-mail de recuperacao enviado!',true);
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
window.addEventListener('load',focusPassword);
</script>
</body>
</html>
