<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comprovante</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;padding:32px 20px 60px;}
.doc-card{background:#FFF;border-radius:24px;padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.titulo{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#8E8E93;text-align:center;margin-bottom:4px;}
.subtitulo{font-size:20px;font-weight:800;text-align:center;color:#1C1C1E;letter-spacing:-0.5px;margin-bottom:24px;}
.topo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.topo-cell{background:#F1F5F9;border-radius:16px;padding:16px 18px;}
.topo-label{font-size:10px;color:#8E8E93;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;}
.topo-val{font-size:18px;font-weight:400;color:#1C1C1E;}
.topo-val.grande{font-size:22px;font-weight:800;}
.card-desc{background:#F8FAFC;border-radius:16px;padding:16px 18px;margin-bottom:20px;line-height:1.8;font-size:13px;color:#475569;}
.card-desc strong{color:#1C1C1E;font-weight:700;}
.card-det{background:#F8FAFC;border-radius:16px;overflow:hidden;margin-bottom:28px;}
.det-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:0.5px solid #E2E8F0;}
.det-row:last-child{border-bottom:none;}
.det-label{font-size:12px;color:#8E8E93;font-weight:500;}
.det-val{font-size:13px;font-weight:600;color:#1C1C1E;}
.assinatura-local{font-size:11px;color:#94A3B8;font-style:italic;text-align:right;margin-bottom:24px;}
.btn-wrap{display:flex;gap:10px;}
.btn{flex:1;padding:13px;border-radius:50px;border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.btn.primary{background:#007AFF;color:#FFF;}
.btn.secondary{background:#F2F2F7;color:#1C1C1E;}
@media print{.btn-wrap{display:none;}body{background:#FFF;padding:0;}}
</style>
</head>
<body>
<div class="doc-card">
  <div class="titulo">Comprovante</div>
  <div class="subtitulo">Dinheiro para Depósito</div>
  <div class="topo-grid">
    <div class="topo-cell">
      <div class="topo-label">No. Comprovante</div>
      <div class="topo-val" id="num-comp">—</div>
    </div>
    <div class="topo-cell">
      <div class="topo-label">Total R$</div>
      <div class="topo-val grande" id="valor-display">—</div>
    </div>
  </div>
  <div class="card-desc" id="card-desc">—</div>
  <div class="card-det">
    <div class="det-row"><span class="det-label">Favorecido</span><span class="det-val">E Barcelos</span></div>
    <div class="det-row"><span class="det-label">Banco</span><span class="det-val">Bradesco</span></div>
    <div class="det-row"><span class="det-label">Agência</span><span class="det-val">3712-5</span></div>
    <div class="det-row"><span class="det-label">Conta</span><span class="det-val">0011754-4</span></div>
  </div>
  <div class="assinatura-local" id="data-extenso">—</div>
  <div class="btn-wrap">
    <button class="btn secondary" onclick="window.location.href='livro_caixa.html'">Voltar</button>
    <button class="btn primary" onclick="window.print()">PDF</button>
  </div>
</div>

<script>
function valorPorExtenso(v) {
  if (v === 0) return 'zero reais';
  const inteiro = Math.floor(v);
  const centavos = Math.round((v - inteiro) * 100);
  const grupos = [[1e9,'bilhão','bilhões'],[1e6,'milhão','milhões'],[1e3,'mil','mil'],[1,'real','reais']];
  const unidades = ['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  const dezenas = ['','dez','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  const centenas = ['','cem','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
  function converter(n) {
    if (n === 0) return '';
    if (n === 100) return 'cem';
    let r = '';
    if (n >= 100) { r += centenas[Math.floor(n/100)]; n %= 100; if (n > 0) r += ' e '; }
    if (n >= 20) { r += dezenas[Math.floor(n/10)]; n %= 10; if (n > 0) r += ' e '; }
    if (n > 0) r += unidades[n];
    return r;
  }
  let resultado = '';
  let resto = inteiro;
  for (const [div, sing, plur] of grupos) {
    const q = Math.floor(resto / div);
    if (q > 0) { resultado += (resultado ? ' e ' : '') + converter(q) + ' ' + (q === 1 ? sing : plur); resto %= div; }
  }
  if (centavos > 0) resultado += (resultado ? ' e ' : '') + converter(centavos) + ' ' + (centavos === 1 ? 'centavo' : 'centavos');
  return resultado.charAt(0).toUpperCase() + resultado.slice(1);
}

const valor = parseFloat(sessionStorage.getItem('recibo_valor') || '0');
const dataISO = sessionStorage.getItem('recibo_data') || '';
sessionStorage.removeItem('recibo_valor');
sessionStorage.removeItem('recibo_data');

const numComp = Math.floor(Math.random() * 90 + 10) + '/' + new Date().getFullYear();
const dataObj = new Date(dataISO + 'T12:00:00');
const diasSemana = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const dataExtenso = `Manaus, ${diasSemana[dataObj.getDay()]}, ${dataObj.getDate()} de ${meses[dataObj.getMonth()]} de ${dataObj.getFullYear()}`;
const valorFmt = valor.toLocaleString('pt-BR', {minimumFractionDigits:2});

document.getElementById('num-comp').textContent = numComp;
document.getElementById('valor-display').textContent = valorFmt;
document.getElementById('data-extenso').textContent = dataExtenso;
document.getElementById('card-desc').innerHTML = `Recebi de <strong>Huber Martins Lima</strong> a importância total de <strong>R$ ${valorFmt}</strong> (${valorPorExtenso(valor)}). O valor acima mencionado é destinado para a realização de depósito na seguinte conta bancária:`;
</script>
</body>
</html>
