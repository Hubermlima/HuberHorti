<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HuberHorti">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Produtos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-y:none;}
.topbar{height:60px;padding:0 20px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#1C1C1E;}
.ios-btn{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:#FFF;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  cursor:pointer;
  flex-shrink:0;
}
.busca-wrap{padding:4px 20px 14px;flex-shrink:0;}
.busca-inner{position:relative;display:flex;align-items:center;background:#FFF;border-radius:16px;padding:6px 12px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.busca-icon{position:absolute;left:14px;width:16px;height:16px;stroke:#8E8E93;stroke-width:2.5;fill:none;}
.busca-input{flex-grow:1;padding:10px 10px 10px 36px;background:transparent;border:none;font-size:16px;outline:none;color:#1C1C1E;font-family:'Inter',sans-serif;}
.lista-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 36px;}
.section-label{font-size:11px;color:#8E8E93;font-weight:500;padding:14px 4px 6px;}
.item-wrap{position:relative;margin-bottom:0;overflow:hidden;}
.item-wrap:first-child{border-radius:14px 14px 0 0;}
.item-wrap:last-child{border-radius:0 0 14px 14px;}
.item-wrap:only-child{border-radius:14px;}
.item-delete-bg{position:absolute;inset:0;background:#EF4444;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;border-radius:0;}
.item-wrap:first-child .item-delete-bg{border-radius:14px 14px 0 0;}
.item-wrap:last-child .item-delete-bg{border-radius:0 0 14px 14px;}
.item-wrap:only-child .item-delete-bg{border-radius:14px;}
.item-delete-bg svg{width:20px;height:20px;stroke:#FFF;stroke-width:2;fill:none;}
.item{background:#FFF;display:flex;align-items:center;padding:16px 18px;gap:14px;position:relative;z-index:1;transition:transform 0.2s ease;cursor:pointer;-webkit-tap-highlight-color:transparent;border-radius:0;border-bottom:1px solid #E5E5EA;}

.item-wrap:last-child .item{
  border-bottom:none;
}
.item:active{background:#F9F9F9;}
.item-info{flex:1;min-width:0;}
.item-nome{font-size:15px;color:#1C1C1E;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:12px;color:#8E8E93;margin-top:4px;line-height:1.35;}
.item-chevron{width:12px;height:12px;stroke:#C7C7CC;stroke-width:2;fill:none;flex-shrink:0;opacity:.85;}
.overlay{
  position:fixed;
  inset:0;
  background:transparent;
  z-index:999;
  display:none;
  align-items:center;
  justify-content:center;
}
.overlay.active{display:flex;}
.modal{background:#FFF;border-radius:22px;padding:24px 24px 28px;width:calc(100% - 48px);max-width:380px;box-shadow:0 32px 64px rgba(0,0,0,0.22),0 8px 24px rgba(0,0,0,0.10);animation:floatIn 0.2s cubic-bezier(0.4,0,0.2,1);max-height:90vh;overflow-y:auto;}
@keyframes floatIn{from{opacity:0;transform:scale(0.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:17px;font-weight:700;color:#1C1C1E;}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:#F2F2F7;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.modal-close svg{width:14px;height:14px;stroke:#1C1C1E;stroke-width:2.5;fill:none;}
.field{margin-bottom:16px;}
.field-label{font-size:12px;color:#8E8E93;margin-bottom:6px;display:block;font-weight:600;}
.field input,.field select{width:100%;padding:14px 16px;background:#FFF;border:1.5px solid #E5E5EA;border-radius:14px;font-size:15px;font-family:'Inter',sans-serif;color:#1C1C1E;outline:none;-webkit-appearance:none;appearance:none;}

.field input:focus,.field select:focus{
  border-color:#007AFF;
  background:#FFF;
}
.field input::placeholder{color:#C7C7CC;}
.field input.readonly{background:#F2F2F7;color:#8E8E93;cursor:default;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-btns{display:flex;gap:10px;margin-top:4px;}
.btn{flex:1;padding:15px;border:none;border-radius:100px;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn:active{opacity:0.8;}
.btn-cancel{background:#F2F2F7;color:#1C1C1E;}
.btn-save{background:#007AFF;color:#FFF;}

.empty{text-align:center;padding:48px 20px;color:#C7C7CC;font-size:13px;}
.loading{text-align:center;padding:40px;color:#C7C7CC;font-size:13px;}

/* Container do Campo para alinhar Label e Toggle */
.field-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 4px;
  margin-bottom: 16px;
}

/* Estrutura do Switch iOS */
.ios-switch {
  position: relative;
  display: inline-block;
  width: 51px;
  height: 31px;
  flex-shrink: 0;
}

.ios-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.ios-slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #E9E9EB; /* Cinza desativado iOS */
  transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 34px;
}

.ios-slider:before {
  position: absolute;
  content: "";
  height: 27px;
  width: 27px;
  left: 2px;
  bottom: 2px;
  background-color: white;
  transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 50%;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15), 0 3px 1px rgba(0,0,0,0.06);
}

input:checked + .ios-slider {
  background-color: #34C759; /* Verde Sucesso iOS */
}

input:checked + .ios-slider:before {
  transform: translateX(20px);
}

</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Produtos</div>
  </div>
  <button class="ios-btn" onclick="abrirNovo()">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<div class="busca-wrap">
  <div class="busca-inner">
    <svg class="busca-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input class="busca-input" id="busca" type="text" placeholder="Buscar produto..." oninput="renderLista()">
  </div>
</div>

<div class="lista-wrap" id="lista">
  <div class="loading">Carregando...</div>
</div>

<div class="overlay" id="overlay" onclick="fecharModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Novo produto</span>
      <button class="modal-close" onclick="fechar()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    
    <div class="field-toggle">
  <label class="field-label" style="margin-bottom:0; font-size:15px; color:#1C1C1E;">Favorito</label>
  <label class="ios-switch">
    <input type="checkbox" id="f-favoritos">
    <span class="ios-slider"></span>
  </label>
</div>


    <div class="field">
      <label class="field-label">Nome</label>
      <input type="text" id="f-nome" placeholder="Nome do produto">
    </div>

    <div class="field">
      <label class="field-label">Fornecedor</label>
      <select id="f-fornecedor">
        <option value="">Selecione...</option>
      </select>
    </div>

    <div class="field-row">
      <div class="field">
        <label class="field-label">Unid. compra</label>
        <select id="f-unid-compra">
          <option value="">—</option>
          <option>Bld</option>
          <option>Cart</option>
          <option>Cent</option>
          <option>Cx</option>
          <option>Dez</option>
          <option>Dz</option>
          <option>Fd</option>
          <option>Kg</option>
          <option>Kit</option>
          <option>L</option>
          <option>Lta</option>
          <option>Mac</option>
          <option>Mil</option>
          <option>Pct</option>
          <option>Par</option>
          <option>Pot</option>
          <option>Tub</option>
          <option>Un</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">Unid. venda</label>
        <select id="f-unid-venda">
          <option value="">—</option>
          <option>Bld</option>
          <option>Cart</option>
          <option>Cent</option>
          <option>Cx</option>
          <option>Dez</option>
          <option>Dz</option>
          <option>Fd</option>
          <option>Kg</option>
          <option>Kit</option>
          <option>L</option>
          <option>Lta</option>
          <option>Mac</option>
          <option>Mil</option>
          <option>Pct</option>
          <option>Par</option>
          <option>Pot</option>
          <option>Tub</option>
          <option>Un</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Peso por unidade</label>
      <input type="text" id="f-peso" inputmode="decimal" placeholder="0,00">
    </div>

    <div class="field">
      <label class="field-label">Preço médio de compra</label>
      <input type="text" id="f-preco" class="readonly" readonly placeholder="Calculado automaticamente">
    </div>

    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="fechar()">Cancelar</button>
      <button class="btn btn-save" onclick="salvar()">Salvar</button>
    </div>
    
    <input type="hidden" id="f-id">
  </div>
</div>

<script>
const UNIDADES = ['Bld','Cart','Cent','Cx','Dez','Dz','Fd','Kg','Kit','L','Lta','Mac','Mil','Pct','Par','Pot','Tub','Un'];

const fmtNum = v => Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
const parseNum = s => parseFloat(String(s).replace(/\./g,'').replace(',','.')) || 0;

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();

let _produtos = [];
let _fornecedores = [];
let _swipeEl = null;

async function carregar() {
  const [{ data: prods }, { data: fors }] = await Promise.all([
    db.from('produtos').select('id, nome, fornecedor_id, unid_compra, unid_venda, peso_por_unid, preco_medio_compra, favoritos').order('nome'),

    db.from('fornecedores').select('id, nome').order('nome')
  ]);
  _produtos = prods || [];
  _fornecedores = fors || [];
  popularFornecedores();
  renderLista();
}

function popularFornecedores() {
  const sel = document.getElementById('f-fornecedor');
  sel.innerHTML = '<option value="">Selecione...</option>';
  _fornecedores.forEach(f => {
    const o = document.createElement('option');
    o.value = f.id;
    o.textContent = f.nome;
    sel.appendChild(o);
  });
}

function renderLista() {
  const q = document.getElementById('busca').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const lista = document.getElementById('lista');
  const filtrados = _produtos.filter(p =>
    p.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(q)
  );
  if (!filtrados.length) { lista.innerHTML = '<div class="empty">Nenhum produto encontrado</div>'; return; }

  lista.innerHTML = filtrados.map(p => {
    const forn = _fornecedores.find(f => f.id === p.fornecedor_id);
    const sub = [forn?.nome, p.unid_venda].filter(Boolean).join(' · ');
    const dadosJSON = JSON.stringify(p).replace(/'/g,"&#39;").replace(/"/g,'&quot;');
    return `<div class="item-wrap" id="wrap-${p.id}">
      <div class="item-delete-bg" onclick="confirmarExcluir('${p.id}')">
        <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </div>
      <div class="item" id="item-${p.id}" data-prod="${dadosJSON}" onclick="abrirEditar(this)">
        <div class="item-info">
          <div class="item-nome">${p.nome}</div>
          <div class="item-sub">${sub}</div>
        </div>
        <svg class="item-chevron" viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </div>
    </div>`;
  }).join('');

  bindSwipe();
}

function buscarProduto(){
  const q=document.getElementById('busca').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(!q) return;

  const itens=[...document.querySelectorAll('.item')];

  for(const item of itens){
    const nome=item.querySelector('.item-nome').textContent
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g,'');

    if(nome.startsWith(q) || nome.includes(q)){
      item.scrollIntoView({behavior:'smooth',block:'center'});
      break;
    }
  }
}

function bindSwipe() {
  document.querySelectorAll('.item').forEach(el => {
    let startX = 0, currentX = 0;
    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      el.style.transition = 'none';
      if (_swipeEl && _swipeEl !== el) resetSwipe(_swipeEl);
    }, {passive:true});
    el.addEventListener('touchmove', e => {
      const diff = e.touches[0].clientX - startX;
      if (diff < 0) { currentX = Math.max(diff, -80); el.style.transform = `translateX(${currentX}px)`; }
    }, {passive:true});
    el.addEventListener('touchend', () => {
      el.style.transition = 'transform 0.2s ease';
      if (currentX < -40) { el.style.transform = 'translateX(-80px)'; _swipeEl = el; }
      else resetSwipe(el);
      currentX = 0;
    });
  });
}

function resetSwipe(el) {
  el.style.transition = 'transform 0.2s ease';
  el.style.transform = 'translateX(0)';
}

function confirmarExcluir(id) {
  if (!confirm('Excluir este produto?')) return;
  excluirPorId(id);
}

async function excluirPorId(id) {
  await db.from('produtos').delete().eq('id', id);
  _produtos = _produtos.filter(p => p.id !== id);
  renderLista();
}

function abrirNovo() {
  document.getElementById('modal-title').textContent = 'Novo produto';
  document.getElementById('f-id').value = '';
  document.getElementById('f-nome').value = '';
  document.getElementById('f-fornecedor').value = '';
  document.getElementById('f-unid-compra').value = '';
  document.getElementById('f-unid-venda').value = '';
  document.getElementById('f-peso').value = '';
  document.getElementById('f-preco').value = '';
  document.getElementById('f-id').value = '';
// ... outras linhas ...
document.getElementById('f-preco').value = '';
document.getElementById('f-favoritos').checked = false; // COLA ESSA LINHA

  document.getElementById('overlay').classList.add('active');
}

function abrirEditar(el) {
  if (_swipeEl) { resetSwipe(_swipeEl); _swipeEl = null; return; }
  const p = JSON.parse(el.getAttribute('data-prod').replace(/&quot;/g,'"').replace(/&#39;/g,"'"));
  
  document.getElementById('modal-title').textContent = 'Editar produto';
  
  // AQUI ESTÁ O TRABALHO:
  document.getElementById('f-id').value = p.id;
  document.getElementById('f-favoritos').checked = p.favoritos || false; // <--- COLA ESTA LINHA AQUI
  
  document.getElementById('f-nome').value = p.nome;
  document.getElementById('f-fornecedor').value = p.fornecedor_id || '';
  document.getElementById('f-unid_compra').value = p.unid_compra || '';
  document.getElementById('f-unid-venda').value = p.unid_venda || '';
  document.getElementById('f-peso').value = p.peso_por_unid ? fmtNum(p.peso_por_unid) : '';
  document.getElementById('f-preco').value = p.preco_medio_compra ? fmtNum(p.preco_medio_compra) : '';
  
  document.getElementById('overlay').classList.add('active');
}


function fechar() { document.getElementById('overlay').classList.remove('active'); }
function fecharModal(e) { return; }

async function salvar() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { alert('Informe o nome do produto'); return; }

  const id = document.getElementById('f-id').value;
  
  // Montando os dados para enviar ao banco
  const payload = {
    nome,
    favoritos: document.getElementById('f-favoritos').checked,
    fornecedor_id: document.getElementById('f-fornecedor').value || null,
    unid_compra: document.getElementById('f-unid-compra').value || null,
    unid_venda: document.getElementById('f-unid-venda').value || null,
    peso_por_unid: parseNum(document.getElementById('f-peso').value) || null,
  };

  try {
    if (id) {
      // Se tem ID, atualiza o que já existe
      const { error } = await db.from('produtos').update(payload).eq('id', id);
      if (error) throw error;
    } else {
      // Se não tem ID, cria um novo
      const { error } = await db.from('produtos').insert(payload);
      if (error) throw error;
    }

    fechar();
    carregar(); // Recarrega a lista para mostrar a mudança
  } catch (err) {
    console.error('Erro ao salvar:', err);
    alert('Erro ao salvar produto: ' + err.message);
  }
}


async function excluir() {
  const id = document.getElementById('f-id').value;
  if (!confirm('Excluir este produto?')) return;
  await db.from('produtos').delete().eq('id', id);
  fechar();
  carregar();
}

document.getElementById('f-peso').addEventListener('input', e => {
  let digits = e.target.value.replace(/\D/g,'');
  if (!digits) { e.target.value = ''; return; }
  e.target.value = fmtNum(parseInt(digits,10) / 100);
});

carregar();
</script>
</body>
</html>
