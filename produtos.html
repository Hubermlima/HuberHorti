<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HuberHorti">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Produtos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-y:none;}
.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#1C1C1E;}
.ios-btn{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;flex-shrink:0;}
.busca-wrap{padding:0 16px 10px;flex-shrink:0;}
.busca-inner{position:relative;display:flex;align-items:center;background:#FFF;border-radius:14px;padding:4px 10px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.busca-icon{position:absolute;left:14px;width:16px;height:16px;stroke:#8E8E93;stroke-width:2.5;fill:none;}
.busca-input{flex-grow:1;padding:9px 9px 9px 34px;background:transparent;border:none;font-size:15px;outline:none;color:#1C1C1E;font-family:'Inter',sans-serif;}
.lista-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 32px;}
.section-label{font-size:11px;color:#8E8E93;font-weight:500;padding:14px 4px 6px;}
.item-wrap{position:relative;margin-bottom:1px;border-radius:14px;overflow:hidden;}
.item-delete-bg{position:absolute;inset:0;background:#EF4444;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;border-radius:14px;}
.item-delete-bg svg{width:20px;height:20px;stroke:#FFF;stroke-width:2;fill:none;}
.item{background:#FFF;border-radius:14px;display:flex;align-items:center;padding:13px 16px;gap:12px;position:relative;z-index:1;transition:transform 0.2s ease;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.item:active{background:#F9F9F9;}
.item-info{flex:1;min-width:0;}
.item-nome{font-size:14px;color:#1C1C1E;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:11px;color:#8E8E93;margin-top:2px;}
.item-chevron{width:14px;height:14px;stroke:#C7C7CC;stroke-width:2;fill:none;flex-shrink:0;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:999;display:none;align-items:center;justify-content:center;}
.overlay.active{display:flex;}
.modal{background:#FFF;border-radius:20px;padding:20px 20px 24px;width:calc(100% - 48px);max-width:380px;box-shadow:0 32px 64px rgba(0,0,0,0.22),0 8px 24px rgba(0,0,0,0.10);animation:floatIn 0.2s cubic-bezier(0.4,0,0.2,1);max-height:90vh;overflow-y:auto;}
@keyframes floatIn{from{opacity:0;transform:scale(0.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:15px;font-weight:600;color:#1C1C1E;}
.modal-close{width:26px;height:26px;border-radius:50%;border:none;background:#F2F2F7;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.modal-close svg{width:12px;height:12px;stroke:#1C1C1E;stroke-width:2.5;fill:none;}
.field{margin-bottom:14px;}
.field-label{font-size:11px;color:#8E8E93;margin-bottom:5px;display:block;}
.field input,.field select{width:100%;padding:12px 14px;background:#F8F8FA;border:1.5px solid #F0F0F0;border-radius:12px;font-size:14px;font-family:'Inter',sans-serif;color:#1C1C1E;outline:none;-webkit-appearance:none;appearance:none;}
.field input:focus,.field select:focus{border-color:#007AFF;background:#FFF;}
.field input::placeholder{color:#C7C7CC;}
.field input.readonly{background:#F2F2F7;color:#8E8E93;cursor:default;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-btns{display:flex;gap:10px;margin-top:4px;}
.btn{flex:1;padding:13px;border:none;border-radius:100px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn:active{opacity:0.8;}
.btn-cancel{background:#F2F2F7;color:#1C1C1E;}
.btn-save{background:#007AFF;color:#FFF;}
.btn-delete{width:100%;margin-top:10px;padding:12px;border:none;border-radius:100px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:#EF4444;background:#FEE2E2;cursor:pointer;}
.empty{text-align:center;padding:48px 20px;color:#C7C7CC;font-size:13px;}
.loading{text-align:center;padding:40px;color:#C7C7CC;font-size:13px;}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Produtos</div>
  </div>
  <button class="ios-btn" onclick="abrirNovo()">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<div class="busca-wrap">
  <div class="busca-inner">
    <svg class="busca-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input class="busca-input" id="busca" type="text" placeholder="Buscar produto..." oninput="renderLista()">
  </div>
</div>

<div class="lista-wrap" id="lista">
  <div class="loading">Carregando...</div>
</div>

<div class="overlay" id="overlay" onclick="fecharModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Novo produto</span>
      <button class="modal-close" onclick="fechar()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="field">
      <label class="field-label">Nome</label>
      <input type="text" id="f-nome" placeholder="Nome do produto">
    </div>

    <div class="field">
      <label class="field-label">Fornecedor</label>
      <select id="f-fornecedor">
        <option value="">Selecione...</option>
      </select>
    </div>

    <div class="field-row">
      <div class="field">
        <label class="field-label">Unid. compra</label>
        <select id="f-unid-compra">
          <option value="">—</option>
          <option>Bld</option>
          <option>Cart</option>
          <option>Cent</option>
          <option>Cx</option>
          <option>Dez</option>
          <option>Dz</option>
          <option>Fd</option>
          <option>Kg</option>
          <option>Kit</option>
          <option>L</option>
          <option>Lta</option>
          <option>Mac</option>
          <option>Mil</option>
          <option>Pct</option>
          <option>Par</option>
          <option>Pot</option>
          <option>Tub</option>
          <option>Un</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">Unid. venda</label>
        <select id="f-unid-venda">
          <option value="">—</option>
          <option>Bld</option>
          <option>Cart</option>
          <option>Cent</option>
          <option>Cx</option>
          <option>Dez</option>
          <option>Dz</option>
          <option>Fd</option>
          <option>Kg</option>
          <option>Kit</option>
          <option>L</option>
          <option>Lta</option>
          <option>Mac</option>
          <option>Mil</option>
          <option>Pct</option>
          <option>Par</option>
          <option>Pot</option>
          <option>Tub</option>
          <option>Un</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Peso por unidade</label>
      <input type="text" id="f-peso" inputmode="decimal" placeholder="0,00">
    </div>

    <div class="field">
      <label class="field-label">Preço médio de compra</label>
      <input type="text" id="f-preco" class="readonly" readonly placeholder="Calculado automaticamente">
    </div>

    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="fechar()">Cancelar</button>
      <button class="btn btn-save" onclick="salvar()">Salvar</button>
    </div>
    <button class="btn-delete" id="btn-delete" style="display:none" onclick="excluir()">Excluir produto</button>
    <input type="hidden" id="f-id">
  </div>
</div>

<script>
const UNIDADES = ['Bld','Cart','Cent','Cx','Dez','Dz','Fd','Kg','Kit','L','Lta','Mac','Mil','Pct','Par','Pot','Tub','Un'];

const fmtNum = v => Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
const parseNum = s => parseFloat(String(s).replace(/\./g,'').replace(',','.')) || 0;

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();

let _produtos = [];
let _fornecedores = [];
let _swipeEl = null;

async function carregar() {
  const [{ data: prods }, { data: fors }] = await Promise.all([
    db.from('produtos').select('id, nome, fornecedor_id, unid_compra, unid_venda, peso_por_unid, preco_medio_compra').order('nome'),
    db.from('fornecedores').select('id, nome').order('nome')
  ]);
  _produtos = prods || [];
  _fornecedores = fors || [];
  popularFornecedores();
  renderLista();
}

function popularFornecedores() {
  const sel = document.getElementById('f-fornecedor');
  sel.innerHTML = '<option value="">Selecione...</option>';
  _fornecedores.forEach(f => {
    const o = document.createElement('option');
    o.value = f.id;
    o.textContent = f.nome;
    sel.appendChild(o);
  });
}

function renderLista() {
  const q = document.getElementById('busca').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const lista = document.getElementById('lista');
  const filtrados = _produtos.filter(p =>
    p.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(q)
  );
  if (!filtrados.length) { lista.innerHTML = '<div class="empty">Nenhum produto encontrado</div>'; return; }

  lista.innerHTML = filtrados.map(p => {
    const forn = _fornecedores.find(f => f.id === p.fornecedor_id);
    const sub = [forn?.nome, p.unid_venda].filter(Boolean).join(' · ');
    const dadosJSON = JSON.stringify(p).replace(/'/g,"&#39;").replace(/"/g,'&quot;');
    return `<div class="item-wrap" id="wrap-${p.id}">
      <div class="item-delete-bg" onclick="confirmarExcluir('${p.id}')">
        <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </div>
      <div class="item" id="item-${p.id}" data-prod="${dadosJSON}" onclick="abrirEditar(this)">
        <div class="item-info">
          <div class="item-nome">${p.nome}</div>
          <div class="item-sub">${sub}</div>
        </div>
        <svg class="item-chevron" viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </div>
    </div>`;
  }).join('');

  bindSwipe();
}

function bindSwipe() {
  document.querySelectorAll('.item').forEach(el => {
    let startX = 0, currentX = 0;
    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      el.style.transition = 'none';
      if (_swipeEl && _swipeEl !== el) resetSwipe(_swipeEl);
    }, {passive:true});
    el.addEventListener('touchmove', e => {
      const diff = e.touches[0].clientX - startX;
      if (diff < 0) { currentX = Math.max(diff, -80); el.style.transform = `translateX(${currentX}px)`; }
    }, {passive:true});
    el.addEventListener('touchend', () => {
      el.style.transition = 'transform 0.2s ease';
      if (currentX < -40) { el.style.transform = 'translateX(-80px)'; _swipeEl = el; }
      else resetSwipe(el);
      currentX = 0;
    });
  });
}

function resetSwipe(el) {
  el.style.transition = 'transform 0.2s ease';
  el.style.transform = 'translateX(0)';
}

function confirmarExcluir(id) {
  if (!confirm('Excluir este produto?')) return;
  excluirPorId(id);
}

async function excluirPorId(id) {
  await db.from('produtos').delete().eq('id', id);
  _produtos = _produtos.filter(p => p.id !== id);
  renderLista();
}

function abrirNovo() {
  document.getElementById('modal-title').textContent = 'Novo produto';
  document.getElementById('f-id').value = '';
  document.getElementById('f-nome').value = '';
  document.getElementById('f-fornecedor').value = '';
  document.getElementById('f-unid-compra').value = '';
  document.getElementById('f-unid-venda').value = '';
  document.getElementById('f-peso').value = '';
  document.getElementById('f-preco').value = '';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('overlay').classList.add('active');
}

function abrirEditar(el) {
  if (_swipeEl) { resetSwipe(_swipeEl); _swipeEl = null; return; }
  const p = JSON.parse(el.getAttribute('data-prod').replace(/&quot;/g,'"').replace(/&#39;/g,"'"));
  document.getElementById('modal-title').textContent = 'Editar produto';
  document.getElementById('f-id').value = p.id;
  document.getElementById('f-nome').value = p.nome;
  document.getElementById('f-fornecedor').value = p.fornecedor_id || '';
  document.getElementById('f-unid-compra').value = p.unid_compra || '';
  document.getElementById('f-unid-venda').value = p.unid_venda || '';
  document.getElementById('f-peso').value = p.peso_por_unid ? fmtNum(p.peso_por_unid) : '';
  document.getElementById('f-preco').value = p.preco_medio_compra ? fmtNum(p.preco_medio_compra) : '';
  document.getElementById('btn-delete').style.display = 'block';
  document.getElementById('overlay').classList.add('active');
}

function fechar() { document.getElementById('overlay').classList.remove('active'); }
function fecharModal(e) { if (e.target === document.getElementById('overlay')) fechar(); }

async function salvar() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { alert('Informe o nome do produto'); return; }

  const id = document.getElementById('f-id').value;
  const payload = {
    nome,
    fornecedor_id: document.getElementById('f-fornecedor').value || null,
    unid_compra: document.getElementById('f-unid-compra').value || null,
    unid_venda: document.getElementById('f-unid-venda').value || null,
    peso_por_unid: parseNum(document.getElementById('f-peso').value) || null,
  };

  if (id) {
    await db.from('produtos').update(payload).eq('id', id);
  } else {
    await db.from('produtos').insert(payload);
  }

  fechar();
  carregar();
}

async function excluir() {
  const id = document.getElementById('f-id').value;
  if (!confirm('Excluir este produto?')) return;
  await db.from('produtos').delete().eq('id', id);
  fechar();
  carregar();
}

document.getElementById('f-peso').addEventListener('input', e => {
  let digits = e.target.value.replace(/\D/g,'');
  if (!digits) { e.target.value = ''; return; }
  e.target.value = fmtNum(parseInt(digits,10) / 100);
});

carregar();
</script>
</body>
</html>
