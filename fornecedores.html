<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HuberHorti - Fornecedores</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;width:100%}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F8FAFC;color:#1E293B;min-height:100vh;overflow-x:hidden}
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:#FFFFFF;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
.back-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.back-btn svg{width:20px;height:20px;stroke:#475569;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.topbar-title{font-size:16px;font-weight:700;color:#1E293B;flex:1}
.topbar-brand{font-size:13px;font-weight:800;color:#1E293B}
.topbar-brand span{color:#2563EB}
.main{margin-top:56px;padding:16px 16px 100px}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:#94A3B8;fill:none;stroke-width:2;stroke-linecap:round}
.search-input{width:100%;padding:11px 12px 11px 38px;background:#FFFFFF;border:1px solid #E2E8F0;border-radius:12px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:#1E293B;outline:none;-webkit-appearance:none}
.search-input:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-input::placeholder{color:#CBD5E1}
.filter-row{display:flex;gap:8px;margin-bottom:16px}
.filter-chip{flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;border:1.5px solid #E2E8F0;background:#FFFFFF;color:#475569;transition:all .15s;-webkit-tap-highlight-color:transparent}
.filter-chip.active.all{background:#1E293B;border-color:#1E293B;color:#fff}
.filter-chip.active.avista{background:#DCFCE7;border-color:#16A34A;color:#16A34A}
.filter-chip.active.prazo{background:#FEF9C3;border-color:#CA8A04;color:#CA8A04}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:12px;padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:800;color:#1E293B;letter-spacing:-.5px}
.stat-label{font-size:10.5px;color:#94A3B8;font-weight:500;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.fornec-list{display:flex;flex-direction:column;gap:8px}
.fornec-card{background:#FFFFFF;border:1px solid #E2E8F0;border-radius:16px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.fornec-card.prazo{border-left:4px solid #CA8A04}
.fornec-card.avista{border-left:4px solid #16A34A}
.fornec-main{padding:14px 16px;display:flex;align-items:center;gap:12px}
.fornec-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.fornec-info{flex:1;min-width:0}
.fornec-nome{font-size:14px;font-weight:700;color:#1E293B}
.fornec-contato{font-size:12px;color:#94A3B8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fornec-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.fornec-badge{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:6px}
.fornec-badge.prazo{background:#FEF9C3;color:#CA8A04}
.fornec-badge.avista{background:#DCFCE7;color:#16A34A}
.fornec-codigo{font-size:11px;color:#94A3B8;font-weight:600;background:#F1F5F9;padding:2px 7px;border-radius:5px}
.fornec-footer{padding:10px 16px;background:#F8FAFC;border-top:1px solid #F1F5F9;display:flex;gap:16px;align-items:center}
.fornec-footer-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:#475569;font-weight:500}
.fornec-footer-item svg{width:13px;height:13px;stroke:#94A3B8;fill:none;stroke-width:2;stroke-linecap:round}
.fornec-saldo{font-size:13px;font-weight:700;margin-left:auto}
.fornec-saldo.red{color:#EF4444}
.fornec-saldo.green{color:#16A34A}
.empty{text-align:center;padding:48px 20px;color:#94A3B8}
.empty svg{width:40px;height:40px;stroke:#CBD5E1;fill:none;stroke-width:1.5;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:#94A3B8;font-size:14px}
.fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:#2563EB;color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(37,99,235,.4);z-index:50;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#FFFFFF;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-size:18px;font-weight:700;color:#1E293B}
.modal-close{width:32px;height:32px;border:none;background:#F1F5F9;border-radius:8px;cursor:pointer;font-size:18px;color:#475569;display:flex;align-items:center;justify-content:center}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:12px 14px;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:12px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:#1E293B;outline:none;-webkit-appearance:none;transition:all .15s}
.form-input:focus{border-color:#2563EB;background:#FFFFFF;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-input::placeholder{color:#CBD5E1}
.form-input.readonly{background:#F1F5F9;color:#94A3B8;cursor:not-allowed;font-weight:700}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tipo-select{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tipo-opt{padding:12px;border:1.5px solid #E2E8F0;border-radius:12px;cursor:pointer;text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.tipo-opt .tipo-icon{font-size:20px;margin-bottom:4px}
.tipo-opt .tipo-name{font-size:13px;font-weight:600;color:#475569}
.tipo-opt.selected.avista{background:#DCFCE7;border-color:#16A34A}.tipo-opt.selected.avista .tipo-name{color:#16A34A}
.tipo-opt.selected.prazo{background:#FEF9C3;border-color:#CA8A04}.tipo-opt.selected.prazo .tipo-name{color:#CA8A04}
.rule-box{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:12px 14px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.rule-box svg{width:16px;height:16px;stroke:#2563EB;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;margin-top:1px}
.rule-box p{font-size:12.5px;color:#1E40AF;font-weight:500;line-height:1.5}
.form-divider{display:flex;align-items:center;gap:10px;margin:16px 0 12px}
.form-divider-line{flex:1;height:1px;background:#E2E8F0}
.form-divider-label{font-size:11px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.banco-item{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.banco-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.banco-item-title{font-size:12.5px;font-weight:600;color:#475569}
.banco-remove{width:24px;height:24px;border:none;background:#FEE2E2;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.banco-remove svg{width:12px;height:12px;stroke:#EF4444;fill:none;stroke-width:2;stroke-linecap:round}
.add-banco-btn{width:100%;padding:10px;border:1.5px dashed #BFDBFE;border-radius:10px;background:none;font-size:13px;font-weight:600;color:#2563EB;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent;margin-bottom:4px}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;border:none;transition:all .15s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-ghost{background:#F1F5F9;color:#475569}
.btn-primary{background:#2563EB;color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.25)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-danger{background:#FEF2F2;color:#EF4444;width:100%;margin-top:10px;padding:12px;border-radius:12px;font-size:14px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;border:1px solid #FECACA}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-primary.loading .spinner{display:block}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:#16A34A}
.toast.err{background:#EF4444}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="topbar-title">Fornecedores</div>
  <div class="topbar-brand">Huber<span>Horti</span></div>
</div>

<div class="main">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="search" placeholder="Buscar fornecedor..." oninput="renderLista()"/>
  </div>
  <div class="filter-row">
    <div class="filter-chip active all" onclick="setFiltro(this,'all')">Todos</div>
    <div class="filter-chip avista" onclick="setFiltro(this,'avista')">A Vista</div>
    <div class="filter-chip prazo" onclick="setFiltro(this,'prazo')">A Prazo</div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="st-total">—</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#16A34A" id="st-avista">—</div><div class="stat-label">A Vista</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#CA8A04" id="st-prazo">—</div><div class="stat-label">A Prazo</div></div>
  </div>
  <div id="lista"><div class="loading">Carregando...</div></div>
</div>

<button class="fab" onclick="abrirNovo()">+</button>

<!-- MODAL -->

<div class="overlay" id="overlay-form" onclick="fecharOverlay(event,'overlay-form')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="form-title">Novo Fornecedor</div>
      <button class="modal-close" onclick="fechar('overlay-form')">×</button>
    </div>
    <input type="hidden" id="f-id"/>
    <div class="form-group">
      <label class="form-label">Codigo</label>
      <input class="form-input readonly" id="f-codigo" type="text" value="Automatico" readonly/>
    </div>
    <div class="form-group">
      <label class="form-label">Nome</label>
      <input class="form-input" id="f-nome" type="text" placeholder="Nome do fornecedor"/>
    </div>
    <div class="form-group">
      <label class="form-label">Contato 1</label>
      <div class="form-row">
        <input class="form-input" id="f-c1nome" type="text" placeholder="Nome"/>
        <input class="form-input" id="f-c1tel" type="tel" placeholder="Telefone"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Contato 2</label>
      <div class="form-row">
        <input class="form-input" id="f-c2nome" type="text" placeholder="Nome"/>
        <input class="form-input" id="f-c2tel" type="tel" placeholder="Telefone"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Forma de Pagamento</label>
      <div class="tipo-select">
        <div class="tipo-opt avista selected" id="opt-avista" onclick="selectTipo('A Vista')">
          <div class="tipo-icon">⚡</div>
          <div class="tipo-name">A Vista</div>
        </div>
        <div class="tipo-opt prazo" id="opt-prazo" onclick="selectTipo('A Prazo')">
          <div class="tipo-icon">📅</div>
          <div class="tipo-name">A Prazo</div>
        </div>
      </div>
    </div>
    <div class="rule-box" id="rule-avista">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p>Compra a vista: ao lancar uma NF deste fornecedor, o sistema gera automaticamente uma saida no Livro Caixa.</p>
    </div>
    <div class="form-group">
      <label class="form-label">Chave Pix</label>
      <input class="form-input" id="f-pix" type="text" placeholder="CPF, CNPJ, e-mail ou telefone"/>
    </div>
    <div class="form-divider">
      <div class="form-divider-line"></div>
      <div class="form-divider-label">Dados Bancarios</div>
      <div class="form-divider-line"></div>
    </div>
    <div id="bancos-wrap"></div>
    <button class="add-banco-btn" onclick="addBanco()">+ Adicionar conta bancaria</button>
    <div class="form-divider">
      <div class="form-divider-line"></div>
      <div class="form-divider-label">Observacoes</div>
      <div class="form-divider-line"></div>
    </div>
    <div class="form-group">
      <textarea class="form-input" id="f-obs" rows="3" placeholder="Notas adicionais..." style="resize:none"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="fechar('overlay-form')">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar" onclick="salvar()">
        <div class="spinner"></div>
        <span>Salvar</span>
      </button>
    </div>
    <button class="btn-danger" id="btn-excluir" style="display:none" onclick="excluir()">Excluir fornecedor</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://suwaqkxkhhfopjkhsptf.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1d2Fxa3hraGhmb3Bqa2hzcHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDI2MDQsImV4cCI6MjA5MDM3ODYwNH0.HcLs3bkZZ0lATGSQbWtTt7oIxcM8inYmLZHm2K5v39U';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);

db.auth.getSession().then(({data})=>{if(!data.session)window.location.href='index.html'});

let todos=[];
let filtroTipo='all';
let tipoSelecionado='A Vista';
let bancosEditando=[];

const CORES=['#EA580C','#16A34A','#2563EB','#7C3AED','#0891B2','#DB2777','#D97706'];

function initiais(nome){
  return nome.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
}

function cor(idx){return CORES[idx%CORES.length]}

async function carregar(){
  document.getElementById('lista').innerHTML='<div class="loading">Carregando...</div>';
  const{data,error}=await db.from('fornecedores').select('*').order('codigo');
  if(error){toast('Erro ao carregar','err');return;}
  todos=data||[];
  renderStats();
  renderLista();
}

function renderStats(){
  document.getElementById('st-total').textContent=todos.length;
  document.getElementById('st-avista').textContent=todos.filter(f=>f.tipo_pagamento==='A Vista').length;
  document.getElementById('st-prazo').textContent=todos.filter(f=>f.tipo_pagamento==='A Prazo').length;
}

function setFiltro(el,tipo){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filtroTipo=tipo;
  renderLista();
}

function renderLista(){
  const q=document.getElementById('search').value.toLowerCase();
  let lista=todos.filter(f=>{
    const matchTipo=filtroTipo==='all'||(filtroTipo==='avista'&&f.tipo_pagamento==='A Vista')||(filtroTipo==='prazo'&&f.tipo_pagamento==='A Prazo');
    const matchQ=!q||f.nome.toLowerCase().includes(q);
    return matchTipo&&matchQ;
  });

  if(!lista.length){
    document.getElementById('lista').innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg><div>Nenhum fornecedor encontrado</div></div>`;
    return;
  }

  const tipo=f=>f.tipo_pagamento==='A Prazo'?'prazo':'avista';
  const bancos=f=>{
    const cb=f.contas_bancarias||[];
    if(cb.length>0)return `<div class="fornec-footer-item"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>${cb.length} conta${cb.length>1?'s':''} bancaria${cb.length>1?'s':''}</div>`;
    if(f.pix)return `<div class="fornec-footer-item"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Somente Pix</div>`;
    return `<div class="fornec-footer-item">Sem dados bancarios</div>`;
  };

  document.getElementById('lista').innerHTML=`<div class="fornec-list">${lista.map((f,i)=>`
    <div class="fornec-card ${tipo(f)}" onclick='abrirEditar(${JSON.stringify(f)})'>
      <div class="fornec-main">
        <div class="fornec-avatar" style="background:${cor(f.codigo-1)}">${initiais(f.nome)}</div>
        <div class="fornec-info">
          <div class="fornec-nome">${f.nome}</div>
          <div class="fornec-contato">${f.contato1_nome?f.contato1_nome+' · ':''} ${f.contato1_tel||'Sem contato'}</div>
        </div>
        <div class="fornec-right">
          <span class="fornec-badge ${tipo(f)}">${f.tipo_pagamento}</span>
          <span class="fornec-codigo">#${f.codigo}</span>
        </div>
      </div>
      <div class="fornec-footer">
        ${bancos(f)}
        <div style="flex:1"></div>
        <div class="fornec-saldo ${f.tipo_pagamento==='A Prazo'?'red':'green'}">${f.tipo_pagamento==='A Prazo'?'Ver saldo':'Quitado'}</div>
      </div>
    </div>`).join('')}</div>`;
}

function abrirNovo(){
  document.getElementById('form-title').textContent='Novo Fornecedor';
  document.getElementById('f-id').value='';
  document.getElementById('f-codigo').value='Automatico';
  document.getElementById('f-nome').value='';
  document.getElementById('f-c1nome').value='';
  document.getElementById('f-c1tel').value='';
  document.getElementById('f-c2nome').value='';
  document.getElementById('f-c2tel').value='';
  document.getElementById('f-pix').value='';
  document.getElementById('f-obs').value='';
  document.getElementById('btn-excluir').style.display='none';
  bancosEditando=[];
  renderBancos();
  selectTipo('A Vista');
  document.getElementById('overlay-form').classList.add('open');
}

function abrirEditar(f){
  document.getElementById('form-title').textContent='Editar Fornecedor';
  document.getElementById('f-id').value=f.id;
  document.getElementById('f-codigo').value='#'+f.codigo;
  document.getElementById('f-nome').value=f.nome||'';
  document.getElementById('f-c1nome').value=f.contato1_nome||'';
  document.getElementById('f-c1tel').value=f.contato1_tel||'';
  document.getElementById('f-c2nome').value=f.contato2_nome||'';
  document.getElementById('f-c2tel').value=f.contato2_tel||'';
  document.getElementById('f-pix').value=f.pix||'';
  document.getElementById('f-obs').value=f.observacoes||'';
  document.getElementById('btn-excluir').style.display='block';
  bancosEditando=JSON.parse(JSON.stringify(f.contas_bancarias||[]));
  renderBancos();
  selectTipo(f.tipo_pagamento||'A Vista');
  document.getElementById('overlay-form').classList.add('open');
}

function selectTipo(tipo){
  tipoSelecionado=tipo;
  document.getElementById('opt-avista').classList.toggle('selected',tipo==='A Vista');
  document.getElementById('opt-prazo').classList.toggle('selected',tipo==='A Prazo');
  document.getElementById('rule-avista').style.display=tipo==='A Vista'?'flex':'none';
}

function renderBancos(){
  const wrap=document.getElementById('bancos-wrap');
  wrap.innerHTML=bancosEditando.map((b,i)=>`
    <div class="banco-item" data-idx="${i}">
      <div class="banco-item-header">
        <span class="banco-item-title">Conta ${i+1}</span>
        <button class="banco-remove" onclick="removeBanco(${i})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="form-group" style="margin-bottom:8px">
        <input class="form-input" type="text" placeholder="Favorecido" value="${b.favorecido||''}" onchange="bancosEditando[${i}].favorecido=this.value"/>
      </div>
      <div class="form-group" style="margin-bottom:8px">
        <input class="form-input" type="text" placeholder="Banco" value="${b.banco||''}" onchange="bancosEditando[${i}].banco=this.value"/>
      </div>
      <div class="form-row">
        <input class="form-input" type="text" placeholder="Agencia" value="${b.agencia||''}" onchange="bancosEditando[${i}].agencia=this.value"/>
        <input class="form-input" type="text" placeholder="Conta" value="${b.conta||''}" onchange="bancosEditando[${i}].conta=this.value"/>
      </div>
    </div>`).join('');
}

function addBanco(){
  bancosEditando.push({favorecido:'',banco:'',agencia:'',conta:''});
  renderBancos();
}

function removeBanco(idx){
  bancosEditando.splice(idx,1);
  renderBancos();
}

function fechar(id){document.getElementById(id).classList.remove('open')}
function fecharOverlay(e,id){if(e.target===document.getElementById(id))fechar(id)}

async function salvar(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome){toast('Informe o nome','err');return;}
  const id=document.getElementById('f-id').value;
  const btn=document.getElementById('btn-salvar');
  btn.classList.add('loading');btn.disabled=true;

  const payload={
    nome,
    tipo_pagamento:tipoSelecionado,
    contato1_nome:document.getElementById('f-c1nome').value.trim()||null,
    contato1_tel:document.getElementById('f-c1tel').value.trim()||null,
    contato2_nome:document.getElementById('f-c2nome').value.trim()||null,
    contato2_tel:document.getElementById('f-c2tel').value.trim()||null,
    pix:document.getElementById('f-pix').value.trim()||null,
    contas_bancarias:bancosEditando,
    observacoes:document.getElementById('f-obs').value.trim()||null,
  };

  let error;
  if(id){
    ({error}=await db.from('fornecedores').update(payload).eq('id',id));
  }else{
    ({error}=await db.from('fornecedores').insert(payload));
  }

  btn.classList.remove('loading');btn.disabled=false;
  if(error){toast('Erro: '+error.message,'err');return;}
  toast(id?'Fornecedor atualizado!':'Fornecedor criado!','ok');
  fechar('overlay-form');
  carregar();
}

async function excluir(){
  const id=document.getElementById('f-id').value;
  if(!confirm('Excluir este fornecedor?'))return;
  const{error}=await db.from('fornecedores').delete().eq('id',id);
  if(error){toast('Erro: '+error.message,'err');return;}
  toast('Fornecedor excluido!','ok');
  fechar('overlay-form');
  carregar();
}

function toast(msg,tipo='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show '+tipo;
  setTimeout(()=>t.classList.remove('show'),2800);
}

carregar();
</script>

</body>
</html>
