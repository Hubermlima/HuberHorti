<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Vendas do Ciclo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-y:none;}
.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-weight:700;font-size:11px;letter-spacing:0.8px;color:#1C1C1E;}
.topbar-sub{font-size:10px;color:#8E8E93;font-weight:500;}
.ios-btn-float{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;}
.totais-wrap{display:flex;gap:10px;padding:0 16px 10px;flex-shrink:0;}
.total-card{flex:1;background:#FFF;border-radius:14px;padding:10px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.total-label{font-size:9px;color:#8E8E93;}
.total-val{font-size:16px;font-weight:700;color:#1C1C1E;margin-top:3px;}
.total-row{display:flex;align-items:baseline;gap:6px;margin-top:3px;}
.total-val.verde{color:#10B981;}
.total-pct{font-size:11px;color:#10B981;font-weight:600;}
.lista-card{flex:1;margin:0 16px 0;background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);display:flex;flex-direction:column;min-height:0;overflow:hidden;margin-bottom:0;}

.lista-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.item-row{display:flex;align-items:center;padding:11px 16px;border-bottom:0.5px solid #E0E0E0;cursor:pointer;gap:8px;}
.item-row:last-child{border-bottom:none;}
.item-row:active{background:#F5F5F5;}
.item-data{font-size:11px;color:#3A3A3C;flex-shrink:0;width:44px;}

.item-info{flex:1;display:flex;flex-direction:column;gap:2px;}
.item-nome{font-size:13px;color:#1C1C1E;}
.item-num{font-size:10px;color:#C7C7CC;}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
.item-venda{font-size:13px;font-weight:500;color:#1C1C1E;}
.item-margem{font-size:10px;color:#10B981;font-weight:600;}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:#C7C7CC;}
.paginacao{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 16px;flex-shrink:0;}
.pag-btns{display:flex;align-items:center;gap:12px;}
.pag-btn{width:32px;height:32px;border-radius:50%;border:none;background:#007AFF;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,0.08);cursor:pointer;}

.pag-btn:disabled{opacity:0.3;pointer-events:none;}
.pag-info{font-size:12px;font-weight:500;color:#8E8E93;}
.pag-clientes{font-size:11px;color:#8E8E93;}
.filtro-overlay{position:fixed;inset:0;z-index:9990;display:none;}
.filtro-overlay.active{display:block;}
.filtro-menu{position:fixed;z-index:9991;width:220px;background:#FFF;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.14);overflow:hidden;display:none;}
.filtro-titulo{padding:13px 16px;font-size:12px;font-weight:600;color:#8E8E93;border-bottom:0.5px solid #F2F2F7;}
.filtro-item{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;font-size:14px;cursor:pointer;border-bottom:0.5px solid #F2F2F7;color:#1C1C1E;}
.filtro-item:last-of-type{border-bottom:none;}
.filtro-item:active{background:#F5F5F5;}
.radio{width:18px;height:18px;border-radius:50%;border:2px solid #D1D1D6;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.radio.checked{border-color:#007AFF;}
.radio.checked::after{content:'';width:9px;height:9px;border-radius:50%;background:#007AFF;}
.filtro-confirmar{width:calc(100% - 24px);margin:10px 12px 12px;padding:13px;background:#007AFF;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:#FFF;cursor:pointer;display:block;}
.filtro-busca{padding:10px 12px 6px;}
.filtro-divisor{height:0.5px;background:#E0E0E0;margin:4px 0;}




</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn-float" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">CENTRAL DE VENDAS</div>
    <div class="topbar-sub" id="status-sub">Carregando...</div>
  </div>
  <button class="ios-btn-float" id="btn-filtro" onclick="abrirFiltro(event)">
    <svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:#1C1C1E;stroke-width:2;fill:none"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
  </button>
</div>

<div class="totais-wrap">
  <div class="total-card">
    <div class="total-label">Faturamento</div>
    <div class="total-val" id="total-faturamento">—</div>
  </div>
  <div class="total-card">
    <div class="total-label">Lucro</div>
    <div class="total-row">
      <span class="total-val verde" id="total-lucro" onclick="this.style.filter=this.style.filter?'':'blur(4px)'" style="cursor:pointer;">—</span>

      <span class="total-pct" id="total-margem">—</span>
    </div>
  </div>
</div>

<div class="lista-card">
  <div onclick="window.location.href='vendas.html?origem=relatorio_vendas'" style="display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:0.5px solid #E0E0E0;cursor:pointer;flex-shrink:0;">
    <div style="width:26px;height:26px;border-radius:50%;border:1.5px solid #007AFF;background:#FFF;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </div>
    <span style="font-size:13px;font-weight:500;color:#007AFF;">Nova Venda</span>
  </div>
  <div class="lista-scroll" id="lista-scroll">

    <div class="empty-state">Carregando...</div>
  </div>
  <div class="paginacao" id="paginacao" style="border-top:0.5px solid #E0E0E0;padding:10px 16px 16px;">
    <span class="pag-clientes" id="pag-clientes">—</span>
    <div class="pag-btns">
      <button class="pag-btn" id="btn-prev" onclick="mudarPagina(-1)" disabled>
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#FFF;stroke-width:2.5;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>

      </button>
      <span class="pag-info" id="pag-info">1 / 1</span>
      <button class="pag-btn" id="btn-next" onclick="mudarPagina(1)" disabled>
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#FFF;stroke-width:2.5;fill:none"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>

      </button>
    </div>
  </div>
</div>

<div class="filtro-overlay" id="filtro-overlay" onclick="fecharFiltro()"></div>
<div class="filtro-menu" id="filtro-menu">

    <div class="filtro-titulo">Buscar cliente</div>
  <div class="filtro-busca">
    <input class="filtro-busca-input" id="filtro-busca-input" type="text" placeholder="Nome do cliente..." autocomplete="off">
  </div>
  <div class="filtro-sugestoes" id="filtro-sugestoes"></div>
  <div class="filtro-divisor"></div>
  <div class="filtro-titulo" style="border-top:none;">Filtrar por cidade</div>


  <div id="filtro-cidades"></div>

  
</div>

<script>
const POR_PAGINA = 15;
const fmt = v => Number(v).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

let _todos = [];
let _filtrados = [];
let _cidades = [];
let _cidadeSelecionada = 'todas';
let _cidadeTemp = 'todas';
let _paginaAtual = 1;
let _ciclo = null;
let _clienteFiltrado = null;


function setStatus(msg) {
  const el = document.getElementById('status-sub');
  el.textContent = msg;
}





async function init() {
  window.HHUtils.atualizarCicloAtualGlobal();
  _ciclo = window.cicloAtual;
  const d0 = HHUtils.formatarDataBR(_ciclo.d0);
  const d7 = HHUtils.formatarDataBR(_ciclo.d7);
  setStatus(`A partir de ${d0}`);


  const d0ISO = (_ciclo.d0 instanceof Date
  ? _ciclo.d0.toLocaleDateString('en-CA')
  : String(_ciclo.d0).slice(0, 10)) + 'T00:00:00-04:00';



  


  const { data: pedidos } = await window.db
    .from('pedidos_vendas')
    .select('id, data, total_venda, total_lucro, margem_pct, clientes(id, nome, cidade), itens_pedidos_vendas(id)')

      .gte('data', d0ISO)

    .order('data', {ascending: false});

  _todos = (pedidos || []).map(p => ({
    id: p.id,
    data: p.data,
    clienteId: p.clientes?.id,
    clienteNome: p.clientes?.nome || '—',
    cidade: p.clientes?.cidade || '',
    totalVenda: parseFloat(p.total_venda) || 0,
    totalLucro: parseFloat(p.total_lucro) || 0,
    margemPct: parseFloat(p.margem_pct) || 0,
    qtdItens: (p.itens_pedidos_vendas || []).length
  }));


  _cidades = ['todas', ...new Set(_todos.map(p => p.cidade).filter(Boolean).sort())];
  montarFiltroCidades();
      const paginaSalva = parseInt(sessionStorage.getItem('central_vendas_pagina') || '1');
  const cidadeSalva = sessionStorage.getItem('central_vendas_cidade') || 'todas';
  sessionStorage.removeItem('central_vendas_pagina');
  sessionStorage.removeItem('central_vendas_cidade');
  _cidadeSelecionada = cidadeSalva;
  _cidadeTemp = cidadeSalva;
  aplicarFiltro(false);
  _paginaAtual = paginaSalva;
  renderizar();


}

function montarFiltroCidades() {
  const container = document.getElementById('filtro-cidades');
  container.innerHTML = _cidades.map(c => `
    <div class="filtro-item" onclick="selecionarCidadeTemp('${c}')">
      ${c === 'todas' ? 'Todas as cidades' : c}
      <div class="radio ${_cidadeSelecionada === c ? 'checked' : ''}" id="radio-${c}"></div>
    </div>`).join('');
}

function selecionarCidadeTemp(cidade) {
  _cidadeTemp = cidade;
  document.querySelectorAll('.filtro-item .radio').forEach(r => r.classList.remove('checked'));
  const el = document.getElementById(`radio-${cidade}`);
  if (el) el.classList.add('checked');
  aplicarFiltro();
}


function abrirFiltro(event) {
  _cidadeTemp = _cidadeSelecionada;
  montarFiltroCidades();
  const btn = document.getElementById('btn-filtro');
  const rect = btn.getBoundingClientRect();
  const menu = document.getElementById('filtro-menu');
  menu.style.top = (rect.bottom + 6) + 'px';
  menu.style.right = '18px';
  menu.style.display = 'block';
  document.getElementById('filtro-overlay').classList.add('active');
  const input = document.getElementById('filtro-busca-input');
  input.value = _clienteFiltrado || '';
  document.getElementById('filtro-sugestoes').innerHTML = '';
  input.oninput = (e) => {
    const t = e.target.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const sugestoes = document.getElementById('filtro-sugestoes');
    if (!t) { sugestoes.innerHTML = ''; return; }
    const nomes = [...new Set(_todos.map(p => p.clienteNome))].filter(n =>
      n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(t)
    ).slice(0, 8);
    sugestoes.innerHTML = nomes.map(n =>
      `<div class="filtro-sug-item" onclick="selecionarCliente('${n.replace(/'/g,"\\'")}')"> ${n}</div>`
    ).join('');
  };
  setTimeout(() => input.focus(), 100);
}

function selecionarCliente(nome) {
  _clienteFiltrado = nome;
  _cidadeSelecionada = 'todas';
  _cidadeTemp = 'todas';
  _filtrados = _todos.filter(p => p.clienteNome === nome);
  _paginaAtual = 1;
  renderizar();
  fecharFiltro();
}


function fecharFiltro() {
  document.getElementById('filtro-menu').style.display = 'none';
  document.getElementById('filtro-overlay').classList.remove('active');
}

function aplicarFiltro(fechar = true) {
  if (fechar) {
    _cidadeSelecionada = _cidadeTemp;
    _clienteFiltrado = null;
    fecharFiltro();
  }
  _filtrados = _cidadeSelecionada === 'todas'
    ? [..._todos]
    : _todos.filter(p => p.cidade === _cidadeSelecionada);
  _paginaAtual = 1;
  renderizar();
}


function renderizar() {
  const total = _filtrados.length;
  const totalPags = Math.max(1, Math.ceil(total / POR_PAGINA));
  if (_paginaAtual > totalPags) _paginaAtual = totalPags;

  const inicio = (_paginaAtual - 1) * POR_PAGINA;
  const pagina = _filtrados.slice(inicio, inicio + POR_PAGINA);
  const lista = document.getElementById('lista-scroll');

        const itemNovo = '';


  if (pagina.length === 0) {
    lista.innerHTML = itemNovo;
  } else {
    lista.innerHTML = itemNovo + pagina.map(p => {

      const dataFmt = p.data ? new Date(p.data).toLocaleDateString('pt-BR', {timeZone:'America/Manaus', day:'2-digit', month:'2-digit'}) : '—';
const horaFmt = p.data ? new Date(p.data).toLocaleTimeString('pt-BR', {timeZone:'America/Manaus', hour:'2-digit', minute:'2-digit'}) : '';


      const numCurto = String(p.id).slice(-4);
      return `<div class="item-row" onclick="abrirVenda('${p.clienteId}','${p.clienteNome.replace(/'/g,"\\'")}','${p.data ? new Date(p.data).toLocaleDateString('en-CA', {timeZone:'America/Manaus'}) : ''}')"
>
        <span class="item-data" style="display:flex;flex-direction:column;gap:1px;width:44px;">
  <span>${dataFmt}</span>
  <span style="font-size:10px;color:#636366;">${horaFmt}</span>

</span>

                <div class="item-info">
          <span class="item-nome" style="display:flex;align-items:center;gap:6px;">
            <div onclick="event.stopPropagation();abrirExtrato('${p.clienteId}','${p.clienteNome.replace(/'/g,"\\'")}','${p.id}')
" style="width:18px;height:18px;border:1.5px solid #007AFF;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;">
              <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="#007AFF" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            ${p.clienteNome}
          </span>
          <span class="item-num" style="color:#636366;">${p.qtdItens} ${p.qtdItens === 1 ? 'item' : 'itens'}</span>
        </div>

        <div class="item-right">
          <span class="item-venda">${fmt(p.totalVenda)}</span>
          <span class="item-margem" style="color:${p.totalLucro >= 0 ? '#059669' : '#EF4444'}">${fmt(p.totalLucro)} · ${p.margemPct.toFixed(1)}%</span>

        </div>
      </div>`;
    }).join('');
  }

  const somaVenda = _filtrados.reduce((a, p) => a + p.totalVenda, 0);
  const somaLucro = _filtrados.reduce((a, p) => a + p.totalLucro, 0);
  const margemTotal = somaVenda > 0 ? (somaLucro / somaVenda * 100) : 0;
  const clientesUnicos = new Set(_filtrados.map(p => p.clienteId)).size;

  document.getElementById('total-faturamento').textContent = fmt(somaVenda);
  /* ESFUMAÇADO — remover as 2 linhas abaixo para mostrar */
document.getElementById('total-lucro').style.filter = 'blur(4px)';
document.getElementById('total-lucro').style.userSelect = 'none';
document.getElementById('total-lucro').textContent = fmt(somaLucro);

  document.getElementById('total-margem').textContent = `${margemTotal.toFixed(1)}%`;
  document.getElementById('pag-clientes').textContent = `${clientesUnicos} cliente${clientesUnicos !== 1 ? 's' : ''}`;
  document.getElementById('pag-info').textContent = `${_paginaAtual} / ${totalPags}`;
  document.getElementById('btn-prev').disabled = _paginaAtual === 1;
  document.getElementById('btn-next').disabled = _paginaAtual === totalPags;
}

function mudarPagina(delta) {
  _paginaAtual += delta;
  renderizar();
  document.getElementById('lista-scroll').scrollTop = 0;
}

function abrirVenda(clienteId, clienteNome, data) {
  sessionStorage.setItem('central_vendas_pagina', _paginaAtual);
  sessionStorage.setItem('central_vendas_cidade', _cidadeSelecionada);

  window.location.href = `vendas.html?cliente_id=${clienteId}&cliente_nome=${encodeURIComponent(clienteNome)}&data=${data}&origem=relatorio_vendas`;
}


const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight);
fixHeight();

async function abrirExtrato(clienteId, clienteNome, pedidoAtualId) {
  document.getElementById('extrato-cliente-nome').textContent = clienteNome;
  document.getElementById('extrato-overlay').style.display = 'flex';

  const [{ data: pedidos }, { data: movs }] = await Promise.all([
    window.db.from('pedidos_vendas').select('id, em_aberto').eq('cliente_id', clienteId).gt('em_aberto', 0),
    window.db.from('movimentos_clientes').select('valor').eq('cliente_id', clienteId).eq('status', 0)
  ]);

  const vendaAtual = (pedidos || []).find(p => p.id === pedidoAtualId);
  const emAbertoAtual = vendaAtual ? parseFloat(vendaAtual.em_aberto) || 0 : 0;
  const vendasAberto = (pedidos || []).filter(p => p.id !== pedidoAtualId).reduce((a, p) => a + (parseFloat(p.em_aberto) || 0), 0);
  const pagamentos = (movs || []).reduce((a, m) => a + (parseFloat(m.valor) || 0), 0);
  const saldo = vendasAberto - pagamentos;
  const finalDevedor = saldo + emAbertoAtual;

  document.getElementById('ext-aberto').textContent = fmt(vendasAberto);
  document.getElementById('ext-pagos').textContent = fmt(pagamentos);
  document.getElementById('ext-saldo').textContent = fmt(Math.abs(saldo));
  document.getElementById('ext-saldo').style.color = saldo <= 0 ? '#059669' : '#EF4444';

  document.getElementById('ext-atual').textContent = fmt(emAbertoAtual);
  document.getElementById('ext-final').textContent = fmt(Math.abs(finalDevedor));
  document.getElementById('ext-final').style.color = finalDevedor <= 0 ? '#059669' : '#EF4444';

}

function fecharExtrato() {
  document.getElementById('extrato-overlay').style.display = 'none';
}


init();

</script>

<div id="extrato-overlay" onclick="fecharExtrato()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9999;align-items:center;justify-content:center;padding:24px;">
  <div onclick="event.stopPropagation()" style="background:#FFF;border-radius:24px;padding:22px 20px;width:100%;max-width:360px;box-shadow:0 32px 64px rgba(0,0,0,0.22);">
    <div style="font-size:15px;font-weight:700;color:#1C1C1E;margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid #E5E5EA;">Extrato Consolidado</div>
    <div id="extrato-cliente-nome" style="font-size:13px;font-weight:600;color:#8E8E93;margin-bottom:12px;"></div>
        <div style="display:flex;flex-direction:column;gap:0;">
      <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid #F5F5F5;">
        <span style="font-size:12px;color:#8E8E93;">Vendas em Aberto</span>
        <span style="font-size:12px;font-weight:600;color:#EF4444;" id="ext-aberto"></span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:0.5px solid #F5F5F5;background:#F0FDF4;border-radius:8px;">
        <span style="font-size:13px;font-weight:600;color:#1C1C1E;">Pagamentos Realizados</span>
        <span style="font-size:17px;font-weight:800;color:#059669;" id="ext-pagos"></span>
          </div>
      <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid #F5F5F5;">
        <span style="font-size:12px;color:#8E8E93;">Saldo em Aberto</span>
        <span style="font-size:12px;font-weight:600;" id="ext-saldo"></span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid #F5F5F5;">
        <span style="font-size:12px;color:#8E8E93;">Venda Atual</span>

        <span style="font-size:12px;font-weight:600;color:#EF4444;" id="ext-atual"></span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:12px 0 0;">
        <span style="font-size:13px;font-weight:700;color:#1C1C1E;">Final Devedor</span>
        <span style="font-size:15px;font-weight:800;" id="ext-final"></span>
      </div>
    </div>
    <button onclick="fecharExtrato()" style="width:100%;margin-top:18px;padding:13px;background:#F2F2F7;border:none;border-radius:50px;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;">Fechar</button>
