<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movimentações Fornecedores</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
body{
  font-family:'Inter',sans-serif;
  background:#F5F5F7;
  margin:0;
  color:#111;
}
.top{
  padding:20px 16px 10px;
}
.title{
  font-size:28px;
  font-weight:800;
  letter-spacing:-0.03em;
}
.sub{
  font-size:14px;
  color:#666;
  margin-top:4px;
}
/* Termo alterado: cliente-box -> fornecedor-box */
.fornecedor-box{
  margin-top:10px;
  position:relative;
}
.fornecedor-input{
  width:100%;
  padding:12px 14px;
  border:none;
  border-radius:12px;
  background:#F2F2F7;
  font-size:14px;
  outline:none;
}
.fornecedor-lista{
  margin-top:8px;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
  display:none;
  position:absolute;
  left:0;
  right:0;
  z-index:30;
}
.fornecedor-item{
  padding:12px 14px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.fornecedor-item:last-child{
  border-bottom:none;
}
.total-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:0 16px;
  margin:18px 0 16px;
}
.total{
  margin:0;
  font-size:24px;
  font-weight:700;
  letter-spacing:-0.03em;
  color:#2C2C2E;
}
.list{
  padding:0 16px 100px;
}
.item{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}
.date{
  font-size:14px;
  color:#777;
  margin-bottom:10px;
}
.date-badge{
  display:inline-flex;
  align-items:center;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  letter-spacing:-0.01em;
  color:#B91C1C;
  background:#FEF2F2;
  border:1px solid #FECACA;
}
.value{
  font-size:18px;
  font-weight:800;
  line-height:1.15;
  margin-bottom:12px;
  letter-spacing:-0.025em;
}
.meta{
  font-size:16px;
  margin-bottom:6px;
}
.cons{
  font-size:15px;
  color:#555;
  margin-bottom:12px;
}
.item-row{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
}
.item-main{
  flex:1;
  min-width:0;
}
.actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.btn{
  width:40px;
  height:40px;
  border-radius:999px;
  border:none;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);
  box-shadow:
    0 10px 22px rgba(15,23,42,.10),
    0 3px 8px rgba(15,23,42,.06),
    inset 0 1px 0 rgba(255,255,255,.95);
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
}
.btn:active{
  transform:translateY(1px) scale(.98);
  box-shadow:
    0 6px 14px rgba(15,23,42,.10),
    0 2px 5px rgba(15,23,42,.06),
    inset 0 1px 0 rgba(255,255,255,.92);
}
.edit{
  color:#2563EB;
}
.del{
  color:#8E8E93;
}
.btn svg{
  width:18px;
  height:18px;
  stroke:currentColor;
  fill:none;
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
@media (max-width:520px){
  .item-row{
    gap:10px;
  }
  .btn{
    min-width:74px;
    padding:10px 14px;
    font-size:14px;
  }
  .title{
    font-size:24px;
  }
  .total{
    font-size:22px;
  }
  .value{
    font-size:17px;
  }
}
.fab-inline{
  min-width:46px;
  height:40px;
  padding:0 12px;
  border-radius:999px;
  border:none;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);
  color:#2563EB;
  font-size:24px;
  font-weight:700;
  line-height:1;
  cursor:pointer;
  margin-right:6px;
  box-shadow:
    0 10px 22px rgba(15,23,42,.10),
    0 3px 8px rgba(15,23,42,.06),
    inset 0 1px 0 rgba(255,255,255,.95);
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
}
.back-row{
  display:flex;
  align-items:center;
  gap:14px;
}
.back-btn{
  width:44px;
  height:44px;
  border:none;
  border-radius:999px;
  background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:
    0 14px 30px rgba(15,23,42,.14),
    0 4px 10px rgba(15,23,42,.08),
    inset 0 1px 0 rgba(255,255,255,.95);
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  flex-shrink:0;
}
.back-btn svg{
  width:22px;
  height:22px;
  stroke:#111827;
  fill:none;
  stroke-width:2.75;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.head-copy{min-width:0}
.toast{
  position:fixed;
  left:50%;
  bottom:94px;
  transform:translateX(-50%);
  background:#111827;
  color:#fff;
  padding:10px 14px;
  border-radius:12px;
  font-size:13px;
  display:none;
  z-index:100;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
}
.sheet-overlay{
  position:fixed;
  inset:0;
  background:rgba(17,17,17,.22);
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:14px;
  z-index:90;
}
.sheet-overlay.open{display:flex}
.sheet{
  width:100%;
  max-width:520px;
  background:#fff;
  border-radius:24px 24px 18px 18px;
  padding:14px;
  box-shadow:0 18px 40px rgba(0,0,0,.18);
}
.sheet-handle{
  width:44px;
  height:5px;
  border-radius:999px;
  background:#D1D5DB;
  margin:2px auto 14px;
}
.sheet-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.sheet-title{
  font-size:24px;
  font-weight:800;
}
.sheet-sub{
  font-size:14px;
  color:#666;
  margin-top:4px;
}
.sheet-close{
  width:40px;
  height:40px;
  border:none;
  border-radius:999px;
  background:#F2F2F7;
  color:#6B7280;
  font-size:24px;
  cursor:pointer;
}
.sheet-form{
  display:grid;
  gap:12px;
}
.sheet-field{
  background:#F7F7F9;
  border-radius:16px;
  padding:14px;
}
.sheet-label{
  font-size:12px;
  font-weight:700;
  color:#666;
  margin-bottom:8px;
}
.sheet-input{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  font-size:16px;
  font-weight:600;
  color:#111;
  font-family:'Inter',sans-serif;
}
.sheet-actions{
  display:flex;
  gap:10px;
  margin-top:14px;
}
.sheet-btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}
.sheet-btn.secondary{
  background:#F2F2F7;
  color:#374151;
}
.sheet-btn.primary{
  background:#2563EB;
  color:#fff;
}
.sheet-grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.seg-control{
  display:flex;
  background:#F2F2F7;
  border-radius:20px;
  padding:4px;
  gap:4px;
}
.seg-option{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:16px;
  font-weight:700;
  color:#8E8E93;
  cursor:pointer;
  user-select:none;
}
.seg-option.active{
  background:#FFFFFF;
  color:#1C1C1E;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.sheet-select{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  font-size:16px;
  font-weight:600;
  color:#111;
  font-family:'Inter',sans-serif;
  appearance:none;
  -webkit-appearance:none;
}
@media (max-width:520px){
  .sheet-grid-2{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="top">
  <div class="back-row">
    <button class="back-btn" id="btn-voltar" type="button" aria-label="Voltar" title="Voltar">
      <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
    </button>
    <div class="head-copy">
      <div class="title">Movimentações Fornecedores</div>
      <div class="sub" id="fornecedor-nome">Selecione um fornecedor</div>
    </div>
  </div>
  <div class="fornecedor-box">
    <input class="fornecedor-input" id="fornecedor-input" type="text" placeholder="Buscar fornecedor..." style="display:none;" autocomplete="off"/>
    <div class="fornecedor-lista" id="fornecedor-lista"></div>
  </div>
</div>

<div class="total-row">
  <div class="total" id="total-geral">R$ 0,00</div>
  <button class="fab-inline" id="btn-nova" type="button" aria-label="Nova movimentação" title="Nova movimentação">+</button>
</div>

<div class="list" id="lista-movimentacoes">
  </div>

<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div>
        <div class="sheet-title">Nova movimentação</div>
        <div class="sheet-sub" id="sheet-fornecedor">Selecione um fornecedor</div>
      </div>
      <button class="sheet-close" id="sheet-close" type="button">×</button>
    </div>

    <div class="sheet-form">
      <div class="sheet-field">
        <div class="sheet-label">Data da Compra</div>
        <input class="sheet-input" id="mov-data" type="date"/>
      </div>

      <div class="sheet-field">
        <div class="sheet-label">Lançado em Despesa</div>
        <div class="seg-control" id="consumo-control">
          <div class="seg-option active" id="consumo-nao">💲 Não</div>
          <div class="seg-option" id="consumo-sim">⚡ Sim</div>
        </div>
      </div>

      <div class="sheet-grid-2">
        <div class="sheet-field">
          <div class="sheet-label">Conta Origem</div>
          <select id="mov-conta" class="sheet-select">
            <option value="nenhum">Nenhum</option>
            <option value="proprio">Banco Santander</option>
            <option value="externa">Conta Externa</option>
          </select>
        </div>

        <div class="sheet-field">
          <div class="sheet-label">Valor Pago</div>
          <input class="sheet-input" id="mov-valor" type="text" inputmode="decimal" placeholder="R$ 0,00"/>
        </div>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="sheet-btn secondary" id="btn-cancelar-sheet" type="button">Cancelar</button>
      <button class="sheet-btn primary" id="btn-gravar-sheet" type="button">Gravar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', async function(){
  const params = new URLSearchParams(window.location.search);
  const fornecedorNomeParam = params.get('fornecedor_nome');
  const fornecedorIdParam = params.get('fornecedor_id');

  const label = document.getElementById('fornecedor-nome');
  const input = document.getElementById('fornecedor-input');
  const lista = document.getElementById('fornecedor-lista');
  const btnVoltar = document.getElementById('btn-voltar');
  const btnNova = document.getElementById('btn-nova');
  const toast = document.getElementById('toast');
  const sheet = document.getElementById('sheet-overlay');
  const sheetClose = document.getElementById('sheet-close');
  const btnCancelarSheet = document.getElementById('btn-cancelar-sheet');
  const btnGravarSheet = document.getElementById('btn-gravar-sheet');
  const sheetTitle = document.querySelector('.sheet-title');
  const sheetFornecedor = document.getElementById('sheet-fornecedor');
  const movData = document.getElementById('mov-data');
  const movValor = document.getElementById('mov-valor');
  const movConta = document.getElementById('mov-conta');
  const consumoSim = document.getElementById('consumo-sim');
  const consumoNao = document.getElementById('consumo-nao');
  const totalEl = document.getElementById('total-geral');
  const listaMovimentacoes = document.getElementById('lista-movimentacoes');

  let fornecedores = [];
  let fornecedorSelecionado = fornecedorIdParam || null;
  let fornecedorSelecionadoNome = fornecedorNomeParam ? decodeURIComponent(fornecedorNomeParam) : '';
  let consumo = false;
  let editandoId = null;
  let salvando = false;

  function escapeHtml(text){
    return String(text || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function mostrarToast(msg){
    toast.textContent = msg;
    toast.style.display = 'block';
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(function(){
      toast.style.display = 'none';
    }, 2200);
  }

  function formatarMoeda(valor){
    return Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function formatarDataTela(dataIso){
    if (!dataIso) return '<span class="date-badge">Sem Data</span>';
    const d = new Date(dataIso);
    if (isNaN(d.getTime())) return '<span class="date-badge">Sem Data</span>';
    return d.toLocaleDateString('pt-BR');
  }

  function formatarDataInput(dataIso){
    if (!dataIso) return '';
    const d = new Date(dataIso);
    if (isNaN(d.getTime())) return '';
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function valorTextoParaNumero(texto){
    return Number(String(texto || '').replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.')) || 0;
  }

  function numeroParaValorTexto(valor){
    return formatarMoeda(Number(valor || 0));
  }

  function atualizarTotalPorDados(items){
    const soma = (items || []).reduce(function(acc, item){
      return acc + (Number(item.valor) || 0);
    }, 0);
    totalEl.textContent = formatarMoeda(soma);
  }

  function ativarConsumo(isSim){
    consumo = !!isSim;
    consumoSim.classList.toggle('active', consumo);
    consumoNao.classList.toggle('active', !consumo);
  }

  function limparFormulario(){
    editandoId = null;
    if (sheetTitle) sheetTitle.textContent = 'Nova movimentação';
    sheetFornecedor.textContent = fornecedorSelecionadoNome || label.textContent || 'Selecione um fornecedor';
    movData.value = '';
    movConta.value = 'nenhum';
    movValor.value = '';
    ativarConsumo(false);
  }

  function preencherFormulario(item){
    editandoId = item.id;
    if (sheetTitle) sheetTitle.textContent = 'Editar movimentação';
    sheetFornecedor.textContent = fornecedorSelecionadoNome || label.textContent || 'Fornecedor';
    movData.value = formatarDataInput(item.data);
    movConta.value = item.destino || 'nenhum';
    movValor.value = numeroParaValorTexto(item.valor);
    ativarConsumo(String(item.tipo || '').toLowerCase() === 'consumo');
  }

  function abrirFormulario(item){
    if (!fornecedorSelecionado && !fornecedorSelecionadoNome) {
      mostrarToast('Selecione um fornecedor primeiro');
      input.style.display = 'block';
      label.style.display = 'none';
      input.focus();
      return;
    }
    if (item) preencherFormulario(item);
    else limparFormulario();
    sheet.classList.add('open');
  }

  function fecharFormulario(){
    sheet.classList.remove('open');
  }

  function esconderSugestoes(){
    lista.style.display = 'none';
    lista.innerHTML = '';
  }

  function renderSugestoes(items){
    if (!items.length) {
      lista.innerHTML = '<div class="fornecedor-item">Nenhum fornecedor encontrado</div>';
      lista.style.display = 'block';
      return;
    }

    lista.innerHTML = items.map(function(f){
      const nome = escapeHtml(f.nome || '');
      return '<div class="fornecedor-item" data-id="' + escapeHtml(f.id) + '" data-nome="' + nome + '">' + nome + '</div>';
    }).join('');
    lista.style.display = 'block';

    lista.querySelectorAll('.fornecedor-item[data-id]').forEach(function(el){
      el.addEventListener('click', async function(){
        fornecedorSelecionado = this.dataset.id;
        fornecedorSelecionadoNome = this.dataset.nome;
        label.textContent = fornecedorSelecionadoNome;
        label.style.display = 'block';
        input.value = '';
        input.style.display = 'none';
        esconderSugestoes();
        await carregarMovimentacoes();
        mostrarToast('Fornecedor selecionado');
      });
    });
  }

  async function carregarMovimentacoes(){
    if (!fornecedorSelecionado) {
      listaMovimentacoes.innerHTML = '';
      atualizarTotalPorDados([]);
      return;
    }

    listaMovimentacoes.innerHTML = '<div class="item"><div class="meta">Carregando movimentações...</div></div>';

    try {
      // Nota: Ajuste o nome da tabela no Supabase se ela também mudou de 'movimentos_clientes' para outra
      const result = await window.db
        .from('movimentos_fornecedores') 
        .select('id, fornecedor_id, data, destino, forma, valor, tipo, status')
        .eq('fornecedor_id', fornecedorSelecionado)
        .order('data', { ascending: false });

      if (result.error) throw result.error;

      const items = result.data || [];
      atualizarTotalPorDados(items);

      if (!items.length) {
        listaMovimentacoes.innerHTML = '<div class="item"><div class="meta">Nenhuma movimentação de compra encontrada</div></div>';
        return;
      }

      listaMovimentacoes.innerHTML = items.map(function(item){
        const destinoBruto = String(item.destino || '').toLowerCase();
        const ehConsumo = String(item.tipo || '').toLowerCase() === 'consumo';

        let destinoLabel = 'Dinheiro';
        if (destinoBruto === 'proprio') destinoLabel = 'Banco Santander';
        else if (destinoBruto === 'externa') destinoLabel = 'Conta Externa';

        const consumoHtml = ehConsumo ? '<div class="cons">Despesa: Sim</div>' : '';

        return [
          '<div class="item" data-id="' + escapeHtml(item.id) + '">',
            '<div class="item-row">',
              '<div class="item-main">',
                '<div class="date">' + formatarDataTela(item.data) + '</div>',
                '<div class="value">' + formatarMoeda(item.valor) + '</div>',
                '<div class="meta">' + escapeHtml(destinoLabel) + '</div>',
                consumoHtml,
              '</div>',
              '<div class="actions">',
                '<button class="btn edit" type="button" data-id="' + escapeHtml(item.id) + '" aria-label="Editar" title="Editar"><svg viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16v4z"/><path d="M13.5 6.5l4 4"/></svg></button>',
                '<button class="btn del" type="button" data-id="' + escapeHtml(item.id) + '" aria-label="Excluir" title="Excluir"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button>',
              '</div>',
            '</div>',
          '</div>'
        ].join('');
      }).join('');

      // Listeners de Edit/Del permanecem os mesmos logicamente...
      listaMovimentacoes.querySelectorAll('.btn.edit').forEach(btn => {
         btn.onclick = function() {
            const item = items.find(r => String(r.id) === String(this.dataset.id));
            if(item) abrirFormulario(item);
         };
      });

      listaMovimentacoes.querySelectorAll('.btn.del').forEach(btn => {
         btn.onclick = async function() {
            if(!confirm('Excluir esta movimentação de compra?')) return;
            try {
               await window.db.from('movimentos_fornecedores').delete().eq('id', this.dataset.id);
               await carregarMovimentacoes();
               mostrarToast('Removido');
            } catch(e) { mostrarToast('Erro ao excluir'); }
         };
      });

    } catch (err) {
      console.error(err);
      listaMovimentacoes.innerHTML = '<div class="item"><div class="meta">Erro ao carregar dados</div></div>';
    }
  }

  if (btnVoltar) {
    btnVoltar.addEventListener('click', () => window.history.back());
  }

  consumoSim.addEventListener('click', () => ativarConsumo(true));
  consumoNao.addEventListener('click', () => ativarConsumo(false));
  btnNova.addEventListener('click', () => abrirFormulario());
  sheetClose.addEventListener('click', fecharFormulario);
  btnCancelarSheet.addEventListener('click', fecharFormulario);

  btnGravarSheet.addEventListener('click', async function(){
    if (salvando || !fornecedorSelecionado) return;
    const valorNumerico = valorTextoParaNumero(movValor.value);
    if (!valorNumerico) { mostrarToast('Informe o valor'); return; }

    salvando = true;
    btnGravarSheet.disabled = true;

    try {
      const payload = {
        fornecedor_id: fornecedorSelecionado,
        data: movData.value ? new Date(movData.value + 'T12:00:00').toISOString() : null,
        destino: movConta.value || 'nenhum',
        forma: movConta.value === 'nenhum' ? 'dinheiro' : 'deposito',
        valor: valorNumerico,
        tipo: consumo ? 'consumo' : 'nao_consumo',
        status: 0
      };

      const query = editandoId 
        ? window.db.from('movimentos_fornecedores').update(payload).eq('id', editandoId)
        : window.db.from('movimentos_fornecedores').insert([payload]);

      const { error } = await query;
      if (error) throw error;

      mostrarToast('Salvo com sucesso');
      fecharFormulario();
      await carregarMovimentacoes();
    } catch (err) {
      mostrarToast('Erro ao salvar');
    } finally {
      salvando = false;
      btnGravarSheet.disabled = false;
    }
  });

  // Máscara de valor
  movValor.addEventListener('input', function(){
    const raw = this.value.replace(/\D/g, '');
    if (!raw) { this.value = ''; return; }
    let n = (parseInt(raw,10) / 100).toFixed(2).replace('.', ',');
    n = n.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    this.value = 'R$ ' + n;
  });

  // Busca de Fornecedores
  try {
    const { data: dataF, error: errF } = await window.db.from('fornecedores').select('id, nome').order('nome');
    if (errF) throw errF;
    fornecedores = dataF || [];

    input.addEventListener('input', function(){
      const termo = this.value.trim().toLowerCase();
      if (!termo) { esconderSugestoes(); return; }
      renderSugestoes(fornecedores.filter(f => String(f.nome).toLowerCase().includes(termo)).slice(0, 8));
    });

    if (fornecedorSelecionado) await carregarMovimentacoes();
  } catch (err) {
    mostrarToast('Erro ao carregar fornecedores');
  }
});
</script>

</body>
</html>
