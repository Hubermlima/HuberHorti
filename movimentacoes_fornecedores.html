<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movimentações Fornecedores</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
body{
  font-family:'Inter',sans-serif;
  background:#F5F5F7;
  margin:0;
  color:#111;
  -webkit-tap-highlight-color:transparent;
}
.top{ padding:20px 16px 10px; }
.title{
  font-size:21px; 
  font-weight:800;
  letter-spacing:-0.03em;
  white-space: nowrap;
}
.sub{ font-size:14px; color:#666; margin-top:4px; min-height:1.2em; }
.fornecedor-box{ margin-top:10px; position:relative; }
.fornecedor-input{
  width:100%;
  padding:12px 14px;
  border:none;
  border-radius:12px;
  background:#F2F2F7;
  font-size:14px;
  outline:none;
  display:none;
  box-sizing: border-box;
}
.fornecedor-lista{
  margin-top:8px;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
  display:none;
  position:absolute;
  left:0;
  right:0;
  z-index:100;
}
.fornecedor-item{ padding:12px 14px; border-bottom:1px solid #eee; cursor:pointer; font-size:14px; }
.total-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:0 16px;
  margin:18px 0 16px;
}
.total{ font-size:24px; font-weight:700; color:#2C2C2E; }
.list{ padding:0 16px 100px; }
.item{ background:#fff; border-radius:18px; padding:18px; margin-bottom:16px; }
.date{ font-size:13px; font-weight:600; color:#8E8E93; margin-bottom:6px; }
.value{ font-size:18px; font-weight:800; margin-bottom:4px; }
.meta{ font-size:14px; color:#666; }
.item-row{ display:flex; align-items:center; justify-content:space-between; }
.actions{ display:flex; gap:8px; }
.btn-action{
  width:38px; height:38px; border-radius:50%; border:none;
  background:#F2F2F7; color:#8E8E93; display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
.btn-edit{ color:#2563EB; }
.fab-inline{
  min-width:46px; height:40px; border-radius:999px; border:none;
  background:#fff; color:#2563EB; font-size:24px; font-weight:700; box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.back-btn{
  width:40px; height:40px; border:none; border-radius:50%;
  background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(0,0,0,.05);
}
.sheet-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.3);
  display:none; align-items:flex-end; z-index:90;
}
.sheet-overlay.open{display:flex}
.sheet{ width:100%; background:#fff; border-radius:24px 24px 0 0; padding:16px 16px 30px; box-sizing:border-box; }
.sheet-handle{ width:40px; height:4px; background:#D1D5DB; border-radius:2px; margin:0 auto 16px; }
.sheet-title{ font-size:22px; font-weight:800; margin-bottom:4px; }
.sheet-field{ background:#F7F7F9; border-radius:16px; padding:12px 14px; margin-bottom:12px; }
.sheet-label{ font-size:11px; font-weight:700; color:#8E8E93; text-transform:uppercase; margin-bottom:6px; }
.sheet-input{ width:100%; border:none; background:transparent; font-size:16px; font-weight:600; outline:none; font-family:inherit; }
.seg-control{ display:flex; background:#E3E3E8; border-radius:12px; padding:2px; }
.seg-option{ flex:1; text-align:center; padding:10px; font-size:14px; font-weight:700; color:#666; border-radius:10px; cursor:pointer; }
.seg-option.active{ background:#fff; color:#000; box-shadow:0 2px 6px rgba(0,0,0,.1); }
.sheet-actions{ display:flex; gap:12px; margin-top:20px; }
.sheet-btn{ flex:1; padding:16px; border-radius:14px; border:none; font-weight:700; font-size:15px; }
.primary{ background:#2563EB; color:#fff; }
.secondary{ background:#F2F2F7; color:#333; }
.toast{
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  background:#1C1C1E; color:#fff; padding:12px 20px; border-radius:12px; font-size:14px; z-index:200; display:none;
}
</style>
</head>
<body>

<div class="top">
  <div style="display:flex; align-items:center; gap:12px;">
    <button class="back-btn" id="btn-voltar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div>
      <div class="title">Movimentações Fornecedores</div>
      <div class="sub" id="fornecedor-nome">Selecione um fornecedor</div>
    </div>
  </div>
  <div class="fornecedor-box">
    <input class="fornecedor-input" id="fornecedor-input" type="text" placeholder="Buscar fornecedor..." autocomplete="off"/>
    <div class="fornecedor-lista" id="fornecedor-lista"></div>
  </div>
</div>

<div class="total-row">
  <div class="total" id="total-geral">R$ 0,00</div>
  <button class="fab-inline" id="btn-nova">+</button>
</div>

<div class="list" id="lista-movimentacoes"></div>

<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-titulo">Nova movimentação</div>
    <div class="sub" id="sheet-fornecedor" style="margin-bottom:20px"></div>
    <div class="sheet-field">
      <div class="sheet-label">Data</div>
      <input class="sheet-input" id="mov-data" type="date"/>
    </div>
    <div class="sheet-field">
      <div class="sheet-label">Forma de Pagamento</div>
      <div class="seg-control" id="forma-control">
        <div class="seg-option active" data-value="Depósito">Depósito</div>
        <div class="seg-option" data-value="Pix">Pix</div>
      </div>
    </div>
    <div class="sheet-field">
      <div class="sheet-label">Valor Pago</div>
      <input class="sheet-input" id="mov-valor" type="text" inputmode="decimal" placeholder="R$ 0,00"/>
    </div>
    <div class="sheet-actions">
      <button class="sheet-btn secondary" id="btn-cancelar">Cancelar</button>
      <button class="sheet-btn primary" id="btn-gravar">Gravar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', async function(){
  const params = new URLSearchParams(window.location.search);
  let fId = params.get('fornecedor_id');
  let fNome = params.get('fornecedor_nome');

  const label = document.getElementById('fornecedor-nome');
  const inputBusca = document.getElementById('fornecedor-input');
  const listaSugestoes = document.getElementById('fornecedor-lista');
  const sheet = document.getElementById('sheet-overlay');
  const movData = document.getElementById('mov-data');
  const movValor = document.getElementById('mov-valor');
  const totalEl = document.getElementById('total-geral');
  const listaEl = document.getElementById('lista-movimentacoes');

  let formaPagamento = "Depósito";
  let salvando = false;
  let idEdicao = null;
  let listaOriginal = [];

  if(fNome) label.textContent = decodeURIComponent(fNome);

  function toast(m){
    const t = document.getElementById('toast');
    t.textContent = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }

  function formatarMoedaInput(valor) {
    let v = valor.replace(/\D/g, '');
    if(!v) return '';
    v = (parseInt(v) / 100).toFixed(2).replace('.', ',');
    return 'R$ ' + v.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }

  movValor.addEventListener('input', function(){
    this.value = formatarMoedaInput(this.value);
  });

  function setForma(valor) {
    formaPagamento = valor;
    document.querySelectorAll('.seg-option').forEach(o => {
      o.classList.toggle('active', o.dataset.value === valor);
    });
  }

  document.querySelectorAll('.seg-option').forEach(opt => {
    opt.onclick = function(){ setForma(this.dataset.value); }
  });

  async function carregar(){
    if(!fId) return;
    const { data, error } = await window.db
      .from('movimentos_fornecedores')
      .select('*')
      .eq('fornecedor_id', fId)
      .eq('status', 0) // Filtra apenas status igual a zero
      .order('data', { ascending: false });

    if(error) return toast("Erro ao carregar");
    listaOriginal = data;
    
    let total = 0;
    listaEl.innerHTML = data.map(i => {
      total += Number(i.valor);
      return `<div class="item"><div class="item-row"><div>
        <div class="date">${new Date(i.data).toLocaleDateString('pt-BR')}</div>
        <div class="value">R$ ${Number(i.valor).toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
        <div class="meta">${i.forma}</div>
      </div><div class="actions">
        <button class="btn-action btn-edit" onclick="abrirEdicao('${i.id}')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-action" onclick="deletar('${i.id}')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        </button>
      </div></div></div>`;
    }).join('');
    totalEl.textContent = 'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits:2});
  }

  window.abrirEdicao = (id) => {
    const item = listaOriginal.find(i => i.id == id);
    if(!item) return;
    idEdicao = id;
    document.getElementById('sheet-titulo').textContent = "Editar movimentação";
    movData.value = item.data.split('T')[0];
    movValor.value = formatarMoedaInput((item.valor * 100).toString());
    setForma(item.forma);
    document.getElementById('sheet-fornecedor').textContent = label.textContent;
    sheet.classList.add('open');
  };

  window.deletar = async (id) => {
    if(!confirm("Excluir?")) return;
    await window.db.from('movimentos_fornecedores').delete().eq('id', id);
    carregar();
  }

  if (!fId) {
    label.style.cursor = 'pointer';
    label.textContent = "Clique para selecionar fornecedor";
    label.onclick = () => {
      label.style.display = 'none';
      inputBusca.style.display = 'block';
      inputBusca.focus();
    };
    
    const { data: listaF } = await window.db.from('fornecedores').select('id, nome').order('nome');
    inputBusca.oninput = () => {
      const termo = inputBusca.value.toLowerCase();
      const filtrados = listaF.filter(f => f.nome.toLowerCase().includes(termo)).slice(0, 6);
      listaSugestoes.style.display = 'block';
      listaSugestoes.innerHTML = filtrados.map(f => `<div class="fornecedor-item" data-id="${f.id}" data-nome="${f.nome}">${f.nome}</div>`).join('');
      listaSugestoes.querySelectorAll('.fornecedor-item').forEach(item => {
        item.onclick = () => {
          fId = item.dataset.id;
          fNome = item.dataset.nome;
          label.textContent = fNome;
          label.style.display = 'block';
          inputBusca.style.display = 'none';
          listaSugestoes.style.display = 'none';
          carregar();
        };
      });
    };
  }

  document.getElementById('btn-gravar').onclick = async () => {
    if(salvando || !fId) return;
    const v = Number(movValor.value.replace(/[^\d,]/g, '').replace(',', '.'));
    if(!v || !movData.value) return toast("Preencha tudo");
    
    salvando = true;
    const payload = {
      fornecedor_id: fId,
      data: new Date(movData.value + 'T12:00:00').toISOString(),
      forma: formaPagamento,
      valor: v,
      status: 0
    };

    let error;
    if(idEdicao) {
      const { error: err } = await window.db.from('movimentos_fornecedores').update(payload).eq('id', idEdicao);
      error = err;
    } else {
      const { error: err } = await window.db.from('movimentos_fornecedores').insert([payload]);
      error = err;
    }

    salvando = false;
    if(!error){ 
      sheet.classList.remove('open'); 
      carregar(); 
      toast(idEdicao ? "Atualizado!" : "Salvo!"); 
    } else toast("Erro ao gravar");
  };

  document.getElementById('btn-nova').onclick = () => {
    if(!fId) return toast("Selecione um fornecedor");
    idEdicao = null;
    document.getElementById('sheet-titulo').textContent = "Nova movimentação";
    movValor.value = '';
    movData.value = new Date().toISOString().split('T')[0];
    setForma("Depósito");
    document.getElementById('sheet-fornecedor').textContent = label.textContent;
    sheet.classList.add('open');
  };

  document.getElementById('btn-cancelar').onclick = () => sheet.classList.remove('open');
  document.getElementById('btn-voltar').onclick = () => window.history.back();
  if(fId) carregar();
});
</script>
</body>
</html>
