<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movimentações Fornecedores</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
/* SEU LAYOUT ORIGINAL PRESERVADO */
body{font-family:'Inter',sans-serif;background:#F5F5F7;margin:0;color:#111;}
.top{padding:20px 16px 10px;}
.title{font-size:28px;font-weight:800;letter-spacing:-0.03em;}
.sub{font-size:14px;color:#666;margin-top:4px;}
.fornecedor-box{margin-top:10px;position:relative;}
.fornecedor-input{width:100%;padding:12px 14px;border:none;border-radius:12px;background:#F2F2F7;font-size:14px;outline:none;}
.fornecedor-lista{margin-top:8px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.06);display:none;position:absolute;left:0;right:0;z-index:30;}
.fornecedor-item{padding:12px 14px;border-bottom:1px solid #eee;cursor:pointer;}
.fornecedor-item:last-child{border-bottom:none;}
.total-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 16px;margin:18px 0 16px;}
.total{margin:0;font-size:24px;font-weight:700;letter-spacing:-0.03em;color:#2C2C2E;}
.list{padding:0 16px 100px;}
.item{background:#fff;border-radius:18px;padding:18px;margin-bottom:16px;}
.date{font-size:14px;color:#777;margin-bottom:10px;}
.date-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:-0.01em;color:#B91C1C;background:#FEF2F2;border:1px solid #FECACA;}
.value{font-size:18px;font-weight:800;line-height:1.15;margin-bottom:12px;letter-spacing:-0.025em;}
.meta{font-size:16px;margin-bottom:6px;}
.cons{font-size:15px;color:#555;margin-bottom:12px;}
.item-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
.item-main{flex:1;min-width:0;}
.actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.btn{width:40px;height:40px;border-radius:999px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);box-shadow:0 10px 22px rgba(15,23,42,.10),0 3px 8px rgba(15,23,42,.06),inset 0 1px 0 rgba(255,255,255,.95);transition:transform .15s ease, box-shadow .15s ease, background .15s ease;}
.btn:active{transform:translateY(1px) scale(.98);box-shadow:0 6px 14px rgba(15,23,42,.10),0 2px 5px rgba(15,23,42,.06),inset 0 1px 0 rgba(255,255,255,.92);}
.edit{color:#2563EB;}
.del{color:#8E8E93;}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
@media (max-width:520px){.item-row{gap:10px;}.btn{min-width:74px;padding:10px 14px;font-size:14px;}.title{font-size:24px;}.total{font-size:22px;}.value{font-size:17px;}}
.fab-inline{min-width:46px;height:40px;padding:0 12px;border-radius:999px;border:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);color:#2563EB;font-size:24px;font-weight:700;line-height:1;cursor:pointer;margin-right:6px;box-shadow:0 10px 22px rgba(15,23,42,.10),0 3px 8px rgba(15,23,42,.06),inset 0 1px 0 rgba(255,255,255,.95);transition:transform .15s ease, box-shadow .15s ease, background .15s ease;}
.back-row{display:flex;align-items:center;gap:14px;}
.back-btn{width:44px;height:44px;border:none;border-radius:999px;background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 14px 30px rgba(15,23,42,.14),0 4px 10px rgba(15,23,42,.08),inset 0 1px 0 rgba(255,255,255,.95);transition:transform .15s ease, box-shadow .15s ease, background .15s ease;flex-shrink:0;}
.back-btn svg{width:22px;height:22px;stroke:#111827;fill:none;stroke-width:2.75;stroke-linecap:round;stroke-linejoin:round;}
.head-copy{min-width:0}
.toast{position:fixed;left:50%;bottom:94px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:12px;font-size:13px;display:none;z-index:100;box-shadow:0 12px 28px rgba(0,0,0,.18);}
.sheet-overlay{position:fixed;inset:0;background:rgba(17,17,17,.22);display:none;align-items:flex-end;justify-content:center;padding:14px;z-index:90;}
.sheet-overlay.open{display:flex}
.sheet{width:100%;max-width:520px;background:#fff;border-radius:24px 24px 18px 18px;padding:14px;box-shadow:0 18px 40px rgba(0,0,0,.18);}
.sheet-handle{width:44px;height:5px;border-radius:999px;background:#D1D5DB;margin:2px auto 14px;}
.sheet-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.sheet-title{font-size:24px;font-weight:800;}
.sheet-sub{font-size:14px;color:#666;margin-top:4px;}
.sheet-close{width:40px;height:40px;border:none;border-radius:999px;background:#F2F2F7;color:#6B7280;font-size:24px;cursor:pointer;}
.sheet-form{display:grid;gap:12px;}
.sheet-field{background:#F7F7F9;border-radius:16px;padding:14px;}
.sheet-label{font-size:12px;font-weight:700;color:#666;margin-bottom:8px;}
.sheet-input{width:100%;border:none;outline:none;background:transparent;font-size:16px;font-weight:600;color:#111;font-family:'Inter',sans-serif;}
.sheet-actions{display:flex;gap:10px;margin-top:14px;}
.sheet-btn{flex:1;padding:14px;border:none;border-radius:14px;font-weight:700;cursor:pointer;}
.sheet-btn.secondary{background:#F2F2F7;color:#374151;}
.sheet-btn.primary{background:#2563EB;color:#fff;}
.sheet-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.seg-control{display:flex;background:#F2F2F7;border-radius:20px;padding:4px;gap:4px;}
.seg-option{flex:1;text-align:center;padding:10px;border-radius:16px;font-weight:700;color:#8E8E93;cursor:pointer;user-select:none;}
.seg-option.active{background:#FFFFFF;color:#1C1C1E;box-shadow:0 4px 10px rgba(0,0,0,.08);}
.sheet-select{width:100%;border:none;outline:none;background:transparent;font-size:16px;font-weight:600;color:#111;font-family:'Inter',sans-serif;appearance:none;-webkit-appearance:none;}
@media (max-width:520px){.sheet-grid-2{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="top">
  <div class="back-row">
    <button class="back-btn" id="btn-voltar" type="button" aria-label="Voltar">
      <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
    </button>
    <div class="head-copy">
      <div class="title">Movimentações Fornecedores</div>
      <div class="sub" id="fornecedor-nome">Selecione um fornecedor</div>
    </div>
  </div>
  <div class="fornecedor-box">
    <input class="fornecedor-input" id="fornecedor-input" type="text" placeholder="Buscar fornecedor..." style="display:none;" autocomplete="off"/>
    <div class="fornecedor-lista" id="fornecedor-lista"></div>
  </div>
</div>

<div class="total-row">
  <div class="total" id="total-geral">R$ 0,00</div>
  <button class="fab-inline" id="btn-nova" type="button">+</button>
</div>

<div class="list" id="lista-movimentacoes"></div>

<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div>
        <div class="sheet-title">Nova movimentação</div>
        <div class="sheet-sub" id="sheet-fornecedor">Selecione um fornecedor</div>
      </div>
      <button class="sheet-close" id="sheet-close" type="button">×</button>
    </div>

    <div class="sheet-form">
      <div class="sheet-field">
        <div class="sheet-label">Data da Compra</div>
        <input class="sheet-input" id="mov-data" type="date"/>
      </div>
      <div class="sheet-field">
        <div class="sheet-label">Lançado em Despesa</div>
        <div class="seg-control" id="consumo-control">
          <div class="seg-option active" id="consumo-nao">💲 Não</div>
          <div class="seg-option" id="consumo-sim">⚡ Sim</div>
        </div>
      </div>
      <div class="sheet-grid-2">
        <div class="sheet-field">
          <div class="sheet-label">Conta Origem</div>
          <select id="mov-conta" class="sheet-select">
            <option value="nenhum">Nenhum</option>
            <option value="proprio">Banco Santander</option>
            <option value="externa">Conta Externa</option>
          </select>
        </div>
        <div class="sheet-field">
          <div class="sheet-label">Valor Pago</div>
          <input class="sheet-input" id="mov-valor" type="text" inputmode="decimal" placeholder="R$ 0,00"/>
        </div>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="sheet-btn secondary" id="btn-cancelar-sheet" type="button">Cancelar</button>
      <button class="sheet-btn primary" id="btn-gravar-sheet" type="button">Gravar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', async function(){
  const params = new URLSearchParams(window.location.search);
  const fornecedorNomeParam = params.get('fornecedor_nome');
  const fornecedorIdParam = params.get('fornecedor_id') || params.get('id'); // Aceita os dois

  const label = document.getElementById('fornecedor-nome');
  const input = document.getElementById('fornecedor-input');
  const lista = document.getElementById('fornecedor-lista');
  const btnVoltar = document.getElementById('btn-voltar');
  const btnNova = document.getElementById('btn-nova');
  const toast = document.getElementById('toast');
  const sheet = document.getElementById('sheet-overlay');
  const sheetClose = document.getElementById('sheet-close');
  const btnCancelarSheet = document.getElementById('btn-cancelar-sheet');
  const btnGravarSheet = document.getElementById('btn-gravar-sheet');
  const sheetFornecedor = document.getElementById('sheet-fornecedor');
  const movData = document.getElementById('mov-data');
  const movValor = document.getElementById('mov-valor');
  const movConta = document.getElementById('mov-conta');
  const consumoSim = document.getElementById('consumo-sim');
  const consumoNao = document.getElementById('consumo-nao');
  const totalEl = document.getElementById('total-geral');
  const listaMovimentacoes = document.getElementById('lista-movimentacoes');

  let fornecedores = [];
  let fornecedorSelecionado = fornecedorIdParam;
  let fornecedorSelecionadoNome = fornecedorNomeParam ? decodeURIComponent(fornecedorNomeParam) : '';
  let consumo = false;
  let editandoId = null;
  let salvando = false;

  function mostrarToast(msg){
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2200);
  }

  function formatarMoeda(valor){
    return Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  // LOGICA DE ORIGEM
  if (fornecedorSelecionado) {
    label.textContent = fornecedorSelecionadoNome || "Carregando...";
    input.style.display = 'none';
    await carregarMovimentacoes();
  } else {
    label.textContent = "Selecione um fornecedor";
    input.style.display = 'block';
    listaMovimentacoes.innerHTML = '<div class="item"><div class="meta">Aguardando seleção...</div></div>';
  }

  async function carregarMovimentacoes(){
    if (!fornecedorSelecionado) return;
    listaMovimentacoes.innerHTML = '<div class="item"><div class="meta">Carregando...</div></div>';
    try {
      const { data, error } = await window.db
        .from('movimentos_fornecedores')
        .select('*')
        .eq('fornecedor_id', fornecedorSelecionado)
        .order('data', { ascending: false });

      if (error) throw error;
      
      let soma = 0;
      listaMovimentacoes.innerHTML = data.map(item => {
        const v = parseFloat(item.valor || 0);
        soma += v;
        const dt = item.data ? new Date(item.data).toLocaleDateString('pt-BR') : '---';
        return `
          <div class="item">
            <div class="item-row">
              <div class="item-main">
                <div class="date">${dt}</div>
                <div class="value">${formatarMoeda(v)}</div>
                <div class="meta">${item.destino === 'proprio' ? 'Santander' : (item.destino === 'externa' ? 'Externa' : 'Dinheiro')}</div>
              </div>
              <div class="actions">
                <button class="btn del" onclick="excluirMov('${item.id}')"><svg viewBox="0 0 24 24"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
              </div>
            </div>
          </div>`;
      }).join('') || '<div class="item"><div class="meta">Sem lançamentos</div></div>';
      
      totalEl.textContent = formatarMoeda(soma);
    } catch (e) { mostrarToast('Erro ao carregar'); }
  }

  window.excluirMov = async (id) => {
    if(!confirm('Excluir?')) return;
    await window.db.from('movimentos_fornecedores').delete().eq('id', id);
    carregarMovimentacoes();
  };

  // BUSCA MANUAL (Para Dashboard)
  input.addEventListener('input', async () => {
    const termo = input.value.trim().toLowerCase();
    if (termo.length < 2) { lista.style.display = 'none'; return; }
    const { data } = await window.db.from('fornecedores').select('id, nome').ilike('nome', `%${termo}%`).limit(5);
    if (data) {
      lista.innerHTML = data.map(f => `<div class="fornecedor-item" data-id="${f.id}" data-nome="${f.nome}">${f.nome}</div>`).join('');
      lista.style.display = 'block';
      lista.querySelectorAll('.fornecedor-item').forEach(el => {
        el.onclick = () => {
          fornecedorSelecionado = el.dataset.id;
          fornecedorSelecionadoNome = el.dataset.nome;
          label.textContent = fornecedorSelecionadoNome;
          input.style.display = 'none';
          lista.style.display = 'none';
          carregarMovimentacoes();
        };
      });
    }
  });

  movValor.addEventListener('input', function(){
    let v = this.value.replace(/\D/g, '');
    v = (v / 100).toFixed(2).replace('.', ',');
    v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    this.value = 'R$ ' + v;
  });

  btnNova.onclick = () => {
    if (!fornecedorSelecionado) return mostrarToast('Selecione um fornecedor');
    sheetFornecedor.textContent = fornecedorSelecionadoNome;
    movData.value = new Date().toISOString().split('T')[0];
    sheet.classList.add('open');
  };

  btnGravarSheet.onclick = async () => {
    const valor = parseFloat(movValor.value.replace(/[^\d,]/g, '').replace(',', '.'));
    if (!valor) return mostrarToast('Informe o valor');
    const { error } = await window.db.from('movimentos_fornecedores').insert({
      fornecedor_id: fornecedorSelecionado,
      data: movData.value,
      valor: valor,
      destino: movConta.value,
      tipo: consumo ? 'consumo' : 'nao_consumo'
    });
    if (!error) { sheet.classList.remove('open'); carregarMovimentacoes(); }
  };

  btnVoltar.onclick = () => window.history.back();
  sheetClose.onclick = () => sheet.classList.remove('open');
  btnCancelarSheet.onclick = () => sheet.classList.remove('open');
  consumoSim.onclick = () => { consumo = true; consumoSim.classList.add('active'); consumoNao.classList.remove('active'); };
  consumoNao.onclick = () => { consumo = false; consumoNao.classList.add('active'); consumoSim.classList.remove('active'); };
});
</script>
</body>
</html>
