<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Movimentações Fornecedores</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
/* ... Mantive seu CSS intacto para NÃO MEXER NO LAYOUT ... */
body{font-family:'Inter',sans-serif;background:#F5F5F7;margin:0;color:#111;padding-top:env(safe-area-inset-top);}
.top{padding:20px 16px 10px;}
.title{font-size:28px;font-weight:800;letter-spacing:-0.03em;}
.sub{font-size:14px;color:#666;margin-top:4px;}
.fornecedor-box{margin-top:10px;position:relative;}
.fornecedor-input{width:100%;padding:12px 14px;border:none;border-radius:12px;background:#F2F2F7;font-size:14px;outline:none;}
.fornecedor-lista{margin-top:8px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.06);display:none;position:absolute;left:0;right:0;z-index:30;}
.fornecedor-item{padding:12px 14px;border-bottom:1px solid #eee;cursor:pointer;}
.total-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 16px;margin:18px 0 16px;}
.total{margin:0;font-size:24px;font-weight:700;letter-spacing:-0.03em;color:#2C2C2E;}
.list{padding:0 16px 100px;}
.item{background:#fff;border-radius:18px;padding:18px;margin-bottom:16px;box-shadow: 0 2px 8px rgba(0,0,0,0.04);}
.date{font-size:14px;color:#777;margin-bottom:10px;}
.value{font-size:18px;font-weight:800;line-height:1.15;margin-bottom:12px;}
.meta{font-size:14px; color: #8E8E93;}
.item-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
.actions{display:flex;gap:8px;}
.btn{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;background:#F2F2F7;cursor:pointer;}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2;}
.fab-inline{min-width:46px;height:40px;border-radius:20px;border:none;background:#2563EB;color:#fff;font-size:24px;font-weight:700;cursor:pointer;}
.back-btn{width:44px;height:44px;border:none;border-radius:50%;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.back-btn svg{width:22px;height:22px;stroke:#111;fill:none;stroke-width:2.5;}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:flex-end;z-index:100;}
.sheet-overlay.open{display:flex;}
.sheet{width:100%;background:#fff;border-radius:24px 24px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
.sheet-field{background:#F7F7F9;border-radius:16px;padding:12px;margin-bottom:12px;}
.sheet-label{font-size:11px;font-weight:700;color:#8E8E93;margin-bottom:4px;text-transform:uppercase;}
.sheet-input, .sheet-select{width:100%;border:none;background:transparent;font-size:16px;font-weight:600;outline:none;}
.sheet-btn{flex:1;padding:16px;border-radius:14px;border:none;font-weight:700;cursor:pointer;}
.sheet-btn.primary{background:#2563EB;color:#fff;}
.sheet-btn.secondary{background:#F2F2F7;color:#1C1C1E;}
</style>
</head>
<body>

<div class="top">
  <div class="back-row" style="display:flex; align-items:center; gap:14px;">
    <button class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
    </button>
    <div>
      <div class="title">Movimentações</div>
      <div class="sub" id="fornecedor-nome">Carregando...</div>
    </div>
  </div>
</div>

<div class="total-row">
  <div class="total" id="total-geral">R$ 0,00</div>
  <button class="fab-inline" id="btn-nova">+</button>
</div>

<div class="list" id="lista-movimentacoes"></div>

<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet">
    <div style="width:40px; height:5px; background:#D1D5DB; border-radius:10px; margin:0 auto 20px;"></div>
    <div class="sheet-title" style="font-size:20px; font-weight:800; margin-bottom:15px;">Nova Movimentação</div>
    
    <div class="sheet-field">
      <div class="sheet-label">Data</div>
      <input type="date" id="mov-data" class="sheet-input">
    </div>
    
    <div class="sheet-field">
      <div class="sheet-label">Conta / Destino</div>
      <select id="mov-conta" class="sheet-select">
        <option value="nenhum">Dinheiro</option>
        <option value="proprio">Banco Santander</option>
        <option value="externa">Conta Externa</option>
      </select>
    </div>

    <div class="sheet-field">
      <div class="sheet-label">Valor Pago</div>
      <input type="tel" id="mov-valor" class="sheet-input" placeholder="R$ 0,00">
    </div>

    <div style="display:flex; gap:10px; margin-top:10px;">
      <button class="sheet-btn secondary" onclick="fecharFormulario()">Cancelar</button>
      <button class="sheet-btn primary" id="btn-gravar-sheet">Gravar</button>
    </div>
  </div>
</div>

<script>
// Inicialização segura para evitar tela branca
document.addEventListener('DOMContentLoaded', async () => {
    // 1. Captura de Parâmetros da URL
    const params = new URLSearchParams(window.location.search);
    const fornecedorId = params.get('fornecedor_id');
    const fornecedorNome = decodeURIComponent(params.get('fornecedor_nome') || "Fornecedor não identificado");

    if (!fornecedorId) {
        document.getElementById('lista-movimentacoes').innerHTML = "<div style='padding:20px'>Erro: ID do fornecedor não recebido.</div>";
        return;
    }

    // 2. Elementos da Interface
    const labelNome = document.getElementById('fornecedor-nome');
    const listaMovs = document.getElementById('lista-movimentacoes');
    const totalGeral = document.getElementById('total-geral');
    const inputValor = document.getElementById('mov-valor');
    
    labelNome.textContent = fornecedorNome;

    // 3. Função de Carregar Dados
    async function carregarMovs() {
        listaMovs.innerHTML = '<div style="padding:20px; color:#8E8E93">Buscando histórico...</div>';
        try {
            const { data, error } = await window.db
                .from('movimentos_fornecedores')
                .select('*')
                .eq('fornecedor_id', fornecedorId)
                .order('data', { ascending: false });

            if (error) throw error;

            let soma = 0;
            if (!data || data.length === 0) {
                listaMovs.innerHTML = '<div style="padding:20px; color:#8E8E93">Nenhuma movimentação encontrada.</div>';
                totalGeral.textContent = "R$ 0,00";
                return;
            }

            listaMovs.innerHTML = data.map(item => {
                soma += parseFloat(item.valor || 0);
                const dataFormatada = new Date(item.data).toLocaleDateString('pt-BR');
                const destino = item.destino === 'proprio' ? 'Santander' : (item.destino === 'externa' ? 'Externa' : 'Dinheiro');
                
                return `
                    <div class="item">
                        <div class="item-row">
                            <div>
                                <div class="date">${dataFormatada}</div>
                                <div class="value">${parseFloat(item.valor).toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}</div>
                                <div class="meta">${destino}</div>
                            </div>
                            <div class="actions">
                                <button class="btn" onclick="excluirMov('${item.id}')" style="color:#EF4444">
                                    <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            totalGeral.textContent = soma.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

        } catch (err) {
            listaMovs.innerHTML = `<div style="padding:20px; color:red">Erro ao carregar: ${err.message}</div>`;
        }
    }

    // 4. Lógica do Formulário (Sheet)
    window.fecharFormulario = () => document.getElementById('sheet-overlay').classList.remove('open');
    document.getElementById('btn-nova').onclick = () => {
        document.getElementById('mov-data').value = new Date().toISOString().split('T')[0];
        document.getElementById('mov-valor').value = "";
        document.getElementById('sheet-overlay').classList.add('open');
    };

    // Máscara de dinheiro (igual ao seu padrão)
    inputValor.oninput = function() {
        let v = this.value.replace(/\D/g, '');
        v = (v / 100).toFixed(2).replace('.', ',');
        v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        this.value = 'R$ ' + v;
    };

    document.getElementById('btn-gravar-sheet').onclick = async () => {
        const valorRaw = inputValor.value.replace(/[^\d,]/g, '').replace(',', '.');
        const valorNum = parseFloat(valorRaw);
        const dataMov = document.getElementById('mov-data').value;
        const contaMov = document.getElementById('mov-conta').value;

        if (!valorNum || valorNum <= 0) return alert("Informe um valor válido.");

        try {
            const { error } = await window.db.from('movimentos_fornecedores').insert({
                fornecedor_id: fornecedorId,
                data: dataMov,
                valor: valorNum,
                destino: contaMov,
                tipo: 'nao_consumo'
            });

            if (error) throw error;
            fecharFormulario();
            carregarMovs();
        } catch (err) {
            alert("Erro ao salvar: " + err.message);
        }
    };

    // 5. Função Global de Exclusão
    window.excluirMov = async (id) => {
        if (!confirm("Deseja excluir este lançamento?")) return;
        const { error } = await window.db.from('movimentos_fornecedores').delete().eq('id', id);
        if (!error) carregarMovs();
    };

    // Início
    carregarMovs();
});
</script>
</body>
</html>
