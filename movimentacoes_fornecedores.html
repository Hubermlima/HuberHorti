<script>
document.addEventListener('DOMContentLoaded', async function(){
  const params = new URLSearchParams(window.location.search);
  const fornecedorNomeParam = params.get('fornecedor_nome');
  const fornecedorIdParam = params.get('fornecedor_id');

  const label = document.getElementById('fornecedor-nome');
  const input = document.getElementById('fornecedor-input');
  const lista = document.getElementById('fornecedor-lista');
  const btnVoltar = document.getElementById('btn-voltar');
  const btnNova = document.getElementById('btn-nova');
  const toast = document.getElementById('toast');
  const sheet = document.getElementById('sheet-overlay');
  const sheetClose = document.getElementById('sheet-close');
  const btnCancelarSheet = document.getElementById('btn-cancelar-sheet');
  const btnGravarSheet = document.getElementById('btn-gravar-sheet');
  const sheetTitle = document.querySelector('.sheet-title');
  const sheetFornecedor = document.getElementById('sheet-fornecedor');
  const movData = document.getElementById('mov-data');
  const movValor = document.getElementById('mov-valor');
  const movConta = document.getElementById('mov-conta');
  const consumoSim = document.getElementById('consumo-sim');
  const consumoNao = document.getElementById('consumo-nao');
  const totalEl = document.getElementById('total-geral');
  const listaMovimentacoes = document.getElementById('lista-movimentacoes');

  let fornecedores = [];
  let fornecedorSelecionado = fornecedorIdParam || null;
  let fornecedorSelecionadoNome = fornecedorNomeParam ? decodeURIComponent(fornecedorNomeParam) : '';
  let consumo = false;
  let editandoId = null;
  let salvando = false;

  // --- LÓGICA DE INJEÇÃO: ORIGEM DOS DADOS ---
  if (fornecedorIdParam && fornecedorNomeParam) {
    // Caso venha de compras.html: Trava o fornecedor e oculta o campo de busca
    label.textContent = fornecedorSelecionadoNome;
    input.style.display = 'none';
    label.style.display = 'block';
  } else {
    // Caso venha do Dashboard: Permite a busca e seleção
    label.textContent = 'Selecione um fornecedor';
    input.style.display = 'block';
    label.style.display = 'none';
  }
  // -------------------------------------------

  function escapeHtml(text){
    return String(text || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function mostrarToast(msg){
    toast.textContent = msg;
    toast.style.display = 'block';
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(function(){
      toast.style.display = 'none';
    }, 2200);
  }

  function formatarMoeda(valor){
    return Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function formatarDataTela(dataIso){
    if (!dataIso) return '<span class="date-badge">Sem Data</span>';
    const d = new Date(dataIso);
    if (isNaN(d.getTime())) return '<span class="date-badge">Sem Data</span>';
    return d.toLocaleDateString('pt-BR');
  }

  function formatarDataInput(dataIso){
    if (!dataIso) return '';
    const d = new Date(dataIso);
    if (isNaN(d.getTime())) return '';
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function valorTextoParaNumero(texto){
    return Number(String(texto || '').replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.')) || 0;
  }

  function numeroParaValorTexto(valor){
    return formatarMoeda(Number(valor || 0));
  }

  function atualizarTotalPorDados(items){
    const soma = (items || []).reduce(function(acc, item){
      return acc + (Number(item.valor) || 0);
    }, 0);
    totalEl.textContent = formatarMoeda(soma);
  }

  function ativarConsumo(isSim){
    consumo = !!isSim;
    consumoSim.classList.toggle('active', consumo);
    consumoNao.classList.toggle('active', !consumo);
  }

  function limparFormulario(){
    editandoId = null;
    if (sheetTitle) sheetTitle.textContent = 'Nova movimentação';
    sheetFornecedor.textContent = fornecedorSelecionadoNome || label.textContent;
    // Define data de hoje por padrão ao abrir novo
    movData.value = new Date().toISOString().split('T')[0];
    movConta.value = 'nenhum';
    movValor.value = '';
    ativarConsumo(false);
  }

  function preencherFormulario(item){
    editandoId = item.id;
    if (sheetTitle) sheetTitle.textContent = 'Editar movimentação';
    sheetFornecedor.textContent = fornecedorSelecionadoNome || label.textContent;
    movData.value = formatarDataInput(item.data);
    movConta.value = item.destino || 'nenhum';
    movValor.value = numeroParaValorTexto(item.valor);
    ativarConsumo(String(item.tipo || '').toLowerCase() === 'consumo');
  }

  function abrirFormulario(item){
    if (!fornecedorSelecionado) {
      mostrarToast('Selecione um fornecedor primeiro');
      if (input.style.display !== 'none') input.focus();
      return;
    }
    if (item) preencherFormulario(item);
    else limparFormulario();
    sheet.classList.add('open');
  }

  function fecharFormulario(){
    sheet.classList.remove('open');
  }

  function esconderSugestoes(){
    lista.style.display = 'none';
    lista.innerHTML = '';
  }

  function renderSugestoes(items){
    if (!items.length) {
      lista.innerHTML = '<div class="fornecedor-item">Nenhum fornecedor encontrado</div>';
      lista.style.display = 'block';
      return;
    }

    lista.innerHTML = items.map(function(f){
      const nome = escapeHtml(f.nome || '');
      return '<div class="fornecedor-item" data-id="' + escapeHtml(f.id) + '" data-nome="' + nome + '">' + nome + '</div>';
    }).join('');
    lista.style.display = 'block';

    lista.querySelectorAll('.fornecedor-item[data-id]').forEach(function(el){
      el.addEventListener('click', async function(){
        fornecedorSelecionado = this.dataset.id;
        fornecedorSelecionadoNome = this.dataset.nome;
        label.textContent = fornecedorSelecionadoNome;
        label.style.display = 'block';
        input.value = '';
        input.style.display = 'none';
        esconderSugestoes();
        await carregarMovimentacoes();
        mostrarToast('Fornecedor selecionado');
      });
    });
  }

  async function carregarMovimentacoes(){
    if (!fornecedorSelecionado) {
      listaMovimentacoes.innerHTML = '';
      atualizarTotalPorDados([]);
      return;
    }

    listaMovimentacoes.innerHTML = '<div class="item"><div class="meta">Carregando movimentações...</div></div>';

    try {
      const result = await window.db
        .from('movimentos_fornecedores') 
        .select('*')
        .eq('fornecedor_id', fornecedorSelecionado)
        .order('data', { ascending: false });

      if (result.error) throw result.error;

      const items = result.data || [];
      atualizarTotalPorDados(items);

      if (!items.length) {
        listaMovimentacoes.innerHTML = '<div class="item"><div class="meta">Nenhuma movimentação encontrada</div></div>';
        return;
      }

      listaMovimentacoes.innerHTML = items.map(function(item){
        const destinoBruto = String(item.destino || '').toLowerCase();
        const ehConsumo = String(item.tipo || '').toLowerCase() === 'consumo';

        let destinoLabel = 'Dinheiro';
        if (destinoBruto === 'proprio') destinoLabel = 'Banco Santander';
        else if (destinoBruto === 'externa') destinoLabel = 'Conta Externa';

        const consumoHtml = ehConsumo ? '<div class="cons">Despesa: Sim</div>' : '';

        return [
          '<div class="item" data-id="' + escapeHtml(item.id) + '">',
            '<div class="item-row">',
              '<div class="item-main">',
                '<div class="date">' + formatarDataTela(item.data) + '</div>',
                '<div class="value">' + formatarMoeda(item.valor) + '</div>',
                '<div class="meta">' + escapeHtml(destinoLabel) + '</div>',
                consumoHtml,
              '</div>',
              '<div class="actions">',
                '<button class="btn edit" type="button" data-id="' + escapeHtml(item.id) + '"><svg viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16v4z"/><path d="M13.5 6.5l4 4"/></svg></button>',
                '<button class="btn del" type="button" data-id="' + escapeHtml(item.id) + '"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button>',
              '</div>',
            '</div>',
          '</div>'
        ].join('');
      }).join('');

      listaMovimentacoes.querySelectorAll('.btn.edit').forEach(btn => {
         btn.onclick = function() {
            const item = items.find(r => String(r.id) === String(this.dataset.id));
            if(item) abrirFormulario(item);
         };
      });

      listaMovimentacoes.querySelectorAll('.btn.del').forEach(btn => {
         btn.onclick = async function() {
            if(!confirm('Excluir esta movimentação?')) return;
            try {
               await window.db.from('movimentos_fornecedores').delete().eq('id', this.dataset.id);
               await carregarMovimentacoes();
               mostrarToast('Removido');
            } catch(e) { mostrarToast('Erro ao excluir'); }
         };
      });

    } catch (err) {
      console.error(err);
      listaMovimentacoes.innerHTML = '<div class="item"><div class="meta">Erro ao carregar dados</div></div>';
    }
  }

  if (btnVoltar) btnVoltar.onclick = () => window.history.back();

  consumoSim.onclick = () => ativarConsumo(true);
  consumoNao.onclick = () => ativarConsumo(false);
  btnNova.onclick = () => abrirFormulario();
  sheetClose.onclick = fecharFormulario;
  btnCancelarSheet.onclick = fecharFormulario;

  btnGravarSheet.onclick = async function(){
    if (salvando || !fornecedorSelecionado) return;
    const valorNumerico = valorTextoParaNumero(movValor.value);
    if (!valorNumerico) { mostrarToast('Informe o valor'); return; }

    salvando = true;
    btnGravarSheet.disabled = true;

    try {
      const payload = {
        fornecedor_id: fornecedorSelecionado,
        data: movData.value ? new Date(movData.value + 'T12:00:00').toISOString() : null,
        destino: movConta.value || 'nenhum',
        forma: movConta.value === 'nenhum' ? 'dinheiro' : 'deposito',
        valor: valorNumerico,
        tipo: consumo ? 'consumo' : 'nao_consumo',
        status: 0
      };

      const { error } = editandoId 
        ? await window.db.from('movimentos_fornecedores').update(payload).eq('id', editandoId)
        : await window.db.from('movimentos_fornecedores').insert([payload]);

      if (error) throw error;

      mostrarToast('Salvo com sucesso');
      fecharFormulario();
      await carregarMovimentacoes();
    } catch (err) {
      mostrarToast('Erro ao salvar');
    } finally {
      salvando = false;
      btnGravarSheet.disabled = false;
    }
  };

  movValor.oninput = function(){
    const raw = this.value.replace(/\D/g, '');
    if (!raw) { this.value = ''; return; }
    let n = (parseInt(raw,10) / 100).toFixed(2).replace('.', ',');
    n = n.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    this.value = 'R$ ' + n;
  };

  try {
    const { data: dataF } = await window.db.from('fornecedores').select('id, nome').order('nome');
    fornecedores = dataF || [];

    input.oninput = function(){
      const termo = this.value.trim().toLowerCase();
      if (!termo) { esconderSugestoes(); return; }
      renderSugestoes(fornecedores.filter(f => String(f.nome).toLowerCase().includes(termo)).slice(0, 8));
    };

    if (fornecedorSelecionado) await carregarMovimentacoes();
  } catch (err) {
    console.error('Erro fornecedores:', err);
  }
});
</script>
