<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movimentações Fornecedores</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
/* CSS ORIGINAL MANTIDO */
body{font-family:'Inter',sans-serif;background:#F5F5F7;margin:0;color:#111;}
.top{padding:20px 16px 10px;}
.title{font-size:28px;font-weight:800;letter-spacing:-0.03em;}
.sub{font-size:14px;color:#666;margin-top:4px;}
.fornecedor-box{margin-top:10px;position:relative;}
.fornecedor-input{width:100%;padding:12px 14px;border:none;border-radius:12px;background:#F2F2F7;font-size:14px;outline:none;}
.fornecedor-lista{margin-top:8px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.06);display:none;position:absolute;left:0;right:0;z-index:30;}
.fornecedor-item{padding:12px 14px;border-bottom:1px solid #eee;cursor:pointer;}
.fornecedor-item:last-child{border-bottom:none;}
.total-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 16px;margin:18px 0 16px;}
.total{margin:0;font-size:24px;font-weight:700;letter-spacing:-0.03em;color:#2C2C2E;}
.list{padding:0 16px 100px;}
.item{background:#fff;border-radius:18px;padding:18px;margin-bottom:16px;}
.date{font-size:14px;color:#777;margin-bottom:10px;}
.value{font-size:18px;font-weight:800;line-height:1.15;margin-bottom:12px;letter-spacing:-0.025em;}
.meta{font-size:16px;margin-bottom:6px;}
.item-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
.item-main{flex:1;min-width:0;}
.actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.btn{width:40px;height:40px;border-radius:999px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);box-shadow:0 10px 22px rgba(15,23,42,.10),0 3px 8px rgba(15,23,42,.06),inset 0 1px 0 rgba(255,255,255,.95);}
.del{color:#8E8E93;}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2;}
.fab-inline{min-width:46px;height:40px;padding:0 12px;border-radius:999px;border:none;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);color:#2563EB;font-size:24px;font-weight:700;box-shadow:0 10px 22px rgba(15,23,42,.10);}
.back-row{display:flex;align-items:center;gap:14px;}
.back-btn{width:44px;height:44px;border:none;border-radius:999px;background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 14px 30px rgba(15,23,42,.14);}
.back-btn svg{width:22px;height:22px;stroke:#111827;fill:none;stroke-width:2.75;}
.sheet-overlay{position:fixed;inset:0;background:rgba(17,17,17,.22);display:none;align-items:flex-end;justify-content:center;padding:14px;z-index:90;}
.sheet-overlay.open{display:flex}
.sheet{width:100%;max-width:520px;background:#fff;border-radius:24px;padding:14px;}
.sheet-head{display:flex;justify-content:space-between;margin-bottom:12px;}
.sheet-title{font-size:24px;font-weight:800;}
.sheet-form{display:grid;gap:12px;}
.sheet-field{background:#F7F7F9;border-radius:16px;padding:14px;}
.sheet-label{font-size:12px;font-weight:700;color:#666;margin-bottom:8px;}
.sheet-input, .sheet-select{width:100%;border:none;outline:none;background:transparent;font-size:16px;font-weight:600;font-family:'Inter';}
.sheet-actions{display:flex;gap:10px;margin-top:14px;}
.sheet-btn{flex:1;padding:14px;border:none;border-radius:14px;font-weight:700;cursor:pointer;}
.sheet-btn.primary{background:#2563EB;color:#fff;}
.seg-control{display:flex;background:#F2F2F7;border-radius:20px;padding:4px;}
.seg-option{flex:1;text-align:center;padding:10px;border-radius:16px;font-weight:700;color:#8E8E93;cursor:pointer;}
.seg-option.active{background:#FFFFFF;color:#1C1C1E;box-shadow:0 4px 10px rgba(0,0,0,.08);}
.toast{position:fixed;left:50%;bottom:94px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:12px;font-size:13px;display:none;z-index:100;}
</style>
</head>
<body>

<div class="top">
  <div class="back-row">
    <button class="back-btn" onclick="window.history.back()"><svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg></button>
    <div class="head-copy">
      <div class="title">Movimentações</div>
      <div class="sub" id="fornecedor-nome">Carregando...</div>
    </div>
  </div>
  <div class="fornecedor-box">
    <input class="fornecedor-input" id="fornecedor-input" type="text" placeholder="Buscar fornecedor..." autocomplete="off" style="display:none;"/>
    <div class="fornecedor-lista" id="fornecedor-lista"></div>
  </div>
</div>

<div class="total-row">
  <div class="total" id="total-geral">R$ 0,00</div>
  <button class="fab-inline" id="btn-nova">+</button>
</div>

<div class="list" id="lista-movimentacoes"></div>

<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet">
    <div class="sheet-head">
      <div><div class="sheet-title">Novo Lançamento</div><div class="sheet-sub" id="sheet-fornecedor-nome"></div></div>
      <button onclick="fecharSheet()" style="background:none;border:none;font-size:24px;">×</button>
    </div>
    <div class="sheet-form">
      <div class="sheet-field"><div class="sheet-label">Data</div><input class="sheet-input" id="mov-data" type="date"/></div>
      <div class="sheet-field">
        <div class="sheet-label">Lançado em Despesa</div>
        <div class="seg-control">
          <div class="seg-option active" id="seg-nao">💲 Não</div>
          <div class="seg-option" id="seg-sim">⚡ Sim</div>
        </div>
      </div>
      <div class="sheet-field">
        <div class="sheet-label">Conta e Valor</div>
        <div style="display:flex;gap:10px;">
          <select id="mov-conta" class="sheet-select"><option value="proprio">Santander</option><option value="externa">Externa</option></select>
          <input class="sheet-input" id="mov-valor" type="text" inputmode="decimal" placeholder="R$ 0,00"/>
        </div>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="sheet-btn primary" id="btn-gravar">Gravar Lançamento</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', async function(){
  const params = new URLSearchParams(window.location.search);
  // Captura exata dos nomes que compras.html envia
  let fornecedorId = params.get('fornecedor_id'); 
  let fornecedorNome = params.get('fornecedor_nome') ? decodeURIComponent(params.get('fornecedor_nome')) : null;

  const labelNome = document.getElementById('fornecedor-nome');
  const inputBusca = document.getElementById('fornecedor-input');
  const listaSugestoes = document.getElementById('fornecedor-lista');
  const totalGeral = document.getElementById('total-geral');
  const listaMovs = document.getElementById('lista-movimentacoes');
  let isConsumo = false;

  function mostrarToast(m){ 
    const t = document.getElementById('toast'); t.textContent = m; t.style.display='block';
    setTimeout(()=> t.style.display='none', 2000);
  }

  async function carregarDados() {
    if(!fornecedorId) return;
    listaMovs.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">Buscando lançamentos...</div>';
    try {
      const { data, error } = await window.db.from('movimentos_fornecedores').select('*').eq('fornecedor_id', fornecedorId).order('data', {ascending:false});
      if(error) throw error;
      let soma = 0;
      listaMovs.innerHTML = (data || []).map(m => {
        const v = parseFloat(m.valor || 0); soma += v;
        return `<div class="item"><div class="item-row"><div class="item-main">
          <div class="date">${new Date(m.data).toLocaleDateString('pt-BR')}</div>
          <div class="value">${v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</div>
          <div class="meta">${m.destino === 'proprio' ? 'Santander' : 'Externa'}</div>
        </div><div class="actions">
          <button class="btn del" onclick="excluir('${m.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
        </div></div></div>`;
      }).join('') || '<div style="padding:40px;text-align:center;color:#999;">Sem movimentações.</div>';
      totalGeral.textContent = soma.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    } catch(e) { mostrarToast("Erro ao carregar banco."); }
  }

  window.excluir = async (id) => {
    if(!confirm("Excluir lançamento?")) return;
    await window.db.from('movimentos_fornecedores').delete().eq('id', id);
    carregarDados();
  };

  // INÍCIO: Decide se mostra busca ou carrega direto
  if(fornecedorId && fornecedorNome) {
    labelNome.textContent = fornecedorNome;
    inputBusca.style.display = 'none';
    carregarDados();
  } else {
    labelNome.textContent = "Selecione o Fornecedor";
    inputBusca.style.display = 'block';
  }

  // AUTOCOMPLETE
  inputBusca.addEventListener('input', async () => {
    const t = inputBusca.value.trim();
    if(t.length < 2) { listaSugestoes.style.display='none'; return; }
    const { data } = await window.db.from('fornecedores').select('id, nome').ilike('nome', `%${t}%`).limit(5);
    if(data) {
      listaSugestoes.innerHTML = data.map(f => `<div class="fornecedor-item" onclick="selecionar('${f.id}','${f.nome}')">${f.nome}</div>`).join('');
      listaSugestoes.style.display = 'block';
    }
  });

  window.selecionar = (id, nome) => {
    fornecedorId = id; fornecedorNome = nome;
    labelNome.textContent = nome;
    inputBusca.style.display = 'none';
    listaSugestoes.style.display = 'none';
    carregarDados();
  };

  // MÁSCARA FINANCEIRA
  document.getElementById('mov-valor').addEventListener('input', function(e){
    let v = e.target.value.replace(/\D/g,'');
    v = (v/100).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    e.target.value = v ? 'R$ ' + v : '';
  });

  // AÇÕES DO SHEET
  document.getElementById('btn-nova').onclick = () => {
    if(!fornecedorId) return mostrarToast("Selecione um fornecedor");
    document.getElementById('sheet-fornecedor-nome').textContent = fornecedorNome;
    document.getElementById('mov-data').value = new Date().toISOString().split('T')[0];
    document.getElementById('sheet-overlay').classList.add('open');
  };

  window.fecharSheet = () => document.getElementById('sheet-overlay').classList.remove('open');

  document.getElementById('btn-gravar').onclick = async () => {
    const v = parseFloat(document.getElementById('mov-valor').value.replace(/[^\d,]/g,'').replace(',','.'));
    if(!v) return mostrarToast("Insira o valor");
    const { error } = await window.db.from('movimentos_fornecedores').insert({
      fornecedor_id: fornecedorId,
      data: document.getElementById('mov-data').value,
      valor: v,
      destino: document.getElementById('mov-conta').value,
      tipo: isConsumo ? 'consumo' : 'nao_consumo'
    });
    if(!error) { fecharSheet(); carregarDados(); } else { mostrarToast("Erro ao gravar."); }
  };

  document.getElementById('seg-sim').onclick = () => { isConsumo=true; document.getElementById('seg-sim').classList.add('active'); document.getElementById('seg-nao').classList.remove('active'); };
  document.getElementById('seg-nao').onclick = () => { isConsumo=false; document.getElementById('seg-nao').classList.add('active'); document.getElementById('seg-sim').classList.remove('active'); };
});
</script>
</body>
</html>
