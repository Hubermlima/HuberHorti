<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movimentações Fornecedores</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
/* Estilos mantidos conforme sua identidade visual */
body{font-family:'Inter',sans-serif;background:#F5F5F7;margin:0;color:#111;}
.top{padding:20px 16px 10px;}
.title{font-size:28px;font-weight:800;letter-spacing:-0.03em;}
.sub{font-size:14px;color:#666;margin-top:4px;cursor:pointer;}
.fornecedor-box{margin-top:10px;position:relative;}
.fornecedor-input{width:100%;padding:12px 14px;border:none;border-radius:12px;background:#F2F2F7;font-size:14px;outline:none;}
.fornecedor-lista{margin-top:8px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.06);display:none;position:absolute;left:0;right:0;z-index:30;}
.fornecedor-item{padding:12px 14px;border-bottom:1px solid #eee;cursor:pointer;}
.fornecedor-item:hover{background:#f9f9f9;}
.total-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 16px;margin:18px 0 16px;}
.total{margin:0;font-size:24px;font-weight:700;color:#2C2C2E;}
.list{padding:0 16px 100px;}
.item{background:#fff;border-radius:18px;padding:18px;margin-bottom:16px;}
.date{font-size:14px;color:#777;margin-bottom:10px;}
.value{font-size:18px;font-weight:800;margin-bottom:12px;}
.meta{font-size:16px;margin-bottom:6px;}
.item-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
.actions{display:flex;align-items:center;gap:8px;}
.btn{width:40px;height:40px;border-radius:999px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:linear-gradient(180deg,#FFFFFF 0%,#F2F2F7 100%);box-shadow:0 10px 22px rgba(15,23,42,.10);}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2;}
.fab-inline{min-width:46px;height:40px;padding:0 12px;border-radius:999px;border:none;background:#2563EB;color:#fff;font-size:24px;font-weight:700;cursor:pointer;}
.back-btn{width:44px;height:44px;border:none;border-radius:999px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.back-btn svg{width:22px;height:22px;stroke:#111;fill:none;stroke-width:2.5;}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:none;align-items:flex-end;justify-content:center;z-index:90;}
.sheet-overlay.open{display:flex;}
.sheet{width:100%;max-width:520px;background:#fff;border-radius:24px 24px 0 0;padding:20px;}
.sheet-field{background:#F7F7F9;border-radius:16px;padding:12px;margin-bottom:12px;}
.sheet-label{font-size:12px;font-weight:700;color:#666;margin-bottom:4px;}
.sheet-input, .sheet-select{width:100%;border:none;background:transparent;font-size:16px;font-weight:600;outline:none;}
.sheet-btn{flex:1;padding:16px;border-radius:14px;border:none;font-weight:700;cursor:pointer;}
.sheet-btn.primary{background:#2563EB;color:#fff;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 20px;border-radius:10px;display:none;z-index:100;}
</style>
</head>
<body>

<div class="top">
  <div style="display:flex; align-items:center; gap:14px;">
    <button class="back-btn" id="btn-voltar"><svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg></button>
    <div>
      <div class="title">Compras / Fornecedor</div>
      <div class="sub" id="fornecedor-nome">Selecione um fornecedor</div>
    </div>
  </div>
  <div class="fornecedor-box">
    <input class="fornecedor-input" id="fornecedor-input" type="text" placeholder="Buscar fornecedor..." autocomplete="off"/>
    <div class="fornecedor-lista" id="fornecedor-lista"></div>
  </div>
</div>

<div class="total-row">
  <div class="total" id="total-geral">R$ 0,00</div>
  <button class="fab-inline" id="btn-nova">+</button>
</div>

<div class="list" id="lista-movimentacoes"></div>

<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h2 style="margin:0">Lançar Compra</h2>
      <button id="sheet-close" style="background:none; border:none; font-size:24px;">&times;</button>
    </div>
    <div class="sheet-field">
      <div class="sheet-label">Data</div>
      <input class="sheet-input" id="mov-data" type="date"/>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="sheet-field">
            <div class="sheet-label">Conta</div>
            <select id="mov-conta" class="sheet-select">
                <option value="proprio">Santander</option>
                <option value="externa">Externa</option>
                <option value="nenhum">Dinheiro</option>
            </select>
        </div>
        <div class="sheet-field">
            <div class="sheet-label">Valor</div>
            <input class="sheet-input" id="mov-valor" type="text" inputmode="decimal" placeholder="R$ 0,00"/>
        </div>
    </div>
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="sheet-btn" id="btn-cancelar-sheet">Cancelar</button>
      <button class="sheet-btn primary" id="btn-gravar-sheet">Gravar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', async function(){
  // Captura parâmetros da URL
  const params = new URLSearchParams(window.location.search);
  let fornecedorIdParam = params.get('fornecedor_id');
  let fornecedorNomeParam = params.get('fornecedor_nome');

  const label = document.getElementById('fornecedor-nome');
  const input = document.getElementById('fornecedor-input');
  const lista = document.getElementById('fornecedor-lista');
  const totalEl = document.getElementById('total-geral');
  const listaMovs = document.getElementById('lista-movimentacoes');
  const sheet = document.getElementById('sheet-overlay');
  const movValor = document.getElementById('mov-valor');
  const toast = document.getElementById('toast');

  let fornecedores = [];
  let fornecedorSelecionado = fornecedorIdParam || null;
  let fornecedorSelecionadoNome = fornecedorNomeParam || "";

  // Helpers
  function mostrarToast(m){ toast.textContent=m; toast.style.display='block'; setTimeout(()=>toast.style.display='none',2000); }
  function formatarMoeda(v){ return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }

  // Mascara Valor
  movValor.addEventListener('input', function(e){
    let v = e.target.value.replace(/\D/g,'');
    v = (Number(v)/100).toFixed(2).replace('.',',');
    v = v.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
    e.target.value = v ? 'R$ ' + v : '';
  });

  // Carregamento de Fornecedores (para busca manual)
  async function carregarFornecedores() {
    const { data } = await window.db.from('fornecedores').select('id, nome').order('nome');
    fornecedores = data || [];
  }

  function renderSugestoes(termo) {
    const filtrados = fornecedores.filter(f => f.nome.toLowerCase().includes(termo.toLowerCase())).slice(0,6);
    if(!filtrados.length) { lista.style.display='none'; return; }
    lista.innerHTML = filtrados.map(f => `<div class="fornecedor-item" data-id="${f.id}" data-nome="${f.nome}">${f.nome}</div>`).join('');
    lista.style.display = 'block';

    lista.querySelectorAll('.fornecedor-item').forEach(item => {
      item.onclick = function() {
        selecionarFornecedor(this.dataset.id, this.dataset.nome);
      };
    });
  }

  function selecionarFornecedor(id, nome) {
    fornecedorSelecionado = id;
    fornecedorSelecionadoNome = nome;
    label.textContent = nome;
    input.style.display = 'none';
    lista.style.display = 'none';
    carregarMovimentacoes();
  }

  // --- LÓGICA DE INICIALIZAÇÃO ---
  if (fornecedorSelecionado && fornecedorSelecionadoNome) {
    // Se veio de compras.html, já assume o fornecedor
    selecionarFornecedor(fornecedorSelecionado, fornecedorSelecionadoNome);
  } else {
    // Se veio do dashboard, pede seleção
    input.style.display = 'block';
  }

  input.addEventListener('input', (e) => renderSugestoes(e.target.value));
  label.onclick = () => { input.style.display = 'block'; input.focus(); };

  async function carregarMovimentacoes() {
    if(!fornecedorSelecionado) return;
    listaMovs.innerHTML = "Carregando...";
    const { data, error } = await window.db.from('movimentos_fornecedores').select('*').eq('fornecedor_id', fornecedorSelecionado).order('data', {ascending: false});
    
    let total = 0;
    listaMovs.innerHTML = data.map(m => {
      total += m.valor;
      return `
        <div class="item">
          <div class="item-row">
            <div>
              <div class="date">${new Date(m.data).toLocaleDateString('pt-BR')}</div>
              <div class="value">${formatarMoeda(m.valor)}</div>
              <div class="meta">${m.destino}</div>
            </div>
            <button class="btn" onclick="excluirMov('${m.id}')">🗑️</button>
          </div>
        </div>`;
    }).join('');
    totalEl.textContent = formatarMoeda(total);
  }

  window.excluirMov = async (id) => {
    if(!confirm("Excluir?")) return;
    await window.db.from('movimentos_fornecedores').delete().eq('id', id);
    carregarMovimentacoes();
  };

  document.getElementById('btn-gravar-sheet').onclick = async () => {
    const val = Number(movValor.value.replace(/[^\d,]/g,'').replace(',','.'));
    const payload = {
      fornecedor_id: fornecedorSelecionado,
      data: document.getElementById('mov-data').value,
      valor: val,
      destino: document.getElementById('mov-conta').value
    };
    await window.db.from('movimentos_fornecedores').insert([payload]);
    sheet.classList.remove('open');
    carregarMovimentacoes();
    mostrarToast("Gravado!");
  };

  document.getElementById('btn-nova').onclick = () => sheet.classList.add('open');
  document.getElementById('sheet-close').onclick = () => sheet.classList.remove('open');
  document.getElementById('btn-voltar').onclick = () => window.history.back();

  await carregarFornecedores();
});
</script>
</body>
</html>
