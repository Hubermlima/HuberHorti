<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Entrega</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;}

/* PIN SCREEN */
.pin-screen{position:fixed;inset:0;background:#F2F4F8;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
.pin-screen.hidden{display:none}
.pin-brand{font-size:28px;font-weight:800;color:#1C1C1E;margin-bottom:6px;}
.pin-brand span{color:#007AFF}
.pin-sub{font-size:13px;color:#374151;font-weight:500;margin-bottom:40px;}
.pin-dots{display:flex;gap:16px;margin-bottom:32px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:#E5E5EA;transition:background 0.15s;}
.pin-dot.filled{background:#007AFF}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px;}
.pin-btn{height:64px;border-radius:16px;border:none;background:#FFF;font-size:22px;font-weight:700;color:#1C1C1E;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.06);font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
.pin-btn:active{background:#F2F2F7;transform:scale(0.96);}
.pin-btn.del{font-size:18px;color:#374151;}
.pin-btn.empty{background:transparent;box-shadow:none;pointer-events:none;}
.pin-error{font-size:13px;color:#EF4444;font-weight:600;margin-top:16px;min-height:20px;}

/* TOPBAR */
.topbar{height:56px;padding:0 16px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:13px;font-weight:800;color:#1C1C1E;letter-spacing:-0.2px;}
.topbar-sub{font-size:10px;color:#374151;font-weight:500;margin-top:1px;}
.topbar-center{display:flex;flex-direction:column;align-items:center;flex:1;}
.ios-btn-float{width:36px;height:36px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;flex-shrink:0;}

/* FILTRO CIDADE */
.filtro-wrap{padding:0 16px 10px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.filtro-wrap::-webkit-scrollbar{display:none}
.filtro-chip{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid #E5E5EA;background:#FFF;color:#374151;font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
.filtro-chip.active{background:#007AFF;color:#FFF;border-color:#007AFF}

/* LISTA */
.lista-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px calc(24px + env(safe-area-inset-bottom));}
.section-card{background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;margin-bottom:12px;}
.pedido-item{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;transition:background 0.15s;}
.pedido-item:not(:last-child){border-bottom:0.5px solid #F2F2F7}
.pedido-item:active{background:#F5F5F7}
.pedido-avatar{width:40px;height:40px;border-radius:12px;background:#EBF4FF;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#007AFF;flex-shrink:0;}
.pedido-info{flex:1;min-width:0;}
.pedido-cliente{font-size:14px;font-weight:700;color:#1C1C1E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pedido-cidade{font-size:11px;color:#374151;font-weight:500;margin-top:2px;}
.pedido-right{text-align:right;flex-shrink:0;}
.pedido-itens{font-size:12px;font-weight:600;color:#374151;}
.pedido-status{font-size:10px;font-weight:700;margin-top:3px;}
.status-conf{color:#10B981}
.status-pend{color:#F59E0B}
.chevron{width:16px;height:16px;stroke:#C7C7CC;stroke-width:2.5;fill:none;margin-left:6px;flex-shrink:0;}

.empty-state{text-align:center;padding:60px 20px;font-size:13px;color:#374151;font-weight:500;}
.empty-icon{font-size:40px;margin-bottom:12px}

/* NAVEGAÇÃO */
.nav-footer{flex-shrink:0;height:60px;padding:0 16px calc(8px + env(safe-area-inset-bottom));background:#FFF;border-top:1px solid #F2F2F7;display:flex;align-items:center;justify-content:space-between;display:none;}
.nav-footer.visible{display:flex}
.nav-info{font-size:13px;font-weight:600;color:#1C1C1E;text-align:center;flex:1;}
.nav-info span{font-size:11px;color:#374151;display:block;margin-top:1px;}

/* MODAL DETALHE */
.modal-overlay{display:none;position:fixed;inset:0;z-index:2000;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,0.2);}
.modal-overlay.active{display:flex}
.modal-sheet{
background:#FFF;
border-radius:24px;
width:100%;
max-width:400px;
max-height:calc(100vh - 100px);
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 24px 60px rgba(0,0,0,0.18);
animation:modalPop 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-sheet-header{padding:24px 20px 0;flex-shrink:0;}
.modal-sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px;}
.modal-sheet-footer{padding:12px 20px 20px;flex-shrink:0;background:#FFF;border-top:1px solid #F2F2F7;}
@keyframes modalPop{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
.modal-header{margin-bottom:12px;}
.modal-cliente{font-size:17px;font-weight:800;color:#1C1C1E;}
.modal-data{font-size:12px;color:#374151;font-weight:600;margin-top:3px;}
.modal-divider{height:1px;background:#F2F2F7;margin:12px 0;}

/* LISTA ITENS */
.lista-header{display:grid;grid-template-columns:1fr 76px 64px;gap:6px;padding:4px 2px 8px;}
.lista-header span{font-size:10px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:0.5px;}
.lista-item-row{display:grid;grid-template-columns:1fr 76px 64px;gap:6px;align-items:center;padding:8px 0;border-bottom:0.5px solid #F2F2F7;}
.lista-item-row:last-child{border-bottom:none;}
.lista-nome{font-size:13px;font-weight:700;color:#1C1C1E;line-height:1.3;}
.lista-input{padding:8px 8px;border:1.5px solid #E5E5EA;border-radius:10px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;color:#1C1C1E;background:#FFF;outline:none;box-sizing:border-box;width:100%;text-align:center;}
.lista-input:focus{border-color:#007AFF}
.lista-input.conf{border-color:#10B981;background:#F0FDF4;}

.modal-actions{display:flex;gap:10px;}
.btn-cancelar{flex:1;padding:13px;background:#F2F2F7;color:#1C1C1E;border:none;border-radius:100px;font-size:14px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;}
.btn-salvar{flex:1;padding:13px;background:#007AFF;color:#FFF;border:none;border-radius:100px;font-size:14px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;}
.btn-salvar:disabled{opacity:0.4;pointer-events:none}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div class="pin-screen" id="pin-screen">
    <div class="pin-brand">Huber<span>Horti</span></div>
    <div class="pin-sub">Digite o PIN de acesso</div>
    <div class="pin-dots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
        <button class="pin-btn" onclick="pinDigit('1')">1</button>
        <button class="pin-btn" onclick="pinDigit('2')">2</button>
        <button class="pin-btn" onclick="pinDigit('3')">3</button>
        <button class="pin-btn" onclick="pinDigit('4')">4</button>
        <button class="pin-btn" onclick="pinDigit('5')">5</button>
        <button class="pin-btn" onclick="pinDigit('6')">6</button>
        <button class="pin-btn" onclick="pinDigit('7')">7</button>
        <button class="pin-btn" onclick="pinDigit('8')">8</button>
        <button class="pin-btn" onclick="pinDigit('9')">9</button>
        <button class="pin-btn empty"></button>
        <button class="pin-btn" onclick="pinDigit('0')">0</button>
        <button class="pin-btn del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
</div>

<!-- APP -->
<div class="topbar">
    <div style="width:36px"></div>
    <div class="topbar-center">
        <div class="topbar-title">Pedidos de Entrega</div>
        <div class="topbar-sub" id="topbar-sub">Ciclo atual</div>
    </div>
    <button class="ios-btn-float" onclick="sair()">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#8E8E93;stroke-width:2.2;fill:none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
</div>

<div class="filtro-wrap" id="filtro-wrap">
    <button class="filtro-chip active" onclick="filtrar(null,this)">Todas</button>
</div>

<div class="lista-wrap" id="lista-wrap">
    <div class="empty-state" id="empty-state">
        <div class="empty-icon">📦</div>
        Carregando pedidos...
    </div>
    <div class="section-card" id="section-card" style="display:none"></div>
</div>

<div class="nav-footer" id="nav-footer">
    <button class="ios-btn-float" onclick="navegar(-1)">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
    </button>
    <div class="nav-info" id="nav-info">— <span>—</span></div>
    <button class="ios-btn-float" onclick="navegar(1)">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
    </button>
</div>

<!-- Modal detalhe pedido -->
<div class="modal-overlay" id="modal-detalhe" onclick="if(event.target===this)fecharModal()">
    <div class="modal-sheet">
        <div class="modal-sheet-header">
            <div class="modal-header">
                <div class="modal-cliente" id="modal-cliente">—</div>
                <div class="modal-data" id="modal-data">—</div>
            </div>
            <div class="modal-divider"></div>
        </div>
        <div class="modal-sheet-body">
            <div id="modal-itens"></div>
        </div>
        <div class="modal-sheet-footer">
            <div class="modal-actions">
                <button class="btn-cancelar" onclick="fecharModal()">Fechar</button>
                <button class="btn-salvar" id="btn-salvar" onclick="salvarConferencia()">Confirmar</button>
            </div>
        </div>
    </div>
</div>

<script>
const PIN_CORRETO = '1234';
let _pinAtual = '';
let _pedidos = [];
let _filtrados = [];
let _filtroCidade = null;
let _pedidoAtualIdx = 0;
let _pedidoAberto = null;
let _conferencias = {};

// ── PIN ───────────────────────────────────────────────────────────
function pinDigit(d) {
    if (_pinAtual.length >= 4) return;
    _pinAtual += d;
    atualizarDots();
    if (_pinAtual.length === 4) {
        setTimeout(() => verificarPin(), 150);
    }
}
function pinDel() {
    _pinAtual = _pinAtual.slice(0,-1);
    atualizarDots();
    document.getElementById('pin-error').textContent = '';
}
function atualizarDots() {
    for (let i=0;i<4;i++) {
        document.getElementById('d'+i).classList.toggle('filled', i < _pinAtual.length);
    }
}
function verificarPin() {
    if (_pinAtual === PIN_CORRETO) {
        document.getElementById('pin-screen').classList.add('hidden');
        init();
    } else {
        document.getElementById('pin-error').textContent = 'PIN incorreto. Tente novamente.';
        _pinAtual = '';
        atualizarDots();
    }
}
function sair() {
    _pinAtual = '';
    atualizarDots();
    document.getElementById('pin-error').textContent = '';
    document.getElementById('pin-screen').classList.remove('hidden');
}

// ── APP ───────────────────────────────────────────────────────────
async function init() {
    await window.HHUtils.atualizarCicloAtualGlobal();
    const ciclo = window.cicloAtual;
    const d0 = ciclo.d0.toISOString();
    const d7 = ciclo.d7.toISOString();

    const { data } = await window.db
        .from('pedidos_vendas')
        .select('id, data, clientes(id, nome, cidade)')
        .gte('data', d0).lte('data', d7)
        .order('data', {ascending: true});

    _pedidos = data || [];

    // Carrega conferências existentes
    const ids = _pedidos.map(p => p.id);
    if (ids.length) {
        const { data: conf } = await window.db
            .from('conferencia_entrega')
            .select('*')
            .in('pedido_venda_id', ids);
        (conf||[]).forEach(c => {
            if (!_conferencias[c.pedido_venda_id]) _conferencias[c.pedido_venda_id] = {};
            _conferencias[c.pedido_venda_id][c.item_id] = c;
        });
    }

    // Filtros de cidade
    const cidades = [...new Set(_pedidos.map(p => p.clientes?.cidade).filter(Boolean).sort())];
    const wrap = document.getElementById('filtro-wrap');
    wrap.innerHTML = `<button class="filtro-chip active" onclick="filtrar(null,this)">Todas</button>` +
        cidades.map(c => `<button class="filtro-chip" onclick="filtrar('${c}',this)">${c}</button>`).join('');

    document.getElementById('topbar-sub').textContent = `${_pedidos.length} pedidos · ciclo atual`;
    filtrar(null, wrap.querySelector('.filtro-chip'));
}

function filtrar(cidade, el) {
    document.querySelectorAll('.filtro-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    _filtroCidade = cidade;
    _filtrados = cidade ? _pedidos.filter(p => p.clientes?.cidade === cidade) : [..._pedidos];
    _pedidoAtualIdx = 0;
    renderizar();
    atualizarNav();
}

function renderizar() {
    const card = document.getElementById('section-card');
    const empty = document.getElementById('empty-state');

    if (_filtrados.length === 0) {
        card.style.display = 'none';
        empty.style.display = 'block';
        empty.innerHTML = '<div class="empty-icon">📦</div>Nenhum pedido encontrado';
        return;
    }

    empty.style.display = 'none';
    card.style.display = 'block';
    card.innerHTML = _filtrados.map((p, i) => {
        const conf = _conferencias[p.id];
        const confCount = conf ? Object.keys(conf).length : 0;
        const ini = (p.clientes?.nome||'?').substring(0,2).toUpperCase();
        const dataFmt = p.data ? p.data.substring(0,10).split('-').reverse().slice(0,2).join('/') : '—';
        return `
        <div class="pedido-item" onclick="abrirPedido(${i})">
            <div class="pedido-avatar">${ini}</div>
            <div class="pedido-info">
                <div class="pedido-cliente">${p.clientes?.nome || '—'}</div>
                <div class="pedido-cidade">${p.clientes?.cidade || '—'} · ${dataFmt}</div>
            </div>
            <div class="pedido-right">
                <div class="pedido-itens">${confCount > 0 ? confCount + ' conf.' : 'Pendente'}</div>
                <div class="pedido-status ${confCount > 0 ? 'status-conf' : 'status-pend'}">${confCount > 0 ? '✓ Conferido' : '⏳ Aguardando'}</div>
            </div>
            <svg class="chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </div>`;
    }).join('');
}

function atualizarNav() {
    const footer = document.getElementById('nav-footer');
    const info = document.getElementById('nav-info');
    if (_filtrados.length > 1) {
        footer.classList.add('visible');
        const p = _filtrados[_pedidoAtualIdx];
        info.innerHTML = `${p?.clientes?.nome || '—'} <span>${_pedidoAtualIdx+1} de ${_filtrados.length}</span>`;
    } else {
        footer.classList.remove('visible');
    }
}

function navegar(dir) {
    const novo = _pedidoAtualIdx + dir;
    if (novo < 0 || novo >= _filtrados.length) return;
    _pedidoAtualIdx = novo;
    atualizarNav();
    abrirPedido(_pedidoAtualIdx);
}

async function abrirPedido(idx) {
    _pedidoAtualIdx = idx;
    atualizarNav();
    const p = _filtrados[idx];
    _pedidoAberto = p;

    // Busca itens e produtos separadamente
    const { data: itens } = await window.db
        .from('itens_pedidos_vendas')
        .select('id, quantidade, produto_id')
        .eq('pedido_venda_id', p.id);

    const produtoIds = (itens||[]).map(i => i.produto_id).filter(Boolean);
    const { data: prods } = produtoIds.length
? await window.db.from('produtos').select('*').in('id', produtoIds)
: { data: [] };
    const mapaProdutos = {};
    (prods||[]).forEach(pr => { mapaProdutos[pr.id] = pr; });
    const itensComProdutos = (itens||[]).map(i => ({ ...i, produtos: mapaProdutos[i.produto_id] || null }));

    const dataFmt = p.data ? p.data.substring(0,10).split('-').reverse().join('/') : '—';
    document.getElementById('modal-cliente').textContent = p.clientes?.nome || '—';
    document.getElementById('modal-data').textContent = dataFmt + ' · ' + (p.clientes?.cidade || '');

    const conf = _conferencias[p.id] || {};
    document.getElementById('modal-itens').innerHTML = itensComProdutos.length === 0
        ? '<p style="text-align:center;color:#374151;padding:20px;font-size:13px;">Nenhum item encontrado</p>'
        : `<div class="lista-header">
               <span>Produto</span>
               <span>Qtd</span>
               <span>Unid</span>
           </div>` +
          itensComProdutos.map(it => {
            const c = conf[it.id];
            const qtdConf = c ? parseFloat(c.quantidade_conferida).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : parseFloat(it.quantidade||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
            const unidConf = c ? c.unidade_conferida : (it.produtos?.unid_venda || '');
            const confCls = c ? 'conf' : '';
            return `
            <div class="lista-item-row" data-item-id="${it.id}" data-produto-id="${it.produto_id}">
                <div class="lista-nome">${it.produtos?.nome || '—'}</div>
                <input class="lista-input ${confCls} qtd-conf" type="tel" inputmode="decimal" value="${qtdConf}" placeholder="0,00">
                <input class="lista-input ${confCls} unid-conf" type="text" value="${unidConf}" placeholder="un">
            </div>`;
          }).join('');

    document.getElementById('modal-detalhe').classList.add('active');
}

function fecharModal() {
    document.getElementById('modal-detalhe').classList.remove('active');
}

async function salvarConferencia() {
    const btn = document.getElementById('btn-salvar');
    btn.disabled = true;
    const p = _pedidoAberto;
    const rows = document.querySelectorAll('#modal-itens .lista-item-row');

    const inserts = [];
    const updates = [];

    rows.forEach(row => {
        const itemId = row.dataset.itemId;
        const produtoId = row.dataset.produtoId;
        const qtd = parseFloat(row.querySelector('.qtd-conf').value.replace(/\./g,'').replace(',','.')) || 0;
        const unid = row.querySelector('.unid-conf').value.trim();
        if (!qtd && !unid) return;

        const conf = (_conferencias[p.id]||{})[itemId];
        if (conf) {
            updates.push({ id: conf.id, quantidade_conferida: qtd, unidade_conferida: unid });
        } else {
            inserts.push({ pedido_venda_id: p.id, item_id: itemId, produto_id: produtoId, quantidade_conferida: qtd, unidade_conferida: unid });
        }
    });

    if (inserts.length) {
        const { data } = await window.db.from('conferencia_entrega').insert(inserts).select();
        if (data) {
            if (!_conferencias[p.id]) _conferencias[p.id] = {};
            data.forEach(c => { _conferencias[p.id][c.item_id] = c; });
        }
    }
    for (const u of updates) {
        await window.db.from('conferencia_entrega').update({ quantidade_conferida: u.quantidade_conferida, unidade_conferida: u.unidade_conferida }).eq('id', u.id);
    }

    btn.disabled = false;
    fecharModal();
    renderizar();
}

function sair() {
    _pinAtual = '';
    atualizarDots();
    document.getElementById('pin-error').textContent = '';
    document.getElementById('pin-screen').classList.remove('hidden');
}

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();
</script>
</body>
</html>
