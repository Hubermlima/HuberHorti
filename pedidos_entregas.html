<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Entrega</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;overflow:hidden;}
.pin-screen{position:fixed;inset:0;background:#F2F4F8;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
.pin-screen.hidden{display:none}
.pin-brand{font-size:28px;font-weight:800;color:#1C1C1E;margin-bottom:6px;}
.pin-brand span{color:#007AFF}
.pin-sub{font-size:13px;color:#475569;font-weight:500;margin-bottom:40px;}
.pin-dots{display:flex;gap:16px;margin-bottom:32px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:#E5E5EA;transition:background 0.15s;}
.pin-dot.filled{background:#007AFF}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px;}
.pin-btn{height:64px;border-radius:16px;border:none;background:#FFF;font-size:22px;font-weight:700;color:#1C1C1E;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.06);font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
.pin-btn:active{background:#F2F2F7;transform:scale(0.96);}
.pin-btn.del{font-size:18px;color:#475569;}
.pin-btn.empty{background:transparent;box-shadow:none;pointer-events:none;}
.pin-error{font-size:13px;color:#EF4444;font-weight:600;margin-top:16px;min-height:20px;}
.topbar{height:56px;padding:0 16px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-center{display:flex;flex-direction:column;align-items:center;flex:1;}
.topbar-title{font-size:13px;font-weight:800;color:#1C1C1E;}
.topbar-sub{font-size:13px;color:#475569;font-weight:600;margin-top:1px;}
@keyframes piscaVermelho{0%,100%{opacity:1}50%{opacity:0.3}}
.topbar-sub.alerta{color:#EF4444;animation:piscaVermelho 1s ease-in-out infinite;}
.topbar-sub.alerta-fixo{color:#EF4444;}

.ios-btn{width:36px;height:36px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;flex-shrink:0;}
.filtro-wrap{padding:0 16px 10px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.filtro-wrap::-webkit-scrollbar{display:none}
.filtro-chip{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid #E5E5EA;background:#FFF;color:#475569;font-family:'Plus Jakarta Sans',sans-serif;}
.filtro-chip.active{background:#007AFF;color:#FFF;border-color:#007AFF}
.lista-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px calc(80px + env(safe-area-inset-bottom));}
.section-card{background:#FFF;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;margin-bottom:10px;}
.pedido-item{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;}


.pedido-item:not(:last-child){border-bottom:0.5px solid #F2F2F7}
.pedido-item:active{background:#F5F5F7}
.avatar{width:40px;height:40px;border-radius:12px;background:#EBF4FF;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#007AFF;flex-shrink:0;}
.pedido-info{flex:1;min-width:0;}
.pedido-nome{font-size:14px;font-weight:700;color:#1C1C1E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pedido-sub{font-size:11px;color:#475569;font-weight:600;margin-top:2px;}
.pedido-status{font-size:13px;font-weight:700;flex-shrink:0;}
.status-ok{color:#10B981}
.status-pend{color:#F59E0B}
.nav-footer{position:fixed;bottom:0;left:0;right:0;height:60px;padding:0 16px;padding-bottom:env(safe-area-inset-bottom);background:#FFF;border-top:1px solid #F2F2F7;display:none;align-items:center;justify-content:space-between;}
.nav-footer.visible{display:flex}
.nav-info{font-size:13px;font-weight:700;color:#1C1C1E;text-align:center;flex:1;}
.nav-info span{font-size:11px;color:#475569;font-weight:500;display:block;}
.modal-overlay{display:none;position:fixed;inset:0;z-index:2000;background:transparent;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.active{display:flex}
@keyframes pop{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
.modal-card{background:#FFF;border-radius:24px;width:100%;max-width:420px;max-height:75vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,0.2);animation:pop 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.modal-top{padding:22px 20px 0;flex-shrink:0;}
.modal-nome{font-size:18px;font-weight:800;color:#111827;}
.modal-sub{font-size:13px;color:#374151;font-weight:600;margin-top:3px;}
.modal-sep{display:none;}


.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px;}
.lista-head{display:grid;grid-template-columns:1fr 32px 90px 80px;gap:8px;padding:12px 0 8px;border-bottom:1px solid #E5E7EB;}

.lista-head span{font-size:11px;font-weight:800;color:#111827;text-transform:uppercase;letter-spacing:0.5px;}
.lista-row{display:grid;grid-template-columns:1fr 32px 90px 80px;gap:8px;align-items:center;padding:12px 0;border-bottom:0.5px solid #E5E7EB;border-radius:10px;transition:background 0.2s;}


.lista-row:last-child{border-bottom:none;}
.prod-nome{font-size:15px;font-weight:700;color:#111827;line-height:1.3;}
.prod-nome.marcado{color:#065F46;}
.prod-nome.alterado{color:#EF4444;}
.check-btn{width:24px;height:24px;border-radius:50%;border:2px solid #D1D5DB;background:#FFF;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.check-btn.marcado{border-color:#065F46;}
.check-btn.marcado svg{display:block;}
.check-btn svg{display:none;width:12px;height:12px;stroke:#065F46;stroke-width:3;fill:none;}
.campo{padding:10px 8px;border:1.5px solid #D1D5DB;border-radius:10px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;color:#111827;font-weight:600;background:#FFF;outline:none;width:100%;text-align:center;}
.campo:focus{border-color:#007AFF}
.campo.ok{border-color:#10B981;background:#F0FDF4;}
.modal-bot{padding:14px 20px 18px;flex-shrink:0;border-top:1px solid #E5E7EB;display:flex;gap:10px;}
.modal-sub-row{margin-top:3px;}
.modal-contador{font-size:12px;font-weight:600;color:#475569;margin-top:4px;}
.modal-contador.completo{color:#10B981;}
.modal-progress{height:4px;background:#E5E7EB;border-radius:100px;margin-top:6px;overflow:hidden;}
.modal-progress-bar{height:100%;background:#4A90D9;border-radius:100px;transition:width 0.3s ease;}
.modal-progress-bar.completo{background:#10B981;}


.modal-card.completo{box-shadow:0 0 0 3px #10B981, 0 24px 60px rgba(0,0,0,0.2);}

.btn-fechar{flex:1;padding:13px;background:#F2F2F7;color:#1C1C1E;border:none;border-radius:100px;font-size:14px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background 0.2s,color 0.2s;}
.btn-fechar.completo{background:#10B981;color:#FFF;}

.btn-confirmar:disabled{opacity:0.4;pointer-events:none}
.seg-wrap{padding:0 16px 10px;flex-shrink:0;}
.seg-track{position:relative;display:flex;background:#E5E5EA;border-radius:100px;padding:3px;height:36px;}
.seg-thumb{position:absolute;top:3px;left:3px;width:calc(50% - 3px);height:calc(100% - 6px);background:#FFF;border-radius:100px;box-shadow:0 1px 4px rgba(0,0,0,0.12);transition:transform 0.25s cubic-bezier(0.34,1.2,0.64,1);pointer-events:none;}
.seg-track.confirmados .seg-thumb{transform:translateX(100%)}
.seg-opt{flex:1;z-index:1;background:transparent;border:none;font-size:12px;font-weight:700;color:#8E8E93;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:color 0.2s;border-radius:100px;}
.seg-opt.active{color:#1C1C1E}
/* ── Toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1C1C1E;color:#FFF;font-size:13px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;padding:10px 20px;border-radius:100px;box-shadow:0 4px 16px rgba(0,0,0,0.2);opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;white-space:nowrap;z-index:9999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.btn-notif{width:36px;height:36px;border-radius:50%;border:none;background:#FFF3CD;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;flex-shrink:0;}

</style>
</head>
<body>

<div class="pin-screen" id="pin-screen">
    <div class="pin-brand">Huber<span>Horti</span></div>
    <div class="pin-sub">Digite o PIN de acesso</div>
    <div class="pin-dots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
        <button class="pin-btn" onclick="pinDigit('1')">1</button>
        <button class="pin-btn" onclick="pinDigit('2')">2</button>
        <button class="pin-btn" onclick="pinDigit('3')">3</button>
        <button class="pin-btn" onclick="pinDigit('4')">4</button>
        <button class="pin-btn" onclick="pinDigit('5')">5</button>
        <button class="pin-btn" onclick="pinDigit('6')">6</button>
        <button class="pin-btn" onclick="pinDigit('7')">7</button>
        <button class="pin-btn" onclick="pinDigit('8')">8</button>
        <button class="pin-btn" onclick="pinDigit('9')">9</button>
        <button class="pin-btn empty"></button>
        <button class="pin-btn" onclick="pinDigit('0')">0</button>
        <button class="pin-btn del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
</div>

<div class="topbar">
    <button class="ios-btn" id="btn-voltar" style="display:none">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
    </button>
    <div style="width:36px" id="spacer-left"></div>
    <div class="topbar-center">
        <div class="topbar-title">Pedidos de Entrega</div>
        <div class="topbar-sub" id="topbar-sub">—</div>
    </div>
        
    <button class="btn-notif" id="btn-notif" onclick="Notification.requestPermission().then(p=>{ if(p==='granted') registrarPush(); })" style="display:none" title="Ativar notificações">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#F59E0B;stroke-width:2.2;fill:none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
    </button>
</div>


<div class="seg-wrap">
    <div class="seg-track" id="seg-track">
        <div class="seg-thumb"></div>
        <button class="seg-opt active" onclick="setEstado('pendentes',this)">Pendentes</button>
        <button class="seg-opt" onclick="setEstado('confirmados',this)">Processados</button>

    </div>
</div>

<div class="filtro-wrap" id="filtro-wrap">
    <button class="filtro-chip active" onclick="filtrar(null,this)">Todas</button>
</div>

<div class="lista-wrap">
    <div style="text-align:center;padding:60px 20px;font-size:13px;color:#475569;" id="empty">Carregando...</div>
    <div id="lista-card"></div>
</div>

<div class="nav-footer" id="nav-footer">
    <button class="ios-btn" onclick="navegar(-1)">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
    </button>
    <div class="nav-info" id="nav-info">— <span>—</span></div>
    <button class="ios-btn" onclick="navegar(1)">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
    </button>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)fecharModal()">
    <div class="modal-card">
        <div class="modal-top">
                        <div class="modal-nome" id="modal-nome">—</div>
                        <div class="modal-sub-row">
                <div class="modal-sub" id="modal-sub">—</div>
                                <div class="modal-contador" id="modal-contador">Itens Processados: 0/0</div>
                <div class="modal-progress"><div class="modal-progress-bar" id="modal-progress-bar" style="width:0%"></div></div>

            </div>

            <div class="modal-sep"></div>

        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-bot">
                        <button class="btn-fechar" id="btn-fechar" onclick="fecharOuSalvar()">Fechar</button>

        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Estado global ────────────────────────────────────────────────────────────
const PIN = '1234';
const _params = new URLSearchParams(window.location.search);
const _isAdmin = _params.get('admin') === 'true';
let _estado = 'pendentes';
let _todosProdutos = [];
let _pin = '';
let _pedidos = [], _filtrados = [], _pedidosConfirmados = new Set();
let _idx = 0, _pedidoAberto = null;

// Snapshot dos itens do pedido aberto para detectar mudanças
let _itensSnapshot = null;
let _checkboxesMarcados = new Set();
let _itensAlterados = new Set(); // produto_id alterados pelo admin


// ─── Toast ────────────────────────────────────────────────────────────────────
function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── PIN ──────────────────────────────────────────────────────────────────────
function pinDigit(d) {
    if (_pin.length >= 4) return;
    _pin += d; _renderDots();
    if (_pin.length === 4) setTimeout(_checkPin, 150);
}
function pinDel() {
    _pin = _pin.slice(0, -1);
    _renderDots();
    document.getElementById('pin-error').textContent = '';
}
function _renderDots() {
    for (let i = 0; i < 4; i++)
        document.getElementById('d' + i).classList.toggle('filled', i < _pin.length);
}
function _checkPin() {
    if (_pin === PIN) {
        document.getElementById('pin-screen').classList.add('hidden');
        carregarApp();
        iniciarPolling();
        if ('Notification' in window) {
            const temSubscription = !!localStorage.getItem('hh_subscription_salva');
            if (Notification.permission !== 'granted' || !temSubscription) {
                document.getElementById('btn-notif').style.display = 'flex';
            }
        }
    } else {

        document.getElementById('pin-error').textContent = 'PIN incorreto';
        _pin = ''; _renderDots();
    }
}

// ─── Dados ────────────────────────────────────────────────────────────────────
async function carregarProdutos() {
    const { data } = await window.db.from('produtos').select('id, nome, unid_venda').order('nome');
    if (data) _todosProdutos = data;
}

async function carregarApp() {
    await carregarProdutos();
    await window.HHUtils.atualizarCicloAtualGlobal();

    const ciclo = window.cicloAtual;
    if (!ciclo || !ciclo.d0 || !ciclo.d7) {
        document.getElementById('empty').style.display = 'block';
        document.getElementById('empty').textContent = 'Erro: ciclo atual não configurado.';
        return;
    }

    const { data } = await window.db.from('pedidos_vendas')
        .select('id, data, clientes(id, nome, cidade)')
        .gte('data', ciclo.d0.toISOString()).lte('data', ciclo.d7.toISOString())
        .order('data', { ascending: false });
    _pedidos = data || [];

    if (_pedidos.length) {
        const ids = _pedidos.map(p => p.id);
        const { data: itensConf } = await window.db.from('itens_pedidos_vendas')
            .select('pedido_venda_id, operador_confirmou')
            .in('pedido_venda_id', ids);

        // Agrupa itens por pedido
        const itensPorPedido = {};
        (itensConf || []).forEach(it => {
            if (!itensPorPedido[it.pedido_venda_id]) itensPorPedido[it.pedido_venda_id] = [];
            itensPorPedido[it.pedido_venda_id].push(it);
        });

        // Um pedido é confirmado se todos os seus itens têm operador_confirmou = true
        _pedidosConfirmados = new Set();
        _pedidos.forEach(p => {
            const itens = itensPorPedido[p.id] || [];
            if (itens.length > 0 && itens.every(it => it.operador_confirmou === true)) {
                _pedidosConfirmados.add(p.id);
            }
        });
    }

    const cidades = [...new Set(_pedidos.map(p => p.clientes?.cidade).filter(Boolean).sort())];
    const wrap = document.getElementById('filtro-wrap');
    wrap.innerHTML = `<button class="filtro-chip active" onclick="filtrar(null,this)">Todas</button>` +
        cidades.map(c => `<button class="filtro-chip" onclick="filtrar('${c}',this)">${c}</button>`).join('');
        filtrar(null, wrap.querySelector('.active'));

}

async function recarregar() {
    const btn = document.getElementById('btn-refresh');
    btn.style.opacity = '0.4';
    _pedidos = [];
    await carregarApp();
    if (_pedidoAberto && document.getElementById('modal').classList.contains('active')) {
        const idx = _filtrados.findIndex(p => p.id === _pedidoAberto.id);
        if (idx !== -1) await abrirPedido(idx);
    }
    btn.style.opacity = '1';
}

// ─── Status atualização ──────────────────────────────────────────────────────
let _pulsoTimer = null;
function mostrarStatusAtualizado() {
    const sub = document.getElementById('topbar-sub');
    const agora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Manaus' });
    sub.textContent = `Atualizado às ${agora}`;
    sub.classList.remove('alerta-fixo');
    sub.classList.add('alerta');
    if (_pulsoTimer) clearTimeout(_pulsoTimer);
    _pulsoTimer = setTimeout(() => {
        sub.classList.remove('alerta');
        sub.classList.add('alerta-fixo');
    }, 15000);
    }


async function refreshSilencioso() {
    if (!_pedidoAberto) return;
    const { data: itensNovos } = await window.db.from('itens_pedidos_vendas')
        .select('id, quantidade, produto_id, quant_despacho, unid_despacho, operador_confirmou')
        .eq('pedido_venda_id', _pedidoAberto.id);

    const snapAnterior = _itensSnapshot ? JSON.parse(_itensSnapshot) : [];
    const snapNovo = (itensNovos || []).map(i => ({ produto_id: i.produto_id, quantidade: i.quantidade, quant_despacho: i.quant_despacho, unid_despacho: i.unid_despacho })).sort((a,b) => a.produto_id.localeCompare(b.produto_id));

    // Detecta alterados
    const alterados = new Set();
    snapNovo.forEach(itemNovo => {
        const itemAnterior = snapAnterior.find(a => a.produto_id === itemNovo.produto_id);
        if (itemAnterior && (itemAnterior.quant_despacho !== itemNovo.quant_despacho || itemAnterior.unid_despacho !== itemNovo.unid_despacho)) {
            alterados.add(itemNovo.produto_id);
        }
    });

    // Detecta excluídos
    const produtosNovos = new Set(snapNovo.map(i => i.produto_id));
    snapAnterior.forEach(itemAnt => {
        if (!produtosNovos.has(itemAnt.produto_id)) {
            const row = document.querySelector(`#modal-body .lista-row[data-produto-id="${itemAnt.produto_id}"]`);
            if (row) row.remove();
        }
    });

    // Atualiza valores no DOM e marca alterados em vermelho
    (itensNovos || []).forEach(it => {
        let row = document.querySelector(`#modal-body .lista-row[data-item-id="${it.id}"]`);
        if (!row) {
            // Item novo — recarrega o modal completo
            abrirPedido(_filtrados.findIndex(p => p.id === _pedidoAberto.id));
            return;
        }
        const qtdInput = row.querySelector('.qtd-campo');
        const unidInput = row.querySelector('.unid-campo');
        const nomeEl = row.querySelector('.prod-nome');
        const checkBtn = row.querySelector('.check-btn');
        const prod = _todosProdutos.find(pr => pr.id === it.produto_id);
        const qtdVal = it.quant_despacho != null
            ? parseFloat(it.quant_despacho).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
            : parseFloat(it.quantidade || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const unidVal = it.unid_despacho || (prod ? prod.unid_venda || '' : '');
        if (qtdInput) qtdInput.value = qtdVal;
        if (unidInput) unidInput.value = unidVal;
        if (alterados.has(it.produto_id)) {
            if (nomeEl) { nomeEl.classList.remove('marcado'); nomeEl.classList.add('alterado'); }
            if (checkBtn) checkBtn.classList.remove('marcado');
        }
    });

    _itensSnapshot = JSON.stringify(snapNovo);
    await carregarApp();
    atualizarContador();
}


// ─── Polling (só operador) ────────────────────────────────────────────────────
function iniciarPolling() {
    if (_isAdmin) return;
        navigator.serviceWorker.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'PUSH_RECEBIDO') {
            mostrarStatusAtualizado();
            const modalAberto = document.getElementById('modal').classList.contains('active');
            if (modalAberto && _pedidoAberto) {
                refreshSilencioso();
            } else {
                carregarApp();
            }
        }

    });

}



// ─── Filtros e lista ──────────────────────────────────────────────────────────
function setEstado(estado, el) {
    _estado = estado;
    document.querySelectorAll('.seg-opt').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('seg-track').classList.toggle('confirmados', estado === 'confirmados');
    _idx = 0;
    const chipAtivo = document.querySelector('.filtro-chip.active');
    const cidadeAtiva = chipAtivo ? chipAtivo.textContent.trim() : null;
    const cidade = cidadeAtiva === 'Todas' ? null : cidadeAtiva;
    const base = cidade ? _pedidos.filter(p => p.clientes?.cidade === cidade) : [..._pedidos];
    _filtrados = base.filter(p => {
        const confirmado = _pedidosConfirmados.has(p.id);
        return _estado === 'confirmados' ? confirmado : !confirmado;
    });
    renderLista(); renderNav();
}

function filtrar(cidade, el) {
    document.querySelectorAll('.filtro-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const base = cidade ? _pedidos.filter(p => p.clientes?.cidade === cidade) : [..._pedidos];
    _filtrados = base.filter(p => {
        const confirmado = _pedidosConfirmados.has(p.id);
        return _estado === 'confirmados' ? confirmado : !confirmado;
    });
    _idx = 0; renderLista(); renderNav();
}

function renderLista() {
    const empty = document.getElementById('empty');
    const card = document.getElementById('lista-card');
    if (!_filtrados.length) {
        empty.style.display = 'block';
        empty.textContent = _estado === 'confirmados' ? 'Nenhum pedido confirmado' : 'Nenhum pedido pendente';
        card.innerHTML = ''; return;
    }
    empty.style.display = 'none';
    card.innerHTML = `<div class="section-card">` + _filtrados.map((p, i) => {
        const confirmado = _pedidosConfirmados.has(p.id);
        const ini = (p.clientes?.nome || '?').substring(0, 2).toUpperCase();
        const dt = p.data ? p.data.substring(0, 10).split('-').slice(1).reverse().join('/') : '—';
        const icone = confirmado
            ? `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#10B981;stroke-width:2.5;fill:none"><polyline points="20 6 9 17 4 12"/></svg>`
            : `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#F59E0B;stroke-width:2;fill:none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
                return `<div class="pedido-item" onclick="abrirPedido(${i})">


            <div class="avatar">${ini}</div>
            <div class="pedido-info">
                <div class="pedido-nome">${p.clientes?.nome || '—'}</div>
                <div class="pedido-sub">${p.clientes?.cidade || '—'} · ${dt}</div>
            </div>
            <div class="pedido-status">${icone}</div>
        </div>`;
    }).join('') + `</div>`;
}

function renderNav() {
    const f = document.getElementById('nav-footer');
    if (_filtrados.length > 1) {
        f.classList.add('visible');
        const p = _filtrados[_idx];
        document.getElementById('nav-info').innerHTML = `${p?.clientes?.nome || '—'} <span>${_idx + 1} de ${_filtrados.length}</span>`;
    } else { f.classList.remove('visible'); }
}

function navegar(dir) {
    const n = _idx + dir;
    if (n < 0 || n >= _filtrados.length) return;
    _idx = n; renderNav(); abrirPedido(_idx);
}

// ─── Modal ────────────────────────────────────────────────────────────────────
async function abrirPedido(i) {
    const sub = document.getElementById('topbar-sub');
    if (sub.classList.contains('alerta') || sub.classList.contains('alerta-fixo')) {
        sub.classList.remove('alerta', 'alerta-fixo');
        sub.textContent = 'Aguardando atualizações';
    }
    _idx = i; renderNav();

    const p = _filtrados[i];
    _pedidoAberto = p;
    document.getElementById('modal-nome').textContent = p.clientes?.nome || '—';
    const dt = p.data ? p.data.substring(0, 10).split('-').reverse().join('/') : '—';
    document.getElementById('modal-sub').textContent = dt + ' · ' + (p.clientes?.cidade || '');
    document.getElementById('modal-body').innerHTML = '<p style="padding:20px;text-align:center;color:#475569;">Carregando itens...</p>';
    document.getElementById('modal').classList.add('active');

    const { data: itens } = await window.db.from('itens_pedidos_vendas')
        .select('id, quantidade, produto_id, quant_despacho, unid_despacho, operador_confirmou')
        .eq('pedido_venda_id', p.id);

    // Snapshot para polling
    _itensSnapshot = JSON.stringify((itens || []).map(i => ({ produto_id: i.produto_id, quantidade: i.quantidade, quant_despacho: i.quant_despacho, unid_despacho: i.unid_despacho })).sort((a,b) => a.produto_id.localeCompare(b.produto_id)));

    const rows = (itens || []).map(it => {
        const prod = _todosProdutos.find(pr => pr.id === it.produto_id);
        const nome = prod ? prod.nome : it.produto_id;
        const unidOficial = prod ? (prod.unid_venda || '') : '';
        const jaConfirmado = it.operador_confirmou === true;
        const temDespachoAlternativo = it.unid_despacho && it.unid_despacho !== unidOficial;
        const qtdVal = it.quant_despacho != null
            ? parseFloat(it.quant_despacho).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
            : parseFloat(it.quantidade || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const unidVal = it.unid_despacho || unidOficial;
                const ok = jaConfirmado ? 'ok' : '';
        const podeEditar = true;
        const readonlyAttr = podeEditar ? '' : 'readonly';
                const checkMarcado = jaConfirmado ? 'marcado' : '';
        const nomeMarcado = jaConfirmado ? 'marcado' : '';
                return `<div class="lista-row" data-item-id="${it.id}" data-produto-id="${it.produto_id}">


            <div class="prod-nome ${nomeMarcado}">${nome}</div>
            <button class="check-btn ${checkMarcado}" onclick="toggleCheck(this)" onmousedown="event.preventDefault()">

              <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <input class="campo ${ok} qtd-campo" type="tel" inputmode="decimal" value="${qtdVal}" placeholder="0,00" oninput="mascaraQtd(this)" ${readonlyAttr} style="${readonlyAttr ? 'color:#8E8E93;background:#F9F9F9;' : ''}">
            <input class="campo ${ok} unid-campo" type="text" value="${unidVal}" placeholder="un" ${readonlyAttr} style="${readonlyAttr ? 'color:#8E8E93;background:#F9F9F9;' : ''}">
        </div>`;

    }).join('');

        document.getElementById('modal-body').innerHTML =
        `<div class="lista-head"><span></span><span></span><span></span><span></span></div>`
+ rows;

    // Reaplicar checkboxes que estavam marcados e não foram alterados
    if (_checkboxesMarcados.size > 0) {
        document.querySelectorAll('#modal-body .lista-row').forEach(row => {
            if (_checkboxesMarcados.has(row.dataset.produtoId)) {
                const check = row.querySelector('.check-btn');
                const nome = row.querySelector('.prod-nome');
                if (check) check.classList.add('marcado');
                if (nome) nome.classList.add('marcado');
            }
        });
        _checkboxesMarcados = new Set();
    }

    // Marcar em vermelho os itens alterados pelo admin
    if (_itensAlterados.size > 0) {
        document.querySelectorAll('#modal-body .lista-row').forEach(row => {
            if (_itensAlterados.has(row.dataset.produtoId)) {
                const nome = row.querySelector('.prod-nome');
                if (nome) nome.classList.add('alterado');
            }
        });
                _itensAlterados = new Set();
    }
    atualizarContador();
}



function mascaraQtd(input) {
    let v = input.value.replace(/\D/g, '');
    if (!v) { input.value = ''; return; }
    input.value = (parseInt(v) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

document.addEventListener('focusin', e => {
    if (e.target.classList.contains('campo')) e.target.select();
});

function fecharModal() {
    document.getElementById('modal').classList.remove('active');
    _pedidoAberto = null;
    _itensSnapshot = null;
}

async function fecharOuSalvar() {
    const total = document.querySelectorAll('#modal-body .check-btn').length;
    const marcados = document.querySelectorAll('#modal-body .check-btn.marcado').length;
    if (total > 0 && marcados === total) {
        await salvar();
    } else {
        fecharModal();
    }
}


async function salvar() {
    const p = _pedidoAberto;


    const updates = [];
    document.querySelectorAll('#modal-body .lista-row').forEach(row => {
        const iid = row.dataset.itemId;
        const qtdInput = row.querySelector('.qtd-campo');
        const unidInput = row.querySelector('.unid-campo');
        if (qtdInput.readOnly) return; // só atualiza campos editáveis
        const qtd = parseFloat(qtdInput.value.replace(/\./g, '').replace(',', '.')) || 0;
        const unid = unidInput.value.trim();
        if (!qtd) return;
        updates.push({ id: iid, quant_despacho: qtd, unid_despacho: unid });
    });

        for (const u of updates) {
        const payload = { quant_despacho: u.quant_despacho, unid_despacho: u.unid_despacho };
        if (!_isAdmin) payload.operador_confirmou = true;
        await window.db.from('itens_pedidos_vendas').update(payload).eq('id', u.id);
    }

        if (!_isAdmin && updates.length > 0) {
        _pedidosConfirmados.add(p.id);
        // Remove pedido confirmado da lista de pendentes
        _filtrados = _filtrados.filter(f => f.id !== p.id);
    }


    fecharModal();
    renderLista();
}

window.addEventListener('resize', fixHeight); fixHeight();

        document.getElementById('pin-screen').classList.add('hidden');

        };
         carregarApp();

});

function toggleCheck(btn) {
    btn.classList.toggle('marcado');
    const row = btn.closest('.lista-row');
    row.querySelector('.prod-nome').classList.toggle('marcado');
    const marcado = btn.classList.contains('marcado');
    
    atualizarContador();
}

function atualizarContador() {
    const total = document.querySelectorAll('#modal-body .check-btn').length;
    const marcados = document.querySelectorAll('#modal-body .check-btn.marcado').length;
    const el = document.getElementById('modal-contador');
    const card = document.querySelector('.modal-card');
    if (!el) return;
    const completo = total > 0 && marcados === total;
    el.textContent = 'Itens Processados: ' + marcados + '/' + total;
    const pct = total > 0 ? Math.round(marcados / total * 100) : 0;
    const bar = document.getElementById('modal-progress-bar');
    if (bar) {
        bar.style.width = pct + '%';
        bar.classList.toggle('completo', completo);
    }
    const btnFechar = document.getElementById('btn-fechar');
    if (btnFechar) {
        btnFechar.classList.toggle('completo', completo);
        if (completo) {
            btnFechar.innerHTML = '<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#FFF;stroke-width:3;fill:none"><polyline points="20 6 9 17 4 12"/></svg> Pedido Processado';
        } else {
            btnFechar.innerHTML = 'Fechar';
        }
    }
    el.classList.toggle('completo', completo);
    card.classList.toggle('completo', completo);
}

}

async function registrarPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
        const reg = await navigator.serviceWorker.ready;
        const vapidKey = 'BA_0xwI2B5MjD8ojcPew-j6-jZ3zdPXaK8qNS3DkXNIED7Hia1THsR_1Nb8XcsAg_qIpdr1U72vmt5aInVOB6WE';
        const keyBytes = Uint8Array.from(atob(vapidKey.replace(/-/g,'+').replace(/_/g,'/')), c => c.charCodeAt(0));
        const subscription = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: keyBytes.buffer
        });
        let dispositivoId = localStorage.getItem('hh_device_id');
        if (!dispositivoId) {
            dispositivoId = crypto.randomUUID();
            localStorage.setItem('hh_device_id', dispositivoId);
        }
        const { error } = await window.db.from('push_subscriptions').upsert({
            operador_id: dispositivoId,
            subscription: subscription.toJSON()
        }, { onConflict: 'operador_id' });
        if (error) { console.error('Supabase error:', error); return; }
        localStorage.setItem('hh_subscription_salva', '1');
        document.getElementById('btn-notif').style.display = 'none';
    } catch(e) {
        console.error('Push registration error:', e);
    }
}
