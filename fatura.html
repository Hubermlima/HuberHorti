<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>HuberHorti · Fatura</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --verde:      #2d6a4f;
  --verde-med:  #40916c;
  --verde-claro:#52b788;
  --laranja:    #e07040;
  --cinza:      #6b7280;
  --cinza-bg:   #f3f4f6;
  --borda:      #e5e7eb;
  --preto:      #111827;
  --erro:       #ef4444;
  --pago:       #10b981;
}

body{
  font-family:'DM Sans',sans-serif;
  background:#eef1ed;
  color:var(--preto);
  min-height:100vh;
}

.page{
  max-width:480px;
  margin:0 auto;
  padding:0 0 48px;
  animation:subir .35s ease both;
}
@keyframes subir{
  from{opacity:0;transform:translateY(14px)}
  to  {opacity:1;transform:translateY(0)}
}

/* ── Estado ── */
.estado{text-align:center;padding:72px 20px;font-size:14px;color:var(--cinza);}
.spinner{
  width:30px;height:30px;
  border:3px solid var(--borda);
  border-top-color:var(--verde);
  border-radius:50%;
  animation:girar .7s linear infinite;
  margin:0 auto 14px;
}
@keyframes girar{to{transform:rotate(360deg)}}
.estado.erro{color:var(--erro);}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:#fff;
  border-bottom:1px solid var(--borda);
  position:sticky;top:0;z-index:10;
}
.topbar-logo{font-family:'DM Serif Display',serif;font-size:18px;color:var(--preto);}
.topbar-logo span{color:var(--verde-claro);}
.topbar-title{font-size:12px;font-weight:500;color:var(--cinza);text-transform:uppercase;letter-spacing:1px;}

/* ── Hero ── */
.hero{
  background:var(--verde);
  padding:22px 20px 20px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;right:-40px;top:-40px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.05);
}
.hero::after{
  content:'';position:absolute;right:30px;bottom:-70px;
  width:200px;height:200px;border-radius:50%;
  background:rgba(255,255,255,.04);
}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.hero-sub{font-size:10px;font-weight:500;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.hero-data{font-size:13px;color:rgba(255,255,255,.8);}
.hero-num-label{font-size:10px;font-weight:500;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;text-align:right;margin-bottom:3px;}
.hero-num{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;text-align:right;}
.hero-cliente{font-family:'DM Serif Display',serif;font-size:26px;color:#fff;letter-spacing:-.3px;line-height:1.15;}

/* ── Card ── */
.card{margin:10px 12px 0;background:#fff;border-radius:16px;overflow:hidden;border:1px solid var(--borda);}
.card-header{display:flex;align-items:center;gap:8px;padding:12px 16px 8px;}
.card-bar{width:3px;height:14px;background:var(--verde);border-radius:2px;flex-shrink:0;}
.card-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--preto);}

/* ── Produtos ── */
.prod-thead{
  display:grid;grid-template-columns:40px 36px 1fr 58px 62px;
  padding:6px 16px;
  border-top:1px solid var(--borda);border-bottom:1px solid #f0f0f0;
  background:var(--cinza-bg);
}
.prod-thead span{font-size:9px;font-weight:600;color:var(--cinza);text-transform:uppercase;letter-spacing:.4px;}
.prod-thead span:nth-child(4),.prod-thead span:nth-child(5){text-align:right;}

.prod-row{
  display:grid;grid-template-columns:40px 36px 1fr 58px 62px;
  padding:7px 16px;border-bottom:1px solid #f8f8f8;align-items:center;
}
.prod-row:last-child{border-bottom:none;}
.prod-quant,.prod-unid{font-size:12px;color:var(--laranja);font-weight:500;}
.prod-nome{font-size:12px;color:var(--laranja);font-style:italic;font-weight:500;}
.prod-unit{font-size:12px;color:var(--laranja);font-weight:500;text-align:right;}
.prod-total{font-size:12px;color:var(--laranja);font-weight:600;text-align:right;}

.prod-total-row{
  display:grid;grid-template-columns:40px 36px 1fr 58px 62px;
  padding:10px 16px;border-top:1px solid var(--borda);background:var(--cinza-bg);
}
.prod-total-label{font-size:9px;font-weight:600;color:var(--cinza);text-transform:uppercase;letter-spacing:.4px;align-self:center;grid-column:1/5;}
.prod-total-val{font-family:'DM Serif Display',serif;font-size:18px;color:var(--preto);text-align:right;}

/* ── Financeiro ── */
.fin-body{padding:0 16px 4px;}
.fin-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5;}
.fin-row:last-child{border-bottom:none;}
.fin-op{font-size:11px;color:var(--cinza);font-weight:600;width:16px;flex-shrink:0;}
.fin-label{font-size:11px;font-weight:500;color:var(--cinza);flex:1;margin-left:8px;}
.fin-val{font-size:12px;font-weight:700;}
.fin-val.vermelho{color:var(--erro);}
.fin-val.verde{color:var(--pago);}
.fin-val.neutro{color:var(--preto);}

.saldo-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 12px;
  border-top:2px solid var(--borda);background:var(--cinza-bg);
}
.saldo-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--cinza);}
.saldo-val{font-family:'DM Serif Display',serif;font-size:22px;color:var(--erro);}

/* ── Footer ── */
.footer{
  margin:10px 12px 0;padding:14px;
  background:#fff;border-radius:16px;border:1px solid var(--borda);
  text-align:center;
}
.footer-texto{font-size:11px;color:var(--cinza);}
.footer-texto b{color:var(--verde);font-weight:600;}
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="topbar-logo">Huber<span>Horti</span></div>
    <div class="topbar-title">Fatura</div>
  </div>

  <div id="conteudo">
    <div class="estado">
      <div class="spinner"></div>
      Carregando fatura…
    </div>
  </div>

</div>

<script>
const fmt  = v => Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtR = v => 'R$ ' + fmt(v);

async function carregarFatura() {
  const params   = new URLSearchParams(window.location.search);
  const pedidoId = params.get('id');

  if (!pedidoId) {
    document.getElementById('conteudo').innerHTML =
      '<div class="estado erro">Link inválido.</div>';
    return;
  }

  // Pedido
  const { data: pedido } = await window.db
    .from('pedidos_vendas')
    .select('id, data, total_venda, em_aberto, clientes(id, nome, cidade)')
    .eq('id', pedidoId)
    .single();

  if (!pedido) {
    document.getElementById('conteudo').innerHTML =
      '<div class="estado erro">Fatura não encontrada.</div>';
    return;
  }

  // Itens
  const { data: itensDB } = await window.db
    .from('itens_pedidos_vendas')
    .select('*, produtos(nome, unid_venda)')
    .eq('pedido_venda_id', pedidoId);

  const itens = (itensDB || []).sort((a, b) =>
    (a.produtos?.nome || '').localeCompare(b.produtos?.nome || '', 'pt-BR')
  );

  // Pagamentos do cliente
  const { data: movs } = await window.db
    .from('movimentos_clientes')
    .select('valor')
    .eq('cliente_id', pedido.clientes.id)
    .eq('status', 0)
    .not('data', 'is', null);
  const totalPagamentos = (movs || []).reduce((a, m) => a + parseFloat(m.valor), 0);

  // Débitos anteriores
  const { data: outrosPedidos } = await window.db
    .from('pedidos_vendas')
    .select('em_aberto')
    .eq('cliente_id', pedido.clientes.id)
    .gt('em_aberto', 0)
    .neq('id', pedidoId);
  const debitosAnteriores = (outrosPedidos || []).reduce((a, p) => a + parseFloat(p.em_aberto), 0);

  // Cálculos
  const totalProd = Math.floor(itens.reduce((a, i) => a + parseFloat(i.total_venda || 0), 0));
  const emAberto  = debitosAnteriores - totalPagamentos;
  const saldo     = Math.floor(emAberto + totalProd);

  // Data formatada
  const meses      = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const dataPedido = new Date(pedido.data);
  const diaNum     = dataPedido.toLocaleDateString('pt-BR',{timeZone:'America/Manaus',day:'numeric'});
  const mesIdx     = parseInt(dataPedido.toLocaleDateString('en-CA',{timeZone:'America/Manaus'}).split('-')[1]) - 1;
  const hora       = dataPedido.toLocaleTimeString('pt-BR',{timeZone:'America/Manaus',hour:'2-digit',minute:'2-digit'}).replace(':','H');
  const diaSem     = diasSemana[new Date(dataPedido.toLocaleDateString('en-CA',{timeZone:'America/Manaus'})).getDay()];
  const emissao    = `${diaNum} de ${meses[mesIdx]} · ${hora} · ${diaSem}`;

  const numero = pedidoId.substring(0, 5).toUpperCase();

  document.getElementById('conteudo').innerHTML = `

    <div class="hero">
      <div class="hero-top">
        <div>
          <div class="hero-sub">Compra realizada</div>
          <div class="hero-data">${emissao}</div>
        </div>
        <div>
          <div class="hero-num-label">Nº fatura</div>
          <div class="hero-num">${numero}</div>
        </div>
      </div>
      <div class="hero-cliente">${pedido.clientes.nome.toUpperCase()}</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-bar"></div>
        <span class="card-label">Produtos comprados</span>
      </div>
      <div class="prod-thead">
        <span>Quant</span><span>Unid</span><span>Descrição</span><span>Unit R$</span><span>Valor</span>
      </div>
      ${itens.map(i => `
        <div class="prod-row">
          <span class="prod-quant">${fmt(parseFloat(i.quantidade || 0))}</span>
          <span class="prod-unid">${i.produtos?.unid_venda || ''}</span>
          <span class="prod-nome">${i.produtos?.nome || ''}</span>
          <span class="prod-unit">${fmt(parseFloat(i.preco_unit || 0))}</span>
          <span class="prod-total">${fmt(parseFloat(i.total_venda || 0))}</span>
        </div>`).join('')}
      <div class="prod-total-row">
        <span class="prod-total-label">Total da compra</span>
        <span class="prod-total-val">${fmt(totalProd)}</span>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-bar"></div>
        <span class="card-label">Situação financeira</span>
      </div>
      <div class="fin-body">
        <div class="fin-row">
          <span class="fin-op"></span>
          <span class="fin-label">Débitos anteriores</span>
          <span class="fin-val vermelho">${fmtR(debitosAnteriores)}</span>
        </div>
        <div class="fin-row">
          <span class="fin-op">−</span>
          <span class="fin-label">Pagamentos</span>
          <span class="fin-val verde">${fmtR(totalPagamentos)}</span>
        </div>
        <div class="fin-row">
          <span class="fin-op">=</span>
          <span class="fin-label">Em aberto</span>
          <span class="fin-val ${emAberto <= 0 ? 'verde' : 'vermelho'}">${fmtR(emAberto)}</span>
        </div>
        <div class="fin-row">
          <span class="fin-op">+</span>
          <span class="fin-label">Compra atual</span>
          <span class="fin-val neutro">${fmtR(totalProd)}</span>
        </div>
      </div>
      <div class="saldo-row">
        <span class="saldo-label">Saldo devedor</span>
        <span class="saldo-val">${fmt(saldo)}</span>
      </div>
    </div>

    <div class="footer">
      <div class="footer-texto">Emitido por <b>HuberHorti</b> · Manaus, AM</div>
    </div>
  `;
}

carregarFatura();
</script>
</body>
</html>
