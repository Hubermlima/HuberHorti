<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>HuberHorti · Fatura</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;min-height:100vh;}
.page{max-width:480px;margin:0 auto;padding:16px 0 40px;}
.loading{text-align:center;padding:80px 20px;font-size:14px;color:#8E8E93;}
.erro{text-align:center;padding:80px 20px;font-size:14px;color:#EF4444;}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;background:#FFF;border-bottom:0.5px solid #F0F0F5;position:sticky;top:0;z-index:10;}
.topbar-title{font-size:13px;font-weight:600;color:#1C1C1E;}
.topbar-logo{font-size:15px;font-weight:800;color:#1C1C1E;}
.topbar-logo span{color:#007AFF;}

/* Cabeçalho */
.fatura-cabecalho{padding:14px 18px 10px;border-bottom:0.5px solid #F0F0F5;background:#FFF;}
.fatura-emissao-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.fatura-emissao-data{font-size:11px;color:#8E8E93;}
.fatura-num{font-size:11px;color:#8E8E93;text-align:right;}
.fatura-num b{display:block;font-size:15px;font-weight:700;color:#1C1C1E;}
.fatura-cliente{font-size:19px;font-weight:700;color:#1C1C1E;letter-spacing:-0.3px;margin-top:6px;}

/* Produtos */
.secao{margin:10px 18px 0;border:1px solid #E0E0E0;border-radius:14px;overflow:hidden;background:#FFF;}
.secao-header{display:flex;align-items:center;gap:8px;padding:10px 14px 6px;background:#FFF;}
.secao-bar{width:3px;height:14px;background:#1C1C1E;border-radius:2px;flex-shrink:0;}
.secao-label{font-size:10px;font-weight:700;color:#1C1C1E;text-transform:uppercase;letter-spacing:0.6px;}
.prod-header{display:grid;grid-template-columns:40px 36px 1fr 56px 60px;padding:8px 18px;border-top:0.5px solid #E0E0E0;border-bottom:0.5px solid #EFEFEF;background:#F8F8FA;}
.prod-header span{font-size:9px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.4px;}
.prod-header span:nth-child(4),.prod-header span:nth-child(5){text-align:right;}
.prod-row{display:grid;grid-template-columns:40px 36px 1fr 56px 60px;padding:10px 18px;border-bottom:0.5px solid #F5F5F5;align-items:center;background:#FFF;}
.prod-row:last-child{border-bottom:none;}
.prod-quant{font-size:12px;color:#E07040;font-weight:500;}
.prod-unid{font-size:12px;color:#E07040;font-weight:500;}
.prod-nome{font-size:12px;color:#E07040;font-style:italic;font-weight:500;}
.prod-unit{font-size:12px;color:#E07040;font-weight:500;text-align:right;}
.prod-total{font-size:12px;color:#E07040;font-weight:600;text-align:right;}
.prod-total-row{display:grid;grid-template-columns:40px 36px 1fr 56px 60px;padding:10px 18px;border-top:0.5px solid #EFEFEF;background:#FFF;}
.prod-total-label{font-size:9px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.4px;align-self:center;grid-column:1/5;}
.prod-total-val{font-size:15px;font-weight:700;color:#1C1C1E;text-align:right;}

/* Situação financeira */
.fin-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #F5F5F5;}
.fin-row:last-child{border-bottom:none;}
.fin-op{font-size:11px;color:#8E8E93;font-weight:600;width:16px;flex-shrink:0;}
.fin-label{font-size:10px;font-weight:500;color:#8E8E93;flex:1;margin-left:8px;}
.fin-val{font-size:11px;font-weight:700;}
.fin-val.vermelho{color:#EF4444;}
.fin-val.verde{color:#10B981;}
.fin-val.neutro{color:#1C1C1E;}
.saldo-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid #E0E0E0;margin-top:2px;}
.saldo-label{font-size:10px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.4px;flex:1;margin-left:24px;}
.saldo-val{font-size:17px;font-weight:800;color:#EF4444;}

/* Footer */
.footer{margin:16px 18px 0;padding:14px;background:#FFF;border-radius:14px;text-align:center;}
.footer-marca{font-size:11px;color:#8E8E93;font-weight:500;}
.footer-marca b{color:#007AFF;}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="topbar-logo">Huber<span>Horti</span></div>
    <div class="topbar-title">Fatura</div>
  </div>
  <div id="conteudo"><div class="loading">Carregando fatura...</div></div>
</div>

<script>
const fmt = v => Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtR = v => 'R$ ' + fmt(v);

async function carregarFatura() {
  const params = new URLSearchParams(window.location.search);
  const pedidoId = params.get('id');
  if (!pedidoId) {
    document.getElementById('conteudo').innerHTML = '<div class="erro">Link inválido.</div>';
    return;
  }

  // Busca pedido
  const { data: pedido } = await window.db.from('pedidos_vendas')
    .select('id, data, total_venda, em_aberto, clientes(id, nome, cidade)')
    .eq('id', pedidoId).single();

  if (!pedido) {
    document.getElementById('conteudo').innerHTML = '<div class="erro">Fatura não encontrada.</div>';
    return;
  }

  // Busca itens
  const { data: itensDB } = await window.db.from('itens_pedidos_vendas')
    .select('*, produtos(nome, unid_venda)')
    .eq('pedido_venda_id', pedidoId);
  const itens = itensDB || [];

  // Busca pagamentos do cliente
  const { data: movs } = await window.db.from('movimentos_clientes')
    .select('valor').eq('cliente_id', pedido.clientes.id).eq('status', 0).not('data', 'is', null);
  const totalPagamentos = (movs || []).reduce((a,m) => a + parseFloat(m.valor), 0);

  // Busca débitos anteriores (outros pedidos em aberto)
  const { data: outrosPedidos } = await window.db.from('pedidos_vendas')
    .select('em_aberto').eq('cliente_id', pedido.clientes.id).gt('em_aberto', 0).neq('id', pedidoId);
  const debitosAnteriores = (outrosPedidos || []).reduce((a,p) => a + parseFloat(p.em_aberto), 0);

  const totalProd = itens.reduce((a,i) => a + parseFloat(i.total_venda || 0), 0);
  const emAberto = debitosAnteriores - totalPagamentos;

  const saldo = emAberto + totalProd;

  // Data de emissão
  const agora = new Date();
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const emissao = `${agora.getDate()} de ${meses[agora.getMonth()]} ${String(agora.getHours()).padStart(2,'0')}H${String(agora.getMinutes()).padStart(2,'0')} ${diasSemana[agora.getDay()]}`;
  const numero = pedidoId.substring(0,5).toUpperCase();

  document.getElementById('conteudo').innerHTML = `
    <div class="fatura-cabecalho" style="background:#FFF;">
      <div class="fatura-emissao-row">
        <div>
          <div style="font-size:10px;color:#8E8E93;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;">Compra Realizada</div>
          <div class="fatura-emissao-data">${emissao}</div>
        </div>
        <div class="fatura-num">
          <span style="font-size:10px;color:#8E8E93;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;">Número Fatura</span>
          <b>${numero}</b>
        </div>
      </div>
      <div class="fatura-cliente">${pedido.clientes.nome.toUpperCase()}</div>
    </div>

    <!-- Produtos -->
    <div class="secao">
      <div class="secao-header">
        <div class="secao-bar"></div>
        <span class="secao-label">Produtos Comprados</span>
      </div>
      <div class="prod-header">
        <span>Quant</span><span>Unid</span><span>Descrição</span><span>Unit R$</span><span>Valor</span>
      </div>
      ${itens.map(i => `
        <div class="prod-row">
          <span class="prod-quant">${fmt(parseFloat(i.quantidade||0))}</span>
          <span class="prod-unid">${i.produtos?.unid_venda || ''}</span>
          <span class="prod-nome">${i.produtos?.nome || ''}</span>
          <span class="prod-unit">${fmt(parseFloat(i.preco_unit||0))}</span>
          <span class="prod-total">${fmt(parseFloat(i.total_venda||0))}</span>
        </div>`).join('')}
      <div class="prod-total-row">
        <span class="prod-total-label">Total da Compra</span>
        <span class="prod-total-val">${fmt(totalProd)}</span>
      </div>
    </div>

    <!-- Situação Financeira -->
    <div class="secao" style="margin-top:10px;">
      <div class="secao-header">
        <div class="secao-bar"></div>
        <span class="secao-label">Situação Financeira</span>
      </div>
      <div style="padding:0 14px;">
        <div class="fin-row">
          <span class="fin-op"></span>
          <span class="fin-label">Débitos Anteriores</span>
          <span class="fin-val vermelho">${fmtR(debitosAnteriores)}</span>
        </div>
        <div class="fin-row">
          <span class="fin-op">−</span>
          <span class="fin-label">Pagamentos</span>
          <span class="fin-val verde">${fmtR(totalPagamentos)}</span>
        </div>
        <div class="fin-row">
          <span class="fin-op">=</span>
          <span class="fin-label">Em Aberto</span>
          <span class="fin-val ${emAberto <= 0 ? 'verde' : 'vermelho'}">${fmtR(emAberto)}</span>
        </div>
        <div class="fin-row">
          <span class="fin-op">+</span>
          <span class="fin-label">Compra Atual</span>
          <span class="fin-val neutro">${fmtR(totalProd)}</span>
        </div>
        <div class="saldo-row">
          <span class="fin-op"></span>
          <span class="saldo-label">Saldo Devedor</span>
          <span class="saldo-val">${fmt(saldo)}</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-marca">Emitido por <b>HuberHorti</b></div>
    </div>
  `;
}

carregarFatura();
</script>
</body>
