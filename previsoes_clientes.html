<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Previsões</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;height:100vh;height:calc(var(--vh,1vh)*100);overflow:hidden;overscroll-behavior-y:none;}
.supercard{background:#fff;border-radius:44px 44px 0 0;height:100%;display:flex;flex-direction:column;}

.topbar{height:56px;padding:0 18px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:#1C1C1E;}
.topbar-sub{font-size:10px;color:#8E8E93;font-weight:500;}
.ios-btn-float{width:38px;height:38px;border-radius:50%;border:0.5px solid rgba(0,0,0,0.06);background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.14);cursor:pointer;}
.lista-card{flex:1;margin:0 16px;margin-bottom:calc(8px + env(safe-area-inset-bottom));background:#FFF;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.12);border:0.5px solid rgba(0,0,0,0.06);display:flex;flex-direction:column;min-height:0;overflow:hidden;}


.lista-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.item-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid #E0E0E0;cursor:pointer;}
.item-row:last-child{border-bottom:none;}
.item-row:active{background:#F5F5F5;}
.item-left{display:flex;flex-direction:column;gap:2px;}
.item-nome{font-size:13px;font-weight:500;color:#1C1C1E;}
.item-tipo{font-size:11px;color:#8E8E93;}
.item-val{font-size:13px;font-weight:600;color:#EF4444;}
.total-bar{padding:10px 16px;border-top:0.5px solid #E5E5EA;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.total-label{font-size:11px;color:#8E8E93;}
.total-val{font-size:15px;font-weight:700;color:#EF4444;}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:#C7C7CC;}
.item-check{width:20px;height:20px;border-radius:50%;border:1.5px solid #C7C7CC;flex-shrink:0;margin-right:12px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.item-check.checked{background:#007AFF;border-color:#007AFF;}
.item-check.checked::after{content:'';width:5px;height:9px;border:2px solid #FFF;border-top:none;border-left:none;transform:rotate(45deg);margin-top:-2px;}
.lote-bar{padding:10px 16px;border-top:0.5px solid #E5E5EA;display:flex;gap:10px;flex-shrink:0;}
.lote-btn{flex:1;padding:11px;border-radius:50px;border:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.lote-btn.desmarcar{background:#F2F2F7;color:#1C1C1E;}
.lote-btn.excluir{background:#F2F2F7;color:#EF4444;}

.paginacao{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px 16px;flex-shrink:0;}
.pag-btn{width:32px;height:32px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,0.08);cursor:pointer;}
.pag-btn:disabled{opacity:0.3;pointer-events:none;}
.pag-info{font-size:12px;font-weight:500;color:#8E8E93;}
.modal-overlay{position:fixed;inset:0;background:transparent;z-index:9995;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.active{display:flex;}
.modal{background:#FFF;border-radius:24px;padding:22px 20px;width:100%;max-width:360px;box-shadow:0 32px 64px rgba(0,0,0,0.22),0 8px 24px rgba(0,0,0,0.10);}
.modal-title{font-size:15px;font-weight:700;color:#1C1C1E;margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid #E5E5EA;}
.field-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #F5F5F5;}
.field-row:last-of-type{border-bottom:none;}
.field-label{font-size:12px;color:#8E8E93;font-weight:400;flex-shrink:0;}
.field-right{display:flex;justify-content:flex-end;flex:1;margin-left:12px;}
.field-input{border:none;background:transparent;font-size:13px;font-weight:500;color:#1C1C1E;outline:none;font-family:'Inter',sans-serif;text-align:right;width:130px;}
.field-val{font-size:13px;font-weight:500;color:#1C1C1E;text-align:right;}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-btn{flex:1;padding:13px;border-radius:50px;border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.modal-btn.primary{background:#F2F2F7;color:#1C1C1E;}
.modal-btn.secondary{background:#F2F2F7;color:#1C1C1E;}
.modal-btn.danger{background:#F2F2F7;color:#EF4444;}
.field-input:focus{outline:none;border:1.5px solid #007AFF;border-radius:8px;padding:4px 8px;background:#F0F6FF;}

.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid #E5E5EA;}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:#F2F2F7;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.modal-seg{display:flex;background:#E3E3E8;border-radius:10px;padding:2px;gap:2px;}
.modal-seg-opt{flex:1;text-align:center;padding:7px 12px;font-size:13px;font-weight:600;color:#8E8E93;border-radius:8px;cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;}
.modal-seg-opt.active{background:#FFF;color:#1C1C1E;box-shadow:0 1px 4px rgba(0,0,0,0.12);}

</style>
</head>
<body>

<div class="supercard">

<div class="topbar">

  <button class="ios-btn-float" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Previsões Depósitos Clientes</div>

    
  </div>
  <div style="width:38px;"></div>
</div>



<div class="lista-card">
  <div class="lista-scroll" id="lista-scroll">
    <div class="empty-state">Carregando...</div>
  </div>
    <div class="total-bar" id="total-bar" style="display:none;">
    <span class="total-label">Total previsto</span>
    <span class="total-val" id="total-val">R$ 0,00</span>
  </div>
  <div class="lote-bar" id="lote-bar" style="display:none;">
    <button class="lote-btn desmarcar" onclick="desmarcarTudo()">Desmarcar Tudo</button>
    <button class="lote-btn excluir" onclick="excluirTudo()">Excluir Tudo</button>
  </div>
</div>


<div class="paginacao" id="paginacao" style="display:none;">
  <button class="pag-btn" id="btn-prev" onclick="mudarPagina(-1)">
    <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <span class="pag-info" id="pag-info">1 / 1</span>
  <button class="pag-btn" id="btn-next" onclick="mudarPagina(1)">
    <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
  </button>
</div>

<!-- Modal confirmar data -->
<div class="modal-overlay" id="modal" onclick="fecharModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">Confirmar Pagamento</span>
      <button class="modal-close" onclick="fecharModal()">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="field-row">
      <span class="field-label">Cliente</span>
      <div class="field-right"><span class="field-val" id="modal-cliente"></span></div>
    </div>
    <div class="field-row">
      <span class="field-label">Valor</span>
      <div class="field-right"><input class="field-input" id="modal-valor" type="text" inputmode="decimal" placeholder="0,00"/></div>

    </div>
    <div class="field-row">
      <span class="field-label">Forma</span>
      <div class="field-right">
        <div class="modal-seg">
          <button class="modal-seg-opt active" id="seg-deposito" onclick="selecionarFormaModal('Depósito')">Depósito</button>
          <button class="modal-seg-opt" id="seg-dinheiro" onclick="selecionarFormaModal('Dinheiro')">Dinheiro</button>
        </div>
      </div>
    </div>
    <div class="field-row">
      <span class="field-label">Data</span>
      <div class="field-right"><input class="field-input" id="modal-data" type="date"/></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn danger" onclick="excluirMovimento()">Excluir</button>
      <button class="modal-btn primary" onclick="confirmarPagamento()">Gravar</button>
    </div>
  </div>
</div>


<script>
const POR_PAGINA = 15;
const fmt = v => Number(v).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

let _todos = [];
let _filtrados = [];
let _formaAtiva = 'Depósito';
let _paginaAtual = 1;
let _idSelecionado = null;

function setStatus(msg, cor='#8E8E93') {
  const el = document.getElementById('status-sub');
  el.textContent = msg;
  el.style.color = cor;
}

function setAtualizado() {
  const agora = new Date();
  const hh = String(agora.getHours()).padStart(2,'0');
  const mi = String(agora.getMinutes()).padStart(2,'0');
  setStatus(`Atualizado ${hh}:${mi}`);
}

async function init() {
  const { data: movs } = await window.db
    .from('movimentos_clientes')
    .select('id, cliente_id, valor, forma, tipo')
    .eq('status', 0)
    .is('data', null)
    .neq('tipo', 'Desconto');

  if (!movs || movs.length === 0) {
    document.getElementById('lista-scroll').innerHTML = '<div class="empty-state">Nenhuma previsão encontrada</div>';
    setAtualizado();
    return;
  }

  const clienteIds = [...new Set(movs.map(m => m.cliente_id))];
  const { data: clientes } = await window.db.from('clientes').select('id, nome').in('id', clienteIds);
  const clienteMap = Object.fromEntries((clientes||[]).map(c => [c.id, c.nome]));

  _todos = movs.map(m => ({
    id: m.id,
    clienteId: m.cliente_id,
    clienteNome: clienteMap[m.cliente_id] || 'Cliente',
    valor: parseFloat(m.valor),
    forma: m.forma,
    tipo: m.tipo
  })).sort((a, b) => a.clienteNome.localeCompare(b.clienteNome));

  aplicarFiltro();
  setAtualizado();
}

function selecionarForma(forma, el) {
  _formaAtiva = forma;
  document.querySelectorAll('.seg-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  _paginaAtual = 1;
  aplicarFiltro();
}

function aplicarFiltro() {
  _filtrados = _todos.filter(m => m.forma === _formaAtiva);
  renderizarLista();
}

function renderizarLista() {
  const total = _filtrados.length;
  const totalPags = Math.max(1, Math.ceil(total / POR_PAGINA));
  if (_paginaAtual > totalPags) _paginaAtual = totalPags;

  const inicio = (_paginaAtual - 1) * POR_PAGINA;
  const pagina = _filtrados.slice(inicio, inicio + POR_PAGINA);

  const lista = document.getElementById('lista-scroll');

  if (pagina.length === 0) {
    lista.innerHTML = '<div class="empty-state">Nenhuma previsão encontrada</div>';
    document.getElementById('total-bar').style.display = 'none';
    document.getElementById('paginacao').style.display = 'none';
    return;
  }

    lista.innerHTML = pagina.map(m => `
    <div class="item-row" id="row-${m.id}" onclick="toggleCheck('${m.id}', event)">
      <div class="item-check" id="chk-${m.id}"></div>
      <div class="item-left" style="flex:1;cursor:pointer;" onclick="event.stopPropagation();abrirModal('${m.id}')">
        <span class="item-nome">${m.clienteNome}</span>
        <span class="item-tipo">${m.tipo}</span>
      </div>
      <span class="item-val">${fmt(m.valor)}</span>
    </div>`).join('');


  const somaTotal = _filtrados.reduce((a, m) => a + m.valor, 0);
  document.getElementById('total-val').textContent = fmt(somaTotal);
  document.getElementById('total-bar').style.display = 'flex';

  if (totalPags > 1) {
    document.getElementById('paginacao').style.display = 'flex';
    document.getElementById('pag-info').textContent = `${_paginaAtual} / ${totalPags}`;
    document.getElementById('btn-prev').disabled = _paginaAtual === 1;
    document.getElementById('btn-next').disabled = _paginaAtual === totalPags;
  } else {
    document.getElementById('paginacao').style.display = 'none';
  }
}

function mudarPagina(delta) {
  _paginaAtual += delta;
  renderizarLista();
  document.getElementById('lista-scroll').scrollTop = 0;
}

(function(){
  const el = document.getElementById('modal-valor');
  el.addEventListener('input', function(){
    let digits = this.value.replace(/\D/g,'');
    if(!digits) { this.value=''; return; }
    let num = parseInt(digits,10);
    this.value = (num/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  });
})();

let _selecionados = new Set();

function toggleCheck(id, e) {
  if (_selecionados.has(id)) {
    _selecionados.delete(id);
    document.getElementById('chk-'+id)?.classList.remove('checked');
  } else {
    _selecionados.add(id);
    document.getElementById('chk-'+id)?.classList.add('checked');
  }
  document.getElementById('lote-bar').style.display = _selecionados.size > 0 ? 'flex' : 'none';
}

function desmarcarTudo() {
  _selecionados.forEach(id => document.getElementById('chk-'+id)?.classList.remove('checked'));
  _selecionados.clear();
  document.getElementById('lote-bar').style.display = 'none';
}

async function excluirTudo() {
  if (_selecionados.size === 0) return;
  const ids = [..._selecionados];
  await window.db.from('movimentos_clientes').delete().in('id', ids);
  _selecionados.clear();
  document.getElementById('lote-bar').style.display = 'none';
  await init();
}

function selecionarFormaModal(forma) {


  document.getElementById('seg-deposito').classList.toggle('active', forma === 'Depósito');
  document.getElementById('seg-dinheiro').classList.toggle('active', forma === 'Dinheiro');
}

function abrirModal(id) {
  _idSelecionado = id;
  const m = _filtrados.find(x => x.id === id);
  if (!m) return;
  document.getElementById('modal-cliente').textContent = m.clienteNome;
  document.getElementById('modal-valor').value = m.valor.toFixed(2);
  selecionarFormaModal(m.forma);
  const hoje = new Date();
  const offset = hoje.getTimezoneOffset();
  const hojeLocal = new Date(hoje.getTime() - offset * 60000);
  document.getElementById('modal-data').value = hojeLocal.toISOString().split('T')[0];
  document.getElementById('modal').classList.add('active');
}

async function excluirMovimento() {
  if (!_idSelecionado) return;
  await window.db.from('movimentos_clientes').delete().eq('id', _idSelecionado);
  fecharModal();
  await init();
}


function fecharModal() {
  document.getElementById('modal').classList.remove('active');
  _idSelecionado = null;
}

async function confirmarPagamento() {
  const data = document.getElementById('modal-data').value;
  if (!data) return alert('Informe a data');
  const valor = parseFloat(document.getElementById('modal-valor').value.replace(/\./g,'').replace(',','.'));

  if (isNaN(valor) || valor <= 0) return alert('Informe um valor válido');
  const forma = document.getElementById('seg-deposito').classList.contains('active') ? 'Depósito' : 'Dinheiro';
  await window.db.from('movimentos_clientes')
    .update({ data: new Date(data + 'T' + new Date().toLocaleTimeString('en-GB', {timeZone:'America/Manaus'})).toISOString(), valor, forma })
    .eq('id', _idSelecionado);
  fecharModal();
  await init();
}


const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight);
fixHeight();
init();
</script>
</div><!-- /supercard -->
</body>
</html>
