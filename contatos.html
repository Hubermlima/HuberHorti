<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contatos Clientes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
body{font-family:sans-serif;padding:10px;background:#F2F4F8;}
input[type=text],select{padding:6px;font-size:14px;width:100%;box-sizing:border-box;border:1px solid #CCC;border-radius:6px;}
table{width:100%;border-collapse:collapse;background:#FFF;}
td,th{padding:6px;border-bottom:1px solid #EEE;font-size:13px;text-align:left;}
.nome{font-weight:600;white-space:nowrap;}
.ok{color:#0A0;font-size:11px;}
</style>
</head>
<body>

<input type="text" id="filtro" placeholder="Buscar..." style="margin-bottom:10px;">

<table>
<thead><tr><th>Cliente</th><th>Tratamento</th><th>Apelido</th><th>Telefone</th></tr></thead>
<tbody id="corpo"><tr><td colspan="4">Carregando...</td></tr></tbody>
</table>

<script>
let clientes = [];

async function carregar() {
  const { data } = await window.db.from('clientes').select('id,nome,apelido,tratamento,telefone').order('nome');
  clientes = data || [];
  render();
}

function render(filtro) {
  const corpo = document.getElementById('corpo');
  const f = (filtro || '').toLowerCase();
  const lista = f ? clientes.filter(c => c.nome.toLowerCase().includes(f)) : clientes;
  corpo.innerHTML = lista.map(c => `
    <tr id="row-${c.id}">
      <td class="nome">${c.nome}</td>
      <td>
        <select id="trat-${c.id}" onchange="salvar('${c.id}')">
          <option value="" ${!c.tratamento ? 'selected' : ''}>—</option>
          <option value="Prezado" ${c.tratamento === 'Prezado' ? 'selected' : ''}>Prezado</option>
          <option value="Prezada" ${c.tratamento === 'Prezada' ? 'selected' : ''}>Prezada</option>
        </select>
      </td>
      <td><input type="text" id="apel-${c.id}" value="${c.apelido||''}" onblur="salvar('${c.id}')"></td>
      <td><input type="text" id="tel-${c.id}" value="${c.telefone||''}" onblur="salvar('${c.id}')"></td>
    </tr>
  `).join('');
}

async function salvar(id) {
  const tratamento = document.getElementById('trat-'+id).value.trim();
  const apelido = document.getElementById('apel-'+id).value.trim();
  const telefone = document.getElementById('tel-'+id).value.trim().replace(/\D/g,'');
  document.getElementById('tel-'+id).value = telefone;

  await window.db.from('clientes').update({ tratamento, apelido, telefone }).eq('id', id);

  const idx = clientes.findIndex(c => c.id === id);
  if (idx > -1) { clientes[idx].tratamento = tratamento; clientes[idx].apelido = apelido; clientes[idx].telefone = telefone; }

  const row = document.getElementById('row-'+id);
  row.style.background = '#E8FFF0';
  setTimeout(() => row.style.background = '', 600);
}

document.getElementById('filtro').addEventListener('input', e => render(e.target.value));

carregar();
</script>

</body>
</html>
