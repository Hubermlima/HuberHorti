<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HuberHorti - Prestação de Contas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>


<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F2F4F8;color:#1C1C1E;min-height:100vh;padding-bottom:100px;}
.topbar{height:56px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;background:#F2F4F8;flex-shrink:0;}
.topbar-copy{display:flex;flex-direction:column;align-items:center;text-align:center;flex-grow:1;}
.topbar-title{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:#1C1C1E;}
.topbar-sub{font-size:10px;color:#8E8E93;font-weight:500;}
.ios-btn-float{width:38px;height:38px;border-radius:50%;border:none;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;}
.sel-wrap{padding:0 16px 12px;}
.sel-btn{width:100%;background:#FFF;border:none;border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,0.06);cursor:pointer;}
.sel-nome{font-size:14px;font-weight:600;color:#1C1C1E;}
.sel-hint{font-size:14px;color:#8E8E93;}
.extrato{margin:0 16px 12px;background:#FFF;border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.ext-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:0.5px solid #F5F5F5;}
.ext-row:last-child{border-bottom:none;}
.ext-label{font-size:12px;color:#8E8E93;}
.ext-val{font-size:13px;font-weight:600;}
.ext-val.red{color:#EF4444;}
.ext-val.green{color:#10B981;}
.lista-wrap{padding:0 16px;}
.lista-titulo{font-size:10px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;}
.pag-card{background:#FFF;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);cursor:pointer;}
.pag-card:active{opacity:0.8;}
.pag-linha1{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.pag-modalidade{font-size:12px;font-weight:600;color:#1C1C1E;}
.pag-data{font-size:11px;color:#8E8E93;}
.pag-linha2{font-size:11px;color:#8E8E93;margin-bottom:6px;}
.pag-valor{font-size:15px;font-weight:700;color:#EF4444;}
.empty-state{text-align:center;padding:40px 16px;font-size:12px;color:#C7C7CC;}
.rodape{position:fixed;bottom:0;left:0;right:0;background:#F2F4F8;padding:12px 16px 28px;display:flex;gap:10px;}
.rodape-btn{flex:1;padding:13px;border-radius:50px;border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.rodape-btn.foto{background:#FFF;color:#1C1C1E;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.rodape-btn.pdf{background:#007AFF;color:#FFF;}

/* Modal padrão */
.modal-overlay{position:fixed;inset:0;background:transparent;z-index:9995;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.active{display:flex;}
.modal{background:#FFF;border-radius:24px;padding:22px 20px;width:100%;max-width:360px;box-shadow:0 32px 64px rgba(0,0,0,0.22),0 8px 24px rgba(0,0,0,0.10);}
.modal-title{font-size:15px;font-weight:700;color:#1C1C1E;margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid #E5E5EA;}
.field-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #F5F5F5;}
.field-row:last-of-type{border-bottom:none;}
.field-label{font-size:12px;color:#8E8E93;font-weight:400;flex-shrink:0;}
.field-right{display:flex;justify-content:flex-end;align-items:center;flex:1;margin-left:12px;}
.field-input{border:none;background:transparent;font-size:13px;font-weight:500;color:#1C1C1E;outline:none;font-family:'Inter',sans-serif;text-align:right;width:130px;}
.field-val{font-size:13px;font-weight:500;color:#1C1C1E;text-align:right;cursor:pointer;}
.chevron{flex-shrink:0;margin-left:4px;}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-btn{flex:1;padding:13px;border-radius:50px;border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.modal-btn.primary{background:#007AFF;color:#FFF;}
.modal-btn.secondary{background:#F2F2F7;color:#1C1C1E;}

/* Modal listas */
.lista-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:9998;display:none;align-items:center;justify-content:center;padding:24px;}
.lista-modal-overlay.active{display:flex;}
.lista-modal{background:#FFF;border-radius:20px;width:100%;max-width:360px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.2);}
.lista-modal-titulo{padding:16px 18px;border-bottom:0.5px solid #E5E5EA;font-size:13px;font-weight:700;color:#1C1C1E;}
.lista-modal-scroll{max-height:300px;overflow-y:auto;}
.lista-modal-item{padding:13px 18px;font-size:14px;color:#1C1C1E;border-bottom:0.5px solid #F5F5F5;cursor:pointer;}
.lista-modal-item:last-child{border-bottom:none;}
.lista-modal-item:active{background:#F5F5F5;}
.lista-modal-item.ativo{color:#007AFF;font-weight:600;}

/* Fornecedor modal */
.forn-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:9997;display:none;align-items:center;justify-content:center;padding:24px;}
.forn-modal-overlay.active{display:flex;}
.forn-modal{background:#FFF;border-radius:20px;width:100%;max-width:360px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.2);}
.forn-modal-titulo{padding:16px 18px;border-bottom:0.5px solid #E5E5EA;font-size:13px;font-weight:700;color:#1C1C1E;}
.forn-modal-scroll{max-height:400px;overflow-y:auto;}
.forn-modal-item{padding:13px 18px;font-size:14px;color:#1C1C1E;border-bottom:0.5px solid #F5F5F5;cursor:pointer;}
.forn-modal-item:last-child{border-bottom:none;}
.forn-modal-item:active{background:#F5F5F5;}
</style>
</head>
<body>

<div class="topbar">
  <button class="ios-btn-float" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#1C1C1E;stroke-width:2.2;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </button>
  <div class="topbar-copy">
    <div class="topbar-title">Prestação de Contas</div>
    <div class="topbar-sub" id="ciclo-sub">—</div>
  </div>
  <div style="width:38px;"></div>
</div>

<div class="sel-wrap">
  <div class="sel-btn" onclick="abrirFornecedores()">
    <span id="sel-nome" class="sel-hint">Selecione um fornecedor</span>
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#C7C7CC" stroke-width="2.5" stroke-linecap="round"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
  </div>
</div>

<div class="extrato" id="extrato" style="display:none;">
  <div class="ext-row">
    <span class="ext-label">Total em Aberto</span>
    <span class="ext-val red" id="ext-aberto">R$ 0,00</span>
  </div>
    <div class="ext-row">
    <span class="ext-label">Total Pagamentos</span>
    <span class="ext-val green" id="ext-pagamentos">R$ 0,00</span>
  </div>
  <div class="ext-row">
    <span class="ext-label">Estoque em Mão</span>
    <span class="ext-val green" id="ext-estoque">R$ 0,00</span>
  </div>
  <div class="ext-row">
    <span class="ext-label">Saldo Devedor</span>

    <span class="ext-val red" id="ext-saldo">R$ 0,00</span>
  </div>
</div>

<div class="lista-wrap" id="lista-wrap" style="display:none;">
  <div class="lista-titulo">Pagamentos</div>
  <div id="lista-pagamentos"></div>
</div>

<div class="rodape">
  
  <button class="rodape-btn pdf" onclick="gerarPDF()">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    PDF
  </button>
</div>

<!-- Modal editar pagamento -->
<div class="modal-overlay" id="modal-editar" onclick="fecharModalEditar()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Editar Pagamento</div>
    <div class="field-row">
      <span class="field-label">Modalidade</span>
      <div class="field-right" onclick="abrirListaModal('modalidade')">
        <span class="field-val" id="ed-modalidade">Depósito</span>
        <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="#C7C7CC" stroke-width="2.5" stroke-linecap="round"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
      </div>
    </div>
    <div class="field-row">
      <span class="field-label">Data</span>
      <div class="field-right"><input class="field-input" id="ed-data" type="date"/></div>
    </div>
    <div class="field-row">
      <span class="field-label">Depositante</span>
      <div class="field-right" onclick="abrirListaModal('depositante')">
        <span class="field-val" id="ed-depositante">Bradesco Expresso</span>
        <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="#C7C7CC" stroke-width="2.5" stroke-linecap="round"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
      </div>
    </div>
    <div class="field-row">
      <span class="field-label">Favorecido</span>
      <div class="field-right" onclick="abrirListaModal('favorecido')">
        <span class="field-val" id="ed-favorecido">Bradesco</span>
        <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="#C7C7CC" stroke-width="2.5" stroke-linecap="round"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
      </div>
    </div>
    <div class="field-row">
      <span class="field-label">Valor</span>
      <div class="field-right"><input class="field-input" id="ed-valor" type="text" inputmode="decimal"/></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="fecharModalEditar()">Cancelar</button>
      <button class="modal-btn primary" onclick="salvarEdicao()">Atualizar</button>

    </div>
  </div>
</div>

<!-- Modal lista opções -->
<div class="lista-modal-overlay" id="lista-modal" onclick="fecharListaModal()">
  <div class="lista-modal" onclick="event.stopPropagation()">
    <div class="lista-modal-titulo" id="lista-modal-titulo"></div>
    <div class="lista-modal-scroll" id="lista-modal-itens"></div>
  </div>
</div>

<!-- Modal fornecedores -->
<div class="forn-modal-overlay" id="forn-modal" onclick="fecharFornecedores()">
  <div class="forn-modal" onclick="event.stopPropagation()">
    <div class="forn-modal-titulo">Selecione o Fornecedor</div>
    <div class="forn-modal-scroll" id="forn-lista"></div>
  </div>
</div>

<script>
const fmt = v => Number(v).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
const fmtNum = v => Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});

const MODALIDADES = ['Depósito', 'Dinheiro', 'Pix'];
const DEPOSITANTES = ['Bradesco Expresso', 'Huber Martins Lima', 'Huber > Antônio', 'Huber > Zebra', 'Huber > Lorinho', 'Huber > Wilgner'];
const FAVORECIDOS = ['Bradesco', 'Itaú', ''];

let _pagamentos = [];
let _fornecedores = [];
let _fIdSelecionado = null;
let _fNomeSelecionado = null;
let _editandoIdx = null;
let _saldoPDF = 0;

let _listaModalCampo = null;
let _ciclo = null;

function init() {
  window.HHUtils.atualizarCicloAtualGlobal();
  _ciclo = window.cicloAtual;
    const { d0, d7 } = _ciclo;
  document.getElementById('ciclo-sub').textContent = `${HHUtils.formatarDataBR(d0)} — ${HHUtils.formatarDataBR(d7)}`;

  carregarFornecedores();
}

async function carregarFornecedores() {
  const { data } = await window.db.from('fornecedores').select('id, nome').order('nome');
  _fornecedores = data || [];
}

function abrirFornecedores() {
  const lista = document.getElementById('forn-lista');
  lista.innerHTML = _fornecedores.map(f =>
    `<div class="forn-modal-item" onclick="selecionarFornecedor('${f.id}','${f.nome.replace(/'/g,"\\'")}')">
      ${f.nome}
    </div>`).join('');
  document.getElementById('forn-modal').classList.add('active');
}

function fecharFornecedores() {
  document.getElementById('forn-modal').classList.remove('active');
}

async function selecionarFornecedor(id, nome) {
  _fIdSelecionado = id;
  _fNomeSelecionado = nome;
  document.getElementById('sel-nome').textContent = nome;
  document.getElementById('sel-nome').style.color = '#1C1C1E';
  fecharFornecedores();
  await carregarDados();
}

async function carregarDados() {
  const d0 = _ciclo.d0.toISOString();
  const d7Fim = new Date(_ciclo.d7);
  d7Fim.setHours(23,59,59);
  const d7 = d7Fim.toISOString();

    const [{ data: pedidos }, { data: movs }, { data: produtos }] = await Promise.all([
    window.db.from('pedidos_compras').select('em_aberto, data').eq('fornecedor_id', _fIdSelecionado),
    window.db.from('movimentos_fornecedores').select('*').eq('fornecedor_id', _fIdSelecionado).eq('status', 0).not('data', 'is', null).gte('data', d0).lte('data', d7).order('data', {ascending: true}),
    window.db.from('produtos').select('id').eq('fornecedor_id', _fIdSelecionado)
  ]);

  const produtoIds = (produtos||[]).map(p => p.id);
  let _valorEstoque = 0;
  if (produtoIds.length > 0) {
    const { data: estoqueItens } = await window.db.from('estoque_inicial').select('quantidade_inicial, custo_unitario_inicial').in('produto_id', produtoIds);
    _valorEstoque = (estoqueItens||[]).reduce((a, e) => a + (parseFloat(e.quantidade_inicial)||0) * (parseFloat(e.custo_unitario_inicial)||0), 0);
  }

  // Extrato
  const ciclo = _ciclo;
  let aberto = 0, atual = 0;
  (pedidos||[]).forEach(p => {
    const dataP = p.data ? new Date(p.data) : null;
    if (dataP && dataP >= ciclo.d0 && dataP <= ciclo.d7) atual += parseFloat(p.em_aberto) || 0;
    else aberto += parseFloat(p.em_aberto) || 0;
  });
  const totalAberto = aberto + atual;
    const totalPagamentos = (movs||[]).reduce((a, m) => a + parseFloat(m.valor), 0);
  const saldo = totalAberto - totalPagamentos - _valorEstoque;
  const saldoPDF = totalAberto - totalPagamentos;


  document.getElementById('ext-aberto').textContent = fmt(totalAberto);
  document.getElementById('ext-pagamentos').textContent = fmt(totalPagamentos);
  document.getElementById('ext-estoque').textContent = fmt(_valorEstoque);

  _saldoPDF = totalAberto - totalPagamentos;
  document.getElementById('ext-saldo').textContent = fmt(saldo);

  document.getElementById('ext-saldo').className = 'ext-val ' + (saldo > 0 ? 'red' : 'green');

  document.getElementById('extrato').style.display = 'block';

  // Pagamentos com valores default
  _pagamentos = (movs||[]).map(m => ({
    id: m.id,
    modalidade: m.forma || 'Depósito',
    data: m.data ? m.data.split('T')[0] : '',
    depositante: 'Bradesco Expresso',
    favorecido: 'Bradesco',
    valor: parseFloat(m.valor)
  }));

  renderizarLista();
  document.getElementById('lista-wrap').style.display = 'block';
}

function renderizarLista() {
  const lista = document.getElementById('lista-pagamentos');
  if (_pagamentos.length === 0) {
    lista.innerHTML = '<div class="empty-state">Nenhum pagamento no ciclo atual</div>';
    return;
  }
  lista.innerHTML = _pagamentos.map((p, i) => {
    const dataFmt = p.data ? p.data.split('-').reverse().join('/') : '—';
    const linha2 = p.depositante && p.favorecido ? `${p.depositante} → ${p.favorecido}` : p.depositante || p.favorecido || '—';
    return `<div class="pag-card" onclick="abrirModalEditar(${i})">
      <div class="pag-linha1">
        <span class="pag-modalidade">${p.modalidade}</span>
        <span class="pag-data">${dataFmt}</span>
      </div>
      <div class="pag-linha2">${linha2}</div>
      <div class="pag-valor">${fmt(p.valor)}</div>
    </div>`;
  }).join('');
}

function abrirModalEditar(idx) {
  _editandoIdx = idx;
  const p = _pagamentos[idx];
  document.getElementById('ed-modalidade').textContent = p.modalidade;
  document.getElementById('ed-data').value = p.data;
  document.getElementById('ed-depositante').textContent = p.depositante;
  document.getElementById('ed-favorecido').textContent = p.favorecido || '—';
  document.getElementById('ed-valor').value = fmtNum(p.valor);
  document.getElementById('modal-editar').classList.add('active');
}

function fecharModalEditar() {
  document.getElementById('modal-editar').classList.remove('active');
  _editandoIdx = null;
}

function salvarEdicao() {
  if (_editandoIdx === null) return;
  const p = _pagamentos[_editandoIdx];
  p.modalidade = document.getElementById('ed-modalidade').textContent;
  p.data = document.getElementById('ed-data').value;
  p.depositante = document.getElementById('ed-depositante').textContent;
  const favText = document.getElementById('ed-favorecido').textContent;
  p.favorecido = favText === '—' ? '' : favText;
  p.valor = parseFloat(document.getElementById('ed-valor').value.replace(/\./g,'').replace(',','.')) || p.valor;
  fecharModalEditar();
  renderizarLista();
}

function abrirListaModal(campo) {
  _listaModalCampo = campo;
  const titulos = { modalidade: 'Modalidade', depositante: 'Depositante', favorecido: 'Favorecido' };
  const opcoes = campo === 'modalidade' ? MODALIDADES : campo === 'depositante' ? DEPOSITANTES : FAVORECIDOS;
  const valorAtual = document.getElementById(`ed-${campo}`).textContent;
  document.getElementById('lista-modal-titulo').textContent = titulos[campo];
  document.getElementById('lista-modal-itens').innerHTML = opcoes.map(o =>
    `<div class="lista-modal-item ${o === valorAtual ? 'ativo' : ''}" onclick="selecionarOpcao('${o.replace(/'/g,"\\'")}')">
      ${o || '— Sem favorecido —'}
    </div>`).join('');
  document.getElementById('lista-modal').classList.add('active');
}

function fecharListaModal() {
  document.getElementById('lista-modal').classList.remove('active');
}

function selecionarOpcao(valor) {
  const el = document.getElementById(`ed-${_listaModalCampo}`);
  el.textContent = valor || '—';
  fecharListaModal();
}



function gerarPDF() {
  if (!_fNomeSelecionado) return alert('Selecione um fornecedor');

  const cicloTexto = document.getElementById('ciclo-sub').textContent;
  const aberto = document.getElementById('ext-aberto').textContent;
  const pagamentos = document.getElementById('ext-pagamentos').textContent;
    const saldo = fmt(_saldoPDF);
  const saldoVermelho = _saldoPDF > 0;


  const linhas = _pagamentos.map(p => {
    const dataFmt = p.data ? p.data.split('-').reverse().join('/') : '—';
    return `<tr>
      <td>${p.modalidade}</td>
      <td>${dataFmt}</td>
      <td>${p.depositante}</td>
      <td>${p.favorecido || '—'}</td>
      <td style="text-align:right;color:#EF4444;font-weight:600;">${fmt(p.valor)}</td>
    </tr>`;
  }).join('');

  const html = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Prestação de Contas - ${_fNomeSelecionado}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#FFF;color:#1C1C1E;padding:32px 24px;}
.rel-brand{font-size:13px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.rel-fornecedor{font-size:20px;font-weight:800;color:#1C1C1E;margin-bottom:24px;}

.rel-ciclo{font-size:12px;color:#8E8E93;margin-bottom:24px;}
.resumo-card{border:1px solid #E5E5EA;border-radius:14px;overflow:hidden;margin-bottom:16px;}
.resumo-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:0.5px solid #F5F5F5;}
.resumo-row:last-child{border-bottom:none;}
.resumo-label{font-size:12px;color:#8E8E93;}
.resumo-val{font-size:13px;font-weight:600;}
.resumo-val.red{color:#EF4444;}
.resumo-val.green{color:#10B981;}
.pag-card{border:1px solid #E5E5EA;border-radius:14px;overflow:hidden;}
