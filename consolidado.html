<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Consolidado</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;
  --card:#FFFFFF;
  --border:#E5E7EB;
  --text:#111827;
  --muted:#4B5563;
  --pos:#16A34A;
  --neg:#DC2626;
  --blue:#2563EB;
  --accent:#2563EB;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* TOPBAR */
.topbar{
  position:sticky;top:0;z-index:200;
  height:56px;padding:0 20px;
  padding-top:env(safe-area-inset-top);
  background:var(--bg);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.btn-back{width:36px;height:36px;border-radius:50%;border:none;background:var(--card);display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,0.08);cursor:pointer;}
.topbar-title{font-size:15px;font-weight:800;color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.fx-badge{background:var(--card);border:1px solid var(--border);border-radius:100px;padding:5px 12px;display:flex;align-items:center;gap:6px;}
.fx-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.5px;}
.fx-val{font-size:13px;font-weight:800;color:var(--text);}
.btn-refresh{width:36px;height:36px;border-radius:50%;border:none;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(37,99,235,0.3);}
.btn-refresh:active{opacity:0.8}
.btn-refresh svg{stroke:#FFF;}

/* CONTEÚDO */
.content{padding:16px 16px calc(32px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;}

/* SEÇÃO */
.section-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card{background:var(--card);border-radius:16px;padding:14px 16px;border:1px solid var(--border);}
.card-label{font-size:10px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.card-value{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.card-sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:3px;}
.card.full{grid-column:1/-1;}
.card.highlight{background:var(--accent);border-color:var(--accent);}
.card.highlight .card-label{color:rgba(255,255,255,0.7);}
.card.highlight .card-value{color:#FFF;}
.card.highlight .card-sub{color:rgba(255,255,255,0.7);}

/* CORRETORAS */
.corretoras-list{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;}
.corretora-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #F3F4F6;}
.corretora-row:last-child{border-bottom:none;}
.corretora-nome{font-size:13px;font-weight:600;color:var(--text);}
.corretora-moeda{font-size:11px;color:#4B5563;font-weight:600;}
.corretora-saldo{text-align:right;}
.corretora-saldo-val{font-size:14px;font-weight:800;color:var(--blue);}
.corretora-saldo-pct{font-size:11px;color:var(--muted);margin-top:1px;}
.corretora-total{background:#EFF6FF;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;}

.corretora-total-label{font-size:12px;font-weight:700;color:#374151;}
.corretora-total-val{font-size:15px;font-weight:800;color:var(--text);}

/* TABELAS */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:16px;border:1px solid var(--border);background:var(--card);}
.table-wrap::-webkit-scrollbar{height:4px;}
.table-wrap::-webkit-scrollbar-track{background:transparent;}
.table-wrap::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:2px;}
table{border-collapse:collapse;min-width:100%;font-size:12px;}
thead th{
  padding:10px 14px;text-align:right;
  font-size:9px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.6px;
  background:#F9FAFB;border-bottom:1px solid var(--border);
  white-space:nowrap;
}
thead th:first-child{text-align:left;position:sticky;left:0;background:#F9FAFB;z-index:10;}
tbody tr{border-bottom:1px solid #F3F4F6;}
tbody tr:last-child{border-bottom:none;}
tbody tr:active{background:#F9FAFB;}
tbody td{padding:11px 14px;text-align:right;white-space:nowrap;font-weight:600;color:var(--text);}
tbody td:first-child{text-align:left;position:sticky;left:0;background:var(--card);z-index:5;font-weight:700;}
tfoot td{padding:10px 14px;text-align:right;font-size:11px;font-weight:800;background:#F9FAFB;border-top:2px solid var(--border);white-space:nowrap;}
tfoot td:first-child{text-align:left;position:sticky;left:0;background:#F9FAFB;z-index:5;}

/* TICKER BADGE */
.ticker-badge{display:inline-flex;align-items:center;gap:6px;}
.ticker-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* TIPO BADGE */
.tipo-badge{display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;}
.tipo-long{background:#E1F9F0;color:#10B981;}
.tipo-short{background:#EDE9FE;color:#7C3AED;}

/* CORES */
.pos{color:var(--pos)!important}
.neg{color:var(--neg)!important}
.blue{color:var(--blue)!important}
.muted{color:var(--muted)!important}

/* RESUMO FINANCEIRO */
.resumo-list{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;}
.resumo-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #F3F4F6;}
.resumo-row:last-child{border-bottom:none;}
.resumo-label{font-size:13px;color:#374151;font-weight:500;}
.resumo-value{font-size:14px;font-weight:800;}
.resumo-row.destaque{background:#F9FAFB;}
.resumo-row.destaque .resumo-label{color:var(--text);font-weight:700;}
.btn-dizimos{width:100%;padding:13px;background:#F9FAFB;border:1px dashed var(--border);border-radius:12px;font-size:13px;font-weight:700;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;margin-top:8px;}
.btn-dizimos:active{background:#F3F4F6;}

/* OPERAÇÕES MENSAIS */
.mes-header{font-size:11px;font-weight:700;color:var(--muted);padding:8px 14px;background:#F9FAFB;border-bottom:1px solid #F3F4F6;letter-spacing:0.5px;}

/* SPINNER */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.spinner-wrap{display:flex;align-items:center;justify-content:center;gap:8px;}
.spinner{width:18px;height:18px;border:2px solid #E5E7EB;border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{display:none;position:fixed;inset:0;z-index:2000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex}
.modal-sheet{background:#FFF;border-radius:24px;padding:26px 20px 22px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,0.18),0 4px 16px rgba(0,0,0,0.10);animation:modalPop 0.28s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes modalPop{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px;text-align:center;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.modal-field-full{margin-bottom:10px;}
.modal-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block;}
.modal-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);background:#FFF;outline:none;box-sizing:border-box;min-width:0;}
.modal-input:focus{border-color:var(--blue)}
.modal-divider{height:1px;background:#F2F2F7;margin:14px 0;}
.modal-info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;}
.modal-info-label{font-size:13px;color:var(--muted);font-weight:500;}
.modal-info-value{font-size:13px;font-weight:800;color:var(--text);}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-btn-cancelar{flex:1;padding:11px;background:#F2F2F7;color:var(--text);border:none;border-radius:100px;font-size:14px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;}
.modal-btn-salvar{flex:1;padding:11px;background:var(--blue);color:#FFF;border:none;border-radius:100px;font-size:14px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;}
.modal-btn-salvar:disabled{opacity:0.4;pointer-events:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <button class="btn-back" onclick="window.history.back()">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#1C1C1E;stroke-width:2.5;fill:none"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
    </button>
    <span class="topbar-title">Consolidado</span>
  </div>
  <div class="topbar-right">
    <div class="fx-badge">
      <span class="fx-label">USD/BRL</span>
      <span class="fx-val" id="fx-val">—</span>
    </div>
    <button class="btn-refresh" onclick="init()" title="Atualizar">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke-width:2.2;fill:none"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    </button>
  </div>
</div>

<div class="content" id="content">
  <div class="loading"><div class="spinner-wrap"><div class="spinner"></div><span>Carregando...</span></div></div>
</div>

<!-- Modal Dízimos -->
<div class="modal-overlay" id="modal-dizimos" onclick="if(event.target===this)fecharModalDizimos()">
  <div class="modal-sheet">
    <div class="modal-title">🕊️ Dízimos e Ofertas</div>
    <div class="modal-info-row">
      <span class="modal-info-label">PnL Acumulado (BRL)</span>
      <span class="modal-info-value" id="diz-pnl">—</span>
    </div>
    <div class="modal-info-row">
      <span class="modal-info-label">Total já Pago</span>
      <span class="modal-info-value" id="diz-pago">—</span>
    </div>
    <div class="modal-info-row">
      <span class="modal-info-label">Dízimos Devidos (20%)</span>
      <span class="modal-info-value" id="diz-devido" style="color:var(--blue)">—</span>
    </div>
    <div class="modal-info-row" style="border-top:1px solid #F2F2F7;padding-top:12px;margin-top:4px;">
      <span class="modal-info-label" style="font-weight:700;color:var(--text)">Saldo Pendente</span>
      <span class="modal-info-value" id="diz-pendente" style="font-size:16px;">—</span>
    </div>
    <div class="modal-info-row">
      <span class="modal-info-label">Último Pagamento</span>
      <span class="modal-info-value" id="diz-ultimo" style="font-size:12px;color:var(--muted)">—</span>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-grid">
      <div>
        <label class="modal-label">Valor Pago (BRL)</label>
        <input id="diz-valor" class="modal-input" type="tel" inputmode="decimal" placeholder="0,00">
      </div>
      <div>
        <label class="modal-label">Data</label>
        <input id="diz-data" class="modal-input" type="date">
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn-cancelar" onclick="fecharModalDizimos()">Cancelar</button>
      <button class="modal-btn-salvar" id="diz-btn-salvar" onclick="registrarPagamento()">Pagar</button>
    </div>
  </div>
</div>

<script>
const API_KEY = '3366384ac03a400c84f239e16cb5c4bd';
const db = window.db;

let _fxRate = 1;

const fmtUSD = v => parseFloat(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtBRL = v => parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtQtd = v => parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:8});
const fmtPct = v => (parseFloat(v||0)*100).toFixed(2) + '%';
const colorCls = v => v > 0 ? 'pos' : v < 0 ? 'neg' : 'muted';
const colorSign = v => v > 0 ? '+' : '';

async function fetchFX() {
  try {
    const r = await fetch(`https://api.twelvedata.com/price?symbol=USD/BRL&apikey=${API_KEY}`);
    const d = await r.json();
    _fxRate = parseFloat(d.price) || 1;
    document.getElementById('fx-val').textContent = fmtBRL(_fxRate);
  } catch(e) { console.error('FX error', e); }
}

async function fetchCotacoes(tickers) {
  const mapa = {};
  if (!tickers.length) return mapa;
  try {
    const simbolos = tickers.join(',');
    const r = await fetch(`https://api.twelvedata.com/price?symbol=${simbolos}&apikey=${API_KEY}`);
    const d = await r.json();
    tickers.forEach(t => {
      if (tickers.length === 1) {
        mapa[t] = parseFloat(d.price) || 0;
      } else {
        mapa[t] = parseFloat(d[t]?.price) || 0;
      }
    });
  } catch(e) { console.error('Cotações error', e); }
  return mapa;
}

function calcularPosicoes(transacoes) {
  const porAtivo = {};
  transacoes.forEach(t => {
    const key = t.ativo_id;
    if (!porAtivo[key]) porAtivo[key] = { ticker: t.ativos?.ticker || '?', nome: t.ativos?.nome || '', transacoes: [] };
    porAtivo[key].transacoes.push(t);
  });

  const abertas = [];   // posições long abertas
  const shorts = [];    // posições short abertas
  const realizados = {};

  Object.entries(porAtivo).forEach(([id, ativo]) => {
    const sorted = [...ativo.transacoes].sort((a,b) => new Date(a.data)-new Date(b.data));

    // Long
    let qtdAberta = 0, custoAberto = 0, pm = 0;
    let lucroRealizado = 0, custoRealizado = 0, receitaVendas = 0;

    // Short
    let qtdShort = 0, custoShort = 0, pmShort = 0;
    let lucroShort = 0;

    sorted.forEach(t => {
      const qtd = parseFloat(t.quantidade_ativo)||0;
      const valor = parseFloat(t.valor_total_usd)||0;

      if (t.tipo_operacao === 'LA') {
        const novoCusto = custoAberto + valor;
        const novaQtd = qtdAberta + qtd;
        pm = novaQtd > 0 ? novoCusto/novaQtd : 0;
        qtdAberta = novaQtd;
        custoAberto = novoCusto;
      } else if (t.tipo_operacao === 'LF') {
        const custo = qtd * pm;
        lucroRealizado += valor - custo;
        custoRealizado += custo;
        receitaVendas += valor;
        qtdAberta -= qtd;
        custoAberto = qtdAberta * pm;
      } else if (t.tipo_operacao === 'SA') {
        const novoCusto = custoShort + valor;
        const novaQtd = qtdShort + qtd;
        pmShort = novaQtd > 0 ? novoCusto/novaQtd : 0;
        qtdShort = novaQtd;
        custoShort = novoCusto;
      } else if (t.tipo_operacao === 'SF') {
        // Lucro short = preço entrada - preço fechamento
        const receitaShort = qtd * pmShort;
        lucroShort += receitaShort - valor;
        qtdShort -= qtd;
        custoShort = qtdShort * pmShort;
      }
    });

    if (qtdAberta > 0.0000001) {
      abertas.push({ id, ticker: ativo.ticker, nome: ativo.nome, qtdAberta, pm, custoAberto, lucroRealizado, custoRealizado, tipo: 'long' });
    }

    if (qtdShort > 0.0000001) {
      shorts.push({ id, ticker: ativo.ticker, nome: ativo.nome, qtdShort, pmShort, custoShort, lucroShort, tipo: 'short' });
    }

    realizados[id] = {
      ticker: ativo.ticker,
      lucroRealizado: lucroRealizado + lucroShort,
      lucroLong: lucroRealizado,
      lucroShort,
      custoRealizado,
      receitaVendas
    };
  });

  return { abertas, shorts, realizados };
}

function calcularSaldosCorretoras(corretoras, transferencias, transacoes, posicoesComCotacao, shortsComCotacao) {
  return corretoras.map(c => {
    const movimentos = transferencias.filter(t => t.corretora_id === c.id);
    let saldo = 0;
    movimentos.forEach(m => {
      if (m.tipo === 'D') saldo += parseFloat(m.valor_destino)||0;
      else saldo -= parseFloat(m.valor_origem)||0;
    });

    const ativosCorretora = transacoes.filter(t => t.ativos?.corretora_id === c.id);
    ativosCorretora.forEach(t => {
      const valor = parseFloat(t.valor_total_usd)||0;
      // LA/SA debitam spot; LF/SF creditam spot
      if (t.tipo_operacao === 'LA' || t.tipo_operacao === 'SA') saldo -= valor;
      else if (t.tipo_operacao === 'LF' || t.tipo_operacao === 'SF') saldo += valor;
    });

    const idsAtivosCorretora = [...new Set(ativosCorretora.map(t => t.ativo_id))];
    const longAbertos = (posicoesComCotacao || []).filter(p => idsAtivosCorretora.includes(p.id));
    const futurosAbertos = (shortsComCotacao || []).filter(p => idsAtivosCorretora.includes(p.id));
    const totalFuturos = futurosAbertos.reduce((s, p) => s + p.custoShort, 0);

    return { ...c, saldo, longAbertos, futurosAbertos, totalFuturos };
  });
}

function calcularRealizadoMensal(transacoes) {
  const porAtivo = {};
  transacoes.forEach(t => {
    if (!porAtivo[t.ativo_id]) porAtivo[t.ativo_id] = [];
    porAtivo[t.ativo_id].push(t);
  });

  const meses = {};
  Object.values(porAtivo).forEach(lista => {
    const sorted = [...lista].sort((a,b) => new Date(a.data)-new Date(b.data));

    // Long
    let qtd = 0, custo = 0, pm = 0;
    // Short
    let qtdS = 0, custoS = 0, pmS = 0;

    sorted.forEach(t => {
      const q = parseFloat(t.quantidade_ativo)||0;
      const v = parseFloat(t.valor_total_usd)||0;
      const d = new Date(t.data);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!meses[key]) meses[key] = { receita:0, custo:0 };

      if (t.tipo_operacao === 'LA') {
        custo += v; qtd += q;
        pm = qtd > 0 ? custo/qtd : 0;
      } else if (t.tipo_operacao === 'LF') {
        const custoVenda = q * pm;
        meses[key].receita += v;
        meses[key].custo += custoVenda;
        qtd -= q; custo = qtd * pm;
      } else if (t.tipo_operacao === 'SA') {
        custoS += v; qtdS += q;
        pmS = qtdS > 0 ? custoS/qtdS : 0;
      } else if (t.tipo_operacao === 'SF') {
        // Lucro short = entrada - fechamento
        const lucroShort = (q * pmS) - v;
        meses[key].receita += lucroShort > 0 ? lucroShort : 0;
        meses[key].custo += lucroShort < 0 ? Math.abs(lucroShort) : 0;
        qtdS -= q; custoS = qtdS * pmS;
      }
    });
  });
  return meses;
}

async function init() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner-wrap"><div class="spinner"></div><span>Carregando dados...</span></div></div>';

  const [txRes, corrRes, trRes] = await Promise.all([
    db.from('transacoes').select('*, ativos(ticker, nome, corretora_id)').order('data'),
    db.from('corretoras').select('*').order('nome'),
    db.from('transferencias').select('*').order('data')
  ]);

  const transacoes = txRes.data || [];
  const corretoras = corrRes.data || [];
  const transferencias = trRes.data || [];

  await fetchFX();

  const { abertas, shorts, realizados } = calcularPosicoes(transacoes);

  // Cotações: long abertos + short abertos
  const tickersLong = [...new Set(abertas.map(a => a.ticker))];
  const tickersShort = [...new Set(shorts.map(s => s.ticker))];
  const tickersTodos = [...new Set([...tickersLong, ...tickersShort])];
  const cotacoes = await fetchCotacoes(tickersTodos);

  // Posições long com cotação (antes de calcular saldos)
  const posicoesComCotacao = abertas.map(a => {
    const cotacao = cotacoes[a.ticker] || 0;
    const valorMercado = a.qtdAberta * cotacao;
    const resultadoAberto = valorMercado - a.custoAberto;
    const drawdown = a.pm > 0 ? (cotacao - a.pm) / a.pm : 0;
    const exposicao = valorMercado > 0 ? valorMercado / (valorMercado + 1) : 0; // placeholder, recalculado abaixo
    return { ...a, cotacao, valorMercado, resultadoAberto, drawdown, exposicao };
  });

  // Posições short com cotação (antes de calcular saldos)
  const shortsComCotacao = shorts.map(s => {
    const cotacao = cotacoes[s.ticker] || 0;
    const resultadoAberto = (s.pmShort - cotacao) * s.qtdShort;
    const drawdown = s.pmShort > 0 ? (cotacao - s.pmShort) / s.pmShort : 0;
    return { ...s, cotacao, resultadoAberto, drawdown };
  });

  const corretorasComSaldo = calcularSaldosCorretoras(corretoras, transferencias, transacoes, posicoesComCotacao, shortsComCotacao);
  const totalSaldo = corretorasComSaldo.reduce((s, c) => s + c.saldo, 0);

  // Recalcular exposição com totalSaldo correto
  posicoesComCotacao.forEach(p => {
    p.exposicao = totalSaldo + p.valorMercado > 0 ? p.valorMercado / (totalSaldo + p.valorMercado) : 0;
  });

  const totalValorMercadoLong = posicoesComCotacao.reduce((s, p) => s + p.valorMercado, 0);
  const totalCustoAbertoLong = posicoesComCotacao.reduce((s, p) => s + p.custoAberto, 0);
  const totalResultadoAbertoLong = totalValorMercadoLong - totalCustoAbertoLong;

  const totalResultadoAbertoShort = shortsComCotacao.reduce((s, p) => s + p.resultadoAberto, 0);
  const totalResultadoAberto = totalResultadoAbertoLong + totalResultadoAbertoShort;

  const totalCarteira = totalSaldo + totalValorMercadoLong;

  const totalLucroRealizado = Object.values(realizados).reduce((s, r) => s + r.lucroRealizado, 0);
  const totalCustoRealizado = Object.values(realizados).reduce((s, r) => s + r.custoRealizado, 0);
  const totalReceita = Object.values(realizados).reduce((s, r) => s + r.receitaVendas, 0);
  const resultadoGeral = totalResultadoAberto + totalLucroRealizado;

  const meses = calcularRealizadoMensal(transacoes);

  renderizar({
    corretorasComSaldo, totalSaldo, totalCarteira,
    posicoesComCotacao, shortsComCotacao,
    totalValorMercadoLong, totalCustoAbertoLong,
    totalResultadoAbertoLong, totalResultadoAbertoShort, totalResultadoAberto,
    totalLucroRealizado, totalCustoRealizado, totalReceita, resultadoGeral,
    realizados, meses
  });
}

const TICKER_COLORS = ['#2563EB','#16A34A','#DC2626','#D97706','#7C3AED','#0891B2','#BE185D','#065F46'];
const _colorCache = {};
let _colorIdx = 0;
function tickerColor(ticker) {
  if (!_colorCache[ticker]) { _colorCache[ticker] = TICKER_COLORS[_colorIdx++ % TICKER_COLORS.length]; }
  return _colorCache[ticker];
}

let _pnlBRL = 0;

async function abrirModalDizimos() {
  const { data } = await db.from('dizimos_ofertas').select('*').order('data', {ascending:false});
  const pagamentos = data || [];
  const totalPago = pagamentos.reduce((s, p) => s + parseFloat(p.valor_pago||0), 0);
  const devido = _pnlBRL * 0.20;
  const pendente = devido - totalPago;
  const ultimo = pagamentos[0] ? new Date(pagamentos[0].data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}) + ' · BRL ' + fmtBRL(pagamentos[0].valor_pago) : 'Nenhum';

  document.getElementById('diz-pnl').textContent = 'BRL ' + fmtBRL(_pnlBRL);
  document.getElementById('diz-pago').textContent = 'BRL ' + fmtBRL(totalPago);
  document.getElementById('diz-devido').textContent = 'BRL ' + fmtBRL(devido);
  const pendEl = document.getElementById('diz-pendente');
  pendEl.textContent = 'BRL ' + fmtBRL(pendente);
  pendEl.style.color = pendente > 0 ? 'var(--neg)' : 'var(--pos)';
  document.getElementById('diz-ultimo').textContent = ultimo;

  const hoje = new Date();
  document.getElementById('diz-data').value = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
  document.getElementById('diz-valor').value = '';

  document.getElementById('modal-dizimos').classList.add('active');
}

function fecharModalDizimos() {
  document.getElementById('modal-dizimos').classList.remove('active');
}

const mascaraDiz = inp => {
  let v = inp.value.replace(/\D/g,'');
  if (!v) { inp.value=''; return; }
  inp.value = (parseInt(v)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
};
document.getElementById('diz-valor').addEventListener('input', function(){ mascaraDiz(this); });

async function registrarPagamento() {
  const valor_pago = parseFloat(document.getElementById('diz-valor').value.replace(/\./g,'').replace(',','.')) || 0;
  const data = document.getElementById('diz-data').value;
  if (!valor_pago || !data) return;
  document.getElementById('diz-btn-salvar').disabled = true;
  const { error } = await db.from('dizimos_ofertas').insert({ data: data+'T12:00:00-04:00', valor_pago });
  document.getElementById('diz-btn-salvar').disabled = false;
  if (!error) fecharModalDizimos();
}

const fixHeight = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', fixHeight); fixHeight();
init();
